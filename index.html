<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF翻訳ビューア</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --panel-soft: #f1f6f5;
      --ink: #18212f;
      --muted: #617086;
      --line: #d8dee8;
      --blue: #2359a7;
      --blue-soft: #e8f0ff;
      --green: #12786b;
      --amber: #9a6500;
      --red: #a73d2a;
      --shadow: 0 8px 22px rgba(24, 33, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      margin: 0;
    }

    button, input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      align-items: center;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 16px;
      min-height: 64px;
      padding: 12px 18px;
    }

    .brand {
      min-width: 210px;
    }

    .brand h1 {
      font-size: 1.12rem;
      line-height: 1.2;
      margin: 0;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.84rem;
      margin: 3px 0 0;
    }

    .search {
      flex: 1;
      min-width: 180px;
      position: relative;
    }

    .search input {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      height: 40px;
      outline: none;
      padding: 0 12px;
      width: 100%;
    }

    .search input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(35, 89, 167, 0.16);
    }

    .toolbar {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      position: relative;
    }

    .toolbar-status {
      color: var(--muted);
      font-size: 0.78rem;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-menu {
      position: relative;
    }

    .menu-trigger {
      min-width: 92px;
    }

    .menu-panel {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: none;
      gap: 12px;
      max-height: calc(100vh - 92px);
      overflow: auto;
      padding: 12px;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: min(330px, calc(100vw - 36px));
      z-index: 30;
    }

    .viewer-menu.menu-open .menu-panel {
      display: grid;
    }

    .menu-section {
      display: grid;
      gap: 6px;
    }

    .menu-section-title {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0;
      margin: 0;
    }

    .menu-actions {
      display: grid;
      gap: 6px;
    }

    .print-settings {
      display: grid;
      gap: 8px;
    }

    .print-orientation {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .print-check {
      align-items: center;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      font-size: 0.84rem;
      gap: 8px;
      line-height: 1.35;
      min-height: 30px;
    }

    .print-check input {
      height: 16px;
      margin: 0;
      width: 16px;
    }

    .print-note {
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.45;
      margin: 0;
    }

    .button {
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      height: 36px;
      justify-content: center;
      padding: 0 12px;
      text-decoration: none;
      white-space: nowrap;
    }

    .menu-panel .button,
    .menu-panel .tab {
      justify-content: flex-start;
      width: 100%;
    }

    .button:hover {
      border-color: #9db2d3;
      color: var(--blue);
    }

    .button.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #ffffff;
    }

    .button.active {
      background: #eaf7f4;
      border-color: #75b7aa;
      color: var(--green);
      font-weight: 700;
    }

    .button.danger {
      background: #ffffff;
      border-color: #d8aaa1;
      color: var(--red);
    }

    .button.danger:hover {
      background: #fff2ef;
      border-color: var(--red);
      color: var(--red);
    }

    .layout {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      min-height: 0;
    }

    .layout.sidebar-collapsed {
      grid-template-columns: 52px minmax(0, 1fr);
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .layout.sidebar-collapsed .sidebar {
      overflow: hidden;
      padding: 8px;
    }

    .sidebar-content {
      min-width: 0;
    }

    .layout.sidebar-collapsed .sidebar-content {
      display: none;
    }

    .sidebar-rail-button {
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--blue);
      cursor: pointer;
      display: none;
      font-weight: 700;
      height: 100%;
      justify-content: center;
      min-height: 140px;
      padding: 8px 4px;
      text-orientation: mixed;
      writing-mode: vertical-rl;
      width: 100%;
    }

    .layout.sidebar-collapsed .sidebar-rail-button {
      display: flex;
    }

    .summary {
      align-items: center;
      color: var(--muted);
      display: flex;
      font-size: 0.86rem;
      gap: 8px;
      justify-content: space-between;
      margin: 0 0 10px;
    }

    .summary-info {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .sidebar-toggle {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      flex: 0 0 auto;
      height: 30px;
      padding: 0 9px;
    }

    .sidebar-toggle:hover,
    .sidebar-rail-button:hover {
      border-color: #9db2d3;
      color: var(--blue);
    }

    .paper-list {
      display: grid;
      gap: 10px;
    }

    .paper {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      padding: 12px;
      text-align: left;
      width: 100%;
    }

    .paper:hover {
      border-color: #9db2d3;
      box-shadow: 0 4px 14px rgba(24, 33, 47, 0.08);
    }

    .paper.active {
      background: var(--blue-soft);
      border-color: #7fa3db;
    }

    .paper-title {
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.35;
      margin: 0 0 8px;
      overflow-wrap: anywhere;
    }

    .meta {
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      font-size: 0.78rem;
      gap: 6px;
      margin: 0;
    }

    .tag {
      background: #eef3f2;
      border: 1px solid #d5e2df;
      border-radius: 999px;
      color: var(--green);
      display: inline-flex;
      line-height: 1;
      padding: 5px 8px;
    }

    .viewer {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .viewer-head {
      align-items: center;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr);
      min-height: 74px;
      padding: 12px 16px;
    }

    .viewer-title {
      min-width: 0;
    }

    .viewer-title h2 {
      font-size: 1rem;
      line-height: 1.3;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-title p {
      color: var(--muted);
      font-size: 0.82rem;
      margin: 4px 0 0;
    }

    .view-tabs {
      display: grid;
      gap: 6px;
    }

    .tab {
      align-items: flex-start;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 2px;
      min-height: 48px;
      padding: 7px 10px;
      text-align: left;
      white-space: normal;
    }

    .tab-label {
      font-weight: 700;
      line-height: 1.2;
    }

    .tab-description {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.25;
    }

    .tab:hover {
      border-color: #9db2d3;
    }

    .tab.active {
      background: #eaf7f4;
      border-color: #75b7aa;
      color: var(--green);
    }

    .tab.active .tab-description {
      color: #367e73;
    }

    .frame-wrap {
      background: #cfd6e2;
      min-height: 0;
      padding: 10px;
    }

    iframe {
      background: #ffffff;
      border: 1px solid #b9c2d0;
      border-radius: 8px;
      box-shadow: var(--shadow);
      height: 100%;
      width: 100%;
    }

    .print-mode-bar {
      align-items: center;
      background: #243447;
      color: #ffffff;
      display: none;
      gap: 10px;
      justify-content: space-between;
      min-height: 48px;
      padding: 8px 14px;
    }

    .print-mode-bar-title {
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .print-mode-bar-actions {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
    }

    .print-mode-bar .button {
      height: 32px;
    }

    body.print-preview-mode {
      background: #d8dee8;
    }

    body.print-preview-mode .topbar {
      display: none;
    }

    body.print-preview-mode .print-mode-bar {
      display: flex;
    }

    body.print-preview-mode .layout {
      display: block;
      min-height: calc(100vh - 48px);
    }

    body.print-preview-mode .sidebar,
    body.print-preview-mode .viewer-head {
      display: none;
    }

    body.print-preview-mode .viewer,
    body.print-preview-mode .frame-wrap {
      display: block;
      height: calc(100vh - 48px);
      min-height: 0;
    }

    body.print-preview-mode .frame-wrap {
      background: #d8dee8;
      padding: 0;
    }

    body.print-preview-mode iframe {
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .empty {
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      display: none;
      height: 100%;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .closed {
      align-items: center;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      min-height: 100vh;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .closed-box {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      max-width: 520px;
      padding: 24px;
    }

    .closed-box h1 {
      font-size: 1.15rem;
      margin: 0 0 8px;
    }

    .closed-box p {
      color: var(--muted);
      margin: 0;
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: stretch;
        display: grid;
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .menu-panel {
        left: 0;
        right: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(220px, 36vh) 1fr;
      }

      .layout.sidebar-collapsed {
        grid-template-columns: 1fr;
        grid-template-rows: 52px 1fr;
      }

      .sidebar {
        border-bottom: 1px solid var(--line);
        border-right: 0;
      }

      .sidebar-rail-button {
        height: 36px;
        min-height: 36px;
        text-orientation: initial;
        writing-mode: horizontal-tb;
      }

      .viewer-head {
        grid-template-columns: 1fr;
      }

      .viewer-title h2 {
        white-space: normal;
      }
    }
  </style>
</head>

    const staticZoteroMetadata = {"drivers-passing-cyclists-how-does-sight-distance-affect-safety-results-from-a-naturalistic-study": {"id": "drivers-passing-cyclists-how-does-sight-distance-affect-safety-results-from-a-naturalistic-study", "stem": "Drivers passing cyclists How does sight distance affect safety Results from a naturalistic study", "title": "Drivers passing cyclists: How does sight distance affect safety? Results from a naturalistic study", "creators": [{"firstName": "Alexander", "lastName": "Rasch"}, {"firstName": "Yury", "lastName": "Tarakanov"}, {"firstName": "Gustav", "lastName": "Tellwe"}, {"firstName": "Marco", "lastName": "Dozza"}], "DOI": "10.1016/j.jsr.2023.09.006", "url": "https://doi.org/10.1016/j.jsr.2023.09.006", "keywords": ["Cyclist safety", "Overtaking", "Sight distance", "Naturalistic data", "Bayesian model"], "abstractNote": "Introduction: Cycling is popular for its ecological, economic, and health benefits. However, especially in rural areas, cyclists may need to share the road with motorized traffic, which is often perceived as a threat. Overtaking a cyclist is a particularly critical maneuver for drivers as they need to control their lateral clearance and speed when passing the cyclist, possibly in the presence of oncoming vehicles or viewobstructing curves. An overtaking vehicle can destabilize the cyclist when passing with low clearance and high speed. At the same time, the cyclist may get scared and eventually stop cycling. In this work, we investigated how visibility regarding available sight distance—an important factor for infrastructure design and regulation—affects drivers’ behavior when overtaking cyclists. Method: Using four roadsidebased traffic sensors, we collected naturalistic data that contained kinematics of drivers overtaking cyclists on a rural road in Sweden. We modeled lateral clearance and speed at the passing moment in response to variables such as sight distance and oncoming traffic with a Bayesian multivariate approach. Results: Fitted on 81 maneuvers, the model revealed that drivers reduced lateral clearance under reduced sight distance. Speed was similarly reduced, however, not as clearly. When an oncoming vehicle was present, it had a similar—yet stronger—effect than sight distance. While we found an overall correlation between clearance and speed, some maneuvers were recorded at critically low clearance. Conclusions: Cyclists’ safety is endangered when passed by drivers under reduced visibility or close to oncoming traffic. Practical Applications: Decision-making for infrastructure and policymaking should aim at prohibiting overtaking in areas with reduced visibility or close oncoming traffic. The model developed in this study may serve as a reference to vehicle active-safety systems and automated driving. The collected and processed data may support evaluating driver models fitted on less ecologically valid data and simulated active-safety systems. 2023 The Author(s).", "pdf": "", "pdfUrl": "Drivers%20passing%20cyclists%20How%20does%20sight%20distance%20affect%20safety%20Results%20from%20a%20naturalistic%20study.pdf", "pdfUri": "", "readerUrl": "translated_ja_research_reader/Drivers%20passing%20cyclists%20How%20does%20sight%20distance%20affect%20safety%20Results%20from%20a%20naturalistic%20study.ja.reader.html", "readerJson": "", "publicationTitle": "Journal of Safety Research", "volume": "87", "date": "2023", "pages": "76-85"}, "investigation-on-road-traffic-safety-in-rural-areas": {"id": "investigation-on-road-traffic-safety-in-rural-areas", "stem": "Investigation on road traffic safety in rural areas", "title": "Investigation on road traffic safety in rural areas using trajectory data: case studies at two measurement sites", "creators": [{"firstName": "Lars", "lastName": "Klitzke"}, {"firstName": "Claudia", "lastName": "Leschik"}, {"firstName": "Richard", "lastName": "Lüdtke"}, {"firstName": "Kay", "lastName": "Gimm"}], "DOI": "10.55329/ditw1500", "url": "https://doi.org/10.55329/ditw1500", "keywords": ["behavior analysis", "rural road", "surrogate measure of safety", "traffic safety", "trajectory data"], "abstractNote": "Analyses of daily driving patterns and near misses offer valuable insights into road safety, particularly as crashes are expected to become increasingly rare. While research has largely focused on highway and urban environments, rural areas remain underexplored. This study addresses this gap by investigating traffic behavior with a specific focus on safety-relevant scenarios at two rural sites in Germany, located south of Berlin along the Federal Road 179. We collected trajectory data and video material over a two-week observation period at each site. Although no accidents or critical conflicts were observed, several behavioral patterns emerged that may comprise traffic safety. Drivers frequently exceed the speed limits and engaged in overtaking maneuvers at intersections. Additionally, vehicles on the main road often yielded their right of way to avoid potential conflicts with turning traffic. The study further reveals that road users adapt their behavior to existing—yet underdeveloped— infrastructure, posing a potential safety risk. In particular, heavy vehicles such as trucks or motorhomes were observed making turns by crossing oncoming lanes, and vulnerable road users have to use the main road, coming into conflict with motorized traffic. These findings underscore the importance of targeted safety assessment and infrastructure improvements in rural traffic environment to reduce the potential of conflicts between different road users.", "pdf": "", "pdfUrl": "Investigation%20on%20road%20traffic%20safety%20in%20rural%20areas.pdf", "pdfUri": "", "readerUrl": "translated_ja_research_reader/Investigation%20on%20road%20traffic%20safety%20in%20rural%20areas.ja.reader.html", "readerJson": "", "publicationTitle": "Traffic Safety Research", "volume": "9", "pages": "e000120", "date": "2025"}, "micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis": {"id": "micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis", "stem": "Micro-level hotspot identification at intersections using traffic conflict analysis", "title": "Micro-level hotspot identification at intersections using traffic conflict analysis", "creators": [{"firstName": "Nuri", "lastName": "Park"}, {"firstName": "Juneyoung", "lastName": "Park"}, {"firstName": "Yang-Jun", "lastName": "Joo"}, {"firstName": "Mohamed", "lastName": "Abdel-Aty"}], "DOI": "10.1016/j.aap.2025.108167", "url": "https://doi.org/10.1016/j.aap.2025.108167", "keywords": ["Crash risk hotspot", "Traffic safety", "Traffic conflict measures", "Signalized intersection"], "abstractNote": "Traditional approaches to identifying traffic crash hotspots have mainly focused on determining dangerous in tersections within road networks, overlooking variations in crash risk within intersections. The micro-level crash hotspot analysis addresses this issue by identifying specific high-risk areas with precision. This study aims to identify micro-level hotspots within three signalized intersections using traffic conflict measures derived from drone video. An algorithm calculates conflicts based on various vehicle sizes and conflict angles. The traffic conflict measures in this study include time-to-collision (TTC), the time to a potential collision assuming constant speed; modified time-to-collision (MTTC), which detects conflicts by assuming constant acceleration; and postencroachment time (PET), the time gap between two vehicles passing the same point. To select the most appropriate conflict measures and determine optimal thresholds at each intersection, we develop crash frequency models using generalized linear modeling (GLM). These selected conflict measures and thresholds are subse quently used to detect micro-level hotspot sections through kernel density. The results demonstrate that the TTC and PET are strongly related to micro-level crash frequencies, with different patterns emerging depending on crash angle and intersection location. Specifically, TTC-based conflicts are highly correlated with rear-end crashes occurring before the stop line, while PET-based conflicts are closely associated with crashes within the intersection, particularly with left-turning movements. This study contributes to intersection safety by identifying traffic conflict measures for micro-level hotspots and offering detailed safety interventions. These interventions include pavement marking enhancements, stop-line location adjustment, extended left-turn bays, or separated bike lanes, which are based on the specific conflict patterns observed in the study.", "pdf": "", "pdfUrl": "Micro-level%20hotspot%20identification%20at%20intersections%20using%20traffic%20conflict%20analysis.pdf", "pdfUri": "", "readerUrl": "translated_ja_research_reader/Micro-level%20hotspot%20identification%20at%20intersections%20using%20traffic%20conflict%20analysis.ja.reader.html", "readerJson": "", "publicationTitle": "Accident Analysis and Prevention", "volume": "220", "date": "2025", "pages": "108167"}, "real-time-conflict-risk-at-signalized-intersection-using-drone-video": {"id": "real-time-conflict-risk-at-signalized-intersection-using-drone-video", "stem": "Real-time conflict risk at signalized intersection using drone video", "title": "Real-time conflict risk at signalized intersection using drone video: A random parameters logit model with heterogeneity in means and variances", "creators": [{"firstName": "Shile", "lastName": "Zhang"}, {"firstName": "N.N.", "lastName": "Sze"}], "DOI": "10.1016/j.aap.2024.107739", "url": "https://doi.org/10.1016/j.aap.2024.107739", "keywords": ["Conflict severity", "Multinomial logit model", "Drone videos", "Random parameters model", "Heterogeneity in means and variances"], "abstractNote": "Signalized intersections are crash prone. This can be attributed to driver errors, red light running behaviour, and poor coordination of conflicting traffic. It is anticipated that overall crash risk at signalized intersection would increase when mixed traffic like motorcycles is involved. In this study, a real-time prediction model for motorcycle and non-motorcycle involved conflict risk at the signalized intersection is proposed. For example, high-resolution vehicle and motorcycle trajectory data are extracted from drone videos using advanced computer vision techniques. Additionally, conflict types including rear-end, angle, and head-on conflicts are also considered. Then, the multinomial logit approach is adopted to model the propensity of severe and slight vehiclevehicle and vehicle-motorcycle conflicts. Furthermore, the problem of unobserved heterogeneity is addressed using the random parameters model with heterogeneity in means and variances. Results indicate that risk of vehicle-vehicle conflict is significantly associated with vehicle speed and acceleration, and conflict type, and that of vehicle-motorcycle conflict is associated with vehicle speed and acceleration, motorcycle lateral speed, conflict type, and time to green signal. Findings should shed light to the development and implementation of optimal traffic signal time plan and traffic management strategy that can mitigate the potential crash risk, especially involving motorcycles, at the signalized intersection.", "pdf": "", "pdfUrl": "Real-time%20conflict%20risk%20at%20signalized%20intersection%20using%20drone%20video.pdf", "pdfUri": "", "readerUrl": "translated_ja_research_reader/Real-time%20conflict%20risk%20at%20signalized%20intersection%20using%20drone%20video.ja.reader.html", "readerJson": "", "publicationTitle": "Accident Analysis and Prevention", "volume": "207", "date": "2024", "pages": "107739"}, "twowheelersovertakingbehaviorjtss2019inpress": {"id": "twowheelersovertakingbehaviorjtss2019inpress", "stem": "TwowheelersovertakingbehaviorJTSS2019inpress", "title": "Examining         || paper.views[0]
        || null;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function applySidebarState() {
      layout.classList.toggle("sidebar-collapsed", sidebarCollapsed);
      sidebarToggle.setAttribute("aria-expanded", String(!sidebarCollapsed));
      sidebarRailButton.setAttribute("aria-expanded", String(!sidebarCollapsed));
      sidebarToggle.textContent = sidebarCollapsed ? "開く" : "閉じる";
      localStorage.setItem("pdfViewer.sidebarCollapsed", String(sidebarCollapsed));
    }

    function setSidebarCollapsed(nextValue) {
      sidebarCollapsed = nextValue;
      applySidebarState();
    }

    function setZoteroStatus(message) {
      zoteroStatus.textContent = message || "";
      zoteroStatus.title = message || "";
    }

    function removeZoteroConnectorMetadata() {
      for (const node of document.querySelectorAll("[data-zotero-connector='dynamic']")) {
        node.remove();
      }
    }

    function absoluteUrl(value) {
      if (!value) return "";
      try {
        return new URL(value, location.href).href;
      } catch (error) {
        return value;
      }
    }

    function creatorName(creator) {
      if (!creator) return "";
      if (creator.name) return creator.name;
      return [creator.firstName, creator.lastName].filter(Boolean).join(" ").trim();
    }

    function addConnectorMeta(name, content, attr = "name") {
      if (!content) return;
      const meta = document.createElement("meta");
      meta.setAttribute(attr, name);
      meta.content = String(content);
      meta.dataset.zoteroConnector = "dynamic";
      document.head.appendChild(meta);
    }

    function addConnectorJsonLd(metadata) {
      const pdfUrl = absoluteUrl(metadata.pdfUrl || "");
      const readerUrl = absoluteUrl(metadata.readerUrl || "");
      const schema = {
        "@context": "https://schema.org",
        "@type": "ScholarlyArticle",
        name: metadata.title || "",
        author: (metadata.creators || []).map((creator) => ({ "@type": "Person", name: creatorName(creator) })).filter((author) => author.name),
        datePublished: metadata.date || "",
        isPartOf: metadata.publicationTitle ? { "@type": "Periodical", name: metadata.publicationTitle } : undefined,
        volumeNumber: metadata.volume || undefined,
        issueNumber: metadata.issue || undefined,
        pagination: metadata.pages || undefined,
        abstract: metadata.abstractNote || undefined,
        url: metadata.url || readerUrl || undefined,
        sameAs: metadata.DOI ? `https://doi.org/${metadata.DOI}` : undefined,
        identifier: metadata.DOI ? [{ "@type": "PropertyValue", propertyID: "DOI", value: metadata.DOI }] : undefined,
        encoding: pdfUrl ? [{ "@type": "MediaObject", encodingFormat: "application/pdf", contentUrl: pdfUrl }] : undefined,
      };
      const cleanSchema = Object.fromEntries(Object.entries(schema).filter(([, value]) => value !== undefined && value !== "" && !(Array.isArray(value) && !value.length)));
      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.dataset.zoteroConnector = "dynamic";
      script.textContent = JSON.stringify(cleanSchema);
      document.head.appendChild(script);
    }

    function addConnectorCoins(metadata) {
      const params = new URLSearchParams();
      params.append("ctx_ver", "Z39.88-2004");
      params.append("rft_val_fmt", "info:ofi/fmt:kev:mtx:journal");
      params.append("rft.genre", "article");
      if (metadata.title) params.append("rft.atitle", metadata.title);
      if (metadata.publicationTitle) params.append("rft.jtitle", metadata.publicationTitle);
      if (metadata.date) params.append("rft.date", metadata.date);
      if (metadata.volume) params.append("rft.volume", metadata.volume);
      if (metadata.issue) params.append("rft.issue", metadata.issue);
      if (metadata.pages) params.append("rft.pages", metadata.pages);
      if (metadata.DOI) params.append("rft_id", `info:doi/${metadata.DOI}`);
      for (const creator of metadata.creators || []) {
        const name = creatorName(creator);
        if (name) params.append("rft.au", name);
      }
      const span = document.createElement("span");
      span.className = "Z3988";
      span.title = params.toString();
      span.hidden = true;
      span.dataset.zoteroConnector = "dynamic";
      document.body.appendChild(span);
    }

    function applyZoteroConnectorMetadata(metadata) {
      removeZoteroConnectorMetadata();
      if (!metadata || !metadata.title) return;
      const pdfUrl = absoluteUrl(metadata.pdfUrl || "");
      const readerUrl = absoluteUrl(metadata.readerUrl || "");
      const [firstPage = "", lastPage = ""] = String(metadata.pages || "").split(/[-–—]/).map((part) => part.trim());
      addConnectorMeta("citation_title", metadata.title);
      addConnectorMeta("citation_journal_title", metadata.publicationTitle || "");
      addConnectorMeta("citation_publication_date", metadata.date || "");
      addConnectorMeta("citation_year", (String(metadata.date || "").match(/\b(19\d{2}|20\d{2})\b/) || [])[1] || "");
      addConnectorMeta("citation_volume", metadata.volume || "");
      addConnectorMeta("citation_issue", metadata.issue || "");
      addConnectorMeta("citation_pages", metadata.pages || "");
      addConnectorMeta("citation_firstpage", firstPage);
      addConnectorMeta("citation_lastpage", lastPage);
      addConnectorMeta("citation_doi", metadata.DOI || "");
      addConnectorMeta("citation_abstract", metadata.abstractNote || "");
      addConnectorMeta("citation_pdf_url", pdfUrl);
      addConnectorMeta("citation_fulltext_html_url", readerUrl);
      addConnectorMeta("DC.title", metadata.title);
      addConnectorMeta("DC.source", metadata.publicationTitle || "");
      addConnectorMeta("DC.date", metadata.date || "");
      addConnectorMeta("DC.identifier", metadata.DOI || "");
      for (const creator of metadata.creators || []) {
        const name = creatorName(creator);
        addConnectorMeta("citation_author", name);
        addConnectorMeta("DC.creator", name);
      }
      for (const keyword of metadata.keywords || []) {
        addConnectorMeta("citation_keywords", keyword);
        addConnectorMeta("DC.subject", keyword);
      }
      addConnectorJsonLd(metadata);
      addConnectorCoins(metadata);
    }

    function updateZoteroConnectorMetadata(paper) {
      const metadata = paper ? staticZoteroMetadata[paper.id] : null;
      applyZoteroConnectorMetadata(metadata || null);
    }

    function currentPrintOptions() {
      return {
        orientation: printOrientation === "landscape" ? "landscape" : "portrait",
        summary: printSummary.checked,
        duplex: printDuplex.checked,
        rules: printRules.checked,
        printMode: printMode.checked,
      };
    }

    function applyPrintControls() {
      const options = currentPrintOptions();
      localStorage.setItem("pdfViewer.printOrientation", options.orientation);
      localStorage.setItem("pdfViewer.printSummary", options.summary ? "true" : "false");
      localStorage.setItem("pdfViewer.printDuplex", options.duplex ? "true" : "false");
      localStorage.setItem("pdfViewer.printRules", options.rules ? "true" : "false");
      document.body.classList.toggle("print-preview-mode", options.printMode);
      const paper = selectedPaper();
      const title = paper?.title || "印刷モード";
      printModeTitle.textContent = `${title} - 印刷モード`;
      for (const button of printOrientationButtons) {
        const active = button.dataset.printOrientation === options.orientation;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      }
    }

    function applyGenericDisplayOptions(targetDocument, options) {
      if (!targetDocument) return;
      targetDocument.body?.classList.toggle("print-rules", Boolean(options.rules));
      targetDocument.body?.classList.toggle("print-mode", Boolean(options.printMode));
      const style = targetDocument.getElementById("pdfViewerGenericDisplayStyle") || targetDocument.createElement("style");
      style.id = "pdfViewerGenericDisplayStyle";
      style.textContent = `
        body.print-rules { --pdf-viewer-rule-row-height: 1.75em; }
        body.print-rules h1,
        body.print-rules h2,
        body.print-rules h3 { border-bottom: 1px solid #9ca3af; padding-bottom: 8px; }
        body.print-rules p,
        body.print-rules li {
          background-image: linear-gradient(
            to bottom,
            transparent calc(var(--pdf-viewer-rule-row-height) - 1px),
            rgba(156, 163, 175, 0.8) calc(var(--pdf-viewer-rule-row-height) - 1px)
          );
          background-origin: content-box;
          background-clip: content-box;
          background-repeat: repeat-y;
          background-size: 100% var(--pdf-viewer-rule-row-height);
          padding-bottom: 0.35em;
        }
        @media screen {
          body.print-mode {
            background: #d8dee8 !important;
            margin: 0;
            padding: 18px;
          }
          body.print-mode > * {
            background: #ffffff;
            box-sizing: border-box;
            margin-left: auto !important;
            margin-right: auto !important;
            max-width: ${options.orientation === "landscape" ? "1120px" : "820px"};
          }
        }
        @media print {
          body.print-rules { --pdf-viewer-rule-row-height: 1.5em; }
          body.print-mode {
            background: #ffffff !important;
            padding: 0;
          }
          body.print-mode > * {
            max-width: none;
          }
        }
      `;
      if (!style.parentElement) targetDocument.head.appendChild(style);
    }

    function applyFrameDisplayOptions() {
      const options = currentPrintOptions();
      const targetWindow = reader.contentWindow;
      if (!targetWindow) return;
      try {
        if (typeof targetWindow.applyViewerDisplayOptions === "function") {
          targetWindow.applyViewerDisplayOptions(options);
          return;
        }
        targetWindow.postMessage({ type: "pdf-viewer-display-options", options }, "*");
      } catch (error) {
        // Fall through to same-origin generic styling when available.
      }
      try {
        applyGenericDisplayOptions(reader.contentDocument, options);
      } catch (error) {
        // Some embedded viewers, such as browser PDF plugins, do not expose a document.
      }
    }

    function applyGenericPrintOptions(targetDocument, options) {
      if (!targetDocument) return;
      applyGenericDisplayOptions(targetDocument, options);
      const style = targetDocument.getElementById("pdfViewerGenericPrintStyle") || targetDocument.createElement("style");
      style.id = "pdfViewerGenericPrintStyle";
      const pageSize = options.orientation === "landscape" ? "A4 landscape" : "A4 portrait";
      style.textContent = `
        @page { size: ${pageSize}; margin: 12mm; }
        ${options.duplex ? "@page :left { margin-left: 16mm; margin-right: 10mm; } @page :right { margin-left: 10mm; margin-right: 16mm; }" : ""}
        @media print {
          body { background: #fff !important; }
          .viewer-page-close-button,
          .viewer-page-close-notice,
          .close-button,
          .modal-close { display: none !important; }
        }
      `;
      if (!style.parentElement) targetDocument.head.appendChild(style);
    }

    function printLoadedFrame(options) {
      const targetWindow = reader.contentWindow;
      if (!targetWindow) return false;
      try {
        if (typeof targetWindow.printWithViewerOptions === "function") {
          targetWindow.printWithViewerOptions(options);
          return true;
        }
      } catch (error) {
        // Fall through to the generic same-origin path.
      }
      try {
        applyGenericPrintOptions(reader.contentDocument, options);
        targetWindow.focus();
        targetWindow.print();
        return true;
      } catch (error) {
        return false;
      }
    }

    function printCurrentFrame(orientationOverride = null) {
      if (orientationOverride === "portrait" || orientationOverride === "landscape") {
        printOrientation = orientationOverride;
      }
      const options = currentPrintOptions();
      applyPrintControls();
      applyFrameDisplayOptions();
      setMenuOpen(false);
      if (printLoadedFrame(options)) return;
      const paper = selectedPaper();
      const readerView = paper ? viewFor(paper, "reader") : null;
      if (options.summary && readerView && selectedViewId !== readerView.id) {
        selectedViewId = readerView.id;
        localStorage.setItem("pdfViewer.view", selectedViewId);
        reader.addEventListener("load", () => {
          window.setTimeout(() => {
            if (!printLoadedFrame(options)) alert("印刷できませんでした。別タブで開いてから印刷してください。");
          }, 100);
        }, { once: true });
        render();
        return;
      }
      alert("印刷できませんでした。別タブで開いてから印刷してください。");
    }

    function setPrintModeEnabled(enabled) {
      printMode.checked = Boolean(enabled);
      applyPrintControls();
      applyFrameDisplayOptions();
      setMenuOpen(false);
    }

    function setMenuOpen(open) {
      viewerMenu.classList.toggle("menu-open", open);
      menuToggle.setAttribute("aria-expanded", String(open));
    }

    function renderList() {
      const query = search.value.trim().toLowerCase();
      const visible = papers.filter((paper) => paper.title.toLowerCase().includes(query));
      count.textContent = `${visible.length} / ${papers.length} 件`;
      paperList.innerHTML = visible.map((paper) => {
        const pages = paper.pages ? `${paper.pages}ページ` : "ページ数未取得";
        const viewNames = paper.views.map((view) => view.label).join(" / ");
        return `
          <button class="paper ${paper.id === selectedPaperId ? "active" : ""}" type="button" data-paper="${escapeHtml(paper.id)}">
            <p class="paper-title">${escapeHtml(paper.title)}</p>
            <p class="meta">
              <span class="tag">${escapeHtml(pages)}</span>
              <span>${escapeHtml(viewNames)}</span>
            </p>
          </button>
        `;
      }).join("");

      for (const button of paperList.querySelectorAll(".paper")) {
        button.addEventListener("click", () => {
          selectedPaperId = button.dataset.paper;
          const paper = selectedPaper();
          const available = viewFor(paper, selectedViewId);
          selectedViewId = available?.id || paper?.defaultView || "side";
          localStorage.setItem("pdfViewer.paper", selectedPaperId);
          localStorage.setItem("pdfViewer.view", selectedViewId);
          setZoteroStatus("");
          render();
        });
      }
    }

    function renderViewer() {
      const paper = selectedPaper();
      const view = viewFor(paper, selectedViewId);

      if (!paper || !view) {
        reader.style.display = "none";
        empty.style.display = "flex";
        viewerTitle.textContent = "";
        viewerMeta.textContent = "";
        openNew.href = "#";
        zoteroRis.href = "#";
      zoteroAdd.disabled = true;
      viewTabs.innerHTML = "";
      applyPrintControls();
      updateZoteroConnectorMetadata(null);
      return;
      }

      selectedViewId = view.id;
      localStorage.setItem("pdfViewer.view", selectedViewId);

      reader.style.display = "block";
      empty.style.display = "none";
      reader.src = view.url;
      openNew.href = view.url;
      zoteroRis.href = staticRisUrls[paper.id] || "#";
      zoteroAdd.disabled = true;
      zoteroAdd.title = "公開版ではローカルZoteroへ直接追加できません。RIS保存を使ってください。";
      viewerTitle.textContent = paper.title;
      applyPrintControls();
      viewerMeta.textContent = `${view.label} - ${view.description} - ${view.size} - ${view.updated}`;
      selectedViewLabel.textContent = view.label;
      updateZoteroConnectorMetadata(paper);

      viewTabs.innerHTML = paper.views.map((candidate) => `
        <button class="tab ${candidate.id === view.id ? "active" : ""}" type="button" data-view="${escapeHtml(candidate.id)}">
          <span class="tab-label">${escapeHtml(candidate.label)}</span>
          <span class="tab-description">${escapeHtml(candidate.description)}</span>
        </button>
      `).join("");

      for (const button of viewTabs.querySelectorAll(".tab")) {
        button.addEventListener("click", () => {
          selectedViewId = button.dataset.view;
          localStorage.setItem("pdfViewer.view", selectedViewId);
          setMenuOpen(false);
          render();
        });
      }
    }

    function render() {
      renderList();
      renderViewer();
    }

    search.addEventListener("input", renderList);
    sidebarToggle.addEventListener("click", () => setSidebarCollapsed(true));
    sidebarRailButton.addEventListener("click", () => setSidebarCollapsed(false));
    menuToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      setMenuOpen(!viewerMenu.classList.contains("menu-open"));
    });
    menuPanel.addEventListener("click", (event) => {
      event.stopPropagation();
      const clickedElement = event.target instanceof Element ? event.target : event.target?.parentElement;
      const link = clickedElement?.closest("a.button");
      if (link && link.id !== "openNew") setMenuOpen(false);
    });
    for (const button of printOrientationButtons) {
      button.addEventListener("click", () => {
        printOrientation = button.dataset.printOrientation || "portrait";
        applyPrintControls();
        applyFrameDisplayOptions();
      });
    }
    printSummary.addEventListener("change", () => {
      applyPrintControls();
      applyFrameDisplayOptions();
    });
    printDuplex.addEventListener("change", () => {
      applyPrintControls();
      applyFrameDisplayOptions();
    });
    printRules.addEventListener("change", () => {
      applyPrintControls();
      applyFrameDisplayOptions();
    });
    printMode.addEventListener("change", () => {
      setPrintModeEnabled(printMode.checked);
    });
    printFrame.addEventListener("click", () => printCurrentFrame());
    printFrameLandscape.addEventListener("click", () => printCurrentFrame("landscape"));
    printModePrint.addEventListener("click", () => printCurrentFrame());
    printModePrintLandscape.addEventListener("click", () => printCurrentFrame("landscape"));
    exitPrintMode.addEventListener("click", () => setPrintModeEnabled(false));
    reader.addEventListener("load", applyFrameDisplayOptions);
    document.addEventListener("click", (event) => {
      if (!viewerMenu.contains(event.target)) setMenuOpen(false);
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && printMode.checked) {
        setPrintModeEnabled(false);
        return;
      }
      if (event.key === "Escape") setMenuOpen(false);
    });
    reloadFrame.addEventListener("click", () => {
      if (reader.src) reader.contentWindow.location.reload();
      setMenuOpen(false);
    });
    openNew.addEventListener("click", (event) => {
      event.preventDefault();
      if (!openNew.href || openNew.href.endsWith("#")) return;
      setMenuOpen(false);
      const opened = window.open(openNew.href, "_blank");
      if (!opened) {
        location.href = openNew.href;
      }
    });
    zoteroAdd.addEventListener("click", () => {
      alert("公開版ではローカルZoteroへ直接追加できません。RIS保存を使ってください。");
    });
    closeViewer.addEventListener("click", () => {
      window.close();
      if (document.visibilityState !== "hidden") {
        alert("ブラウザのタブを閉じてください。");
      }
    });

    applySidebarState();
    applyPrintControls();
    render();
  </script>

<style id="viewer-page-close-style">
  .viewer-page-close-button {
    align-items: center;
    background: #ffffff;
    border: 1px solid #d8aaa1;
    border-radius: 8px;
    bottom: 18px;
    box-shadow: 0 8px 22px rgba(24, 33, 47, 0.16);
    color: #a73d2a;
    cursor: pointer;
    display: inline-flex;
    font: 700 14px/1 "Yu Gothic", "Meiryo", system-ui, sans-serif;
    height: 38px;
    justify-content: center;
    padding: 0 14px;
    position: fixed;
    right: 18px;
    z-index: 2147483647;
  }

  .viewer-page-close-button:hover {
    background: #fff2ef;
    border-color: #a73d2a;
  }

  .viewer-page-close-notice {
    align-items: center;
    background: rgba(24, 33, 47, 0.62);
    display: flex;
    inset: 0;
    justify-content: center;
    padding: 24px;
    position: fixed;
    z-index: 2147483646;
  }

  .viewer-page-close-notice-box {
    background: #ffffff;
    border: 1px solid #d8dee8;
    border-radius: 8px;
    box-shadow: 0 12px 30px rgba(24, 33, 47, 0.2);
    color: #18212f;
    max-width: 420px;
    padding: 20px;
    text-align: center;
  }

  .viewer-page-close-notice-box h1 {
    font-size: 1rem;
    margin: 0 0 8px;
  }

  .viewer-page-close-notice-box p {
    color: #617086;
    font-size: 0.9rem;
    margin: 0;
  }
</style>
<script id="viewer-page-close-script">
(() => {
  function showManualCloseNotice() {
    if (document.getElementById("viewerPageCloseNotice")) return;
    const notice = document.createElement("div");
    notice.className = "viewer-page-close-notice";
    notice.id = "viewerPageCloseNotice";
    notice.innerHTML = `
      <div class="viewer-page-close-notice-box">
        <h1>このタブを閉じてください</h1>
        <p>ブラウザの制限により自動で閉じられませんでした。</p>
      </div>
    `;
    document.body.appendChild(notice);
    notice.addEventListener("click", () => notice.remove());
  }

  function closeCurrentPage(button) {
    button.disabled = true;
    button.textContent = "閉じています";
    window.close();
    window.setTimeout(() => {
      if (document.visibilityState !== "hidden") {
        button.disabled = false;
        button.textContent = "閉じる";
        showManualCloseNotice();
      }
    }, 350);
  }

  function addCloseButton() {
    if (window.top !== window.self) return;
    if (document.getElementById("viewerPageClose")) return;
    const button = document.createElement("button");
    button.className = "viewer-page-close-button";
    button.id = "viewerPageClose";
    button.type = "button";
    button.textContent = "閉じる";
    button.title = "このページを閉じる";
    button.addEventListener("click", () => closeCurrentPage(button));
    document.body.appendChild(button);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", addCloseButton);
  } else {
    addCloseButton();
  }
})();
</script>
