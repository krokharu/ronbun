<meta name="citation_abstract" content="Signalized intersections are crash prone. This can be attributed to driver errors, red light running behaviour, and poor coordination of conflicting traffic. It is anticipated that overall crash risk at signalized intersection would increase when mixed traffic like motorcycles is involved. In this study, a real-time prediction model for motorcycle and non-motorcycle involved conflict risk at the signalized intersection is proposed. For example, high-resolution vehicle and motorcycle trajectory data are extracted from drone videos using advanced computer vision techniques. Additionally, conflict types including rear-end, angle, and head-on conflicts are also considered. Then, the multinomial logit approach is adopted to model the propensity of severe and slight vehiclevehicle and vehicle-motorcycle conflicts. Furthermore, the problem of unobserved heterogeneity is addressed using the random parameters model with heterogeneity in means and variances. Results indicate that risk of vehicle-vehicle conflict is significantly associated with vehicle speed and acceleration, and conflict type, and that of vehicle-motorcycle conflict is associated with vehicle speed and acceleration, motorcycle lateral speed, conflict type, and time to green signal. Findings should shed light to the development and implementation of optimal traffic signal time plan and traffic management strategy that can mitigate the potential crash risk, especially involving motorcycles, at the signalized intersection." data-zotero-connector="server">

ource": "概要: 信号交差点は衝突しやすい。これはドライバーのミス、赤信号での走行行動、衝突する交通の調整不足などが原因である可能性があります。二輪車などの交通が混在する場合、信号交差点での全体的な衝突リスクが高まることが予想されます。本研究では、信号交差点における二輪車と二輪車以外の衝突リスクをリアルタイムに予測するモデルを提案する。たとえば、高度なコンピュータービジョン技術を使用して、高解像度の車両やオートバイの軌跡データがドローンのビデオから抽出されます。さらに、追突、斜め、正面衝突などの衝突タイプも考慮されます。次に、多項ロジットアプローチを採用して、重度および軽度の車両および車両とオートバイの衝突の傾向をモデル化します。さらに、観察されない不均一性の問題は、平均と分散の不均一性を備えたランダムパラメーターモデルを使用して対処されます。その結果、車両と車両の衝突のリスクは車両の速度と加速度、衝突の種類と大きく関連しており、車両と二輪車の衝突のリスクは車両の速度と加速度、自動二輪車の横速度、衝突の種類、青信号までの時間と関連していることが示されています。調査結果は、信号交差点での、特に自動二輪車が関与する潜在的な衝突リスクを軽減できる、最適な信号時間計画と交通管理戦略の開発と実施に光を当てるはずです。", "translation": "概要: 信号交差点は衝突しやすい。これはドライバーのミス、赤信号での走行行動、衝突する交通の調整不足などが原因である可能性があります。二輪車などの交通が混在する場合、信号交差点での全体的な衝突リスクが高まることが予想されます。本研究では、信号交差点における二輪車と二輪車以外の衝突リスクをリアルタイムに予測するモデルを提案する。たとえば、高度なコンピュータービジョン技術を使用して、高解像度の車両やオートバイの軌跡データがドローンのビデオから抽出されます。さらに、追突、斜め、正面衝突などの衝突タイプも考慮されます。次に、多項ロジットアプローチを採用して、重度および軽度の車両および車両とオートバイの衝突の傾向をモデル化します。さらに、観察されない不均一性の問題は、平均と分散の不均一性を備えたランダムパラメーターモデルを使用して対処されます。その結果、車両と車両の衝突のリスクは車両の速度と加速度、衝突の種類と大きく関連しており、車両と二輪車の衝突のリスクは車両の速度と加速度、自動二輪車の横速度、衝突の種類、青信号までの時間と関連していることが示されています。調査結果は、信号交差点での、特に自動二輪車が関与する潜在的な衝突リスクを軽減できる、最適な信号時間計画と交通管理戦略の開発と実施に光を当てるはずです。", "bbox": [0.08, 0.2, 0.92, 0.3], "kind": "overview-summary", "chapter_id": "chapter-overview", "figure_ids": []}, {"id": "overview-03", "page": 0, "order": 3, "source": "自分の論文に入れるための情報: タイトル: Real-time conflict risk at signalized intersection using drone video: A random parameters logit model with heterogeneity in means and variances / 著者: Shile Zhang, N.N. Sze / 出版日: 15 August 2024 / 掲載誌: Accident Analysis and Prevention / 巻・ページ/論文番号: 207 (2024) 107739 / DOI: 10.1016/j.aap.2024.107739 / 査読: 査読付き学術誌掲載論文と推定。ただし、本文PDFだけでは査読プロセスの明記確認はできないため、投稿先誌ページで最終確認してください。", "translation": "自分の論文に入れるための情報: タイトル: Real-time conflict risk at signalized intersection using drone video: A random parameters logit model with heterogeneity in means and variances / 著者: Shile Zhang, N.N. Sze / 出版日: 15 August 2024 / 掲載誌: Accident Analysis and Prevention / 巻・ページ/論文番号: 207 ], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b011", "page": 1, "order": 11, "source": "Signalized intersections are crash prone. This can be attributed to driver errors, red light running behaviour, and poor coordination of conflicting traffic. It is anticipated that overall crash risk at signalized intersection would increase when mixed traffic like motorcycles is involved. In this study, a real-time prediction model for motorcycle and non-motorcycle involved conflict risk at the signalized intersection is proposed. For example, high-resolution vehicle and motorcycle trajectory data are extracted from drone videos using advanced computer vision techniques. Additionally, conflict types including rear-end, angle, and head-on conflicts are also considered. Then, the multinomial logit approach is adopted to model the propensity of severe and slight vehiclevehicle and vehicle-motorcycle conflicts. Furthermore, the problem of unobserved heterogeneity is addressed using the random parameters model with heterogeneity in means and variances. Results indicate that risk of vehicle-vehicle conflict is significantly associated with vehicle speed and acceleration, and conflict type, and that of vehicle-motorcycle conflict is associated with vehicle speed and acceleration, motorcycle lateral speed, conflict type, and time to green signal. Findings should shed light to the development and implementation of optimal traffic signal time plan and traffic management strategy that can mitigate the potential crash risk, especially involving motorcycles, at the signalized intersection.", "translation": "信号交差点は衝突しやすい。これはドライバーのミス、赤信号での走行行動、衝突する交通の調整不足などが原因である可能性があります。二輪車などの交通が混在する場合、信号交差点での全体的な衝突リスクが高まることが予想されます。本研究では、信号交差点における二輪車と二輪車以外の衝突リスクをリアルタイムに予測するモデルを提案する。たとえば、高度なコンピュータービジョン技術を使用して、高解像度の車両やオートバイの軌跡データがドローンのビデオから抽出されます。さらに、追突、斜め、正面衝突などの衝突タイプも考慮されます。次に、多項ロジットアプローチを採用して、重度および軽度の車両および車両とオートバイの衝突の傾向をモデル化します。さらに、観察されない不均一性の問題は、平均と分散の不均一性を備えたランダムパラメーターモデルを使用して対処されます。その結果、車両と車両の衝突のリスクは車両の速度と加速度、衝突の種類と大きく関連しており、車両と二輪車の衝突のリスクは車両の速度と加速度、自動二輪車の横速度、衝突の種類、青信号までの時間と関連していることが示されています。調査結果は、信号交差点での、特に自動二輪車が関与する潜在的な衝突リスクを軽減できる、最適な信号時間計画と交通管理戦略の開発と実施に光を当てるはずです。", "bbox": [0.3393333406473207, 0.35233428614294515, 0.9368574926981457, 0.5237513512191675], "kind": "body", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b012", "page": 1, "order": 12, "source": "1. Introduction", "translation": "1. はじめに", "bbox": [0.06314280849117021, 0.5577765051776004, 0.16435497244848304, 0.5741946495373692], "kind": "heading", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b013", "page": 1, "order": 13, "source": "1.35 million people are killed on the roads every year worldwide. Road crash is the leading cause of death for children and young adults of age between 5 and 29 years. Unfortunately, 93 % of total road deaths are in developing countries (World Health Organization, 2024). In China, road fatality rate was at a high level at 157 per million population in 2021 (National Bureau of Statistics of China, 2024). Among all road entities, majority of the crashes occur at the intersections. It could be attributed to complicated vehicle maneuvers, repeated stop and go traffic, and frequent conflicts among vehicles of different traffic streams (Wong et al., 2007). Safety studies for intersections based on historical crash data are conducted. Factors including built environment, geometric design, traffic control, environmental and weather conditions, and traffic flow characteristics that affect the crash risk at intersections are identified (Wong et al., 2007; Huang et al., 2008; Wang et al., 2018). However, only the aggregated data on traffic flow characteristics like annual average traffic flow, vehicle mix, and directional split are considered in conventional crash-based safety studies. To better", "translation": "世界中で毎年 135 万人が路上で死亡しています。交通事故は、5 歳から 29 歳までの子供と若者の主な死因です。残念なことに、交通事故死亡者全体の 93% は発展途上国で発生しています (世界保健機関、2024 年)。中国では、2021 年の交通事故死亡率は人口 100 万人あたり 157 人と高水準でした (中国国家統計局、2024 年)。すべての道路エンティティの中で、衝突事故の大部分は交差点で発生します。これは、複雑な車両操作、繰り返される停止と発進、および異なる交通流の車両間の頻繁な衝突に起因する可能性があります (Wong et al., 2007)。過去の衝突データに基づいた交差点の安全性研究が実施されています。交差点での衝突リスクに影響を与える建築環境、幾何学的設計、交通規制、環境および気象条件、交通の流れの特性などの要因が特定されています (Wong et al., 2007; Huang et al., 2008; Wang et al., 2018)。", "bbox": [0.06314280849117021, 0.5841329400491249, 0.4849766769247048, 0.8114065237019049], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b014", "page": 1, "order": 14, "source": "* Corresponding author. E-mail address: tony.nn.sze@polyu.edu.hk (N.N. Sze).", "translation": "* Corresponding author. E-mail address: tony.nn.sze@polyu.edu.hk (N.N. Sze).", "bbox": [0.07161887821821425, 0.8429775091458418, 0.3687928342473425, 0.8698249468990188], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b015", "page": 1, "order": 15, "source": "https://doi.org/10.1016/j.aap.2024.107739 Received 29 March 2024; Received in revised form 24 July 2024; Accepted 4 August 2024", "translation": "https://doi.org/10.1016/j.aap.2024.107739 Received 29 March 2024; Received in revised form 24 July 2024; Accepted 4 August 2024", "bbox": [0.06314280849117021, 0.8764769785782017, 0.5538931500270379, 0.9032529767578383], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b016", "page": 1, "order": 16, "source": "Available online 15 August 2024 0001-4575/© 2024 Elsevier Ltd. All rights are reserved, including those for text and data mining, AI training, and similar technologies.", "translation": "Available online 15 August 2024 0001-4575/© 2024 Elsevier Ltd. All rights are reserved, including those for text and data mining, AI training, and similar technologies.", "bbox": [0.06302958694153861, 0.9004650647027986, 0.79169752041474, 0.9273684083439884], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b017", "page": 1, "order": 17, "source": "understand the crash mechanism, and association between crash occurrence and traffic characteristics, it is necessary to collect the data on dynamic traffic flow characteristics. For example, precise data on the location, speed, and acceleration of individual vehicles are available for real-time safety analysis using advanced data acquisition technologies like radar and video camera (Essa and Sayed, 2018; Song et al., 2022a). For example, disaggregated data on traffic volume, queue length, and shock wave speed at the cycle level are available for safety diagnosis of signalized intersections (Essa and Sayed, 2018). Hence, adaptive traffic signal time plan in response to the real-time traffic conditions can be implemented to improve the overall safety and operation efficiency of signalized intersections On the other hand, safety studies based on historical crash record also suffer from the problems including under-reporting, imbalanced crash data, and misspecification (Tsui et al., 2009; Chen et al., 2022; Ding et al., 2022). To this end, different surrogate safety measures and crash precursors are proposed for road safety studies (Tarko et al., 2009; Tarko and Lizarazo, 2021). According to the safety pyramid proposed by Hyd´en (1987), all traffic events can be classified into three categories,", "translation": "しかし、従来の衝突ベースの安全性研究では、年間平均交通量、車両構成、方向分割などの交通流特性に関する集計データのみが考慮されています。衝突のメカニズム、および衝突の発生と交通特性の関連性をより深く理解するには、動的な交通の流れの特性に関するデータを収集する必要があります。たとえば、個々の車両の位置、速度、加速度に関する正確なデータは、レーダーやビデオカメラなどの高度なデータ収集技術を使用してリアルタイムの安全分析に利用できます (Essa and Sayed, 2018; Song et al., 2022a)。たとえば、自転車レベルでの交通量、待ち行列の長さ、衝撃波速度に関する細分化されたデータは、信号交差点の安全性診断に利用できます (Essa and Sayed, 2018)。したがって、リアルタイムの交通状況に応じた適応的な信号時間計画を実装することで、信号交差点の全体的な安全性と運用効率を向上させることができます。一方、過去の衝突記録に基づく安全性研究には、過小報告、不均衡な衝突データ、仕様の誤りなどの問題もあります（Tsui et al., 2009; Chen et al., 2022; Ding et al., 2022; Ding et al., 2009; Chen et al., 2022; Ding et al. al.、2022）。この目的を達成するために、さまざまな代替安全対策と衝突前兆現象が交通安全研究のために提案されています (Tarko et al., 2009; Tarko and Lizarazo, 2021)。 Hyd’en (1987) によって提案された安全ピラミッドによると、すべての交通イベントは 3 つのカテゴリに分類できます。 * 責任著者。", "bbox": [0.5150428042565766, 0.5577765051776004, 0.936856467372815, 0.8114065237019049], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b001", "page": 2, "order": 1, "source": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "translation": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b002", "page": 2, "order": 2, "source": "namely undisturbed passages, traffic conflicts, and road crashes. Traffic conflicts are far more prevalent than road crashes. They can be easily observed and used to proxy the crash risk. It is increasingly popular to adopt traffic conflict for real-time safety assessment. For example, two proximity indicators including post encroachment time (PET) and time to collision (TTC) are most commonly used to measure traffic conflicts and estimate the crash risk (Zheng et al., 2021). To measure the traffic conflicts, it is necessary to consider the kinematic of different traffic participants including motor vehicles, motorcycles, bicycles, and pedestrians in the mixed traffic environment. In particular, motorcycles, bicycles, and pedestrians are considered vulnerable road users. They are prone to mortality and severe injury in road crashes. Additionally, movement of vulnerable road users are more stochastic, compared to that of motor vehicles. It is more difficult to describe and predict the motion of vulnerable road users. Hence, vehicle-vehicle and vehicle-vulnerable road user conflicts should be estimated separately (Fu et al., 2018; Nasernejad et al., 2023). Likelihood of severe conflicts between vehicle and motorcycle is usually higher since motorcyclists tend to be more risk-taking and aggressive (Song et al., 2022a). Furthermore, studies have also stratified the traffic conflict analysis by collision type such as rear-end and sideswipe. Influencing factors that affect the traffic conflict risk involving different vehicle class and collision type can be identified (Song et al., 2022a). For the association measure between traffic conflict risk and possible influencing factors, econometric methods like multinomial logit and generalized linear regression models are adopted (Jin et al., 2023). To account for the problems including individual heterogeneity and possible correlation, advanced modeling approaches like random parameters model and models with heterogeneity in means and variances are considered (Behnood and Mannering, 2017a,b). In this study, the main focuses are vehicle-vehicle and vehiclemotorcycle conflicts at the signalized intersection. Factors that contribute to the risk of vehicle-vehicle and vehicle-motorcycle conflicts at the signalized intersection are identified using video observation survey. To model the kinematic of all traffic participants involved in the traffic conflicts, real-time trajectories of vehicles and motorcycles from aerial view will be collected using drone videos. Temporal proximity indicator – post encroachment time (PET) will be adopted. Additionally, collision types including rear-end, angle, and head-on collisions will be considered. Furthermore, random parameters logit model with heterogeneity in means and variances will be developed for the association measure between conflict risk and possible factors. Contribution of this paper is twofold. First, factors of different level in the hierarchical structure (individual versus cycle level) that contribute to the conflicts involving different traffic participants (vehicle-vehicle versus vehiclemotorcycle) will be identified. Second, random parameters logit model with heterogeneity in means and variances will be applied to account for the effects of individual heterogeneity on the occurrence and severity of vehicle-vehicle and vehicle-motorcyclist conflicts. The remainder of this paper is organized as follow. Literature review will be presented in Section 2. Method of data collection and analysis will be given in Section 3. Estimation results and discussions will be provided in Section 4-6. Finally, the concluding remarks will be given in Section 7.", "translation": "つまり、邪魔されていない通路、交通渋滞、交通事故です。交通コンフリクトは交通事故よりもはるかに蔓延しています。これらは簡単に観察でき、事故のリスクを代理するために使用できます。リアルタイムの安全性評価に交通衝突を採用することがますます一般的になっています。たとえば、交錯後時間（PET）と衝突までの時間（TTC）を含む 2 つの近接指標は、交通衝突を測定し、衝突リスクを推定するために最も一般的に使用されます (Zheng et al., 2021)。交通衝突を測定するには、混合交通環境における自動車、オートバイ、自転車、歩行者などのさまざまな交通参加者の運動学を考慮する必要があります。特に、オートバイ、自転車、歩行者は交通弱者とみなされます。彼らは交通事故で死亡したり重傷を負ったりする傾向があります。さらに、交通弱者の移動は自動車の移動に比べてより確率的です。交通弱者の動きを説明し、予測することはさらに困難です。したがって、車両と車両、および車両と脆弱な道路利用者の衝突は個別に推定する必要があります（Fu et al., 2018; Nasernejad et al., 2023）。オートバイの運転者はよりリスクを負い、攻撃的になる傾向があるため、車両とオートバイの間で深刻な衝​​突が発生する可能性は通常より高くなります (Song et al., 2022a)。さらに、追突や横滑りなどの衝突タイプごとに交通衝突分析を階層化した研究も行われています。さまざまな車両クラスや衝突タイプに関係する交通コンフリクトのリスクに影響を与える要因を特定することができます (Song et al., 2022a)。交通コンフリクトのリスクと考えられる影響要因との関連性測定には、多項ロジットや一般化線形回帰モデルなどの計量経済的手法が採用されています（Jin et al.、2023）。個々の不均一性や相関関係の可能性などの問題を説明するために、ランダムパラメーターモデルや、平均と分散の不均一性を備えたモデルなどの高度なモデリングアプローチが考慮されます (Behnood and Mannering、2017a、b)。この研究では、信号交差点での車と車および二輪車の衝突が主な焦点となっています。信号交差点における車同士、車とバイクの衝突リスクに寄与する要因をビデオ観察調査により特定します。交通コンフリクトに関与するすべての交通参加者の運動学をモデル化するために、ドローンビデオを使用して上空から見た車両とオートバイのリアルタイムの軌跡が収集されます。時間的近接インジケータ – 交錯後時間 (PET) が採用されます。さらに、追突、斜め、正面衝突などの衝突タイプも考慮されます。さらに、平均と分散の不均一性を伴うランダムパラメータロジットモデルが、紛争リスクと考えられる要因の間の関連尺度のために開発されます。この論文の貢献は 2 つあります。まず、さまざまな交通参加者 (車両間対車両、オートバイ) が関与する紛争に寄与する、階層構造のさまざまなレベル (個人レベル対サイクルレベル) の要因が特定されます。第二に、平均と分散の不均一性を備えたランダムパラメータロジットモデルを適用して、車両間および車両とオートバイの衝突の発生と重大度に対する個人の不均一性の影響を説明します。この文書の残りの部分は次のように構成されています。文献レビューはセクション 2 で説明されます。データ収集と分析の方法はセクション 3 で説明されます。推定結果と考察はセクション 4-6 で説明されます。最後に、セクション 7 で結論を述べます。", "bbox": [0.06314265469237061, 0.0646335747770474, 0.48499128781066586, 0.7664020531533497], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b003", "page": 2, "order": 3, "source": "2. Literature review", "translation": "2. 文献レビュー", "bbox": [0.06314270595863715, 0.7771266019209324, 0.19476780072433084, 0.7935447847304179], "kind": "heading", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b004", "page": 2, "order": 4, "source": "2.1. Factors affecting intersection safety", "translation": "2.1. 交差点安全性に影響する要因", "bbox": [0.06314269955035383, 0.8034830367924569, 0.2917678064661527, 0.8199012196019424], "kind": "heading", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p002-b005", "page": 2, "order": 5, "source": "Studies have identified the road environment, traffic and driver factors that affect intersection safety based on historical crash data (Abdel-Aty and Wang, 2006; Huang et al., 2008; Wang et al., 2019a; Wong et al., 2007). For the intersection design, factors including number of approaches, junction control, signal time plan, distance between consecutive intersections, road width and curvature, and number of lanes are found affecting the crash frequency at the intersections (AbdelAty and Wang, 2006; Wang et al., 2019a). Traffic flow and proportion of", "translation": "Studies have identified the road environment, traffic and driver factors that affect intersection safety based on historical crash data (Abdel-Aty and Wang, 2006; Huang et al., 2008; Wang et al., 2019a; Wong et al., 2007). For the intersection design, factors including number of approaches, junction control, signal time plan, distance between consecutive intersections, road width and curvature, and number of lanes are found affecting the crash frequency at the intersections (AbdelAty and Wang, 2006; Wang et al., 2019a). Traffic flow and proportion of", "bbox": [0.06314262905923736, 0.8298404713566144, 0.4849764718596387, 0.9385428956958387], "kind": "body", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p002-b007", "page": 2, "order": 7, "source": "truck in the traffic are positively associated with crash frequency. Additionally, built environment like commercial, industrial and community land use also contribute to the increase in crash risk at the intersections. For driver characteristics, driver age is positively associated with the risk of more severe crash because of the reduction in physical capability of drivers. Furthermore, driving violation behaviour such as red light running and driving under the influence of alcohol and drug also increase the risk of crash at the intersections. At the signalized intersections, one of the major crash contributory factors is rear-end conflicts among vehicles in the queues (Essa and Sayed, 2018). Factors including volume of approaching traffic, formation of vehicle queues, cycle time, and green time significantly affect the risk of traffic conflicts (Yuan and Abdel-Aty, 2018). In particular, installation of green signal countdown device can mitigate the safety risk at signalized intersections by increasing the drivers’ intention to stop at the yellow dilemma zone and deterring the red light running violation in the short term, even that drivers’ propensities of risk-taking behaviour may increase in the long run (Islam et al., 2017; Yan et al., 2022). To this end, it is worth exploring the effectiveness of adaptive signal time plan, that is responsive to the real-time traffic volume and speed, in enhancing the overall safety and operation efficiency of signalized intersections (Jin et al., 2021). For example, some empirical studies indicate that adaptive signal time plan significantly reduces the potential crash risk (Khattak et al., 2018; Jin et al., 2021; Lin and Wei, 2023). Nevertheless, association between crash potential, signal time plan, and real-time traffic characteristics should be examined. With the advances in remote sensing and information communication technologies, it is possible to collect the real-time vehicle position and trajectory data using GPS-enabled device on the vehicles like taxis and buses. Studies indicate that dynamic traffic characteristics like average segment speed, sudden acceleration, hard braking, and speeding are positively associated with the crash risk at the intersections (Xie et al., 2013, 2019; Stipancic et al., 2018; Stipancic et al., 2019). On the other hand, safety of vulnerable road users such as motorcyclists, bicyclists and pedestrians has also been a major concern. Unlike safety studies for motor vehicle, there is a lack of comprehensive data for the estimation of crash exposure of vulnerable road users. Precise information on the volume and speed of vulnerable road users at individual road segments and intersections is usually not available (Zhu et al., 2022). Alternate data sources like household travel survey and bike-sharing data are used to estimate the crash exposure at the aggregated level in terms of the number, time and distance of trips involving vulnerable road users for the association measure between possible influencing factors and crash risk involving vulnerable road users (Lee et al., 2015; Sze et al., 2019; Song et al., 2020). The emerging video observation surveys can be conducted to examine the behaviour of vulnerable road users when interacting with the motor vehicles (Zhu et al., 2022; Nasernejad et al., 2023). Microscopic features like jerk (the first derivative of acceleration) profile (Zaki et al., 2014) and motion of body’s joints (Zhang et al., 2022) of pedestrians can be extracted. Findings indicate that the speed and acceleration of vehicles and vulnerable road users involved in the interactions can affect the safety risk (Tageldin and Sayed, 2019; Zhu et al., 2022; Song et al., 2022a).", "translation": "truck in the traffic are positively associated with crash frequency. Additionally, built environment like commercial, industrial and community land use also contribute to the increase in crash risk at the intersections. For driver characteristics, driver age is positively associated with the risk of more severe crash because of the reduction in physical capability of drivers. Furthermore, driving violation behaviour such as red light running and driving under the influence of alcohol and drug also increase the risk of crash at the intersections. At the signalized intersections, one of the major crash contributory factors is rear-end conflicts among vehicles in the queues (Essa and Sayed, 2018). Factors including volume of approaching traffic, formation of vehicle queues, cycle time, and green time significantly affect the risk of traffic conflicts (Yuan and Abdel-Aty, 2018). In particular, installation of green signal countdown device can mitigate the safety risk at signalized intersections by increasing the drivers’ intention to stop at the yellow dilemma zone and deterring the red light running violation in the short term, even that drivers’ propensities of risk-taking behaviour may increase in the long run (Islam et al., 2017; Yan et al., 2022). To this end, it is worth exploring the effectiveness of adaptive signal time plan, that is responsive to the real-time traffic volume and speed, in enhancing the overall safety and operation efficiency of signalized intersections (Jin et al., 2021). For example, some empirical studies indicate that adaptive signal time plan significantly reduces the potential crash risk (Khattak et al., 2018; Jin et al., 2021; Lin and Wei, 2023). Nevertheless, association between crash potential, signal time plan, and real-time traffic characteristics should be examined. With the advances in remote sensing and information communication technologies, it is possible to collect the real-time vehicle position and trajectory data using GPS-enabled device on the vehicles like taxis and buses. Studies indicate that dynamic traffic characteristics like average segment speed, sudden acceleration, hard braking, and speeding are positively associated with the crash risk at the intersections (Xie et al., 2013, 2019; Stipancic et al., 2018; Stipancic et al., 2019). On the other hand, safety of vulnerable road users such as motorcyclists, bicyclists and pedestrians has also been a major concern. Unlike safety studies for motor vehicle, there is a lack of comprehensive data for the estimation of crash exposure of vulnerable road users. Precise information on the volume and speed of vulnerable road users at individual road segments and intersections is usually not available (Zhu et al., 2022). Alternate data sources like household travel survey and bike-sharing data are used to estimate the crash exposure at the aggregated level in terms of the number, time and distance of trips involving vulnerable road users for the association measure between possible influencing factors and crash risk involving vulnerable road users (Lee et al., 2015; Sze et al., 2019; Song et al., 2020). The emerging video observation surveys can be conducted to examine the behaviour of vulnerable road users when interacting with the motor vehicles (Zhu et al., 2022; Nasernejad et al., 2023). Microscopic features like jerk (the first derivative of acceleration) profile (Zaki et al., 2014) and motion of body’s joints (Zhang et al., 2022) of pedestrians can be extracted. Findings indicate that the speed and acceleration of vehicles and vulnerable road users involved in the interactions can affect the safety risk (Tageldin and Sayed, 2019; Zhu et al., 2022; Song et al., 2022a).", "bbox": [0.5150425991915105, 0.0646336516764807, 0.9368510331485629, 0.766402130052783], "kind": "body", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p002-b008", "page": 2, "order": 8, "source": "2.2. Safety surrogate measures", "translation": "2.2. 安全代替指標", "bbox": [0.5150430093216427, 0.7771266788203658, 0.69190388764403, 0.7935448616298512], "kind": "heading", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p002-b009", "page": 2, "order": 9, "source": "Conventional safety studies based on historical crash record have several limitations. First, crash occurrence is rare and random. It can take considerable time period to gather adequate crash cases to establish valid and reliable inferences. Second, police crash report may suffer from the problem of under reporting, missing data, and misspecification of the agencies who are responsible for crash investigation, reporting, and data coding (Tsui et al., 2009; Watson et al., 2015; Ding et al., 2022; Chen et al., 2022; Tarko, 2012; Tarko and Lizarazo, 2021). Furthermore, some dynamic traffic characteristics and key crash contributing factors like vehicle maneuver and driver behaviour are not captured in the", "translation": "Conventional safety studies based on historical crash record have several limitations. First, crash occurrence is rare and random. It can take considerable time period to gather adequate crash cases to establish valid and reliable inferences. Second, police crash report may suffer from the problem of under reporting, missing data, and misspecification of the agencies who are responsible for crash investigation, reporting, and data coding (Tsui et al., 2009; Watson et al., 2015; Ding et al., 2022; Chen et al., 2022; Tarko, 2012; Tarko and Lizarazo, 2021). Furthermore, some dynamic traffic characteristics and key crash contributing factors like vehicle maneuver and driver behaviour are not captured in the", "bbox": [0.5150428042565766, 0.8034831136918903, 0.9368446761315131, 0.9385429725952721], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p003-b001", "page": 3, "order": 1, "source": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "translation": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p003-b002", "page": 3, "order": 2, "source": "police crash database. In recent years, some researchers have established real-time crash prediction models for freeways and arterial roads, incorporating the traffic parameters like traffic volume, vehicle occupancy, average speed, and vehicle mix (Wang et al., 2017; Yuan and Abdel-Aty, 2018; Bao et al., 2019; Zhang and Abdel-Aty, 2022; Islam and Abdel-Aty, 2023). Additionally, vehicle trajectory data are captured using advanced vehicle sensing, image processing, and crowdsourcing techniques (Yuan and Abdel-Aty, 2018; Wang et al., 2019b) for the association measure between dynamic traffic characteristics and real-time crash risk (Zhang and Abdel-Aty, 2022; Islam and Abdel-Aty, 2023). To estimate the potential crash risk of different road entities, several surrogate safety measures like time-to-collision (TTC), post encroachment time (PET), and deceleration rate to avoid crash (DRAC) are proposed (Tarko et al., 2009; Tarko 2023). TTC and PET estimate the crash risk based on time proximity for potential collision of vehicles involved. For example, TTC refers to the time remained before two vehicles collide when the velocities of both remain unchanged (Hayward, 1972). On the other hand, PET refers to the difference between the time at which the first vehicle leaving an intersecting zone and that of the second vehicle arriving at that zone (Cooper, 1984). Furthermore, DRAC is a speedbased safety indicator that considers the minimum required deceleration rate for a following vehicle, avoiding the collision with a leading vehicle (Cooper and Ferguson, 1976). Additionally, other dynamic traffic characteristics such as vehicle approaching speed, yielding rate, time to cross or go, and deceleration rate at the intersection are also considered in the traffic conflict risk analysis (Fu et al., 2018, Essa and Sayed, 2018; Patel et al., 2023). Furthermore, it is quite challenging to model the trajectories of vulnerable road users including pedestrian, bicyclist, and motorcyclist. For example, movement and behaviour of motorcyclist are more chaotic and unpredictable, compared to that of motor vehicles (Song et al., 2022a; Ospina-Mateus et al., 2023). Factors including road geometry, lane configuration, traffic mix, weaving movement, and variation in speed among all vehicles significantly affect the risk of traffic conflicts involving vulnerable road users. Additionally, sudden acceleration, hard brake, and shockwave propagation are all positively associated with the conflict risk (Sun et al., 2020; Ospina-Mateus et al., 2023; Song et al., 2022a; Nasernejad et al., 2023). Nevertheless, there are very few studies that focus on the modeling of traffic conflict risk involving motorcycle at the signalized intersections, where the interactions among motor vehicles and motorcycles are sophisticated.", "translation": "警察の事故データベース。近年、一部の研究者は、交通量、車両占有率、平均速度、車両混合などの交通パラメータを組み込んだ、高速道路や幹線道路のリアルタイム衝突予測モデルを確立しています (Wang et al., 2017; Yuan and Abdel-Aty, 2018; Bao et al., 2019; Zhang and Abdel-Aty, 2022; Islam and Abdel-Aty, 2023年）。さらに、車両の軌跡データは、動的交通特性とリアルタイムの衝突リスクとの関連性測定のために、高度な車両センシング、画像処理、およびクラウドソーシング技術（Yuan and Abdel-Aty, 2018; Wang et al., 2019b）を使用して取得されます（Zhang and Abdel-Aty, 2022; Islam and Abdel-Aty, 2023）。さまざまな道路エンティティの潜在的な衝突リスクを推定するために、衝突までの時間 (TTC)、交錯後時間 (PET)、衝突を回避するための減速率 (DRAC) などのいくつかの代替安全対策が提案されています (Tarko et al., 2009; Tarko 2023)。 TTC と PET は、関係する車両の潜在的な衝突の時間的近接性に基づいて衝突リスクを推定します。たとえば、TTC は、2 台の車両の速度が変化しない場合に、2 台の車両が衝突するまでの残り時間を指します (Hayward、1972)。一方、PET は、最初の車両が交差点ゾーンを出る時間と 2 番目の車両がそのゾーンに到着する時間の差を指します (Cooper、1984)。さらに、DRAC は、後続車両に必要な最小減速度を考慮して、先行車両との衝突を回避する速度ベースの安全指標です (Cooper および Ferguson、1976)。さらに、車両の接近速度、譲歩率、横断または進行の時間、交差点での減速率などの他の動的な交通特性も交通コンフリクトリスク分析で考慮されます（Fu et al., 2018、Essa and Sayed, 2018; Patel et al., 2023）。さらに、歩行者、自転車、自動二輪車などの交通弱者の軌跡をモデル化することは非常に困難です。たとえば、オートバイの動きと行動は、自動車の動きと比較して、より混沌として予測不可能です (Song et al., 2022a; Ospina-Mateus et al., 2023)。道路の形状、車線の構成、交通の混合、蛇行の動き、すべての車両間の速度の変動などの要因は、交通弱者の道路利用者が関与する交通衝突のリスクに大きく影響します。さらに、急加速、急ブレーキ、衝撃波の伝播はすべて紛争リスクと正の関連性を示しています（Sun et al., 2020; Ospina-Mateus et al., 2023; Song et al., 2022a; Nasernejad et al., 2023）。それにもかかわらず、自動車と二輪車の間の相互作用が洗練されている信号交差点における二輪車が関与する交通コンフリクトリスクのモデル化に焦点を当てた研究はほとんどありません。 2.3.分析方法事故と紛争の重大度は離散的な性質を持っているため、考えられるリスク要因の影響を推定するために、二値および多項ロジット回帰またはプロビット回帰、順序付きロジット回帰またはプロビット回帰などの離散結果モデルが採用されます（Xin et al., 2017; Zhai et al., 2019; Song et al., 2020）。関連測度に対する空間依存の影響を考慮して、条件付き自己回帰やベイズ空間法などの高度なアプローチも採用されています (Zeng et al., 2019; Guo et al., 2019)。さらに、ドライバーの姿勢、安全認識、運転スタイルなどの観察されていない測定不可能な要因に起因する個人の不均一性も、衝突リスクと他の観察された要因との関係を変える可能性があります。この目的を達成するために、ランダムパラメータ、ランダム効果、および潜在クラス法が採用され、衝突および紛争重大度モデルにおける観察されない異質性の影響が考慮されます (Behnood and Mannering, 2017a,b; Fountas et al., 2018; Song et al., 2020; Chang et al., 2021; Sun et al., 2023;ゴスワミーら、2023 年）。さらに、平均と分散の不均一性や相関グループ化ランダムパラメータ法などの高度なアプローチが、高速道路の合流および分岐エリアでの車線変更行動と交通衝突リスクのモデリングに採用されています。個々の車両の軌道に基づく (Li et al., 2021; Song et al., 2022a)。衝突および紛争重大度モデルにおける観察されなかった異質性を説明するいくつかの最近の研究を表 1 にまとめます。交通コンフリクト分析における個人の不均一性を説明するモデルが普及しているにもかかわらず、交差点での交通弱者の道路利用者が関与する紛争に足を運ぶ人はほとんどいません。", "bbox": [0.06314280849117021, 0.0646335747770474, 0.48498200861642393, 0.6082605601954537], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p003-b003", "page": 3, "order": 3, "source": "2.3. Analytic methods", "translation": "2.3. 分析方法", "bbox": [0.06314280849117021, 0.6189851474127531, 0.19104977882707294, 0.635403291772522], "kind": "heading", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p003-b004", "page": 3, "order": 4, "source": "Because of the discrete nature of crash and conflict severity, discrete outcome models such as binary and multinomial logit or probit regression, and ordered logit or probit regression are adopted to estimate the influences of possible risk factors (Xin et al., 2017; Zhai et al., 2019; Song et al., 2020). Accounting for the effect of spatial dependence on the association measure, advanced approaches like conditional autoregressive and Bayesian spatial method are also adopted (Zeng et al., 2019; Guo et al., 2019). Furthermore, individual heterogeneity attributed to some unobserved and unmeasurable factors like driver attitude, safety perception and driving style can also modify the association between crash risk and other observed factors. To this end, random parameters, random effects, and latent class methods are adopted, accounting for the effect of unobserved heterogeneity in the crash and conflict severity models (Behnood and Mannering, 2017a,b; Fountas et al., 2018; Song et al., 2020; Chang et al., 2021; Sun et al., 2023; Goswamy et al., 2023). Furthermore, advanced approaches like heterogeneity in means and variances and correlated grouped random parameters methods are adopted for the modeling of lane changing behaviour and traffic conflict risk at the highway merging and diverging areas, based on the trajectories of individual vehicles (Li et al., 2021; Song et al., 2022a). Some recent studies accounting for unobserved heterogeneity in the crash and conflict severity models are summarized", "translation": "Because of the discrete nature of crash and conflict severity, discrete outcome models such as binary and multinomial logit or probit regression, and ordered logit or probit regression are adopted to estimate the influences of possible risk factors (Xin et al., 2017; Zhai et al., 2019; Song et al., 2020). Accounting for the effect of spatial dependence on the association measure, advanced approaches like conditional autoregressive and Bayesian spatial method are also adopted (Zeng et al., 2019; Guo et al., 2019). Furthermore, individual heterogeneity attributed to some unobserved and unmeasurable factors like driver attitude, safety perception and driving style can also modify the association between crash risk and other observed factors. To this end, random parameters, random effects, and latent class methods are adopted, accounting for the effect of unobserved heterogeneity in the crash and conflict severity models (Behnood and Mannering, 2017a,b; Fountas et al., 2018; Song et al., 2020; Chang et al., 2021; Sun et al., 2023; Goswamy et al., 2023). Furthermore, advanced approaches like heterogeneity in means and variances and correlated grouped random parameters methods are adopted for the modeling of lane changing behaviour and traffic conflict risk at the highway merging and diverging areas, based on the trajectories of individual vehicles (Li et al., 2021; Song et al., 2022a). Some recent studies accounting for unobserved heterogeneity in the crash and conflict severity models are summarized", "bbox": [0.06314280849117021, 0.6453415822842776, 0.4849712939667192, 0.9385428187964054], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p003-b006", "page": 3, "order": 6, "source": "in Table 1. Even that models accounting for individual heterogeneity in traffic conflict analysis are prevalent, very few visit the conflicts involving vulnerable road users at the intersections.", "translation": "in Table 1. Even that models accounting for individual heterogeneity in traffic conflict analysis are prevalent, very few visit the conflicts involving vulnerable road users at the intersections.", "bbox": [0.5150428042565766, 0.0646335747770474, 0.9367815160911481, 0.10740815881455525], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p003-b007", "page": 3, "order": 7, "source": "3. Data", "translation": "3. データ", "bbox": [0.5150428042565766, 0.1173464204890235, 0.5650410509502612, 0.13376458407365058], "kind": "heading", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p003-b008", "page": 3, "order": 8, "source": "In this study, a comprehensive high definition drone-based vehicle trajectory dataset – Signalized Intersection Dataset (SIND) is adopted for traffic conflict analysis, both involving and not involving motorcycles, at the intersection (Xu et al., 2022). Overall, a total of seven-hour long videos from 15 days in July and August 2021 were captured. Selected site is a typical four-leg signalized intersection in Tianjin City of China. There are high traffic flow and traffic mix during the observation period. For example, the average number of vehicles approaching the intersection is 700 per hour, and that of motorcycles is 470 per hour respectively. Among the vehicles, majority are private cars (96.8 %). All surveys were conducted in the daytime. The dimensions of the area covered by the drone video are 80 × 50 m.", "translation": "この研究では、包括的な高解像度ドローンベースの車両軌跡データセットである信号交差点データセット (SIND) が、交差点でのオートバイを含むものと含まないもの両方の交通衝突分析に採用されています (Xu et al., 2022)。全体として、2021 年 7 月と 8 月の 15 日間から合計 7 時間の長さのビデオが撮影されました。選択された場所は、中国の天津市にある典型的な 4 本脚の信号交差点です。観測期間中は交通量が多く、交通量が混在します。たとえば、交差点に進入する車両の平均台数は 1 時間あたり 700 台、バイクの平均台数は 1 時間あたり 470 台です。", "bbox": [0.5150428042565766, 0.14370385505318095, 0.9368444710664471, 0.3051210139467119], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p003-b009", "page": 3, "order": 9, "source": "Table 1 Recent road safety studies with econometric models considering unobserved heterogeneity.", "translation": "表 1 Recent road safety studies with econometric models considering unobserved heterogeneity.", "bbox": [0.515046803025366, 0.3288342807215351, 0.9368418052205875, 0.36768160589394167], "kind": "table-caption", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p003-b010", "page": 3, "order": 10, "source": "Study Econometric model Crash type Location (Study period)", "translation": "Study Econometric model Crash type Location (Study period)", "bbox": [0.5251429764907256, 0.3706778769635213, 0.9161042928115877, 0.39459729189417686], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p003-b011", "page": 3, "order": 11, "source": "Behnood and Mannering (2017a,b)", "translation": "Behnood and Mannering (2017a,b)", "bbox": [0.5251429764907256, 0.39803469656291063, 0.5875646288189011, 0.4327394108134599], "kind": "body ", "page": 3, "order": 46, "source": "Vehicle and ebike crash at intersection", "translation": "S. チャンと N.N. Sze 事故分析と予防 207 (2024) 107739 3", "bbox": [0.7462830418777726, 0.8622475843388767, 0.8141961316115797, 0.896952298589426], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p003-b047", "page": 3, "order": 47, "source": "United Kingdom (2020–2022)", "translation": "United Kingdom (2020–2022)", "bbox": [0.8411392205189746, 0.8622475843388767, 0.9189330628661821, 0.8861669992695322], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p003-b048", "page": 3, "order": 48, "source": "Note:", "translation": "Note:", "bbox": [0.515046803025366, 0.9112628217308878, 0.5436652735229625, 0.9260389709410114], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p003-b049", "page": 3, "order": 49, "source": "1 Next Generation Simulation (NGSIM) Open Data.", "translation": "1 Next Generation Simulation (NGSIM) Open Data.", "bbox": [0.5244760536294364, 0.9192627466770409, 0.7985970370968857, 0.9380388968099578], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p004-b001", "page": 4, "order": 1, "source": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "translation": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p004-b002", "page": 4, "order": 2, "source": "Fig. 1 and Fig. 2 illustrate the conflicts involving two vehicles. As shown in Fig. 1, conflicts are stratified into three types by intersecting angle, namely rear-end, head-on, and angled conflicts (Wu et al., 2020; Arun et al., 2021).1 As shown in Fig. 2, “Vehicle 1” denotes the leading vehicle, and “Vehicle 2” denotes the following vehicle respectively in an interaction. In a rear-end conflict (as shown in Fig. 2(a)), vehicle in the front is the leading vehicle. In an angled or head-on conflict (as shown in Fig. 2(b)), vehicle that reach the intersecting area first is the leading vehicle. In vehicle-motorcycle conflicts, a motorcycle can either be the leading or following vehicle. In this study, severity levels of traffic conflict are also considered. For example, threshold values for slight traffic conflict and severe conflict are set at post encroachment time (PET) of 4 s and 2 s respectively (Zheng et al., 2019; Patel et al., 2023). Fig. 3 illustrates the heatmaps of traffic conflict density, by vehicle class and severity level, at the study area. As shown in Fig. 3(a), slight vehicle-vehicle conflicts are prevalent at the center of intersection and intersection approaches. As shown in Fig. 3(c) and Fig. 3(d), both slight and severe vehicle-motorcycle conflicts are prevalent at the center of intersection only. Fig. 4 presents the signal time plan of the study area. In particular, average cycle time is 67 s, average green time for major road (Phase 1) is 33 s, and average green time for minor road (Phase 2) is 26 s respectively. Additionally, permissive left-turn is adopted for both Phase 1 and Phase 2. Hence, leftturning traffic have to give way to oncoming traffic. This may induce potential conflicts between left-turning and oncoming (straightthrough) traffic (Song et al., 2022b). Table 2 summarizes the data used in this study. Overall, trajectories of 3,545 vehicle-vehicle and 2,601 vehicle-motorcycle interactions are used for the estimation. For each interaction, parameters like longitudinal speed, acceleration rate, and deceleration rate of every vehicle involved are estimated. Additionally, time to green (time remaining before green signal starts) is also considered. Furthermore, for each signal cycle, data including traffic volumes by direction, cycle time, green time for major road, and green time for minor road are captured.", "translation": "図 1 と図 2 は、2 台の車両が関与する衝突を示しています。図１に示すように、衝突は交差する角度によって、追突衝突、正面衝突、斜め衝突の３種類に階層化される（Wu et al., 2020; Arun et al., 2021）。図２に示すように、対話における「車両１」は先行車両を、「車両２」は後続車両をそれぞれ示す。追突事故（図 2 (a) 参照）では、前方車両が先行車両となります。斜め衝突または正面衝突 (図 2 (b) に示す) では、最初に交差エリアに到達した車両が先頭車両になります。車とバイクの衝突では、バイクが先頭車両になることも後続車両になることもあります。この調査では、交通コンフリクトの重大度レベルも考慮されます。たとえば、軽度の交通コンフリクトと重大な競合のしきい値は、それぞれ 4 秒と 2 秒の交錯後時間 (PET) に設定されます (Zheng et al., 2019; Patel et al., 2023)。図 3 は、調査地域における車両クラスおよび重大度レベル別の交通衝突密度のヒートマップを示しています。図3(a)に示すように、交差点中央や交差点進入部では軽度の車車衝突が発生している。図 3 (c) および図 3 (d) に示すように、軽度および重度の車両と二輪車の衝突は交差点の中央でのみ発生しています。図 4 は、調査地域の信号時間計画を示しています。特に、平均サイクルタイムは 67 秒、主要道路 (フェーズ 1) の平均青時間は 33 秒、補助道路 (フェーズ 2) の平均青時間は 26 秒です。さらに、フェーズ 1 とフェーズ 2 の両方で許容的な左折が採用されています。そのため、左折車は対向車に道を譲らなければなりません。これは、左折車と対向車（直進車）の間で潜在的な衝突を引き起こす可能性があります (Song et al., 2022b)。表 2 は、この研究で使用したデータをまとめたものです。全体として、3,545 件の車両と車両、および 2,601 件の車両とオートバイの相互作用の軌跡が推定に使用されます。インタラクションごとに、関係するすべての車両の縦方向の速度、加速率、減速度などのパラメータが推定されます。さらに、青までの時間（青信号が始まるまでの残り時間）も考慮されます。さらに、信号サイクルごとに、方向別の交通量、サイクルタイム、主要道路の青時間、補助道路の青時間などのデータが収集されます。", "bbox": [0.06314394275731719, 0.0646335747770474, 0.484992364402263, 0.5159757803696817], "kind": "body", "chapter_id": "chapter-006", "figure_ids": ["fig-004-01", "fig-004-02", "fig-005-01", "fig-005-02"]}, {"id": "p004-b003", "page": 4, "order": 3, "source": "4. Method", "translation": "4. 方法", "bbox": [0.06314516033114727, 0.5259150321243538, 0.13226409673657402, 0.5423331764841225], "kind": "heading", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b004", "page": 4, "order": 4, "source": "In this study, risk of traffic conflict at the intersection, with and without the involvement of motorcycle, will be estimated. Given the discrete nature of the occurrence and severity level of traffic conflict, multinomial logit regression approach would be adopted (FigueroaMedina, 2005; Behnood and Mannering, 2017a, 2017b). The utility function of logit model is given by,", "translation": "本研究では、二輪車の関与の有無にかかわらず、交差点における交通衝突のリスクを推定します。交通コンフリクトの発生と重大度レベルが離散的であることを考慮すると、多項ロジット回帰アプローチが採用されます (FigueroaMedina, 2005; Behnood and Mannering, 2017a, 2017b)。", "bbox": [0.06314516033114727, 0.5522714669958783, 0.48496698760033063, 0.6346183408070611], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b005", "page": 4, "order": 5, "source": "skn = βkxkn + εkn (1)", "translation": "skn = βkxkn + εkn (1)", "bbox": [0.06314516033114727, 0.6381279540436683, 0.48493920128387136, 0.6553655003150185], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b006", "page": 4, "order": 6, "source": "Fig. 1. Conflict type by intersecting angle.", "translation": "図 1 と図 2 は、2 台の車両が関与する衝突を示しています。", "bbox": [0.15866640343147678, 0.8397621900404929, 0.3894792854548784, 0.8545383392506165], "kind": "figure-caption", "chapter_id": "chapter-007", "figure_ids": ["fig-004-01", "fig-004-02"]}, {"id": "p004-b007", "page": 4, "order": 7, "source": "1 Some studies also analyze the risk of sideswipe conflict. In this study, number of sideswipe conflict is negligible. Hence, sideswipe conflict is not considered.", "translation": "ロジットモデルの効用関数は次の式で与えられます。", "bbox": [0.06314307123078618, 0.8951913784661747, 0.48496816672446086, 0.9381101056851981], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b009", "page": 4, "order": 9, "source": "Fig. 2. Vehicle notation.", "translation": "図 2 は、2 台の車両が関与する衝突を示しています。", "bbox": [0.6589514695065171, 0.2625486033255775, 0.79288700033077, 0.27732475253570116], "kind": "figure-caption", "chapter_id": "chapter-007", "figure_ids": ["fig-004-01"]}, {"id": "p004-b010", "page": 4, "order": 10, "source": "where skn is a function determining the probability of conflict outcome k in the observation n, xkn is a vector of explanatory variables that affect conflict outcome, βk is a vector of estimable parameters, and εkn is the error term, assuming independent and identically distributed (IID) Type 1 extreme value distribution. Accounting for the effect of unobserved heterogeneity in the means and variances of random parameter, let βkn be a vector varying across the observations, as defined in Seraneeprakarn et al. (2017),", "translation": "s kn = β k x kn + ε kn (1) ここで、 s kn は観測値 n における衝突結果 k の確率を決定する関数、x kn は衝突結果に影響を与える説明変数のベクトル、β k は推定可能なパラメータのベクトル、ε kn は独立同一分布 (IID) タイプ 1 極値分布を仮定した誤差項です。ランダムパラメータの平均と分散における観察されない不均一性の影響を考慮して、Seraneeprakarn et al. で定義されているように、β kn を観察全体で変化するベクトルとする。 (2017) 、β kn = β + Θ kn z kn + Γ ω kn (2) ここで、β はすべての観測値にわたって推定された平均パラメータ、z kn は不均一性効果を捉える説明変数のベクトル、Θ kn は不均一性効果の推定パラメータのベクトル、ω kn は N (0, σ kn 2) で正規分布し、Γ はコレスキー分解に基づく対称コレスキー行列。", "bbox": [0.5150455213687026, 0.29427673276147326, 0.9368185303355828, 0.40290881334408185], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b011", "page": 4, "order": 11, "source": "βkn = β + Θknzkn + Γωkn (2)", "translation": "観測固有の観測されない不均一性では、ベクトル β kn は連続密度関数 Prob (β n = β) = f (β | φ) を持ち、 φ はこの関数を特徴付けるパラメータのベクトルです。", "bbox": [0.5150508530604218, 0.4064185034801223, 0.9368439584037818, 0.42372283690929796], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b012", "page": 4, "order": 12, "source": "where β is the mean parameter estimated across all observations, zkn is a vector of explanatory variables that capture heterogeneity effect, Θkn is a vector of estimated parameters for heterogeneity effect, ωkn is normally distributed with N(0,σkn2), Γ is the symmetric Cholesky matrix based on Cholesky decomposition. With observation-specific unobserved heterogeneity, the vector βkn have a continuous density function Prob(βn = β) = f(β|φ), and φ is a vector of parameters characterizing this function. Thus, the probability of observation n having conflict outcome k can be given by,", "translation": "したがって、観測値 n が矛盾結果 k を持つ確率は、 p n (k) = ∫ EXP [ β k x kn ] ∑ ∀ K EXP [ β k x kn ] f (β | φ) d β (3) さらに、分散共変量行列は次のように書くことができます。 C = ΓΓ T (4) ここで、対角要素は標準偏差です。ランダムパラメータの分散、非対角要素はそれぞれランダムパラメータ間の分散です。", "bbox": [0.515046803025 kn) = ∑ K", "translation": "LL(βkn) = ∑ K", "bbox": [0.5150515707881532, 0.7114078848218743, 0.5930870310495169, 0.7360079366367125], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b019", "page": 4, "order": 19, "source": "∑ N", "translation": "∑ N", "bbox": [0.5975228447610285, 0.7114078848218743, 0.6168966232140627, 0.7232937688312293], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b020", "page": 4, "order": 20, "source": "∑ R", "translation": "∑ R", "bbox": [0.6508562696900914, 0.7114078848218743, 0.6702300481431256, 0.7232951530210289], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b021", "page": 4, "order": 21, "source": "1 R", "translation": "1 R", "bbox": [0.6378101327160601, 0.7119189584556195, 0.6463924133307878, 0.7420510786029865], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b022", "page": 4, "order": 22, "source": "( xk|βkn, νr kn", "translation": "(xk|βkn, νr kn", "bbox": [0.6899035291902944, 0.714610284822428, 0.749898441526004, 0.7364369585751211], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b023", "page": 4, "order": 23, "source": ") (5)", "translation": ") (5)", "bbox": [0.7506652310744938, 0.714610284822428, 0.9368407798952568, 0.7351938023363125], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b024", "page": 4, "order": 24, "source": "ykn", "translation": "ykn", "bbox": [0.6190472943612644, 0.7187766961188933, 0.6347551758935351, 0.7351948789283788], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b025", "page": 4, "order": 25, "source": "Pkn", "translation": "Pkn", "bbox": [0.6723805654915276, 0.7187766961188933, 0.68904092298966, 0.7351948789283788], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b026", "page": 4, "order": 26, "source": "n=1", "translation": "n=1", "bbox": [0.5990469908649665, 0.7335501 ance metrics like Akaike’s", "translation": "表 3 illustrates the results of goodness of fit assessment of the candidate models. For example, performance metrics like Akaike’s", "bbox": [0.5150497764688247, 0.8978461007027301, 0.9368261177430293, 0.9274068580606409], "kind": "table-caption", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b001", "page": 5, "order": 1, "source": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "translation": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b002", "page": 5, "order": 2, "source": "Fig. 3. Traffic conflict heatmap.", "translation": "図 3. 交通衝突ヒートマップ。", "bbox": [0.41257163691753573, 0.39912017051372745, 0.5874406157201649, 0.41389635817356774], "kind": "figure-caption", "chapter_id": "chapter-009", "figure_ids": ["fig-005-01"]}, {"id": "p005-b003", "page": 5, "order": 3, "source": "Fig. 4. Signal time plan.", "translation": "図 4. 信号時間計画。", "bbox": [0.4332376841509927, 0.5542629700698947, 0.5668430602187922, 0.5690391577297349], "kind": "figure-caption", "chapter_id": "chapter-009", "figure_ids": ["fig-005-02"]}, {"id": "p005-b004", "page": 5, "order": 4, "source": "information criterion (AIC) and Bayesian information criterion (BIC) are adopted, considering the model complexity. Smaller AIC and BIC values indicate superior model fit. As shown in Table 3, the random parameters logit model with heterogeneity in means and variances is considered, given the lowest AIC values among the candidate models.", "translation": "モデルの複雑さを考慮して、情報量基準 (AIC) とベイズ情報量基準 (BIC) が採用されます。 AIC および BIC 値が小さいほど、モデルの適合性が優れていることを示します。表 3 に示すように、候補モデルの中で最も低い AIC 値を考慮して、平均と分散に不均一性があるランダムパラメーターロジットモデルが考慮されます。表 4 は、車両間衝突の平均と分散の不均一性を伴うランダムパラメータロジットモデルのパラメータ推定の結果を示しています。表 4 に示すように、追突衝突は、他の種類の衝突と比較して、1 % の有意水準で重大である可能性が高くなります (1.664)。さらに、先行車両の縦方向の速度 (軽度の衝突: 0.106、重度の衝突: 0.174) および横方向の速度 (軽度の衝突: 2.236、重度の衝突: 4.349) は、軽度および重度の衝突の可能性と正の相関があり、すべて 1 % の有意水準です。一方、後続車両の縦方向の速度 (軽度の衝突: 0.093、重度の衝突: 0.178) は、1 % の有意水準で軽度および重度の衝突の可能性と正の相関があります。さらに、先行車両の縦方向の加速度は、軽度の衝突の可能性 (1.364) と負の相関がありますが、重大な衝突の可能性 (0.237) とは正の相関があり、どちらも有意水準 1 % です。後続車両の前後方向の加速は、10 % レベルで重大な衝突の可能性 (0.265) と負の相関があります。最後に重要なことですが、ランダムパラメーターの平均と分散の不均一性も考慮されます。軽度の衝突の可能性については、前後方向の加速度のランダムパラメータの平均と分散の両方が、他のタイプの衝突と比較して追突の方が高く、いずれも有意水準は 1% です。 5.2.自動車と二輪車の衝突表 5 は、候補モデルの適合度評価の結果を示しています。たとえば、候補モデル間で AIC および BIC 値が低いことを考慮して、平均と分散に不均一性があるランダムパラメーターロジットモデルが考慮されます。表 6 はパラメータ推定の結果を示しています。たとえば、グリーンまでの時間 (0.631) は、1 % の有意水準で深刻な紛争の可能性と正の相関があります。さらに、車両の前後速度 (軽度の衝突: 0.540、重度の衝突: 1.202)、横速度 (軽度の衝突: 0.586、重度の衝突: 0.832)、および縦方向の加速度 (軽度の衝突: 2.095、重度の衝突: 3.915) は、すべて 1 % の有意水準で、軽度および重度の衝突の可能性と正の相関があります。さらに、後方衝突は、有意水準 1 % で深刻になる可能性が高くなります (1.132)。ただし、オートバイの横速度は、重大な衝突の可能性 (2.111) と 1 % の有意水準で負の相関があります。", "bbox": [0.06314280849117021, 0.581276549048727, 0.4849418158634644, 0.6504075631515449], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b005", "page": 5, "order": 5, "source": "Table 4 presents the results of parameter estimation of random parameters logit model with heterogeneity in means and variances for vehicle-vehicle conflict. As shown in Table 4, rear-end conflict has a higher likelihood of being severe (1.664), compared to other conflict types, at the 1 % level of significance. Additionally, longitudinal speed (slight conflict: 0.106; severe conflict: 0.174) and lateral speed (slight conflict: 2.236; severe conflict: 4.349) of the leading vehicle are positively associated with the likelihood of slight and severe conflicts, all at the 1 % level of significance. On the other hand, longitudinal speed of the following vehicle (slight conflict: 0.093; severe conflict: 0.178) is positively associated with the likelihood of slight and severe conflicts at the 1 % level of significance. Furthermore, the longitudinal acceleration of the leading vehicle is negatively associated with the likelihood of slight conflict (−1.364), but positively associated with that of severe conflict (0.237), both at the 1 % level of significance. Longitudinal acceleration of the following vehicle is negatively associated with the likelihood of severe conflict (−0.265) at the 10 % level. Last but not least, heterogeneity in means and variances of the random parameters are also considered. For the likelihood of slight conflict, both mean and variance of the random parameters of longitudinal acceleration are higher for rear-end conflict, compared to other conflict types, both at the", "translation": "表 4 presents the results of parameter estimation of random parameters logit model with heterogeneity in means and variances for vehicle-vehicle conflict. As shown in 表 4, rear-end conflict has a higher likelihood of being severe (1.664), compared to other conflict types, at the 1 % level of significance. Additionally, longitudinal speed (slight conflict: 0.106; severe conflict: 0.174) and lateral speed (slight conflict: 2.236; severe conflict: 4.349) of the leading vehicle are positively associated with the likelihood of slight and severe conflicts, all at the 1 % level of significance. On the other hand, longitudinal speed of the following vehicle (slight conflict: 0.093; severe conflict: 0.178) is positively associated with the likelihood of slight and severe conflicts at the 1 % level of significance. Furthermore, the longitudinal acceleration of the leading vehicle is negatively associated with the likelihood of slight conflict (−1.364), but positively associated with that of severe conflict (0.237), both at the 1 % level of significance. Longitudinal acceleration of the following vehicle is negatively associated with the likelihood of severe conflict (−0.265) at the 10 % level. Last but not least, heterogeneity in means and variances of the random parameters are also considered. For the likelihood of slight conflict, both mean and variance of the random parameters of longitudinal acceleration are higher for rear-end conflict, compared to other conflict types, both at the", "bbox": [0.06314280849117021, 0.6472042403577916, 0.48498200861642393, 0.9271907706530538], "kind": "table-caption", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b007", "page": 5, "order": 7, "source": "1 % level of significance.", "translation": "最後に重要なことですが、重大な衝突の可能性に関して、車両の横速度は、有意水準 1 % でオートバイの横速度のランダムパラメーターの平均と正の相関があります。", "bbox": [0.5150428042565766, 0.581276549048727, 0.6636732464527332, 0.5976946934084959], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b008", "page": 5, "order": 8, "source": "5.2. Vehicle-motorcycle conflict", "translation": "5.2. 車両と二輪車のコンフリクト", "bbox": [0.5150428042565766, 0.616847227817724, 0.6962832059298255, 0.6332653721774928], "kind": "heading", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p005-b009", "page": 5, "order": 9, "source": "Table 5 illustrates the results of goodness of fit assessment of the candidate models. For instance, the random parameters logit model with heterogeneity in means and variances is considered, given the lower AIC and BIC values among the candidate models.", "translation": "表 5 illustrates the results of goodness of fit assessment of the candidate models. For instance, the random parameters logit model with heterogeneity in means and variances is considered, given the lower AIC and BIC values among the candidate models.", "bbox": [0.5150428042565766, 0.6432036242395319, 0.9367882832383301, 0.6991218161616002], "kind": "table-caption", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p005-b010", "page": 5, "order": 10, "source": "Table 6 presents the results of parameter estimation. For example, time to green (0.631) is positively associated with the likelihood of severe conflict, at the 1 % level of significance. Additionally, longitudinal speed (slight conflict: 0.540; sever
