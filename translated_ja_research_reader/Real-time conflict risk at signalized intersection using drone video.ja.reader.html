itigate the", "translation": "これは、車両の速度変更が、交差点での車両と車両および車両とバイクの両方の衝突に対する効果的な代替安全対策と考えられることを正当化します (Tageldin et al., 2017)。最後に重要なことですが、車両間衝突のランダムパラメーターの平均に影響を与える要因が特定されます。軽微な衝突の可能性については、先行車の前後加速による有利な効果が追突の影響で相殺される。", "bbox": [0.06314280849117021, 0.5469184974435168, 0.48494314878639416, 0.6555495206589174], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p007-b015", "page": 7, "order": 15, "source": "Table 7 Marginal effects on the probabilities of vehicle-vehicle and vehicle-motorcycle conflicts.", "translation": "表 7 Marginal effects on the probabilities of vehicle-vehicle and vehicle-motorcycle conflicts.", "bbox": [0.06314280849117021, 0.6818336700631352, 0.5340374174023547, 0.7086096682427718], "kind": "table-caption", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p007-b016", "page": 7, "order": 16, "source": "Variable Vehicle-vehicle conflict Vehicle-motorcycle conflict", "translation": "これは、一見有利な交通シナリオにおけるリスクを冒すドライバーの代償戦略に起因する可能性があります (Chen et al., 2021a)。", "bbox": [0.07323796303948261, 0.7116072850524343, 0.790385975518102, 0.7247414006631961], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p007-b017", "page": 7, "order": 17, "source": "No conflict Slight conflict Severe conflict No conflict Slight conflict Severe conflict", "translation": "オートバイの属性については、オートバイの横速度が 1 単位増加すると、重大な車両とオートバイの衝突のリスクが 0.08 % 減少します。", "bbox": [0.35494884036730434, 0.7281780363375968, 0.9267658306642406, 0.7413121519483586], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p007-b018", "page": 7, "order": 18, "source": "Longitudinal speed of (leading) vehicle [SL] −0.068 0.080 −0.012 −0.032 0.054 −0.022 Longitudinal speed of (leading) vehicle [SE] −0.029 −0.020 0.048 −0.020 −0.050 0.070 Longitudinal speed of following vehicle [SL] −0.057 0.066 −0.010 NA NA NA Longitudinal speed of following vehicle [SE] −0.025 −0.018 0.043 NA NA NA Lateral speed of (leading) vehicle [SL] −0.020 0.024 −0.004 −0.016 0.030 −0.014 Lateral speed of (leading) vehicle [SE] −0.011 −0.008 0.019 −0.007 −0.019 0.026 Longitudinal acceleration of (leading) vehicle [SL] 0.001 ¡0.001 0.000 −0.012 0.023 −0.011 Longitudinal acceleration of (leading) vehicle [SE] −0.007 −0.001 0.008 −0.006 −0.020 0.026 Longitudinal acceleration of following vehicle [SL] IS IS IS NA NA NA Longitudinal acceleration of following vehicle [SE] 0.003 0.002 ¡0.004 NA NA NA Motorcycle lateral speed [SL] NA NA NA IS IS IS Motorcycle lateral speed [SE] NA NA NA 0.0006 0.0003 ¡0.0008 Rear-end conflict [SL] IS IS IS IS IS IS Rear-end conflict [SE] −0.043 −0.025 0.068 −0.031 −0.062 0.094 Time to green [SL] IS IS IS IS IS IS Time to green [SE] IS IS IS −0.013 −0.026 0.039", "translation": "これは、自動車とオートバイの衝突のリスク軽減におけるオートバイのウィービング動作の役割を正当化します。実際、車線変更や進路変更などの横方向の操作は、衝突前の状況では一般的です（Liu et al., 2022; Nasernejad et al., 2023; Zaki et al., 2014）。これらは、潜在的な交通コンフリクトのリスクを示している可能性があります (Tageldin and Sayed、2019)。さらに、ランダムパラメータの平均に影響を与える要因も特定されます。深刻な車両とオートバイの衝突の可能性については、オートバイの横速度のランダムパラメータは車両の横速度のランダムパラメータと正の相関があります。横方向の速度は、方向転換などの回避行動の蔓延と密接に相関しています。これは、効果的な代替安全対策と考えることができます (Lanzaro et al., 2022)。", "bbox": [0.07323796303948261, 0.7447495566170924, 0.9012642466391374, 0.9198105782399058], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p007-b019", "page": 7, "order": 19, "source": "SL – Slight conflict; SE – Severe conflict; IS – Insignificant; bold – direct average marginal effects; NA – Not included in the model.", "translation": "最後になりましたが、これはリスクを回避するドライバーが採用した代償戦略に起因すると考えられます (Chen et al., 2021a)。", "bbox": [0.06314280849117021, 0.9232627475998341, 0.7638718314627639, 0.9380388968099578], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p007-b021", "page": 7, "order": 21, "source": "potential crash risk, special road markings can be used to deter inattentive lane changing. Furthermore, one unit increase in longitudinal acceleration of the leading vehicle is associated with 0.1 % reduction but 0.8 % increase in the risk of slight and severe vehicle-vehicle conflicts. Also, one unit increase in longitudinal acceleration of the following vehicle is associated with 0.4 % reduction in the risk of severe vehiclevehicle conflict. However, one unit increase in vehicle longitudinal acceleration is associated with 2.3 % and 2.6 % increase in the risk of slight and severe vehicle-motorcycle conflicts. Such findings are consistent with that of previous studies at highway merging and diverging areas for aggressive driving behaviour (Wei et al., 2019; Stipancic et al., 2019; Song et al., 2022a; Ali et al., 2022). This justifies that speed change of vehicle can be considered as effective surrogate safety measure for both vehicle-vehicle and vehicle-motorcycle collisions at the intersections (Tageldin et al., 2017). Last but not least, factors that affect the means of the random parameters for vehicle-vehicle conflicts are identified. For the likelihood of slight conflict, favorable effect of longitudinal acceleration of leading vehicle is offset for rear-end conflict. This could be attributed to the compensatory strategy of risk-taking drivers in seemingly favorable traffic scenarios (Chen et al., 2021a). For the motorcycle attributes, one unit increase in motorcycle lateral speed is associated with 0.08 % reduction in the risk of severe vehiclemotorcycle conflicts. This justifies the role of motorcycle’s weaving movement in the risk reduction of vehicle-motorcycle collision. Indeed, lateral maneuvers such as lane changing and swerving are prevalent in pre-crash conditions (Liu et al., 2022; Nasernejad et al., 2023; Zaki et al., 2014). They may be indicative to risk of potential traffic conflict (Tageldin and Sayed, 2019). Additionally, factors that affect the means of the random parameters are also identified. For the likelihood of severe vehicle-motorcyclist conflict, random parameter of lateral speed of motorcyclist is positively correlated to that of the lateral speed of vehicle. Lateral speed is closely correlated to the prevalence of evasive actions like swerving. This can be considered as an effective surrogate safety measure (Lanzaro et al., 2022). Last but not least, this can be attributed to the compensatory strategy adopted by the risk-averse drivers (Chen et al., 2021a).", "translation": "6.2.衝突のタイプと合図時間計画衝突のタイプでは、追突衝突は、車両と車両の重大な衝突のリスクが 6.8 % 増加し、車両とオートバイの重大な衝突のリスクが 9.4 % 増加します。これは、交差点進入時の衝突リスクにおける黄色のジレンマの役割を正当化します (Zhao et al., 2023)。黄色のジレンマに起因するリスクを軽減するために、適応型交通信号時間計画などの高度な交通制御手段が必要です。表 5 モデルのパフォーマンス。パラメータ平均と分散に不均一性があるランダムパラメータロジットモデルランダムパラメータロジットモデル対数尤度 2469.893 2476.444 McFadden Rsquared 0.136 0.130 AIC 4961.900 4974.000 BIC 5049.900 5039.400 表 6 パラメータ推定の結果車とバイクの衝突。変数軽度の衝突重度の衝突係数 t 統計量係数 t 統計量切片 0.267** 3.460 2.147** 10.670 車両前後方向速度 0.540** 3.510 1.202** 5.350 車両横方向速度 0.586** 3.270 0.832** 3.160 車両前後加速度 2.095** 3.230 3.915** 5.060 二輪車横速度平均 2.111** 2.580 SD 2.239** 2.440 追突衝突 1.132** 7.870 青信号までの時間 0.631** 2.840 平均値の不均一性（正規分布） 二輪車の横速度：車両の横速度 2.174** 2.660 分散の不均一性二輪車の横速度：青信号までの時間 0.048^ 0.110 ^10%レベルで顕著。 * 5% レベルで有意。 ** 1% レベルで有意。モデルには含まれていません。表 7 自動車と自動車および自動車とオートバイの衝突の確率に対する限界効果。変数車と車の衝突車と二輪車の衝突衝突なし軽度の衝突重度の衝突衝突なし軽度の衝突重度の衝突 (先行) 車両の前後速度 [SL] 0.068 0.080 0.012 0.032 0.054 0.022 (先行) 車両の前後速度 [SE] 0.029 0.020 0.048 0.020 0.050 0.070 後続車の前後速度[SL] 0.057 0.066 0.010 NA NA NA 後続車両の前後速度[SE] 0.025 0.018 0.043 NA NA NA (先行車)の横速度[SL] 0.020 0.024 0.004 0.016 0.030 0.014 （先行）車両の横速度［SE］ 0.011 0.008 0.019 0.007 0.019 0.026 （先行）車両の前後加速度［SL］ 0.001 ± 0.001 0.000 0.012 0.023 0.011 （先行）車両の前後加速度［SE］ 0.007 0.001 0.008 0.006 0.020 0.026 後続車両の前後加速度［SL］ IS IS NA NA NA 後続車両の前後加速度［SE］ 0.003 0.002 ¡ 0.004 NA NA NA 二輪車横速度［SL］ NA NA NA IS IS IS 二輪車横速度 [SE] NA NA NA 0.0006 0.0003 ¡ 0.0008 追突衝突 [SL] IS IS IS IS IS 追突衝突 [SE] 0.043 0.025 0.068 0.031 0.062 0.094 青までの時間 [SL] IS IS IS IS IS 時間から緑色 [SE] IS IS IS 0.013 0.026 0.039 SL – わずかな矛盾。 SE – 深刻な紛争。 IS – 重要ではありません。太字 – 直接平均限界効果。 NA – モデルには含まれていません。 S. チャンと N.N. Sze 事故分析と予防 207 (2024) 107739 7", "bbox": [0.5150428042565766, 0.06463815029332905, 0.9368539040594885, 0.542337444402671], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p007-b022", "page": 7, "order": 22, "source": "6.2. Conflict type and signal time plan", "translation": "6.2. コンフリクト種別と信号時間計画", "bbox": [0.5150428042565766, 0.5597748907508976, 0.7359411491969344, 0.5761930351106663], "kind": "heading", "chapter_id": "chapter-013", "figure_ids": []}, {"id": "p007-b023", "page": 7, "order": 23, "source": "For the conflict type, rear-end conflict is associated with 6.8 % increase in the risk of severe vehicle-vehicle conflicts and 9.4 % increase in that of severe vehicle-motorcycle conflicts. This justifies the role of yellow dilemma in the collision risk at the intersection approaches (Zhao et al., 2023). To mitigate the risk attributed to yellow dilemma, advanced traffic control measures like adaptive traffic signal time plan", "translation": "For the conflict type, rear-end conflict is associated with 6.8 % increase in the risk of severe vehicle-vehicle conflicts and 9.4 % increase in that of severe vehicle-motorcycle conflicts. This justifies the role of yellow dilemma in the collision risk at the intersection approaches (Zhao et al., 2023). To mitigate the risk attributed to yellow dilemma, advanced traffic control measures like adaptive traffic signal time plan", "bbox": [0.5150428042565766, 0.5861323253150551, 0.9368109429281364, 0.6684068752092145], "kind": "body", "chapter_id": "chapter-013", "figure_ids": []}, {"id": "p008-b001", "page": 8, "order": 1, "source": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "translation": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-013", "figure_ids": []}, {"id": "p008-b002", "page": 8, "order": 2, "source": "can be implemented (Jin et al., 2021). Last but not least, one unit increase in time to green is associated with 3.9 % increase in the risk of severe vehicle-motorcycle conflicts. This could be attributed to the anxiety of road users, especially motorcyclists tend to be more risk taking and aggressive (Song et al., 2022a). This is indicative to the effectiveness of optimal signal time allocation and signal countdown (to green) device in mitigating the potential collision risk attributed to driver anxiety (Islam et al., 2017).", "translation": "実装することができます (Jin et al., 2021)。最後に重要なことですが、グリーンまでの時間が 1 台増加すると、深刻な車両とオートバイの衝突のリスクが 3.9 % 増加します。これは、道路利用者の不安に起因する可能性があり、特にオートバイの運転者はよりリスクを負い、攻撃的になる傾向があります (Song et al., 2022a)。これは、ドライバーの不安に起因する潜在的な衝突リスクを軽減する上で、最適な信号時間の割り当てと信号カウントダウン（青へ）装置が有効であることを示しています（Islam et al., 2017）。 6.3.概要この研究の結果と意味を表 8 にまとめます。表 8 に示すように、車両と車両の衝突と車両とオートバイの衝突では、調査結果は一般に類似しています。たとえば、車両の前後方向の速度と横方向の速度は両方とも、車両と車両および車両とオートバイの衝突のリスクと正の相関があります。さらに、追突事故は車両対車両、車両対バイクの両方の衝突で深刻になる可能性が高くなります。対照的に、車両の縦方向の加速度は、車両と車両および車両とオートバイの両方の衝突のリスクと正の相関がありますが、軽度の車両と車両の衝突のリスクとは負の相関があります。最後に重要なことですが、青信号までの時間は、深刻な車両とオートバイの衝突のリスクのみと大きく関連しています。上記の調査結果は、交差点に近づく車両の速度を下げるための高度な交通管理手段を示しています (Guo et al., 2016)。たとえば、自動速度取り締まりカメラと長方形の急速点滅ビーコン (RRFB) を事故が発生しやすい場所に設置できます (Pezeshknejad および Rowangould、2024)。さらに、ランブルストリップとシェボン舗装標識を使用することもできます (Guo et al., 2016)。さらに、黄色のジレンマにおけるドライバーの不安にも対処する必要があります。これは、適応信号時間計画を示しています (Islam et al., 2017; Chen et al., 2021a)。最後に重要なことですが、車両の最適な速度と加速を見積もる際には、安全性と車両乗車の快適さのレベルの間のトレードオフを考慮する必要があります。これは、自動運転システムの動作計画戦略を示唆しています (Chen et al., 2021b)。", "bbox": [0.06314280849117021, 0.0646335747770474, 0.4849752927355085, 0.17333585973604884], "kind": "body", "chapter_id": "chapter-013", "figure_ids": []}, {"id": "p008-b003", "page": 8, "order": 3, "source": "6.3. Summary", "translation": "6.3. まとめ", "bbox": [0.06314280849117021, 0.19513136999339512, 0.14735239980469603, 0.2115495335780222], "kind": "heading", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b004", "page": 8, "order": 4, "source": "Findings and implications of this study are summarized in Table 8. As shown in Table 8, findings are generally similar between vehicle-vehicle and vehicle-motorcycle conflicts. For example, both vehicle longitudinal speed and lateral speed are positively associated with the risk of vehiclevehicle and vehicle-motorcycle conflicts. Additionally, rear-end conflict has a higher likelihood of being severe for both vehicle-vehicle and vehicle-motorcycle conflicts. In contrast, vehicle longitudinal acceleration is positively associated with the risk of both vehicle-vehicle and vehicle-motorcycle conflicts, but negatively associated with that of", "translation": "Findings and implications of this study are summarized in Table 8. As shown in Table 8, findings are generally similar between vehicle-vehicle and vehicle-motorcycle conflicts. For example, both vehicle longitudinal speed and lateral speed are positively associated with the risk of vehiclevehicle and vehicle-motorcycle conflicts. Additionally, rear-end conflict has a higher likelihood of being severe for both vehicle-vehicle and vehicle-motorcycle conflicts. In contrast, vehicle longitudinal acceleration is positively associated with the risk of both vehicle-vehicle and vehicle-motorcycle conflicts, but negatively associated with that of", "bbox": [0.06314280849117021, 0.22148880455755257, 0.4849766769247048, 0.34333466856382694], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b005", "page": 8, "order": 5, "source": "Table 8 Comparison between vehicle-vehicle and vehicle-motorcycle conflicts.", "translation": "表 8 Comparison between vehicle-vehicle and vehicle-motorcycle conflicts.", "bbox": [0.06314280849117021, 0.35669110043627356, 0.4384192169754502, 0.3835385381894505], "kind": "table-caption", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b006", "page": 8, "order": 6, "source": "Variable Vehicle-vehicle conflict Vehicle-motorcycle conflict Implications", "translation": "Variable Vehicle-vehicle conflict Vehicle-motorcycle conflict Implications", "bbox": [0.07323796303948261, 0.3865352322059133, 0.44863648136235385, 0.4104546471365689], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b007", "page": 8, "order": 7, "source": "Slight conflict Severe conflict Slight conflict Severe conflict", "translation": "Slight conflict Severe conflict Slight conflict Severe conflict", "bbox": [0.16456921417631207, 0.41389205180530264, 0.36905711185130485, 0.43781146673595817], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b008", "page": 8, "order": 8, "source": "Longitudinal speed of (leading) vehicle", "translation": "Longitudinal speed of (leading) vehicle", "bbox": [0.07323796303948261, 0.4412488329549753, 0.13342212479808782, 0.48673961551975137], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b009", "page": 8, "order": 9, "source": "+ + + + Speed reduction using warning signs and rumble strips, and traffic control measures like automated speed enforcement camera", "translation": "+ + + + Speed reduction using warning signs and rumble strips, and traffic control measures like automated speed enforcement camera", "bbox": [0.16456921417631207, 0.4412488329549753, 0.471279150768143, 0.5407391281311431], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b010", "page": 8, "order": 10, "source": "Longitudinal speed of following vehicle", "translation": "Longitudinal speed of following vehicle", "bbox": [0.07323796303948261, 0.4843907607791666, 0.13342212479808782, 0.5299530213671997], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b011", "page": 8, "order": 11, "source": "+ + NA NA", "translation": "+ + NA NA", "bbox": [0.16456921417631207, 0.4843907607791666, 0.3485566546587399, 0.49752491483964506], "kind": "metadata", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b012", "page": 8, "order": 12, "source": "Lateral speed of (leading) vehicle", "translation": "Lateral speed of (leading) vehicle", "bbox": [0.07323796303948261, 0.5383902349408417, 0.13872718369174947, 0.573095718185724], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b013", "page": 8, "order": 13, "source": "+ + + + Remedial measures like improved pavement surface and clearer road markings Longitudinal acceleration of (leading) vehicle", "translation": "+ + + + Remedial measures like improved pavement surface and clearer road markings Longitudinal acceleration of (leading) vehicle", "bbox": [0.07323796303948261, 0.5383902349408417, 0.47343735805652454, 0.6486665599815196], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b014", "page": 8, "order": 14, "source": "−^ + + + Reduction of driver anxiety using advanced traffic management like adaptive signal time plan and signal countdown (to red) device", "translation": "−^ + + + Reduction of driver anxiety using advanced traffic management like adaptive signal time plan and signal countdown (to red) device", "bbox": [0.16456921417631207, 0.6031749699726938, 0.47409295107291066, 0.7026660341431946], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b015", "page": 8, "order": 15, "source": "Longitudinal acceleration of following vehicle", "translation": "Longitudinal acceleration of following vehicle", "bbox": [0.07323796303948261, 0.6463177436906514, 0.14077618101585543, 0.6918799658289678], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b016", "page": 8, "order": 16, "source": "IS − NA NA", "translation": "IS − NA NA", "bbox": [0.16456921417631207, 0.6463177436906514, 0.3485566546587399, 0.6594518593014133], "kind": "metadata", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b017", "page": 8, "order": 17, "source": "Motorcycle lateral speed NA NA IS −^ Remedial measures like improved pavement surface and clearer road markings Time to green IS IS IS + Reduction of driver anxiety using advanced traffic management like adaptive signal time plan and signal countdown (to green) device Rear-end conflict IS + IS + Elimination of yellow dilemma using adaptive signal time plan", "translation": "Motorcycle lateral speed NA NA IS −^ Remedial measures like improved pavement surface and clearer road markings Time to green IS IS IS + Reduction of driver anxiety using advanced traffic management like adaptive signal time plan and signal countdown (to green) device Rear-end conflict IS + IS + Elimination of yellow dilemma using adaptive signal time plan", "bbox": [0.07323796303948261, 0.7003172178523265, 0.47409295107291066, 0.9077348295297207], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b018", "page": 8, "order": 18, "source": "+ Positive association; – Negative association; NA – Not used variable; IS – Insignificant;^With heterogeneity in means and variances.", "translation": "+ Positive association; – Negative association; NA – Not used variable; IS – Insignificant;^With heterogeneity in means and variances.", "bbox": [0.06314280849117021, 0.9112628217308878, 0.4849726781559155, 0.9380388199105244], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b020", "page": 8, "order": 20, "source": "slight vehicle-vehicle conflict. Last but not least, time-to-green is significantly associated with the risk of severe vehicle-motorcycle conflict only. Above findings are indicative to the advanced traffic management measures in reducing the speed of vehicles approaching the intersections (Guo et al., 2016). For example, automated speed enforcement cameras and rectangular Rapid-Flashing Beacons (RRFB) can be installed at the accident-prone locations (Pezeshknejad and Rowangould, 2024). Additionally, rumble strips and chevon pavement markings can be used (Guo et al., 2016). Furthermore, drivers’ anxiety in the yellow dilemma should be accommodated. This is indicative to the adaptive signal time plan (Islam et al., 2017; Chen et al., 2021a). Last but not least, the tradeoff between safety and level of comfort of car occupancy should be considered when estimating the optimal speed and acceleration of vehicles. This is indicative to the motion planning strategy of automated driving system (Chen et al., 2021b).", "translation": "slight vehicle-vehicle conflict. Last but not least, time-to-green is significantly associated with the risk of severe vehicle-motorcycle conflict only. Above findings are indicative to the advanced traffic management measures in reducing the speed of vehicles approaching the intersections (Guo et al., 2016). For example, automated speed enforcement cameras and rectangular Rapid-Flashing Beacons (RRFB) can be installed at the accident-prone locations (Pezeshknejad and Rowangould, 2024). Additionally, rumble strips and chevon pavement markings can be used (Guo et al., 2016). Furthermore, drivers’ anxiety in the yellow dilemma should be accommodated. This is indicative to the adaptive signal time plan (Islam et al., 2017; Chen et al., 2021a). Last but not least, the tradeoff between safety and level of comfort of car occupancy should be considered when estimating the optimal speed and acceleration of vehicles. This is indicative to the motion planning strategy of automated driving system (Chen et al., 2021b).", "bbox": [0.5150428042565766, 0.0646335747770474, 0.936851340746162, 0.2787635986074128], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b021", "page": 8, "order": 21, "source": "7. Conclusions", "translation": "7. 結論", "bbox": [0.5150428042565766, 0.2894881089252789, 0.6122637419740097, 0.305906272509906], "kind": "heading", "chapter_id": "chapter-015", "figure_ids": []}, {"id": "p008-b022", "page": 8, "order": 22, "source": "Safety of signalized intersections has been of major concern. Influencing factors including road environment, vehicle type, and road user characteristics that affect the crash risk and propensity of dangerous behaviour like speeding and red-light running are identified. However, safety of vulnerable road user likes motorcycle is less studied. It is rare that vehicle dynamics and their effects on potential collision risk are considered. In this study, the multinomial logit regression approach is adopted to examine the relationship between possible factors and the risk of traffic conflict involving and not involving motorcycle at the signalized intersection, based on the high-definition trajectory data obtained from drone video. In addition to signal time plan and conflict type, individual vehicle and motorcycle attributes like longitudinal speed, lateral speed and longitudinal acceleration are also considered. Furthermore, the effect of unobserved heterogeneity is accounted using random parameters model with heterogeneity in means and variances. Results indicate that risk of vehicle-vehicle and vehicle-motorcycle conflicts are positively associated with vehicle longitudinal speed, lateral speed, and longitudinal acceleration, except that risk of slight vehicle-vehicle conflict and longitudinal acceleration are negatively correlated. This may be attributed to the association between the risk of severe conflict and variation in traffic speed (Song et al., 2022a; Nasernejad et al., 2023). Additionally, likelihoods of severe vehiclevehicle and vehicle-motorcycle conflicts are higher for rear-end conflict. This could be attributed to the yellow dilemma at the intersection approaches. Furthermore, the likelihood of severe vehicle-motorcycle conflict would increase with time to green. However, the likelihood of severe vehicle-motorcycle conflict would decrease with motorcycle longitudinal speed. Such findings are indicative to the remedial measures like advanced warning signs, rumble strips and chevron pavement markings, automated speed enforcement camera, and signal countdown device, especially at the accident-prone locations where motorcycles are prevalent (Chen et al., 2020). To generalize the policy applications of this study, it is worth investigating the conflict risk involving all vulnerable road user types including pedestrians and bicycles, especially in the urban areas (Bai and Sze, 2020; Zhu and Sze, 2021; Zhu et al., 2021). Additionally, it is worth exploring the effect of unobserved heterogeneity attributed to driving style, aggressive, and compensatory strategy of individual drivers on the conflict risk, using advanced analytic methods like latent structure, deep learning, and fuzzy logic approaches (Song et al., 2022a). Last but not least, effects of spatial dependency and temporal instability should be accounted for when more comprehensive data at multiple sites are available in the future study (Zeng et al., 2019). Nevertheless, conflicts involving non-motorized transport modes including pedestrians and bicycles are not considered in this study. In the future study, it is worth exploring the interferences between conflicts involving and not involving non-motorized transport modes.", "translation": "信号交差点の安全性は大きな懸念事項となっています。道路環境、車両の種類、道路利用者の特性など、衝突リスクやスピード違反や赤信号無視などの危険行為の傾向に影響を与える要因が特定されます。しかし、オートバイのような交通弱者の安全についてはあまり研究されていません。車両のダイナミクスと、潜在的な衝突リスクに対するその影響が考慮されることはほとんどありません。本研究では、ドローン映像から得られた高解像度の軌跡データに基づいて、多項ロジット回帰アプローチを採用し、信号交差点における二輪車が関与する場合とそうでない場合の交通衝突のリスクと考えられる要因との関係を調査します。信号時間計画と衝突の種類に加えて、縦方向の速度、横方向の速度、縦方向の加速度などの個々の車両およびオートバイの属性も考慮されます。さらに、観察されない不均一性の影響は、平均と分散の不均一性を含むランダムパラメーターモデルを使用して説明されます。結果は、軽度の車両と車両の衝突のリスクと前後方向の加速度が負の相関関係にあることを除いて、車両と車両および車両とバイクの衝突のリスクは車両の前後方向速度、横方向速度、および前後方向の加速度と正の相関があることを示しています。これは、深刻な紛争のリスクと交通速度の変動との関連に起因すると考えられる (Song et al., 2022a; Nasernejad et al., 2023)。さらに、追突事故の場合、深刻な車両衝突および車両とオートバイの衝突の可能性が高くなります。これは、交差点進入時の黄色のジレンマに起因すると考えられます。さらに、深刻な車両とオートバイの衝突の可能性は、環境に優しい時間が経つにつれて増加するでしょう。しかし、車両とオートバイの深刻な衝突の可能性は、オートバイの縦方向の速度が速くなるにつれて減少します。このような調査結果は示唆的です特に自動二輪車が蔓延する事故が起きやすい場所では、高度な警告標識、ランブルストリップ、シェブロン舗装標識、自動速度取り締まりカメラ、信号カウントダウン装置などの是正措置が適用されます (Chen et al., 2020)。この研究の政策適用を一般化するには、特に都市部において、歩行者や自転車を含むすべての弱い立場にある道路利用者タイプが関与する紛争リスクを調査する価値がある（Bai and Sze, 2020; Zhu and Sze, 2021; Zhu et al., 2021）。さらに、潜在構造、ディープラーニング、ファジーロジックアプローチなどの高度な分析手法を使用して、個々のドライバーの運転スタイル、攻撃的、代償戦略に起因する観察されない異質性が紛争リスクに及ぼす影響を調査する価値があります（Song et al.、2022a）。最後に重要なことですが、将来の研究で複数のサイトでのより包括的なデータが利用可能になった場合には、空間依存性と時間的不安定性の影響を考慮する必要があります (Zeng et al., 2019)。それにもかかわらず、歩行者や自転車を含む非電動交通機関が関与する紛争は、この研究では考慮されていません。将来の研究では、非電動輸送手段が関与する紛争と関与しない紛争との間の干渉を調査する価値がある。表 8 車両と車両の衝突と車両とオートバイの衝突の比較。変動する車と車の衝突車とバイクの衝突影響軽度の衝突重度の衝突軽度の衝突重度の衝突 （先行）車両の縦方向の速度 + + + + 警告標識やランブルストリップを使用した速度低減、および自動速度取り締まりカメラなどの交通取締り措置後続車両の縦方向の速度 + + NA NA （先行）車両の横速度 + + + + 舗装表面の改善や道路標識の明瞭化などの是正措置車両の前後方向の加速（先行車） ^ + + + 適応型信号タイムプランや信号カウントダウン（赤まで）装置などの高度な交通管理によるドライバーの不安軽減後続車両の前後加速度 IS NA NA 二輪車の横速度 NA NA IS ^ 舗装路面の改善や道路標示の鮮明化などの改善策青信号までの時間 IS IS IS + 適応型信号タイムプランや信号カウントダウン（青まで）装置などの高度な交通管理によるドライバーの不安軽減追突 IS + IS + 黄信号の解消適応型信号タイムプラン + ポジティブアソシエーションを使用するジレンマ。 – 負の関連性; NA – 変数は使用されません。 IS – 重要ではありません;^平均と分散に不均一性があります。 S. チャンと N.N. Sze 事故分析と予防 207 (2024) 107739 8", "bbox": [0.5150428042565766, 0.31584456302166175, 0.9368620041296003, 0.9385428187964054], "kind": "body", "chapter_id": "chapter-015", "figure_ids": []}, {"id": "p009-b001", "page": 9, "order": 1, "source": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "translation": "S. Zhang and N.N. Sze Accident Analysis and Prevention 207 (2024) 107739", "bbox": [0.06314280849117021, 0.042397623015446716, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-015", "figure_ids": []}, {"id": "p009-b002", "page": 9, "order": 2, "source": "CRediT authorship contribution statement", "translation": "CRediT 著者寄稿文 Shile Zhang: 執筆 – 原案、方法論、調査、形式分析、データキュレーション、概念化。 N.N.サイズ: 概念化、方法論、監修、執筆 – レビューと編集。", "bbox": [0.06314280849117021, 0.0646335747770474, 0.3351814651529857, 0.08105173355545991], "kind": "body", "chapter_id": "chapter-015", "figure_ids": []}, {"id": れます。", "本研究では、信号交差点における二輪車と二輪車以外の衝突リスクをリアルタイムに予測するモデルを提案する。", "さらに、観察されない不均一性の問題は、平均と分散の不均一性を備えたランダムパラメーターモデルを使用して対処されます。", "その結果、車両と車両の衝突のリスクは車両の速度と加速度、衝突の種類と大きく関連しており、車両と二輪車の衝突のリスクは車両の速度と加速度、自動二輪車の横速度、衝突の種類、青信号までの時間と関連していることが示されています。", "調査結果は、信号交差点での、特に自動二輪車が関与する潜在的な衝突リスクを軽減できる、最適な信号時間計画と交通管理戦略の開発と実施に光を当てるはずです。"]}, {"id": "chapter-001", "title_en": "1. introduction", "title_ja": "1. はじめに", "start_page": 1, "paragraph_ids": ["p001-b012", "p001-b013", "p001-b014", "p001-b015", "p001-b016", "p001-b017", "p002-b001", "p002-b002"], "summary": ["交差点での衝突リスクに影響を与える建築環境、幾何学的設計、交通規制、環境および気象条件、交通の流れの特性などの要因が特定されています (Wong et al., 2007; Huang et al., 2008; Wang et al., 2018)。", "この目的を達成するために、さまざまな代替安全対策と衝突前兆現象が交通安全研究のために提案されています (Tarko et al., 2009; Tarko and Lizarazo, 2021)。", "さまざまな車両クラスや衝突タイプに関係する交通コンフリクトのリスクに影響を与える要因を特定することができます (Song et al., 2022a)。", "信号交差点における車同士、車とバイクの衝突リスクに寄与する要因をビデオ観察調査により特定します。", "さらに、平均と分散の不均一性を伴うランダムパラメータロジットモデルが、紛争リスクと考えられる要因の間の関連尺度のために開発されます。"]}, {"id": "chapter-002", "title_en": "2. literature review", "title_ja": "2. 文献レビュー", "start_page": 2, "paragraph_ids": ["p002-b003"], "summary": ["2. 文献レビュー"]}, {"id": "chapter-003", "title_en": "2.1. factors affecting intersection safety", "title_ja": "2.1. 交差点安全性に影響する要因", "start_page": 2, "paragraph_ids": ["p002-b004", "p002-b005", "p002-b007"], "summary": ["Traffic flow and proportion of"]}, {"id": "chapter-004", "title_en": "2.2. safety surrogate measures", "title_ja": "2.2. 安全代替指標", "start_page": 2, "paragraph_ids": ["p002-b008", "p002-b009", "p003-b001", "p003-b002"], "summary": ["さまざまな道路エンティティの潜在的な衝突リスクを推定するために、衝突までの時間 (TTC)、交錯後時間 (PET)、衝突を回避するための減速率 (DRAC) などのいくつかの代替安全対策が提案されています (Tarko et al., 2009; Tarko 2023)。", "さらに、車両の接近速度、譲歩率、横断または進行の時間、交差点での減速率などの他の動的な交通特性も交通コンフリクトリスク分析で考慮されます（Fu et al., 2018、Essa and Sayed, 2018; Patel et al., 2023）。", "それにもかかわらず、自動車と二輪車の間の相互作用が洗練されている信号交差点における二輪車が関与する交通コンフリクトリスクのモデル化に焦点を当てた研究はほとんどありません。", "2.3.分析方法事故と紛争の重大度は離散的な性質を持っているため、考えられるリスク要因の影響を推定するために、二値および多項ロジット回帰またはプロビット回帰、順序付きロジット回帰またはプロビット回帰などの離散結果モデルが採用されます（Xin et al., 2017; Zhai et al., 2019; Song et al., 2020）。", "交通コンフリクト分析における個人の不均一性を説明するモデルが普及しているにもかかわらず、交差点での交通弱者の道路利用者が関与する紛争に足を運ぶ人はほとんどいません。"]}, {"id": "chapter-005", "title_en": "2.3. analytic methods", "title_ja": "2.3. 分析方法", "start_page": 3, "paragraph_ids": ["p003-b003", "p003-b004", "p003-b006"], "summary": ["2.3. 分析方法"]}, {"id": "chapter-006", "title_en": "3. data", "title_ja": "3. データ", "start_page": 3, "paragraph_ids": ["p003-b007", "p003-b008", "p003-b009", "p003-b010", "p003-b011", "p003-b012", "p003-b013", "p003-b014", "p003-b015", "p003-b016", "p003-b017", "p003-b018", "p003-b019", "p003-b020", "p003-b021", "p003-b022", "p003-b023", "p003-b024", "p003-b025", "p003-b026", "p003-b027", "p003-b028", "p003-b029", "p003-b030", "p003-b031", "p003-b032", "p003-b033", "p003-b034", "p003-b035", "p003-b036", "p003-b037", "p003-b038", "p003-b039", "p003-b040", "p003-b041", "p003-b042", "p003-b043", "p003-b044", "p003-b045", "p003-b046", "p003-b047", "p003-b048", "p003-b049", "p004-b001", "p004-b002"], "summary": ["この研究では、包括的な高解像度ドローンベースの車両軌跡データセットである信号交差点データセット (SIND) が、交差点でのオートバイを含むものと含まないもの両方の交通衝突分析に採用されています (Xu et al., 2022)。", "表 1 観察されない不均一性を考慮した計量経済モデルを使用した最近の交通安全研究。", "(2023) 米国フロリダ州交差点における歩行者衝突事故の平均値に不均一性を伴うランダムパラメーター順序付けロジットモデル (2012 – 2019) Sun et al。", "(2023) 平均値に不均一性があるランダムパラメーターロジットモデル中国、交差点衝突事故瀋陽市 (2015 – 2017) Gao and Zhang (2024) 平均値と分散に不均一性があるランダムパラメーターロジットモデルイギリス (2020 – 2022) 注: 1 次世代シミュレーション (NGSIM) オープンデータ。", "図 3 は、調査地域における車両クラスおよび重大度レベル別の交通衝突密度のヒートマップを示しています。"]}, {"id": "chapter-007", "title_en": "4. method", "title_ja": "4. 方法", "start_page": 4, "paragraph_ids": ["p004-b003", "p004-b004", "p004-b005", "p004-b006", "p004-b007", "p004-b009", "p004-b010", "p004-b011", "p004-b012", "p004-b013", "p004-b014", "p004-b015", "p004-b016", "p004-b017", "p004-b018", "p004-b019", "p004-b020", "p004-b021", "p004-b022", "p004-b023", "p004-b024", "p004-b025", "p004-b026", "p004-b027", "p004-b028", "p004-b029"], "summary": ["本研究では、二輪車の関与の有無にかかわらず、交差点における交通衝突のリスクを推定します。", "交通コンフリクトの発生と重大度レベルが離散的であることを考慮すると、多項ロジット回帰アプローチが採用されます (FigueroaMedina, 2005; Behnood and Mannering, 2017a, 2017b)。", "s kn = β k x kn + ε kn (1) ここで、 s kn は観測値 n における衝突結果 k の確率を決定する関数、x kn は衝突結果に影響を与える説明変数のベクトル、β k は推定可能なパラメータのベクトル、ε kn は独立同一分布 (IID) タイプ 1 極値分布を仮定した誤差項です。", "したがって、観測値 n が矛盾結果 k を持つ確率は、 p n (k) = ∫ EXP [ β k x kn ] ∑ ∀ K EXP [ β k x kn ] f (β | φ) d β (3) さらに、分散共変量行列は次のように書くことができます。", "この研究では、パラメータの収束、モデルのパフォーマンスと計算時間の間のトレードオフに 1000 回のハルトン描画が採用されています (Song et al、2022a)。"]}, {"id": "chapter-008", "title_en": "5. results", "title_ja": "5. 結果", "start_page": 4, "paragraph_ids": ["p004-b030"], "summary": ["5. 結果"]}, {"id": "chapter-009", "title_en": "5.1. vehicle-vehicle conflict", "title_ja": "5.1. 車両相互のコンフリクト", "start_page": 4, "paragraph_ids": ["p004-b031", "p004-b032", "p005-b001", "p005-b002", "p005-b003", "p005-b004", "p005-b005", "p005-b007"], "summary": ["AIC および BIC 値が小さいほど、モデルの適合性が優れていることを示します。", "表 3 に示すように、候補モデルの中で最も低い AIC 値を考慮して、平均と分散に不均一性があるランダムパラメーターロジットモデルが考慮されます。", "表 4 は、車両間衝突の平均と分散の不均一性を伴うランダムパラメータロジットモデルのパラメータ推定の結果を示しています。", "表 4 に示すように、追突衝突は、他の種類の衝突と比較して、1 % の有意水準で重大である可能性が高くなります (1.664)。", "5.2.自動車と二輪車の衝突表 5 は、候補モデルの適合度評価の結果を示しています。"]}, {"id": "chapter-010", "title_en": "5.2. vehicle-motorcycle conflict", "title_ja": "5.2. 車両と二輪車のコンフリクト", "start_page": 5, "paragraph_ids": ["p005-b008", "p005-b009", "p005-b010"], "summary": ["5.2. 車両と二輪車のコンフリクト"]}, {"id": "chapter-011", "title_en": "6. discussions", "title_ja": "6. 考察", "start_page": 5, "paragraph_ids": ["p005-b011", "p005-b012", "p006-b001", "p006-b002", "p006-b003", "p006-b004", "p006-b005", "p006-b006", "p006-b007", "p006-b008", "p006-b009", "p006-b010", "p006-b011", "p006-b012", "p006-b013"], "summary": ["この研究では、個人の両方における考えられる要因の役割 (例: 図 3. 交通衝突ヒートマップ。", "S. Zhang および N.N. Sze 事故分析と予防 207 (2024) 107739 5", "ドローンを使用して収集したリアルタイムの軌跡データに基づいて、信号交差点における車車および二輪車の衝突リスクにおける自転車と車の速度や加速度）およびサイクル（サイクルタイムや青時間など）のレベルを調査します。", "さらに、車の速度は、交通弱者が巻き込まれる衝突事故の負傷結果において重要な役割を果たします。", "パラメータ平均と分散に不均一性があるランダムパラメータロジットモデルランダムパラメータロジットモデル対数尤度 2944.144 -3007.798 McFadden Rsquared 0.244 0.230 AIC 5918.400 6039.700 BIC 6010.900 6113.700 表 4 パラメータ推定の結果車と車の衝突。"]}, {"id": "chapter-012", "title_en": "6.1. vehicle and motorcycle attributes", "title_ja": "6.1. 車両・二輪車属性", "start_page": 6, "paragraph_ids": ["p006-b014", "p006-b015", "p006-b017", "p006-b018", "p006-b019", "p006-b020", "p006-b021", "p006-b022", "p006-b023", "p006-b024", "p006-b025", "p006-b026", "p006-b027", "p006-b028", "p006-b029", "p006-b030", "p006-b031", "p006-b032", "p006-b033", "p006-b034", "p007-b001", "p007-b002", "p007-b003", "p007-b004", "p007-b005", "p007-b006", "p007-b007", "p007-b008", "p007-b009", "p007-b010", "p007-b011", "p007-b012", "p007-b013", "p007-b014", "p007-b015", "p007-b016", "p007-b017", "p007-b018", "p007-b019", "p007-b021"], "summary": ["最後に重要なことですが、車両間衝突のランダムパラメーターの平均に影響を与える要因が特定されます。", "これらは、潜在的な交通コンフリクトのリスクを示している可能性があります (Tageldin and Sayed、2019)。", "これは、交差点進入時の衝突リスクにおける黄色のジレンマの役割を正当化します (Zhao et al., 2023)。", "黄色のジレンマに起因するリスクを軽減するために、適応型交通信号時間計画などの高度な交通制御手段が必要です。", "パラメータ平均と分散に不均一性があるランダムパラメータロジットモデルランダムパラメータロジットモデル対数尤度 2469.893 2476.444 McFadden Rsquared 0.136 0.130 AIC 4961.900 4974.000 BIC 5049.900 5039.400 表 6 パラメータ推定の結果車とバイクの衝突。"]}, {"id": "chapter-013", "title_en": "6.2. conflict type and signal time plan", "title_ja": "6.2. コンフリクト種別と信号時間計画", "start_page": 7, "paragraph_ids": ["p007-b022", "p007-b023", "p008-b001", "p008-b002"], "summary": ["これは、ドライバーの不安に起因する潜在的な衝突リスクを軽減する上で、最適な信号時間の割り当てと信号カウントダウン（青へ）装置が有効であることを示しています（Islam et al., 2017）。", "表 8 に示すように、車両と車両の衝突と車両とオートバイの衝突では、調査結果は一般に類似しています。", "上記の調査結果は、交差点に近づく車両の速度を下げるための高度な交通管理手段を示しています (Guo et al., 2016)。", "これは、適応信号時間計画を示しています (Islam et al., 2017; Chen et al., 2021a)。", "これは、自動運転システムの動作計画戦略を示唆しています (Chen et al., 2021b)。"]}, {"id": "chapter-014", "title_en": "6.3. summary", "title_ja": "6.3. まとめ", "start_page": 8, "paragraph_ids": ["p008-b003", "p008-
