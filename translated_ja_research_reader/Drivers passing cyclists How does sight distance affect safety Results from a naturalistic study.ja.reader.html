LC;i ¼ bLC 0 þ bLC vis 1 \u0003 OPi ð Þ d s vis;i þ bLC OP OPi þ bLC onc OPi d s onc;i", "translation": "それぞれ 15,000 回以上の反復を行うデフォルトのマルコフ連鎖モンテカルロ (MCMC) サンプラーを使用し、そのうち最初の 5,000 回の反復は、チェーンの定性的、視覚的検査と bR から破棄されました。", "bbox": [0.06314280849117021, 0.6087201496586011, 0.41189346111074315, 0.6249351257155781], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b015", "page": 4, "order": 15, "source": "þ bLC V;cyc;i Vs cyc;i þ bLC W;ego;i Ws ego;i ð2Þ", "translation": "値は 1 に近い (Bürkner, 2017)。", "bbox": [0.10742848714682925, 0.6287202311720004, 0.4849211555580528, 0.644363306143488], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b016", "page": 4, "order": 16, "source": "lV;i ¼ bV 0 þ bV vis 1 \u0003 OPi ð Þ d s vis;i þ bV OP OPi þ bV onc OPi d s onc;i", "translation": "さらに、事後予測チェックをプロットし (Gelman et al., 2019)、その (ベイジアン) R2 値を計算することで、データへのモデルの適合性を評価しました。", "bbox": [0.06314280849117021, 0.6590057656888109, 0.4039892025040085, 0.6752204725977713], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b017", "page": 4, "order": 17, "source": "þ bV V;cyc;i Vs cyc;i þ bV W;ego;i Ws ego;i ð3Þ", "translation": "(Vehtari et al.、2017)。", "bbox": [0.10323799533723052, 0.6789344845281031, 0.4849211555580528, 0.6946492682211477], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b018", "page": 4, "order": 18, "source": "In Eqs. (1)–(3), the subscript i denotes the sample index, while the superscript s denotes a standardized variable. Sight distance was included whenever there was no oncoming traffic present, that is, through the interaction with 1 \u0003 OP ð Þ. This was done since we hypothesized that sight distance had a similar effect as an oncoming vehicle. Via model comparison, we also tested whether this model was better than a version that included sight distance for all samples, that is, even when an oncoming vehicle was present. The distance to the oncoming vehicle donc was included as an interaction with the presence of the oncoming vehicle OP. The standard deviations of LC and Vego are denoted as rLC and rV, respectively. q is the residual correlation between LC and Vego. We fitted the model in R version 4.0.3 (2020-10-10) with the package brms 2.18.0 (Bürkner, 2017). We used weakly informative default prior distribution for all parameters (Bürkner, 2017). We used the default Markov-chain Monte Carlo (MCMC) sampler with four chains, each over 15,000 iterations, out of which the first 5,000 iterations were used to warm up the sampler and discarded afterward. We verified the convergence of the MCMC sampler from", "translation": "Vehtari et al. (2017) による LOOCV メソッドは、推定の標準誤差とともにモデルの期待対数予測密度を推定します。ドライバーの行動がサイクリストの知覚に及ぼす影響を実証するために、Rasch et al. (2022) によって以前に開発されたベイズ順序ロジスティック回帰モデルを使用しました。モデルは、横方向クリアランス、追い越し速度、対向車の存在および TTC (衝突までの時間) を入力として使用し、1 (非常に低いリスク認識) から 5 (非常に高い危険認識) までのスコアの確率分布を使用し、そこから各追い越しイベントの最も頻度の高いスコアを選択しました (Rasch et al.、2022)。図 4 は、統計分析に使用された 81 件の追い越し操作をまとめたものです (表 2、図 4) は、道路の西向き方向での追い越し操作の速度が低くなりました。これは、道路区間で 19 回の追い越し操作が行われたことを示しています。これらの操作のうち 14 回、自車両は追い越し中に実線を超えました。センサー 1 と 2 センサー 3 と 4 (a) センサー 3 の匿名化されたビデオスナップショット (b) 図 2. 追い越し操作の例のデータスナップショット。", "bbox": [0.06314096931385844, 0.7033914264975607, 0.48499518404692216, 0.9517811331392956], "kind": "body", "chapter_id": "chapter-007", "figure_ids": ["fig-004-01", "fig-006-01"]}, {"id": "p004-b020", "page": 4, "order": 20, "source": "qualitative, visual inspections of the chains and from the bR value being close to one (Bürkner, 2017). We furthermore assessed the fit of the model to the data by plotting posterior predictive checks", "translation": "パネル a は、センサー 3 の匿名化されたビデオフィードを示します。", "bbox": [0.5150432656529753, 0.5235365711019466, 0.936822221506773, 0.562994131727345], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b021", "page": 4, "order": 21, "source": "(Gabry et al., 2019) and calculating its (Bayesian) R2 value (Gelman et al., 2019). Model comparisons were done via approximate leaveone-out cross-validation (LOOCV) with the R package loo (Vehtari et al., 2017). The LOOCV method by Vehtari et al. (2017) estimates a model’s expected log predictive density (ELPD) along with the standard error of the estimate. To demonstrate the impact of driver behavior on cyclists’ perceived safety, we used the Bayesian ordered logistic regression model developed previously by Rasch et al. (2022) to predict cyclists’ perceived safety. The model uses the inputs lateral clearance, overtaking speed, and the oncoming vehicle’s presence and TTC (time-to-collision). The output of the model is a probability mass distribution of scores, ranging from 1 (very low risk perception) to 5 (very high risk perception), from which we selected the most frequent score for each overtaking event (Rasch et al., 2022).", "translation": "パネル b は、センサーの位置と方向、および追跡を示す、道路の上面図を示します。検出および分類された道路利用者 (自車両が青、自転車が黄色) とその位置、速度、および境界ボックス (1 秒ごとに表示。黒い点は幾何学的中心をマーク) のビデオバージョンは https://youtu.be/uLjw1yHNjwQ で入手できます。 Journal of Safety Research 87。 (2023) 76–85 79", "bbox": [0.5150432656529753, 0.563320108425125, 0.9368586205560093, 0.7627794746492175], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b022", "page": 4, "order": 22, "source": "3. Results", "translation": "3. 結果", "bbox": [0.5151426709437771, 0.7834605775439659, 0.5791578326345058, 0.7936369871509505], "kind": "heading", "chapter_id": "chapter-008", "figure_ids": []}, {"id": "p004-b023", "page": 4, "order": 23, "source": "3.1. Data overview", "translation": "3.1. データ概要", "bbox": [0.5151426709437771, 0.8098173200132236, 0.6296657685500321, 0.8199937296202083], "kind": "heading", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p004-b024", "page": 4, "order": 24, "source": "Table 2 summarizes the 81 overtaking maneuvers used for statistical analyses. Most of the overtaking maneuvers happened in the westbound direction (Table 2, Fig. 4). Cyclist and ego-vehicle speed were lower in the westbound direction of the road, possibly due to the inclination of the road towards that direction. Fig. 4 shows the locations of the overtaking maneuvers on the road stretch. Nineteen maneuvers were carried out in westbound direction during the solid-line segment, and in 14 of these maneuvers, the ego vehicle exceeded the solid line during the overtaking.", "translation": "表 2 summarizes the 81 overtaking maneuvers used for statistical analyses. Most of the overtaking maneuvers happened in the westbound direction (表 2, Fig. 4). Cyclist and ego-vehicle speed were lower in the westbound direction of the road, possibly due to the inclination of the road towards that direction. Fig. 4 shows the locations of the overtaking maneuvers on the road stretch. Nineteen maneuvers were carried out in westbound direction during the solid-line segment, and in 14 of these maneuvers, the ego vehicle exceeded the solid line during the overtaking.", "bbox": [0.5150478283506965, 0.8361740624824814, 0.9368352431384717, 0.9517775188659302], "kind": "table-caption", "chapter_id": "chapter-009", "figure_ids": ["fig-006-01"]}, {"id": "p005-b001", "page": 5, "order": 1, "source": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "translation": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "bbox": [0.06314330192898555, 0.06021030976091428, 0.936795050385512, 0.06835119136831545], "kind": "metadata", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b002", "page": 5, "order": 2, "source": "Oncoming vehicle Ego vehicle (a)", "translation": "定性的には、ドライバーは高速走行時により大きな車間距離で追い越しをしました (図 5)。", "bbox": [0.18434977763769556, 0.08937588573728523, 0.7827218224706608, 0.10043961868031806], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-007-01"]}, {"id": "p005-b003", "page": 5, "order": 3, "source": "Cyclist", "translation": "しかし、特に低い車高で行われる操作では、サイクリストは追い越し中に高いリスクを認識すると予測されました（図5）。", "bbox": [0.29294093244315955, 0.21434519325096738, 0.33159233946635097, 0.2241898202529576], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-007-01"]}, {"id": "p005-b004", "page": 5, "order": 4, "source": "(b)", "translation": "3.2.モデリング結果図 6 は、モデルの事後予測分布を、モデルのフィッティングに使用されたデータで重ねて示しています。", "bbox": [0.18434977763769556, 0.23510854008963553, 0.2031846707300993, 0.24617227303266834], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-007-02"]}, {"id": "p005-b005", "page": 5, "order": 5, "source": "T-junction", "translation": "このモデルは、横方向のクリアランスと速度の相関関係など、データの傾向を捉えます。", "bbox": [0.3640541650663047, 0.41055019468245035, 0.42096664186062915, 0.4203948601341572], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b006", "page": 5, "order": 6, "source": "Fig. 3. Illustration of the independent and dependent variables used to model the overtaking maneuvers (panel a). Panel b shows how sight distance (measured as the range of visibility, dvis) and on-road distance to the oncoming vehicle (donc) were defined. Dimensions do not represent reality.", "translation": "図 3. 追い越し操作のモデル化に使用される独立変数と従属変数の図 (パネル a)。", "bbox": [0.06314280849117021, 0.44321353657648493, 0.9367824388839456, 0.4628268523900767], "kind": "figure-caption", "chapter_id": "chapter-009", "figure_ids": ["fig-005-01"]}, {"id": "p005-b007", "page": 5, "order": 7, "source": "Table 1 Overview of the independent variables used in the model.", "translation": "表 1 Overview of the independent variables used in the model.", "bbox": [0.0631427315917704, 0.48186984355656187, 0.3542430576759853, 0.500688557525813], "kind": "table-caption", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b008", "page": 5, "order": 8, "source": "Acronym Independent variable Type Definition", "translation": "このモデルの R2 値の中央値は、横方向クリアランスの場合は 0.39 [0.26, 0.51] 95% HDI、追い越し速度の場合は 0.35 [0.21, 0.47] 95% HDI です。", "bbox": [0.07742845484908134, 0.5105706345518228, 0.36082536433397633, 0.5295684473012413], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b009", "page": 5, "order": 9, "source": "dvis Sight distance Continuous The sight distance available to the driver of the ego vehicle OP Presence of oncoming vehicle", "translation": "LOOCV を介して、このモデルは代替モデルの ELPD (対向車が存在する場合の視距離も含む) をわずかに減少させました (/C0 の ELPD の差は 1.3) が、標準誤差 (1.6) 以内でした。図7に横クリアランスと追い越し速度の係数分布を示します。視距離が減少すると、横方向のクリアランスが減少します。対向車の存在と接近は、横方向クリアランスに対して最も強い減少効果をもたらしました (図 7)。", "bbox": [0.07742845484908134, 0.5372849593859488, 0.46573767748637807, 0.5886391314916483], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-007-03"]}, {"id": "p005-b010", "page": 5, "order": 10, "source": "An oncoming vehicle is visible to the driver at the passing moment donc Distance of oncoming vehicle", "translation": "興味深いことに、対向車が近づくと、追い越し速度が低下する効果もありました。対向車の存在に関連するパラメータも最も広い分布を持ち、つまり最も大きな不確実性を持っていました。さらに、車幅の増加により横方向のクリアランスが減少し、自転車の速度が速くなることでドライバーの追い越し速度が速くなります。", "bbox": [0.07742887779578021, 0.5589258056580604, 0.4658234972165493, 0.6209966827891455], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b011", "page": 5, "order": 11, "source": "Binary (0 = absent, 1 = present)", "translation": "横方向クリアランスと追い越し速度の間のモデルの残差相関 (q) は、0.44 [0.25, 0.61] 95% HDI と推定されました。", "bbox": [0.22247519276628877, 0.5589265746523934, 0.28240286939344417, 0.5886383624973153], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b012", "page": 5, "order": 12, "source": "Continuous The road distance between ego vehicle and oncoming vehicle", "translation": "完全な非標準モデルを付録で報告しました (表 A1)。 4. ディスカッション 4.1.視界が変化する田舎道でのドライバーの行動私たちの結果は、対向車が存在せず視距離が減少した場合、ドライバーは自転車との横方向のクリアランスを減少させることを示しました。", "bbox": [0.22247521839942205, 0.5912841259498907, 0.46975931103059343, 0.6102104606760521], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b013", "page": 5, "order": 13, "source": "Vcyc Speed of cyclist Continuous Speed of the cyclist", "translation": "この減少は、カーブの後ろからドライバーに現れる可能性のある対向車との正面衝突の可能性のリスクによって説明される可能性があります。追い越し速度も低下しましたが、これはバッサーニらが発見した結果と一致しています。", "bbox": [0.07742890342891348, 0.6236412543005047, 0.4097260002612529, 0.6426398744939729], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b014", "page": 5, "order": 14, "source": "Wego Width of ego vehicle Continuous Width of the rectangular bounding box around the ego vehicle", "translation": "(2019);ただし、横方向のクリアランスほど明確ではありません。対向車の存在とその近さは、視距離よりも同様ではありますが、より強い影響を及ぼしました。自転車を追い越す際に対向車がドライバーに近づいている場合、ドライバーは横方向のクリアランスを低くし、速度を低く保ちました。", "bbox": [0.07742891624548011, 0.6452848305024986, 0.4619494592536739, 0.6749966183474204], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p005-b015", "page": 5, "order": 15, "source": "Qualitatively, drivers overtook with larger clearances when traveling at higher speeds (Fig. 5). However, particularly in maneuvers performed at low clearance, cyclists were predicted to have perceived high risk during the passing (Fig. 5).", "translation": "接近してくる対向車の存在下でのクリアランスの低下は、シミュレータ（Bianchi Piccinini et al., 2018）、テストトラック（Rasch, Boda, et al., 2020）、フィールドテスト（Dozza et al., 2016）、および自然主義的運転研究（Kovaceva et al., 2019）による以前の研究を裏付けています。私たちの結果は、対向車の存在に関するパラメータの大きさが他のどの変数よりも大きく変化することを示しています。これは、対向車のさまざまな種類やサイズがドライバーの行動に及ぼす影響に関連している可能性があります (Levulis et al., 2015)。ただし、より大きな分散は、外部サイクリスト、対向車、自車（a）（b）、視覚障害物（植生）、T 字路、センサー範囲（150 m）による誤差にも関連している可能性があります。図 3. 追い越し操作のモデル化に使用される独立変数と従属変数の図 (パネル a)。パネル b は、視距離 (視界の範囲 d vis として測定) と対向車までの路上距離 (d onc) がどのように定義されたかを示しています。寸法は現実を表すものではありません。表 1 モデルで使用される独立変数の概要。頭字語独立変数タイプ定義 dvis 視距離連続自車両のドライバーが利用できる視距離 OP 対向車両の存在バイナリ (0 = 不在、1 = 存在) 対向車両が通過する瞬間にドライバーに見える d onc 対向車両の距離連続自車両と対向車両間の道路距離 V cyc 自転車の速度連続自転車の速度 Wego 自車両の幅連続長方形の境界の幅自我車両の周りのボックス A. Rasch、Y. Tarakanov、G. Tellwe 他安全研究ジャーナル 87 (2023) 76–85 80", "bbox": [0.06314168704158986, 0.6953915015514076, 0.4849442766442578, 0.745067381974942], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-005-01", "fig-007-01"]}, {"id": "p005-b016", "page": 5, "order": 16, "source": "3.2. Modeling results", "translation": "3.2. モデリング結果", "bbox": [0.06333142349401753, 0.768247947150403, 0.18933763932376924, 0.7784243567573877], "kind": "heading", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p005-b017", "page": 5, "order": 17, "source": "Fig. 6 shows the posterior predictive distribution of the model, overlayed by the data used for fitting the model. The model captures the trends in the data, including the correlation between lateral clearance and speed. The model has a median R2 value of 0.39 [0.26, 0.51] 95% HDI for lateral clearance and 0.35 [0.21, 0.47] 95% HDI for overtaking speed. Via LOOCV, the model reduced the ELPD of the alternative model (including sight distance also in the presence of oncoming traffic) slightly (difference in ELPD of \u00031.3), but within standard error (1.6).", "translation": "Fig. 6 shows the posterior predictive distribution of the model, overlayed by the data used for fitting the model. The model captures the trends in the data, including the correlation between lateral clearance and speed. The model has a median R2 value of 0.39 [0.26, 0.51] 95% HDI for lateral clearance and 0.35 [0.21, 0.47] 95% HDI for overtaking speed. Via LOOCV, the model reduced the ELPD of the alternative model (including sight distance also in the presence of oncoming traffic) slightly (difference in ELPD of \u00031.3), but within standard error (1.6).", "bbox": [0.06314167422502323, 0.7946046896196608, 0.4849703711739216, 0.9122811240267127], "kind": "body", "chapter_id": "chapter-010", "figure_ids": ["fig-007-02"]}, {"id": "p005-b018", "page": 5, "order": 18, "source": "Fig. 7 shows the coefficient distributions for lateral clearance and overtaking speed. A decreasing sight distance had a decreasing effect on lateral clearance. The presence and proximity of an", "translation": "Fig. 7 shows the coefficient distributions for lateral clearance and overtaking speed. A decreasing sight distance had a decreasing effect on lateral clearance. The presence and proximity of an", "bbox": [0.06314355826031821, 0.91524744276702, 0.48494627602865253, 0.9517805948432624], "kind": "body", "chapter_id": "chapter-010", "figure_ids": ["fig-007-03"]}, {"id": "p005-b020", "page": 5, "order": 20, "source": "Visual obstruction (vegetation)", "translation": "Visual obstruction (vegetation)", "bbox": [0.5185322426879436, 0.30835990272836883, 0.6948861489006154, 0.31820452973035906], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p005-b021", "page": 5, "order": 21, "source": "Sensor range (150 m)", "translation": "Sensor range (150 m)", "bbox": [0.5773874033861575, 0.3487455433894671, 0.70506557878282, 0.358590208841174], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p005-b022", "page": 5, "order": 22, "source": "oncoming vehicle had the strongest decreasing effect on lateral clearance (Fig. 7). Interestingly, a closer oncoming vehicle also had a decreasing effect on overtaking speed. The parameters related to the presence of an oncoming vehicle also had the widest distributions, that is, had the greatest uncertainty. Furthermore, an increasing car width had a decreasing effect on lateral clearance and a faster cyclist speed resulted in faster overtaking speeds by drivers. The model’s residual correlation (q) between lateral clearance and overtaking speed was estimated to be 0.44 [0.25, 0.61] 95% HDI. We reported the full, non-standardized model in the Appendix (Table A1).", "translation": "oncoming vehicle had the strongest decreasing effect on lateral clearance (Fig. 7). Interestingly, a closer oncoming vehicle also had a decreasing effect on overtaking speed. The parameters related to the presence of an oncoming vehicle also had the widest distributions, that is, had the greatest uncertainty. Furthermore, an increasing car width had a decreasing effect on lateral clearance and a faster cyclist speed resulted in faster overtaking speeds by drivers. The model’s residual correlation (q) between lateral clearance and overtaking speed was estimated to be 0.44 [0.25, 0.61] 95% HDI. We reported the full, non-standardized model in the Appendix (Table A1).", "bbox": [0.5150472644217647, 0.47767421047544073, 0.9368482647701702, 0.6196387925958458], "kind": "body", "chapter_id": "chapter-010", "figure_ids": ["fig-007-03"]}, {"id": "p005-b023", "page": 5, "order": 23, "source": "4. Discussion", "translation": "4. 考察", "bbox": [0.5151438500679073, 0.6384621589808118, 0.6020809797844807, 0.6486385685877966], "kind": "heading", "chapter_id": "chapter-011", "figure_ids": []}, {"id": "p005-b024", "page": 5, "order": 24, "source": "4.1. Driver behavior on rural roads with varying visibility", "translation": "4.1. 視認性が異なる地方道路でのドライバー行動", "bbox": [0.5151438500679073, 0.6648199011427025, 0.8656324483476985, 0.6749963107496872], "kind": "heading", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p005-b025", "page": 5, "order": 25, "source": "Our results showed that under decreased sight distance, when no oncoming vehicle was present, drivers decreased lateral clearance to the cyclist. This decrease may be explained by the risk of a possible head-on collision with an oncoming vehicle that might appear to the driver from behind the curve. Overtaking speed decreased as well, which is in line with the results found by Bassani et al. (2019); however, not as clearly as lateral clearance. The presence and proximity of oncoming traffic had a similar but stronger effect than sight distance. When oncoming traffic was present and closer to the driver while passing the cyclist, drivers kept a lower lateral clearance and a lower speed. The lowered clearance in the presence of a close oncoming vehicle confirms previous research from simulator (Bianchi Piccinini et al., 2018), testtrack (Rasch, Boda, et al., 2020), field-test (Dozza et al., 2016), and naturalistic-driving studies (Kovaceva et al., 2019). Our results indicate that the magnitude of the parameter for the oncoming vehicle’s presence varies more than for any other variable; this could be related to the effect of different types and sizes of oncoming vehicles on driver behavior (Levulis et al., 2015). However, the greater variance may also be related to the error due to the extrap-", "translation": "Our results showed that under decreased sight distance, when no oncoming vehicle was present, drivers decreased lateral clearance to the cyclist. This decrease may be explained by the risk of a possible head-on collision with an oncoming vehicle that might appear to the driver from behind the curve. Overtaking speed decreased as well, which is in line with the results found by Bassani et al. (2019); however, not as clearly as lateral clearance. The presence and proximity of oncoming traffic had a similar but stronger effect than sight distance. When oncoming traffic was present and closer to the driver while passing the cyclist, drivers kept a lower lateral clearance and a lower speed. The lowered clearance in the presence of a close oncoming vehicle confirms previous research from simulator (Bianchi Piccinini et al., 2018), testtrack (Rasch, Boda, et al., 2020), field-test (Dozza et al., 2016), and naturalistic-driving studies (Kovaceva et al., 2019). Our results indicate that the magnitude of the parameter for the oncoming vehicle’s presence varies more than for any other variable; this could be related to the effect of different types and sizes of oncoming vehicles on driver behavior (Levulis et al., 2015). However, the greater variance may also be related to the error due to the extrap-", "bbox": [0.5150490074748267, 0.6911766436119602, 0.9368844587543405, 0.9517779033630968], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b001", "page": 6, "order": 1, "source": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "translation": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "bbox": [0.063142763633187, 0.06013679390267469, 0.9367945377228468, 0.06834919198304952], "kind": "metadata", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b002", "page": 6, "order": 2, "source": "Table 2 Summary of the data used for statistical analyses, including the dependent and independent variables used for modeling. All data are measured at the return onset. All continuous variables are summarized as mean (standard deviation); all categorical variables as the number of samples per level (percentage). Square brackets indicate the range of values ([min, max]).", "translation": "表 2 Summary of the data used for statistical analyses, including the dependent and independent variables used for modeling. All data are measured at the return onset. All continuous variables are summarized as mean (standard deviation); all categorical variables as the number of samples per level (percentage). Square brackets indicate the range of values ([min, max]).", "bbox": [0.06314271236692046, 0.0851558274736606, 0.9367645982231932, 0.12561772353530995], "kind": "table-caption", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b003", "page": 6, "order": 3, "source": "Direction of travel", "translation": "対向車の有無を判断するために使用される、対向車までの距離。", "bbox": [0.45047576120665206, 0.13549938722686572, 0.543780622622655, 0.14364027844669605], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b004", "page": 6, "order": 4, "source": "Characteristic eastbound N = 18 westbound N = 63", "translation": "さらに、私たちのモデルは、幅の広い車はより低い車間距離を維持する一方で、必ずしもそれに応じて速度を低下させるわけではないことを示した以前の研究を確認しました (Dozza et al., 2016)。", "bbox": [0.07743044141690938, 0.1514992371191719, 0.8788222334005469, 0.15964012833900224], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b005", "page": 6, "order": 5, "source": "Presence of oncoming vehicle (–) Absent 9 (50%) 42 (67%) Present 9 (50%) 21 (33%) Lateral clearance (m) 2.26 (0.68) [1.04, 3.34] 1.70 (0.62) [0.49, 3.35] Ego-vehicle speed (km/h) 75.5 (9.9) [60.7, 98.2] 65.1 (11.4) [37.2, 102.9] Sight distance (m) 446.7 (41.4) [382.1, 520.1] 197.9 (20.4) [180.9, 255.0] Distance to oncoming vehicle (m) 247.4 (115.0) [28.7, 405.1] 118.4 (60.4) [17.5, 209.5] Not applicable 9 42 Speed of cyclist (km/h) 10.5 (2.3) [6.0, 14.3] 5.9 (2.5) [2.3, 12.1] Width of ego vehicle (m) 1.8 (0.1) [1.6, 2.2] 1.8 (0.1) [1.5, 2.2]", "translation": "追い越し速度も明らかに自転車の速度に依存しており、これは道路の傾斜によりどちらの道路利用者も西行きと比べて東行きの方が速度が高くなるため、またはドライバーが自転車と同様の相対速度を保ちながら追い越しをするための可能性があります。私たちの結果は、対向車がいない状況でのみ視距離を考慮した場合、ドライバーの行動をより適切に説明できる可能性があることを強調しています。この事実は、ドライバーの行動が、最も近い、より差し迫った脅威によって導かれていることを示唆しています。対向車が存在する場合、それは対向車自体であり、そうでない場合は、対向車が突然現れる可能性がある接近カーブです。以前の文献で示唆されているように、ドライバーは、正面衝突のリスクをサイクリストとの横滑り衝突の可能性で補うことによって、これらの脅威に反応します (Rasch, Boda, et al., 2020)。しかし、脅威はドライバーにとっての重要性に応じて決定される可能性があります。つまり、接近する対向車は、その差し迫りのために対向車が見えないカーブの接近よりも、依然としてドライバーの行動に強い影響を与えます。", "bbox": [0.07742939045844552, 0.1674275801509336, 0.922453722453866, 0.2727090563001514], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b006", "page": 6, "order": 6, "source": "olation of the distance of the oncoming vehicle, which was used to determine its presence or absence. Furthermore, our models confirmed previous work that showed that wider cars keep lower clearances while they did not necessarily reduce speed accordingly (Dozza et al., 2016). Overtaking speed was also clearly dependent on cyclist speed, which might have been either because of the road inclination causing higher speeds in the eastbound direction compared to the westbound for both road users, or because drivers overtake keeping similar relative speeds with the cyclist. Our results highlight that driver behavior might be better explained when accounting for sight distance only in situations without oncoming traffic. This fact suggests that driver behavior is guided by the closest, more imminent threat, which in case of oncoming traffic being present is the oncoming vehicle itself, and otherwise the approaching curve from which an oncoming vehicle may suddenly appear. As suggested in previous literature, drivers react to these threats by compensating for the risk of a head-on collision with a possible side-swipe collision with the cyclist (Rasch, Boda, et al., 2020). However, threats may be ordered by their importance to the driver, that is, a close oncoming vehicle still has a stronger impact on driver behavior than an approaching curve with no oncoming vehicle visible because of its impendence. This might be explained by the looming effect, that is, the optical expansion of an obstacle on the driver’s eye’s retina, which may be more evident for an oncoming vehicle traveling at higher speed (Lee, 1976). We showed that lateral clearance and speed might be correlated in cyclist-overtaking maneuvers. This fact is encouraging, given that an increased speed is physically correlated with a higher side-swipe risk through the aerodynamic drag (Gromke & Ruck, 2021); however, this relation may not have been strong enough to make the overtaking maneuvers safe. In fact, clearances were partly so low (37% of the maneuvers had lateral clearances below 1.5 m, a common minimum clearance in many European countries) that cyclists’ perceived safety might have been critically low. Due to the wide range of credible correlation values (from 0.25 to 0.61 in the 95% HDI), future work may model the residual correlation in further detail, to understand whether it is influenced by certain variables and whether there are differences between individual drivers.", "translation": "これは、迫り来る効果、つまり、より高速で走行する対向車がドライバーの目の網膜上で障害物を視覚的に拡大することで説明されるかもしれません (Lee、1976)。私たちは、自転車の追い越し操作において、横方向のクリアランスと速度が相関している可能性があることを示しました。速度の増加が空気抵抗による横スワイプのリスクの増加と物理的に相関していることを考えると、この事実は心強いものです (Gromke & Ruck、2021)。ただし、この関係は追い越し操作を安全に行えるほど強力ではなかった可能性があります。実際、車高が部分的に非常に低かったため（操縦の 37% は、多くのヨーロッパ諸国で一般的な最低車高である 1.5 m 未満の車高でした）、自転車利用者が認識する安全性は極めて低かった可能性があります。信頼できる相関値の範囲が広いため (95% HDI で 0.25 ～ 0.61)、将来の研究では、残差相関がさらに詳細にモデル化され、特定の変数の影響を受けるかどうか、および個々のドライバー間に差があるかどうかが理解される可能性があります。 4.2.自転車の追い越し操作を捕捉するための路側の交通センサーこの研究で使用された交通センサーは路側に設置されているため、ドローンのような空中計測器とは対照的に、継続的に交通を捕捉することができます。これにより、通常ははるかに長期間にわたって実行され、よりコストがかかる可能性がある自然主義的な運転研究など、他のデータ収集方法よりも短期間（7 日間）で顕著な量の追い越し操作を捕捉することができました（Kovaceva et al., 2019）。さらに、自然な運転の研究では、ドライバーは自分が計器付き車両を運転していることに気づいている可能性があり、これは路上でのデータ収集には存在しない可能性のある交絡因子です。自然主義的な運転研究では通常行われる、ハンドル角度やペダル制御などのドライバー入力信号を捕捉することはできませんが、路側ベースのデータ収集では、対話に関与するユーザーがいる範囲での車両情報の捕捉が可能になり、特定のインフラストラクチャーを制約できるため、分析に有利になる可能性があります。これは、車載センサーでは位置を推定することが難しい対向車の影響を強く受ける追い越しの際に特に有利です。道路脇のセンサーは、特定の場所と視野に制限されます。私たちのセットアップは約 150 m の区間をカバーしていましたが、追い越し操作のすべての段階を捉えることはほとんどありませんでした。この研究では通過する瞬間を捉えるだけで十分でしたが、将来の研究ではより大規模なインフラストラクチャセンサーアレイが必要になる可能性があります。この研究で収集されたデータは、より低いデータに適合したドライバーモデルを検証するために使用できます。データ収集環境が合理的に類似していることを前提とした、シミュレータまたはテストトラック環境で収集されたデータなどの生態学的妥当性。 1 つのアプローチは、Rasch、Panero らが行ったように、両方のデータセットに同じモデル構造を当てはめ、推定されたモデル係数を比較することです。 (2020) 。同様に、Kovaceva らによって行われたように、1 つのデータセットに適合したモデルを自然主義的データの予測に使用することも、その逆も可能です。 (2020) 。このような検証により、1 つのデータセットだけでは達成できないドライバーの行動に関する累積的な証拠が得られる可能性があります。表 2 モデリングに使用される従属変数と独立変数を含む、統計分析に使用されるデータの概要。すべてのデータは復帰時に測定されます。すべての連続変数は平均 (標準偏差) として要約されます。すべてのカテゴリ変数をレベルごとのサンプル数 (パーセンテージ) として表します。角括弧は、値の範囲 ([最小、最大]) を示します。進行方向特徴東行き N = 18 西行き N =6 3 対向車の有無 (-) 無し 9 (50%) 42 (67%) 有り 9 (50%) 21 (33%) 横方向隙間 (m) 2.26 (0.68) [1.04, 3.34] 1.70 (0.62) [0.49, 3.35]自車速度 (km/h) 75.5 (9.9) [60.7, 98.2] 65.1 (11.4) [37.2, 102.9] 見通し距離 (m) 446.7 (41.4) [382.1, 520.1] 197.9 (20.4) [180.9, 255.0]対向車までの距離 (m) 247.4 (115.0) [28.7, 405.1] 118.4 (60.4) [17.5, 209.5] 該当なし 9 42 自転車の速度 (km/h) 10.5 (2.3) [6.0, 14.3] 5.9 (2.5) [2.3, 12.1] 自車両の幅 (m) 1.8 (0.1) [1.6, 2.2] 1.8 (0.1) [1.5, 2.2] 西行き方向の実線東行き西行き図 4. 交通センサーから得られたステッチされたカメラ画像上にプロットされた、自転車とすれ違う瞬間の自車位置の概要。赤い影の領域は、カーブが近づいているため、車両が西行き方向の (実線の) 中心線を越えてはいけない場所を示しています。黒い十字記号は、自車両が追い越し中に実線を超えた場所を示します。", "bbox": [0.06314280208288689, 0.30467738111597537, 0.4850114867196787, 0.8024892654158564], "kind": "body", "chapter_id": "chapter-012", "figure_ids": ["fig-006-01"]}, {"id": "p006-b007", "page": 6, "order": 7, "source": "Solid line for westbound direction", "translation": "A. Rasch、Y. Tarakanov、G. Tellwe 他。", "bbox": [0.21739714090082213, 0.8332134343002386, 0.46509090226783506, 0.8459058395660964], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b008", "page": 6, "order": 8, "source": "Direction eastbound westbound", "translation": "安全研究ジャーナル 87 (2023) 76–85 81", "bbox": [0.3393984744389471, 0.8950243528970362, 0.653761272683016, 0.9077172964589272], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p006-b009", "page": 6, "order": 9, "source": "Fig. 4. Overview of the ego-vehicle positions at the moment of passing the cyclist, plotted over the stitched camera images obtained from the traffic sensors. The red shaded area marks where vehicles may not cross the (solid) center line for the westbound direction, due to the approaching curve. Black cross symbols mark where the ego vehicle exceeded the solid line during the overtake.", "translation": "図 4. 交通センサーから得られたステッチされたカメラ画像上にプロットされた、自転車とすれ違う瞬間の自車位置の概要。", "bbox": [0.063142763633187, 0.9215704986705241, 0.9368021251302933, 0.951282286515446], "kind": "figure-caption", "chapter_id": "chapter-012", "figure_ids": ["fig-006-01"]}, {"id": "p006-b011", "page": 6, "order": 11, "source": "4.2. Roadside-based traffic sensors for capturing cyclist-overtaking maneuvers", "translation": "4.2. 自転車追い越し挙動を捉える路側設置型交通センサー", "bbox": [0.5150478796169631, 0.3046681531839787, 0.918987507641237, 0.3280585961377875], "kind": "heading", "chapter_id": "chapter-013", "figure_ids": []}, {"id": "p006-b012", "page": 6, "order": 12, "source": "The traffic sensors used in this study were roadside-based and, therefore, able to capture traffic continuously, in contrast to, for instance, airborne instrumentation like drones. This allowed the capture of a notable amount of overtaking maneuvers in shorter time (seven days) than other data-collection methods, such as naturalistic-driving studies that typically run over much longer durations and may be more costly (Kovaceva et al., 2019). Furthermore, in naturalistic driving studies, drivers may be aware that they are driving an instrumented vehicle, which is a possible confounder that does not exist for roadsidebased data collection. While not being able to capture driverinput signals such as steering-wheel angle or pedal controls, which naturalistic-driving studies usually do, roadside-based data collection allows for capturing the kinematics of all road users involved in the interaction and enable constraining specific infrastructure, which may favor analyses. This is particularly advantageous for overtaking interactions that are strongly influenced by the oncoming vehicle, whose position may be hard to estimate by on-vehicle sensors. Roadside-based sensors are limited to their specific location and field of view. Even though our setup covered a stretch of about 150 m, we rarely captured all phases of an overtaking maneuver. While capturing the passing moment was enough for this study, future studies may need larger infrastructure sensor arrays. The data collected in this study can be used to validate driver models fitted on data with lower ecological validity, such as data collected in simulator or test-track environments, given that the data-collection environments were reasonably similar. One approach could be to fit the same model structure on both data sets and compare the estimated model coefficients, as done by Rasch, Panero, et al. (2020). Similarly, models fitted on one data set could be used for prediction on the naturalistic data and vice-versa, as done by Kovaceva et al. (2020). Such validation may deliver cumulative evidence on driver behavior that one data set alone may not achieve.", "translation": "The traffic sensors used in this study were roadside-based and, therefore, able to capture traffic continuously, in contrast to, for instance, airborne instrumentation like drones. This allowed the capture of a notable amount of overtaking maneuvers in shorter time (seven days) than other data-collection methods, such as naturalistic-driving studies that typically run over much longer durations and may be more costly (Kovaceva et al., 2019). Furthermore, in naturalistic driving studies, drivers may be aware that they are driving an instrumented vehicle, which is a possible confounder that does not exist for roadsidebased data collection. While not being able to capture driverinput signals such as steering-wheel angle or pedal controls, which naturalistic-driving studies usually do, roadside-based data collection allows for capturing the kinematics of all road users involved in the interaction and enable constraining specific infrastructure, which may favor analyses. This is particularly advantageous for overtaking interactions that are strongly influenced by the oncoming vehicle, whose position may be hard to estimate by on-vehicle sensors. Roadside-based sensors are limited to their specific location and field of view. Even though our setup covered a stretch of about 150 m, we rarely captured all phases of an overtaking maneuver. While capturing the passing moment was enough for this study, future studies may need larger infrastructure sensor arrays. The data collected in this study can be used to validate driver models fitted on data with lower ecological validity, such as data collected in simulator or test-track environments, given that the data-collection environments were reasonably similar. One approach could be to fit the same model structure on both data sets and compare the estimated model coefficients, as done by Rasch, Panero, et al. (2020). Similarly, models fitted on one data set could be used for prediction on the naturalistic data and vice-versa, as done by Kovaceva et al. (2020). Such validation may deliver cumulative evidence on driver behavior that one data set alone may not achieve.", "bbox": [0.5150471618892316, 0.34423892900006053, 0.9368510331485629, 0.8024953404710875], "kind": "body", "chapter_id": "chapter-013", "figure_ids": []}, {"id": "p007-b001", "page": 7, "order": 1, "source": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "translation": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "bbox": [0.06314435288744942, 0.06021000216318106, 0.9367960757108427, 0.06835088377058222], "kind": "metadata", "chapter_id": "chapter-013", "figure_ids": []}, {"id": "p007-b002", "page": 7, "order": 2, "source": "Fig. 5. Lateral clearance and overtaking speed by drivers. The color indicates the perceived safety of the cyclist, predicted by the model developed by Rasch et al. (2022).", "translation": "図 5. ドライバーによる横方向クリアランスと追い越し速度。", "bbox": [0.06533322381149927, 0.32957070814458045, 0.9346232062702335, 0.3377115897519816], "kind": "figure-caption", "chapter_id": "chapter-013", "figure_ids": ["fig-007-01"]}, {"id": "p007-b003", "page": 7, "order": 3, "source": "Fig. 6. Model predictions vs observed data. The predictions are represented by the probability density predicted by the model.", "translation": "図 6. モデル予測と観測データ。", "bbox": [0.06314280849117021, 0.652141952970306, 0.4848749133856427, 0.6710682876964674], "kind": "figure-caption", "chapter_id": "chapter-013", "figure_ids": ["fig-007-02"]}, {"id": "p007-b004", "page": 7, "order": 4, "source": "4.3. Practical applications", "translation": "4.3. practical applications", "bbox": [0.06333331393759582, 0.7157485502342088, 0.21879296753963548, 0.7259249598411934], "kind": "heading", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p007-b005", "page": 7, "order": 5, "source": "Several countermeasures that address cyclists’ objective and subjective, perceived, risk may benefit from our results. Infrastructure design, for instance, should aim at separating cyclists from motorized traffic on rural roads, especially in locations where sight distances are low and oncoming vehicles frequent. In addition, where shoulders are not large enough for cyclists to be used, compromised by roadside barriers, or even unrideable due to gravel, designated and separated cyclist paths are necessary. Extending the findings from Bassani et al. (2019), who suggested that road should be designed with sight distances slightly greater than required to avoid excessive speed by drivers, our study suggests that cyclist safety may be compromised on shared roads with low sight distance. Furthermore, policymaking should strive to prevent overtaking of cyclists in areas with limited visibility where oncoming traffic may appear at short distances, as marked, for instance, with a solid line.", "translation": "Several countermeasures that address cyclists’ objective and subjective, perceived, risk may benefit from our results. Infrastructure design, for instance, should aim at separating cyclists from motorized traffic on rural roads, especially in locations where sight distances are low and oncoming vehicles frequent. In addition, where shoulders are not large enough for cyclists to be used, compromised by roadside barriers, or even unrideable due to gravel, designated and separated cyclist paths are necessary. Extending the findings from Bassani et al. (2019), who suggested that road should be designed with sight distances slightly greater than required to avoid excessive speed by drivers, our study suggests that cyclist safety may be compromised on shared roads with low sight distance. Furthermore, policymaking should strive to prevent overtaking of cyclists in areas with limited visibility where oncoming traffic may appear at short distances, as marked, for instance, with a solid line.", "bbox": [0.06314353262718495, 0.7421052927034665, 0.4849682692569939, 0.9499930675160876], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p007-b007", "page": 7, "order": 7, "source": "Fig. 7. Model coefficients with full posterior distribution and median (black dot) with 95% highest density interval (HDI, black horizontal bar) marked, for the dependent variables lateral clearance and overtaking speed. All continuous coefficients are on a standardized scale.", "translation": "図 7. 従属変数の横クリアランスと追い越し速度について、完全事後分布と 95% の最高密度間隔 (HDI、黒い水平バー) がマークされた中央値 (黒い点) を備えたモデル係数。", "bbox": [0.5150471618892316, 0.6472848309638952, 0.9367807983634168, 0.687853588400551], "kind": "figure-caption", "chapter_id": "chapter-014", "figure_ids": ["fig-007-03"]}, {"id": "p007-b008", "page": 7, "order": 8, "source": "However, when doing so, traffic regulations may need to be clearer, specifying that cyclists may not be overtaken at such locations, just as any other vehicle may not be overtaken either (Kircher et al., 2022). Even though the Swedish traffic regulation prohibits overtaking larger vehicles when a solid line is present, cyclists are frequently overtaken during solid-line segments, as our data show, possibly because of their reduced dimension that allows drivers to pass them while staying in their lane. This behavior might have resulted in even closer passes. Where cyclists need to be overtaken, a minimum clearance or full lane change, as suggested by Kircher et al. (2022), should be in place and evident to all drivers. Since overtaking speed contributes to the aerodynamic force on the cyclist together with lateral clearance (Gromke & Ruck, 2021), minimum lateral clearances may need to be stratified by speed limits, or overtaking speeds may also need to be limited. The lateral clearance and overtaking speed model could be included in active-safety system development as a reference model", "translation": "However, when doing so, traffic regulations may need to be clearer, specifying that cyclists may not be overtaken at such locations, just as any other vehicle may not be overtaken either (Kircher et al., 2022). Even though the Swedish traffic regulation prohibits overtaking larger vehicles when a solid line is present, cyclists are frequently overtaken during solid-line segments, as our data show, possibly because of their reduced dimension that allows drivers to pass them while staying in their lane. This behavior might have resulted in even closer passes. Where cyclists need to be overtaken, a minimum clearance or full lane change, as suggested by Kircher et al. (2022), should be in place and evident to all drivers. Since overtaking speed contributes to the aerodynamic force on the cyclist together with lateral clearance (Gromke & Ruck, 2021), minimum lateral clearances may need to be stratified by speed limits, or overtaking speeds may also need to be limited. The lateral clearance and overtaking speed model could be included in active-safety system development as a reference model", "bbox": [0.5150472131554982, 0.7426736564150238, 0.9368429330784511, 0.9504900685535378], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b001", "page": 8, "order": 1, "source": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "translation": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "bbox": [0.0631453269465135, 0.06013779359530766, 0.9367971010361733, 0.06835019167568249], "kind": "metadata", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b002", "page": 8, "order": 2, "source": "for naturalistic driver behavior. In the same way, it may inform automated driving on how to overtake a cyclist, to become more humanlike and thereby possibly more accepted, as suggested by Abe et al. (2018). For instance, an automated vehicle that overtakes a cyclist should keep a lower speed when a higher lateral clearance cannot be achieved. The data may as well be useful for the evaluation of active-safety systems. For instance, a forward-collision warning system could be tested on the time-series data collected to understand in what situations it might give false-positive warnings to the driver. Similarly, in counterfactual simulations, the overtaking maneuvers recorded could be used to create artificial crash scenarios to test true-positive activations of active-safety systems, as demonstrated by Kovaceva et al. (2022). Finally, our Bayesian model may allow driver adaptions through online learning to improve the acceptance of active-safety systems (Hasenjager et al., 2020).", "translation": "自然なドライバーの行動を実現します。同様に、Abe et al.が示唆しているように、より人間らしくなり、おそらくより受け入れられるよう、サイクリストを追い越す方法を自動運転に提供する可能性があります。 （2018年）。たとえば、サイクリストを追い越す自動運転車は、横方向の車間距離を大きく確保できない場合は、速度を低く保つ必要があります。このデータは、アクティブセーフティシステムの評価にも役立つ可能性があります。たとえば、前方衝突警告システムは、収集された時系列データに基づいてテストされ、どのような状況でドライバーに誤検知警告が発せられるかを理解できます。同様に、Kovaceva らが実証したように、反事実シミュレーションでは、記録された追い越し操作を使用して、人為的な衝突シナリオを作成し、アクティブセーフティシステムの真の陽性作動をテストすることができます。 （2022年）。最後に、私たちのベイジアンモデルは、オンライン学習を通じてドライバーの適応を可能にし、アクティブセーフティシステムの受け入れを向上させる可能性があります (Hasenjager et al., 2020)。 4.4.限界と今後の研究すべての自然主義的データと同様に、この研究で収集されたデータには交絡因子がたくさんあります。たとえば、道路の傾斜がドライバーの行動に影響を与えた可能性があります。さらに、道路の西端に向かう実線の中心線、破線の端線とそれに対する自転車の位置決めの存在は、ドライバーの行動に影響を与えた可能性がありますが、この研究では考慮されていませんでした。これらの考えられる問題に対処するために、将来の研究ではシミュレーターやテストトラック実験を実施して視認性に関するこの研究の結果を確認するか、視距離が限られている他の道路区間でより自然主義的な研究を実施する可能性があります。このようなより制御された環境では、Figueira and Larocca (2020) が車から車への追い越しについて実施した研究と同様に、さまざまな視距離をテストして、横方向のクリアランスと追い越し速度への影響を理解することができます。さらに、おんぶ運転はドライバー自身の行動と先頭車両のドライバーの行動を区別できない可能性があるという点まで根本的に異なると想定したため、この研究の分析からは便乗運転を除外しました。ただし、このような操作は実際の交通では一般的であるため、将来の研究では、衝突データベースからその重要性を調査し、その結果ドライバーの行動を調査する必要があります。これは、シミュレーターやテストトラックの実験でも行うことができ、ドライバーの制御や視線の行動を詳細に分析することで、ドライバーをより深く理解することができます。今後の研究では、この研究で使用した線形モデルよりも非線形モデルの方がデータによく適合するかどうかをさらに調査する可能性があります。同様に、多変量モデルの共分散行列の要素は、独立変数に依存するようにモデル化できます。さらに、この研究では情報力の弱い事前情報しか使用していませんでしたが、この研究からのパラメータ分布は将来の研究で事前情報として役立つ可能性があります。", "bbox": [0.06314278926632026, 0.08496317516837323, 0.4850293273804312, 0.27963679167259115], "kind": "body", "chapter_id": "chapter-014", "figure_ids": []}, {"id": "p008-b003", "page": 8, "order": 3, "source": "4.4. Limitations and future work", "translation": "4.4. 限界と今後の課題", "bbox": [0.06333257698501446, 0.30131802937204616, 0.26071180442698566, 0.31149445820388916], "kind": "heading", "chapter_id": "chapter-015", "figure_ids": []}, {"id": "p008-b004", "page": 8, "order": 4, "source": "As with all naturalistic data, the ones collected in this study are rife with confounders. For instance, the inclination of the road might have influenced driver behavior. Furthermore, the presence of the solid center line towards the western end of the road stretch, as well as the dashed edge line and the cyclist’s positioning to it, might have influenced driver behavior but were not accounted for in this work. To address these possible issues, future studies could conduct a simulator or test-track experiment to confirm the findings of this study for visibility, or conduct more naturalistic studies on other road stretches with limited sight distance. In such more controlled environments, different sight distances could be tested to understand their effect on lateral clearance and overtaking speed, similar to the study carried out by Figueira and Larocca (2020) for car-to-car overtaking. Furthermore, we excluded piggybacking maneuvers from the analyses in this study because we assumed these maneuvers to be fundamentally different up to the point that we may not be able to differentiate between the driver’s own behavior and that of the lead vehicle’s driver. However, as such maneuvers are common in real traffic, future work should investigate their importance from crash databases and consequently investigate driver behavior. This could also be done in a simulator or test-track experiment in which drivers can be better understood through detailed analyses of their control and gaze behavior. Future work may further investigate whether a non-linear model could fit better to the data than the linear model used in this study. Similarly, the elements of the covariance matrix of the multivariate model could be modeled to depend on the independent variables. Furthermore, while this work used only weakly informative priors, the parameter distributions from this work could serve as prior information in future studies.", "translation": "As with all naturalistic data, the ones collected in this study are rife with confounders. For instance, the inclination of the road might have influenced driver behavior. Furthermore, the presence of the solid center line towards the western end of the road stretch, as well as the dashed edge line and the cyclist’s positioning to it, might have influenced driver behavior but were not accounted for in this work. To address these possible issues, future studies could conduct a simulator or test-track experiment to confirm the findings of this study for visibility, or conduct more naturalistic studies on other road stretches with limited sight distance. In such more controlled environments, different sight distances could be tested to understand their effect on lateral clearance and overtaking speed, similar to the study carried out by Figueira and Larocca (2020) for car-to-car overtaking. Furthermore, we excluded piggybacking maneuvers from the analyses in this study because we assumed these maneuvers to be fundamentally different up to the point that we may not be able to differentiate between the driver’s own behavior and that of the lead vehicle’s driver. However, as such maneuvers are common in real traffic, future work should investigate their importance from crash databases and consequently investigate driver behavior. This could also be done in a simulator or test-track experiment in which drivers can be better understood through detailed analyses of their control and gaze behavior. Future work may further investigate whether a non-linear model could fit better to the data than the linear model used in this study. Similarly, the elements of the covariance matrix of the multivariate model could be modeled to depend on the independent variables. Furthermore, while this work used only weakly informative priors, the parameter distributions from this work could serve as prior information in future studies.", "bbox": [0.06314281489945352, 0.3276747910661622, 0.48498800676960796, 0.733202414611446], "kind": "body", "chapter_id": "chapter-015", "figure_ids": []}, {"id": "p008-b005", "page": 8, "order": 5, "source": "5. Conclusions", "translation": "5. 結論", "bbox": [0.06333394835764414, 0.7570978369189104, 0.15934219535687577, 0.767274246525895], "kind": "heading", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b006", "page": 8, "order": 6, "source": "Our results suggest that reduced sight distance due to an approaching curve has a similar effect on drivers as an oncoming vehicle. Drivers reduce lateral clearance to the cyclist under reduced visibility, however, if an oncoming vehicle is present it has a similar yet stronger effect. We found a correlation between lateral clearance and overtaking speed, however, drivers did not reduce speed as clearly as clearance. These findings suggest that cyclists may need to be better protected from motorized traffic, especially at locations with low visibility for drivers, for instance, by providing more shoulder space or separated bike lanes. At the same time, overtaking maneuvers should be ensured to follow recommendations on both objective and subjective safety of the cyclist, for instance, through traffic regulations, law enforcement,", "translation": "我々の結果は、カーブの接近による視距離の減少が、対向車と同様の影響をドライバーに与えることを示唆しています。ドライバーは視界が悪くなるとサイクリストとの横方向のクリアランスを減らしますが、対向車が存在する場合には、同様ではありますがより強力な効果が生じます。", "bbox": [0.06314419268036651, 0.7834546562876015, 0.48497847124403337, 0.9517715207101324], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b008", "page": 8, "order": 8, "source": "or active-safety systems for motorized vehicles. Such systems should aim at preventing drivers from overtaking in situations with decreased visibility or during segments where regulations forbid exiting the lane, for instance, due to solid lines. The recorded data set can be helpful for fitting and validating driver-behavior models to improve active-safety systems and enable counterfactual simulations of such systems. The fitted driver model may help improving active-safety systems by allowing more acceptable decision-making, as well as make automated driving more acceptable by providing a human reference. In fact, our study shows that while overtaking a cyclist, vehicle automation cannot just rely on a reference driver model because that would inevitably compromise cyclist safety. On the contrary, automated driving will be safer than human driving in this scenario when it factors cyclist (perceived) safety in the decision of whether and how to overtake the cyclist.", "translation": "横方向のクリアランスと追い越し速度の間には相関関係があることがわかりましたが、ドライバーはクリアランスほど明らかに速度を下げていませんでした。", "bbox": [0.5150478796169631, 0.08494979466697816, 0.9369012740897623, 0.27962341117119605], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b009", "page": 8, "order": 9, "source": "Declaration of Competing Interest", "translation": "これらの調査結果は、特にドライバーの視界が悪い場所では、路肩のスペースを増やしたり、自転車レーンを分離したりするなどして、自転車を自動車交通からより適切に保護する必要がある可能性があることを示唆しています。", "bbox": [0.5150478796169631, 0.2980902525585018, 0.7433435366874732, 0.30826668139034485], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b010", "page": 8, "order": 10, "source": "The authors declare that they have no known competing financial interests or personal relationships that could have appeared to influence the work reported in this paper.", "translation": "同時に、追い越し操作は、交通規制、法執行機関、電動車両の予防安全システムなどを通じて、サイクリストの客観的安全性と主観的安全性の両方に関する推奨事項に従うようにする必要があります。", "bbox": [0.5150468542916324, 0.3245140705584598, 0.936893891747382, 0.3609825502112927], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b011", "page": 8, "order": 11, "source": "Acknowledgments", "translation": "このようなシステムは、視界が低下した状況や、実線などで規制により車線からの逸脱が禁止されている区間でドライバーの追い越しを防止することを目的とすべきである。", "bbox": [0.5150471618892316, 0.37953453849612545, 0.6387075487116685, 0.38971094810311013], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b012", "page": 8, "order": 12, "source": "We would like to thank the team at Viscando AB for planning, conducting, and data processing of the naturalistic study. We also thank Vineet Kothari for his work on the accuracy estimation of the data. We further thank Carol Flannagan for valuable discussions about the statistical model. This work was supported by the project Modelling Interaction between Cyclists and Automobiles 2 (MICA2), funded jointly by Vinnova, the Swedish Energy Agency, the Swedish Transport Administration, and the Swedish vehicle industry through the Strategic Vehicle Research and Innovation (FFI) Program under Grant 2019-03082. The work was carried out at Viscando AB, Gothenburg, Sweden, and Chalmers University of Technology, Gothenburg, Sweden.", "translation": "記録されたデータセットは、ドライバーの行動モデルを適合および検証して、アクティブセーフティシステムとこのようなシステムの反事実的なシミュレーションを可能にします。", "bbox": [0.5150471618892316, 0.4058912809653832, 0.9368797422578197, 0.5742081453879142], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b013", "page": 8, "order": 13, "source": "Appendix", "translation": "適合したドライバーモデルは、より受け入れられる意思決定を可能にすることで予防安全システムを改善するのに役立つ可能性があるほか、人間の基準を提供することで自動運転をより受け入れられるようにする可能性があります。", "bbox": [0.5151420557485787, 0.5948892482826627, 0.5785453545482714, 0.6050656578896473], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b014", "page": 8, "order": 14, "source": "See Table A1.", "translation": "実際、私たちの調査では、サイクリストを追い越す際に、車両の自動化が参照ドライバーモデルだけに依存することはできないことが示されています。", "bbox": [0.5346663006938787, 0.6212469904445533, 0.6194762392133212, 0.631423400051538], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b015", "page": 8, "order": 15, "source": "Table A1 Parameters of the model with non-standardized variables, summarized by median and lower and upper 95% highest density interval (HDI). Prob. direction denotes the probability of direction, defined as the proportion of the parameter posterior distribution that has the same sign as the distribution median (Makowski et al., 2019).", "translation": "それはサイクリストの安全性を必然的に損なうからです。", "bbox": [0.5150470593566986, 0.646727079374134, 0.9367720830981067, 0.7087590069422501], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b016", "page": 8, "order": 16, "source": "Parameter Unit Median Lower 95% HDI Upper 95% HDI Prob. Direction (%)", "translation": "逆に、自転車を追い越すかどうか、追い越す方法を決定する際に自転車の（知覚された）安全性を考慮に入れれば、このシナリオでは自動運転の方が人間の運転よりも安全になります。", "bbox": [0.5293327633891596, 0.7186419683117429, 0.9073259699936491, 0.7483537561566648], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b017", "page": 8, "order": 17, "source": "bLC 0 NA 3.517 1.602 5.342 92.1", "translation": "競合利益の宣言著者らは、この論文で報告されている研究に影響を及ぼした可能性がある既知の競合する経済的利益や個人的関係がないことを宣言します。", "bbox": [0.5293328146554261, 0.7561419769629292, 0.8822491782530137, 0.7676265228298653], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b018", "page": 8, "order": 18, "source": "bLC vis 1/m 0.002 0.000 0.004 98.0", "translation": "謝辞自然主義的研究の計画、実施、データ処理をしていただいた Viscando AB のチームに感謝いたします。", "bbox": [0.52933260959036, 0.7687847820943053, 0.8821271645386723, 0.7803407675347818], "kind": "body", "chapter_id": "chapter-016", "figure_ids": []}, {"id": "p008-b019", "page": 8, "order": 19, "source": "bLC OP NA \u00030.585 \u00031.118 0.050 99.3", "translation": "また、データの精度推定に関する作業を行った Vineet Kothari にも感謝します。", "bbox": [0.52933260959036, 0.7814991036986552, 0.8822492807855469, 0.7929836495655913],
