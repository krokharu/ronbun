<!doctype html>

  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #192230;
      --muted: #657285;
      --line: #d7dde6;
      --blue: #2458a6;
      --green: #14796f;

      --danger: #b44a30;
      --shadow: 0 10px 28px rgba(25, 34, 48, 0.1);

    }

    body {

      color: var(--ink);

      margin: 0;
      overflow-x: hidden;
      padding-bottom: 250px;

      gap: 14px;
      grid-template-columns:

        minmax(420px, 1fr)
        8px
        minmax(240px, var(--nav-width, 320px));
      margin: 0 auto;
      max-width: 1760px;
      padding: 14px;
    }

    .paper-header {
      align-items: center;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 18px rgba(25, 34, 48, 0.06);
      display: flex;
      gap: 14px;
      justify-content: space-between;
      padding: 14px 18px;
      position: sticky;
      top: 0;
      z-index: 8;

      display: grid;
      gap: 7px;
      min-width: 0;

      line-height: 1.35;
      margin: 0;
    }

      font-size: 0.84rem;
      margin: 4px 0 0;

      flex-wrap: wrap;
      gap: 6px;
    }

      background: #edf4f8;
      border: 1px solid #d2e1eb;
      border-radius: 999px;
      color: #31475f;
      display: inline-flex;
      font-size: 0.78rem;
      min-height: 26px;
      padding: 0 9px;
      white-space: nowrap;
    }

      display: flex;
      flex: 0 0 auto;
      gap: 8px;
      justify-content: flex-end;
      position: relative;

    .menu-item,

      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);

      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 12px;
      white-space: nowrap;

    .menu-button {

    }

      border-radius: 8px;
      box-shadow: var(--shadow);
      display: none;
      gap: 6px;
      min-width: 260px;
      padding: 8px;

      right: 0;
      top: calc(100% + 8px);
      z-index: 30;

    }

      padding: 0 0 8px;

      padding: 0 2px;

      min-height: 38px;
      text-align: left;
      width: 100%;

      border-color: var(--danger);
      color: var(--danger);
    }

      align-self: stretch;
      background: transparent;
      border: 0;
      cursor: col-resize;
      min-height: calc(100vh - 92px - 250px);
      padding: 0;
      position: sticky;
      top: 78px;

      background: #c4cfdd;
      border-radius: 999px;
      content: "";

      height: 100%;
      margin: 0 auto;
      width: 3px;

    .resize-handle.active::before {

      width: 4px;

      cursor: col-resize;
      user-select: none;
    }

      align-self: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(25, 34, 48, 0.06);
      max-height: calc(100vh - 92px - 250px);
      overflow: auto;
      position: sticky;
      top: 78px;

      padding: 12px;
    }

    .right-nav h2 {

      line-height: 1.2;
      padding: 6px 9px;

      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      cursor: pointer;
      font-size: 0.78rem;
      min-height: 30px;
      padding: 0 9px;

    .mini-button:hover {
      border-color: #6b98d4;
      color: var(--blue);
    }

    .mini-button.active {
      background: #eaf3ff;
      border-color: #6b98d4;
      color: var(--blue);
      font-weight: 700;
    }

    .mini-button:disabled {

    .graph-context {

      font-size: 0.82rem;
      line-height: 1.45;
      margin: 0 0 10px;

      border: 1px solid var(--line);

      display: block;

      line-height: 1.5;
      margin-top: 8px;
    }

      padding-left: 1.2rem;
    }

      margin: 0 0 0.35rem;

      gap: 16px;
      min-width: 0;
    }

    .page-section {

      border: 1px solid var(--line);
      border-radius: 8px;

    .paragraph.heading {

    }

    .paragraph.overview-summary,

    .paragraph-figure-link,
    .related-paragraph-button {

    .nav-block h3 {

    }

<meta name="citation_abstract" content="Introduction: Cycling is popular for its ecological, economic, and health benefits. However, especially in rural areas, cyclists may need to share the road with motorized traffic, which is often perceived as a threat. Overtaking a cyclist is a particularly critical maneuver for drivers as they need to control their lateral clearance and speed when passing the cyclist, possibly in the presence of oncoming vehicles or viewobstructing curves. An overtaking vehicle can destabilize the cyclist when passing with low clearance and high speed. At the same time, the cyclist may get scared and eventually stop cycling. In this work, we investigated how visibility regarding available sight distance—an important factor for infrastructure design and regulation—affects drivers’ behavior when overtaking cyclists. Method: Using four roadsidebased traffic sensors, we collected naturalistic data that contained kinematics of drivers overtaking cyclists on a rural road in Sweden. We modeled lateral clearance and speed at the passing moment in response to variables such as sight distance and oncoming traffic with a Bayesian multivariate approach. Results: Fitted on 81 maneuvers, the model revealed that drivers reduced lateral clearance under reduced sight distance. Speed was similarly reduced, however, not as clearly. When an oncoming vehicle was present, it had a similar—yet stronger—effect than sight distance. While we found an overall correlation between clearance and speed, some maneuvers were recorded at critically low clearance. Conclusions: Cyclists’ safety is endangered when passed by drivers under reduced visibility or close to oncoming traffic. Practical Applications: Decision-making for infrastructure and policymaking should aim at prohibiting overtaking in areas with reduced visibility or close oncoming traffic. The model developed in this study may serve as a reference to vehicle active-safety systems and automated driving. The collected and processed data may support evaluating driver models fitted on less ecologically valid data and simulated active-safety systems. 2023 The Author(s)." data-zotero-connector="server">

istance. While we found an overall correlation between clearance and speed, some maneuvers were recorded at critically low clearance. Conclusions: Cyclists’ safety is endangered when passed by drivers under reduced visibility or close to oncoming traffic. Practical Applications: Decision-making for infrastructure and policymaking should aim at prohibiting overtaking in areas with reduced visibility or close oncoming traffic. The model developed in this study may serve as a reference to vehicle active-safety systems and automated driving. The collected and processed data may support evaluating driver models fitted on less ecologically valid data and simulated active-safety systems. 2023 The Author(s).", "url": "https://doi.org/10.1016/j.jsr.2023.09.006", "identifier": [{"@type": "PropertyValue", "propertyID": "DOI", "value": "10.1016/j.jsr.2023.09.006"}], "sameAs": "https://doi.org/10.1016/j.jsr.2023.09.006", "encoding": [{"@type": "MediaObject", "encodingFormat": "application/pdf", "contentUrl": "Drivers%20passing%20cyclists%20How%20does%20sight%20distance%20affect%20safety%20Results%20from%20a%20naturalistic%20study.pdf"}]}</script>

ることが明らかになりました。速度も同様に低下しましたが、それほど明確ではありませんでした。対向車が存在する場合、視距離よりも同様の、しかしより強力な効果がありました。クリアランスと速度の間に全体的な相関関係があることがわかりましたが、一部の操作は非常に低いクリアランスで記録されました。結論: 視界が悪くなったり、対向車の近くでドライバーに追い越されると、自転車の安全が危険にさらされます。実践的な応用: インフラストラクチャーに関する意思決定と政策決定は、視界の悪いエリアや対向車が接近しているエリアでの追い越しを禁止することを目的とすべきです。この研究で開発されたモデルは、車両の予防安全システムや自動運転の参考となる可能性があります。収集および処理されたデータは、生態学的に有効性が低いデータやシミュレートされたアクティブセーフティシステムに適合したドライバーモデルの評価をサポートする可能性があります。", "translation": "概要: しかし、特に田舎では、自転車は自動車交通と道路を共有する必要がある場合があり、これはしばしば脅威として認識されます。サイクリストを追い越すことは、ドライバーにとって特に重要な操作です。ドライバーは、対向車や視界を遮るカーブがある場合、サイクリストを追い越すときに横方向のクリアランスと速度を制御する必要があるからです。追い越し車は、車高が低く高速で追い越すときに自転車を不安定にする可能性があります。同時に、自転車に乗っている人は怖くなって、最終的には自転車に乗るのをやめてしまう可能性があります。この研究では、インフラ設計と規制の重要な要素である可視距離に関する視認性が、自転車を追い越す際のドライバーの行動にどのような影響を与えるかを調査しました。方法: 道路脇に設置された 4 台の交通センサーを使用して、スウェーデンの田舎道で自転車を追い越すドライバーの運動学を含む自然なデータを収集しました。ベイジアン多変量アプローチを使用して、視界距離や対向車などの変数に応じて、追い越しの瞬間の横方向のクリアランスと速度をモデル化しました。結果: このモデルを 81 の操縦に当てはめたところ、ドライバーは視距離が短くなると横方向のクリアランスが減少することが明らかになりました。速度も同様に低下しましたが、それほど明確ではありませんでした。対向車が存在する場合、視距離よりも同様の、しかしより強力な効果がありました。クリアランスと速度の間に全体的な相関関係があることがわかりましたが、一部の操作は非常に低いクリアランスで記録されました。結論: 視界が悪くなったり、対向車の近くでドライバーに追い越されると、自転車の安全が危険にさらされます。実践的な応用: インフラストラクチャーに関する意思決定と政策決定は、視界の悪いエリアや対向車が接近しているエリアでの追い越しを禁止することを目的とすべきです。この研究で開発されたモデルは、車両の予防安全システムや自動運転の参考となる可能性があります。収集および処理されたデータは、生態学的に有効性が低いデータやシミュレートされたアクティブセーフティシステムに適合したドライバーモデルの評価をサポートする可能性があります。", "bbox": [0.08, 0.2, 0.92, 0.3], "kind": "overview-summary", "chapter_id": "chapter-overview", "figure_ids": []}, {"id": "overview-03", "page": 0, "order": 3, "source": "自分の論文に入れるための情報: タイトル: Drivers passing cyclists: How does sight distance affect safety? Results from a naturalistic study / 著者: Alexander Rasch, Yury Tarakanov, Gustav Tellwe, Marco Dozza / 出版日: 16 September 2023 / 掲載誌: Journal of Safety Research / 巻・ページ/論文番号: 87 (2023) 76 / DOI: 10.1016/j.jsr.2023.09.006 / 査読: 査読付き学術誌掲載論文と推定。ただし、本文PDFだけでは査読プロセスの明記確認はできないため、投稿先誌ページで最終確認してください。", "translation": "自分の論文に入れるための情報: タイトル: Drivers passing cyclists: How does sight distance a 05", "page": 1, "order": 5, "source": "Drivers passing cyclists: How does sight distance affect safety? Results from a naturalistic study", "translation": "自転車を追い越すドライバー: 視距は安全性にどう影響するか自然観察研究の結果", "bbox": [0.06314352621890162, 0.22454561470600154, 0.8113482392395696, 0.26320463239110253], "kind": "title", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b006", "page": 1, "order": 6, "source": "Alexander Rasch a,⇑, Yury Tarakanov b, Gustav Tellwe b, Marco Dozza a", "translation": "Alexander Rasch a,⇑, Yury Tarakanov b, Gustav Tellwe b, Marco Dozza a", "bbox": [0.06333331393759582, 0.2736557075489944, 0.6358705247881626, 0.29086858832711204], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b007", "page": 1, "order": 7, "source": "a Department of Mechanics and Maritime Sciences, Chalmers University of Technology, Hörselgången 4, 41756 Göteborg, Sweden b Viscando AB, Anders Carlssons gata 14, 41755 Göteborg, Sweden", "translation": "a Department of Mechanics and Maritime Sciences, Chalmers University of Technology, Hörselgången 4, 41756 Göteborg, Sweden b Viscando AB, Anders Carlssons gata 14, 41755 Göteborg, Sweden", "bbox": [0.06323806121438302, 0.29707071987174405, 0.6913022267400335, 0.3195688025766232], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b008", "page": 1, "order": 8, "source": "a r t i c l e i n f o", "translation": "記事情報", "bbox": [0.06333331393759582, 0.3475343388651966, 0.22182318838855974, 0.35883117321543523], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b009", "page": 1, "order": 9, "source": "a b s t r a c t", "translation": "要旨", "bbox": [0.3397140183094395, 0.3478914213837484, 0.44927956540970665, 0.359188255733987], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b010", "page": 1, "order": 10, "source": "Article history: Received 20 January 2023 Received in revised form 16 June 2023 Accepted 8 September 2023 Available online 16 September 2023", "translation": "Article history: Received 20 January 2023 Received in revised form 16 June 2023 Accepted 8 September 2023 Available online 16 September 2023", "bbox": [0.06314280849117021, 0.3739992788371145, 0.2615321928571326, 0.42535345094281396], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b011", "page": 1, "order": 11, "source": "Introduction: Cycling is popular for its ecological, economic, and health benefits. However, especially in rural areas, cyclists may need to share the road with motorized traffic, which is often perceived as a threat. Overtaking a cyclist is a particularly critical maneuver for drivers as they need to control their lateral clearance and speed when passing the cyclist, possibly in the presence of oncoming vehicles or viewobstructing curves. An overtaking vehicle can destabilize the cyclist when passing with low clearance and high speed. At the same time, the cyclist may get scared and eventually stop cycling. In this work, we investigated how visibility regarding available sight distance—an important factor for infrastructure design and regulation—affects drivers’ behavior when overtaking cyclists. Method: Using four roadsidebased traffic sensors, we collected naturalistic data that contained kinematics of drivers overtaking cyclists on a rural road in Sweden. We modeled lateral clearance and speed at the passing moment in response to variables such as sight distance and oncoming traffic with a Bayesian multivariate approach. Results: Fitted on 81 maneuvers, the model revealed that drivers reduced lateral clearance under reduced sight distance. Speed was similarly reduced, however, not as clearly. When an oncoming vehicle was present, it had a similar—yet stronger—effect than sight distance. While we found an overall correlation between clearance and speed, some maneuvers were recorded at critically low clearance. Conclusions: Cyclists’ safety is endangered when passed by drivers under reduced visibility or close to oncoming traffic. Practical Applications: Decision-making for infrastructure and policymaking should aim at prohibiting overtaking in areas with reduced visibility or close oncoming traffic. The model developed in this study may serve as a reference to vehicle active-safety systems and automated driving. The collected and processed data may support evaluating driver models fitted on less ecologically valid data and simulated active-safety systems. \u0001 2023 The Author(s). Published by Elsevier Ltd. This is an open access article under the CC BY-NC-ND license (http://creativecommons.org/licenses/by-nc-nd/4.0/).", "translation": "自転車とすれ違うドライバー: 視距離は安全性にどのような影響を与えますか? 自然主義的研究の結果 Alexander Rasch a,⇑、Yury Tarakanov b、Gustav Tellwe b、Marco Dozza a a チャルマーズ工科大学機械海事科学部、Hörselgången 4、41756 Göteborg、Sweden b Viscando AB、Anders Carlssons gata 14、41755 Göteborg、Sweden 記事情報記事履歴: 2023 年 1 月 20 日に受領 2023 年 6 月 16 日に改訂版を受領 2023 年 9 月 8 日に受理 2023 年 9 月 16 日にオンラインで入手可能。しかし、特に田舎では、自転車は自動車交通と道路を共有する必要がある場合があり、これはしばしば脅威として認識されます。サイクリストを追い越すことは、ドライバーにとって特に重要な操作です。ドライバーは、対向車や視界を遮るカーブがある場合、サイクリストを追い越すときに横方向のクリアランスと速度を制御する必要があるからです。追い越し車は、車高が低く高速で追い越すときに自転車を不安定にする可能性があります。同時に、自転車に乗っている人は怖くなって、最終的には自転車に乗るのをやめてしまう可能性があります。この研究では、インフラ設計と規制の重要な要素である可視距離に関する視認性が、自転車を追い越す際のドライバーの行動にどのような影響を与えるかを調査しました。方法: 道路脇に設置された 4 台の交通センサーを使用して、スウェーデンの田舎道で自転車を追い越すドライバーの運動学を含む自然なデータを収集しました。ベイジアン多変量アプローチを使用して、視界距離や対向車などの変数に応じて、追い越しの瞬間の横方向のクリアランスと速度をモデル化しました。結果: このモデルを 81 の操縦に当てはめたところ、ドライバーは視距離が短くなると横方向のクリアランスが減少することが明らかになりました。速度も同様に低下しましたが、それほど明確ではありませんでした。対向車が存在する場合、視距離よりも同様の、しかしより強力な効果がありました。クリアランスと速度の間に全体的な相関関係があることがわかりましたが、一部の操作は非常に低いクリアランスで記録されました。結論: 視界が悪くなったり、対向車の近くでドライバーに追い越されると、自転車の安全が危険にさらされます。実践的な応用: インフラストラクチャーに関する意思決定と政策決定は、視界の悪いエリアや対向車が接近しているエリアでの追い越しを禁止することを目的とすべきです。この研究で開発されたモデルは、車両の予防安全システムや自動運転の参考となる可能性があります。収集および処理されたデータは、生態学的に有効性が低いデータやシミュレートされたアクティブセーフティシステムに適合したドライバーモデルの評価をサポートする可能性があります。 /C2112023 作成者。 Elsevier Ltd が発行。これは CC BY-NC-ND ライセンス (http://creativecommons.org/licenses/by-nc-nd/4.0/) に基づくオープンアクセス記事です。", "bbox": [0.33961876558622667, 0.37448109223648696, 0.9369789937498219, 0.64878313952241], "kind": "body", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b012", "page": 1, "order": 12, "source": "Keywords: Cyclist safety Overtaking Sight distance Naturalistic data Bayesian model", "translation": "キーワード: Cyclist safety Overtaking Sight distance Naturalistic data Bayesian model", "bbox": [0.06314280849117021, 0.4424980257992985, 0.14789843680950748, 0.5045661730005013], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b013", "page": 1, "order": 13, "source": "1. Introduction", "translation": "1. はじめに", "bbox": [0.06333331393759582, 0.6891771814465968, 0.1643494741413977, 0.6993535910535814], "kind": "heading", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b014", "page": 1, "order": 14, "source": "With a growing interest in more sustainable transportation has come an ever-increasing interest in cycling as an alternative to car driving for commuting, sports, and other leisure activities (Buehler & Pucher, 2021b). This growth received a recent push when the COVID-19 pandemic forced societies into lockdowns and social distancing (Buehler & Pucher, 2021a). Cycling has been shown to increase health benefits; however, it is still met with physical and psychological barriers in environments where it has not yet gained enough attention (Kircher et al., 2022). Rural roads present such an environment, where cyclists are often exposed to sharing the road with motorized vehicles due to an absence of separating", "translation": "With a growing interest in more sustainable transportation has come an ever-increasing interest in cycling as an alternative to car driving for commuting, sports, and other leisure activities (Buehler & Pucher, 2021b). This growth received a recent push when the COVID-19 pandemic forced societies into lockdowns and social distancing (Buehler & Pucher, 2021a). Cycling has been shown to increase health benefits; however, it is still met with physical and psychological barriers in environments where it has not yet gained enough attention (Kircher et al., 2022). Rural roads present such an environment, where cyclists are often exposed to sharing the road with motorized vehicles due to an absence of separating", "bbox": [0.0631421740711219, 0.7155340008152878, 0.4849860586514798, 0.8574941996679943], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b015", "page": 1, "order": 15, "source": "⇑Corresponding author. E-mail address: alexander.rasch@chalmers.se (A. Rasch).", "translation": "⇑Corresponding author. E-mail address: alexander.rasch@chalmers.se (A. Rasch).", "bbox": [0.07066654964286893, 0.8845403455568315, 0.3668888563746834, 0.9071399355136732], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b016", "page": 1, "order": 16, "source": "https://doi.org/10.1016/j.jsr.2023.09.006 0022-4375/\u0001 2023 The Author(s). Published by Elsevier Ltd. This is an open access article under the CC BY-NC-ND license (http://creativecommons.org/licenses/by-nc-nd/4.0/).", "translation": "https://doi.org/10.1016/j.jsr.2023.09.006 0022-4375/\u0001 2023 The Author(s). Published by Elsevier Ltd. This is an open access article under the CC BY-NC-ND license (http://creativecommons.org/licenses/by-nc-nd/4.0/).", "bbox": [0.06314280849117021, 0.9216418613446312, 0.635391595326239, 0.9513535722901197], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b017", "page": 1, "order": 17, "source": "infrastructure (Kircher et al., 2022). Rural roads were originally designed for, and are still predominantly used by, motorized traffic; however, they are being increasingly used by cyclists, for instance, for sports activity (Moll et al., 2021). Impact speeds on rural roads are often high and consequences of collisions can, as a result, become catastrophic (Hosseinpour et al., 2021; IsakssonHellman & Töreki, 2019; Isaksson-Hellman & Werneke, 2017). Overtaking maneuvers of cyclists represent a frequent and critical scenario on rural roads, which presents collision risks for all involved road users: the cyclist, the overtaking driver, and a possibly present oncoming vehicle. For the cyclist, the most common, critical scenario is being overtaken too closely or too fast. The aerodynamic effect of a combination of lateral clearance and speed of the overtaking vehicle when passing the cyclist has been shown to decrease both stability (Gromke & Ruck, 2021) and perceived safety (Llorca et al., 2017; Rasch et al., 2022) of the cyclist. While", "translation": "より持続可能な交通手段への関心の高まりに伴い、通勤、スポーツ、その他のレジャー活動における自動車運転の代替手段として自転車への関心がますます高まっています (Buehler & Pucher、2021b)。この成長は、最近、新型コロナウイルス感染症のパンデミックにより社会がロックダウンと社会的距離を置くことを余儀なくされたときに後押しされました（Buehler & Pucher、2021a）。サイクリングは健康効果を高めることが証明されています。しかし、まだ十分な注目を集めていない環境では、依然として物理的および心理的障壁に直面しています (Kircher et al., 2022)。田舎の道路はそのような環境にあり、分離されたインフラストラクチャが存在しないため、自転車利用者はしばしば電動車両と道路を共有することにさらされています (Kircher et al., 2022)。田舎の道路はもともと自動車交通用に設計されており、現在でも主に自動車交通によって使用されています。ただし、自転車に乗る人によるスポーツ活動などでの使用が増えています (Moll et al., 2021)。田舎の道路では衝突速度が速いことが多く、その結果、衝突の結果は壊滅的なものになる可能性があります（Hosseinpour et al., 2021; IsakssonHellman & Töreki, 2019; Isaksson-Hellman & Werneke, 2017）。自転車の追い越しは、田舎の道路で頻繁に発生する重大なシナリオであり、すべての人に衝突の危険をもたらします。自転車、追い越し運転者、そしておそらく存在する対向車などの道路利用者が関与します。自転車に乗っている人にとって、最も一般的かつ重大なシナリオは、追い越されすぎる、または追い越される速度が速すぎることです。サイクリストを追い越すときの横方向のクリアランスと追い越し車両の速度の組み合わせによる空気力学的影響は、サイクリストの安定性 (Gromke & Ruck, 2021) と知覚される安全性 (Llorca et al., 2017; Rasch et al., 2022) の両方を低下させることが示されています。一方、", "bbox": [0.5150458289663019, 0.6891742592681311, 0.9368784093348899, 0.897061957181319], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b001", "page": 2, "order": 1, "source": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "translation": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "bbox": [0.06314280849117021, 0.06014209996357274, 0.9367945377228468, 0.06835449804394757], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b002", "page": 2, "order": 2, "source": "a decrease in stability may result in the cyclist falling to the ground and becoming injured, a decrease in perceived safety may result in the cyclist no longer being willing to cycle (Sanders, 2015). Recent studies have shown the importance of overtaking crashes, particularly in later phases after the overtaking vehicle has steered out to pass the cyclist. Díaz Fernández et al. (2022) analyzed crashes between cyclists and motorized vehicles from various data sources, including insurance reports and crash databases. They concluded that the passing scenario is particularly dangerous and new safety countermeasures are needed. Furthermore, Gildea et al. (2021) showed through a self-reported survey among cyclists that a significant amount of side-swipe crashes and nearcrashes with lower severity of injuries remains unreported. This underlines the importance of investigating further in what situations the side-swipe risk for cyclists increases and how it can be effectively decreased. Countermeasures to overtaking crashes can be manifold: infrastructure design, for instance, typically aims at separating cyclists from motorized traffic, while policymaking can prescribe, for instance, a minimum clearance through traffic regulations. Such a regulation is already in place in many countries that have predominantly used a minimum clearance of 1.5 m (Rubie et al., 2020). In Sweden, a legal minimum clearance is not quantified; the traffic regulation says that a driver must leave a safe distance laterally between the vehicles (Ministry of Rural Affairs and Infrastructure, 2022). Vehicles themselves can be equipped with active-safety systems that can assist the driver when overtaking the cyclist, or, in the future, might overtake the cyclist autonomously. However, their effectiveness is limited by how well they are accepted by drivers (Lübbe, 2015). Detailed knowledge of driver behavior, as well as models that can predict certain behavior, may improve acceptability of such systems (Abe et al., 2018). Visibility, that is, how far drivers can look ahead to estimate the distance to approaching curves and possibly appearing oncoming traffic, has been a critical design parameter for rural roads (Lippold et al., 2017). Sight distance, for instance, determines where overtaking maneuvers should be prohibited (with traffic signs or solid lines on the road) because of possibly appearing oncoming traffic that may cause a head-on collision (Trafikverket, 2022). To date, only studies on car-to-car overtaking maneuvers have investigated the effect of visibility. For instance, Llorca et al. (2015) parametrized a microscopic traffic model of overtaking desire and duration with the available sight distance to the driver. In a simulator study, Figueira and Larocca (2020) investigated the effect of sight distance on the gap to a lead vehicle before overtaking and concluded that the speed of the overtaken vehicle had a stronger influence on driver behavior than sight distance. Bassani et al. (2019) conducted a simulator study with drivers in a virtual rural-highway environment and found that drivers tended to speed when the available sight distance increased. Previous work on overtaking of cyclists has predominantly been conducted in simulator (Bianchi Piccinini et al., 2018; Goddard et al., 2020; Huemer & Strauß, 2021) or field-test (Dozza et al., 2016; Llorca et al., 2017; López et al., 2020) environments. However, naturalistic studies have the highest ecological validity because they unobtrusively capture road users’ behavior in everyday traveling (Bärgman, 2016). Furthermore, data collected in naturalistic studies may allow the validation of driver models fitted in environments with lower ecological validity (Rasch & Dozza, 2022). Naturalistic data may further enable simulations of active-safety systems to estimate their effectiveness (Kovaceva et al., 2022). However, their existence for cyclist-overtaking studies has been scarce (Beck et al., 2019; Kovaceva et al., 2019), because of their costs in terms of instrumentation efforts and time duration to capture a desired amount of information, as well as privacy concerns.", "translation": "安定性が低下すると、自転車に乗っている人が地面に落ちて怪我をする可能性があり、安全性の認識が低下すると、自転車に乗る意欲がなくなる可能性があります (Sanders, 2015)。最近の研究では、追い越し事故、特に追い越し車両が自転車を追い越すためにハンドルを切った後の段階での衝突の重要性が示されています。ディアス・フェルナンデス他(2022) は、保険報告書や事故データベースなどのさまざまなデータソースから、自転車と電動車両との衝突事故を分析しました。彼らは、追い越しシナリオは特に危険であり、新たな安全対策が必要であると結論付けた。さらに、Gildea ら。 (2021) は、サイクリストを対象とした自己申告調査を通じて、かなりの量の横滑り事故および負傷の重度が低いニア事故が依然として報告されていないことを示しました。これは、どのような状況で自転車に乗る人の横スワイプのリスクが増加するのか、またそれを効果的に軽減するにはどうすればよいのかをさらに調査することの重要性を強調しています。追い越し事故への対策は多岐にわたります。たとえば、インフラ設計は通常、自転車利用者を自動車交通から分離することを目的としていますが、政策決定では、たとえば交通規制を通じて最小限の車間距離を規定することもあります。このような規制は、主に 1.5 m の最小空間距離を使用している多くの国ですでに導入されています (Rubie et al., 2020)。スウェーデンでは、法定最低許可量は数値化されていません。交通規制では、ドライバーは車両間で横方向に安全な距離を離れなければならないと規定されています (農村省、2022 年)。車両自体に、自転車の追い越し時にドライバーを支援するアクティブセーフティシステムを装備することができ、将来的には自律的に自転車を追い越せるようになる可能性もあります。ただし、その有効性はドライバーにどれだけ受け入れられるかによって制限されます (Lübbe、2015)。ドライバーの行動に関する詳細な知識、および特定の行動を予測できるモデルがあれば、そのようなシステムの受け入れ可能性が向上する可能性があります (Abe et al., 2018)。視認性、つまり、ドライバーが接近するカーブや出現する可能性のある対向車までの距離を推定するためにどこまで前方を確認できるかは、田舎の道路にとって重要な設計パラメーターです (Lippold et al., 2017)。たとえば、正面衝突を引き起こす可能性のある対向車が現れる可能性があるため、追い越し操作を禁止する必要がある場所（交通標識または道路上の実線）は、見通し距離によって決まります（Trafikverket、2022）。これまで、視界の影響を調査したのは、車から車への追い越し操作に関する研究のみでした。たとえば、Llorca et al. (2015) は、ドライバーまでの有効な視距離を使用して、追い越しの欲求と持続時間の微視的な交通モデルをパラメーター化しました。 Figueira and Larocca (2020) はシミュレーター研究で、追い越し前の先行車両との間隔に対する視距離の影響を調査し、追い越された車両の速度が視距離よりもドライバーの行動に強い影響を与えると結論付けました。バッサーニら。 (2019) は、仮想の田舎の高速道路環境でドライバーを対象としたシミュレーター研究を実施し、利用可能な視距離が増加するとドライバーがスピードを落とす傾向があることを発見しました。サイクリストの追い越しに関するこれまでの研究は、主にシミュレーター (Bianchi Piccinini et al., 2018; Goddard et al., 2020; Huemer & Strauß, 2021) またはフィールドテスト (Dozza et al., 2016; Llorca et al., 2017; López et al., 2020）環境。しかし、自然主義的研究は、日常の移動における道路利用者の行動を目立たないように捉えるため、生態学的妥当性が最も高くなります（Bärgman、2016）。さらに、自然主義的研究で収集されたデータにより、生態学的妥当性が低い環境に適合したドライバーモデルの検証が可能になる可能性があります (Rasch & Dozza、2022)。さらに、自然主義的なデータにより、アクティブセーフティシステムのシミュレーションでその有効性を推定できる可能性があります (Kovaceva et al., 2022)。", "bbox": [0.06313725250953502, 0.08496317516837323, 0.48501005126421587, 0.9517815176364621], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b004", "page": 2, "order": 4, "source": "Previous research has explored the effect of sight distance on driver behavior when overtaking cars (Figueira & Larocca, 2020; Llorca et al., 2015), but not when overtaking cyclists. However, to increase cyclist activity on rural roads, cyclists’ physical and psychological safety must be guaranteed; therefore, detailed information on driver behavior is needed. Furthermore, naturalistic data for cyclist-overtaking maneuvers have been scarce in previous work, despite their importance in understanding drivers’ realistic behavior and developing effective countermeasures to overtaking crashes. The aim of this study was to model driver behavior when overtaking cyclists in a novel, naturalistic, study based on a set of roadside-based traffic sensors, investigating, among others, the effect of visibility in terms of sight distance. Another aim of this study was to provide a naturalistic data set that could be used by future studies to validate driver (and possibly cyclist) models, fitted on less ecologically valid data, and to evaluate simulated active-safety systems.", "translation": "しかし、希望する量の情報を取得するための計測作業や時間の面でコストがかかり、またプライバシー上の懸念があるため、自転車による追い越しの研究にはその存在はほとんどありません（Beck et al., 2019; Kovaceva et al., 2019）。前の研究では、車を追い越すときのドライバーの行動に対する視距離の影響が調査されていますが（Figueira & Larocca、2020; Llorca et al.、2015）、自転車を追い越すときは調査されていません。しかし、田舎道での自転車の活動を増やすには、自転車の身体的および心理的安全が保証されなければなりません。したがって、ドライバーの動作に関する詳細な情報が必要です。さらに、自転車の追い越し操作に関する自然主義的なデータは、ドライバーの現実的な行動を理解し、追い越し衝突に対する効果的な対策を開発する上で重要であるにもかかわらず、これまでの研究では不足していました。この研究の目的は、道路脇に設置された一連の交通センサーに基づいた斬新で自然主義的な研究で、自転車を追い越すときのドライバーの行動をモデル化し、とりわけ視距離の観点からの視認性の影響を調査することでした。この研究のもう 1 つの目的は、生態学的に妥当性が低いデータに適合させたドライバー (および場合によってはサイクリスト) モデルを検証し、シミュレートされたアクティブセーフティシステムを評価するために、将来の研究で使用できる自然主義的なデータセットを提供することでした。", "bbox": [0.5150465466940333, 0.08495979159330781, 0.9368557496450837, 0.3059901505667834], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b005", "page": 2, "order": 5, "source": "2. Method", "translation": "2. 方法", "bbox": [0.5151414405533804, 0.34424238947455926, 0.5827591340594414, 0.35441879908154394], "kind": "heading", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b006", "page": 2, "order": 6, "source": "2.1. Naturalistic-data collection", "translation": "2.1. 自然観察データの収集", "bbox": [0.5151414405533804, 0.37059913194381694, 0.7058764060542589, 0.3807755415508017], "kind": "heading", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p002-b007", "page": 2, "order": 7, "source": "We collected naturalistic data from smart traffic sensors over seven consecutive days in August and September 2021 on the two-lane rural road Spårhagavägen in Mölndal, Sweden (Fig. 1, a). The investigated road stretch was straight and had a speed limit of 70 km/h (GPS coordinates of the center of the road stretch: 57.559778\u0003 latitude, 12.013694\u0003 longitude). The road had a lane width of about 3.6 m and connected two curve elements. The curve element at the western end of the observed road stretch (Fig. 1, b) was closer to the locations of the sensors than the curve at the eastern end (Fig. 1, c), resulting in a decreased sight distance for drivers. Furthermore, a solid line prohibited crossing the center line towards the western end of the road (see the red-shaded area in Fig. 1, d). The dashed line marks the edge of the lane and simultaneously the beginning of the road shoulder (Fig. 1, c). The data were collected using Viscando’s proprietary data collection system consisting of four infrastructure-based sensors OTUS3D.1 The sensors use 3D vision and artificial intelligence to detect, track, and classify vehicles, cyclists, and pedestrians, covering a road stretch of approximately 150 meters in length (Fig. 2). Vision data are processed in the embedded computational unit and removed within 20 ms from being captured. Thus, fully anonymous data comprising object positions, velocities, 3D rectangular bounding boxes, and road-user types are stored (Fig. 2), ensuring full compliance with the General Data Protection Regulation of the European Union (GDPR2) because personal information is neither stored in the sensors nor transmitted. Furthermore, in customized sensors used in research and development projects, there is also a possibility to store low-resolution and anonymized video, where identification of persons and vehicles is impossible (hence GDPR compliance is preserved), which was done for annotation purposes in this study. The sensors were installed on light posts in a way to cover the whole road stretch in both directions. The object data from all sensors were fused and filtered in postprocessing, yielding complete trajectories for vehicles and cyclists on the entire measurement stretch.", "translation": "We collected naturalistic data from smart traffic sensors over seven consecutive days in August and September 2021 on the two-lane rural road Spårhagavägen in Mölndal, Sweden (Fig. 1, a). The investigated road stretch was straight and had a speed limit of 70 km/h (GPS coordinates of the center of the road stretch: 57.559778\u0003 latitude, 12.013694\u0003 longitude). The road had a lane width of about 3.6 m and connected two curve elements. The curve element at the western end of the observed road stretch (Fig. 1, b) was closer to the locations of the sensors than the curve at the eastern end (Fig. 1, c), resulting in a decreased sight distance for drivers. Furthermore, a solid line prohibited crossing the center line towards the western end of the road (see the red-shaded area in Fig. 1, d). The dashed line marks the edge of the lane and simultaneously the beginning of the road shoulder (Fig. 1, c). The data were collected using Viscando’s proprietary data collection system consisting of four infrastructure-based sensors OTUS3D.1 The sensors use 3D vision and artificial intelligence to detect, track, and classify vehicles, cyclists, and pedestrians, covering a road stretch of approximately 150 meters in length (Fig. 2). Vision data are processed in the embedded computational unit and removed within 20 ms from being captured. Thus, fully anonymous data comprising object positions, velocities, 3D rectangular bounding boxes, and road-user types are stored (Fig. 2), ensuring full compliance with the General Data Protection Regulation of the European Union (GDPR2) because personal information is neither stored in the sensors nor transmitted. Furthermore, in customized sensors used in research and development projects, there is also a possibility to store low-resolution and anonymized video, where identification of persons and vehicles is impossible (hence GDPR compliance is preserved), which was done for annotation purposes in this study. The sensors were installed on light posts in a way to cover the whole road stretch in both directions. The object data from all sensors were fused and filtered in postprocessing, yielding complete trajectories for vehicles and cyclists on the entire measurement stretch.", "bbox": [0.5150461365639011, 0.3969568741057077, 0.9368894828484604, 0.8683948481378456], "kind": "body", "chapter_id": "chapter-003", "figure_ids": ["fig-003-01", "fig-004-01"]}, {"id": "p002-b008", "page": 2, "order": 8, "source": "1 Viscando AB (https://viscando.com/, retrieved June 12, 2023). 2 Regulation (EU) 2016/679 of the European Parliament and of the Council of 27 April 2016 on the protection of natural persons with regard to the processing of personal data and on the free movement of such data, and repealing Directive 95/46/ EC (General Data Protection Regulation) [2016] OJ L 119/1 (https://eur-lex.europa.eu/ eli/reg/2016/679/oj, retrieved June 12, 2023).", "translation": "1 Viscando AB (https://viscando.com/, retrieved June 12, 2023). 2 Regulation (EU) 2016/679 of the European Parliament and of the Council of 27 April 2016 on the protection of natural persons with regard to the processing of personal data and on the free movement of such data, and repealing Directive 95/46/ EC (General Data Protection Regulation) [2016] OJ L 119/1 (https://eur-lex.europa.eu/ eli/reg/2016/679/oj, retrieved June 12, 2023).", "bbox": [0.5150475207530973, 0.8853697828444593, 0.9367871553804664, 0.9513303486612616], "kind": "body", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p003-b001", "page": 3, "order": 1, "source": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "translation": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "bbox": [0.06314280849117021, 0.060213616436546394, 0.9367945377228468, 0.06835449804394757], "kind": "metadata", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p003-b002", "page": 3, "order": 2, "source": "Fig. 1. Setup for the naturalistic study. Panel a shows how the four sensors were installed on two light poles. Panel b and c show the view from the center of the observed road stretch towards the westbound and eastbound directions, respectively. Panel d shows the road layout and how the four sensors were oriented to cover the desired road stretch. The street images in panel b and c were obtained from eniro (Eniro Group AB (https://www.eniro.se/, retrieved June 12, 2023)).", "translation": "図 1. Setup for the naturalistic study. Panel a shows how the four sensors were installed on two light poles. Panel b and c show the view from the center of the observed road stretch towards the westbound and eastbound directions, respectively. Panel d shows the road layout and how the four sensors were oriented to cover the desired road stretch. The street images in panel b and c were obtained from eniro (Eniro Group AB (https://www.eniro.se/, retrieved June 12, 2023)).", "bbox": [0.06314280208288689, 0.43599921624097576, 0.4849243853328442, 0.4980673634421786], "kind": "figure-caption", "chapter_id": "chapter-003", "figure_ids": ["fig-003-01"]}, {"id": "p003-b003", "page": 3, "order": 3, "source": "2.2. Data post-processing and validation", "translation": "2.2. データ後処理と検証", "bbox": [0.06333331393759582, 0.5296772215496512, 0.3089049658761477, 0.5398536311566359], "kind": "heading", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p003-b004", "page": 3, "order": 4, "source": "We identified overtaking maneuvers by the following criteria: (1) a car and a bicycle traveled in the same direction, and (2) there was a passing moment when the car and bicycle were exactly next to each other. We focused on cars because trucks and buses were not common on the observed part of the road. We excluded events from the further analyses where multiple cyclists were overtaken since they presented a substantial minority in the data that would have been hard to capture and might have confounded the results for our variables of interest. To further narrow the scope and reduce the complexity of the modeling, we did not consider piggybacking maneuvers in the data since they involved a lead vehicle that might have influenced the behavior of the following vehicle’s driver. We identified piggybacking vehicles with the definition from Dozza et al. (2016), that is, when the distance to the lead vehicle at the passing moment was less or equal to 60 m. We manually reviewed the recorded anonymized videos from the sensors for all of the found overtaking events. This was done to verify that the cyclist was correctly classified and was not, for instance, a motorized scooter. Furthermore, we confirmed that the bounding boxes qualitatively matched the actual road-user dimensions by visually verifying that the road user was well enclosed within the cuboidal box, without clear gaps or excesses. Based on Viscando data collected alongside accurate differential GNSS ground truth in earlier measurements, we expect the error of the lateral positions on average (standard deviation) to be 0.00 (0.39) m and 0.00 (0.11) m for cars and bicycles, respectively. The error of the bounding-box widths was estimated to be 0.05 (0.09) m and 0.27 (0.07) m for cars and bicycles, respectively. Bicycle widths were, therefore, slightly overestimated, which may have resulted, on average, in shorter lateral clearances; however, we", "translation": "We identified overtaking maneuvers by the following criteria: (1) a car and a bicycle traveled in the same direction, and (2) there was a passing moment when the car and bicycle were exactly next to each other. We focused on cars because trucks and buses were not common on the observed part of the road. We excluded events from the further analyses where multiple cyclists were overtaken since they presented a substantial minority in the data that would have been hard to capture and might have confounded the results for our variables of interest. To further narrow the scope and reduce the complexity of the modeling, we did not consider piggybacking maneuvers in the data since they involved a lead vehicle that might have influenced the behavior of the following vehicle’s driver. We identified piggybacking vehicles with the definition from Dozza et al. (2016), that is, when the distance to the lead vehicle at the passing moment was less or equal to 60 m. We manually reviewed the recorded anonymized videos from the sensors for all of the found overtaking events. This was done to verify that the cyclist was correctly classified and was not, for instance, a motorized scooter. Furthermore, we confirmed that the bounding boxes qualitatively matched the actual road-user dimensions by visually verifying that the road user was well enclosed within the cuboidal box, without clear gaps or excesses. Based on Viscando data collected alongside accurate differential GNSS ground truth in earlier measurements, we expect the error of the lateral positions on average (standard deviation) to be 0.00 (0.39) m and 0.00 (0.11) m for cars and bicycles, respectively. The error of the bounding-box widths was estimated to be 0.05 (0.09) m and 0.27 (0.07) m for cars and bicycles, respectively. Bicycle widths were, therefore, slightly overestimated, which may have resulted, on average, in shorter lateral clearances; however, we", "bbox": [0.06314218688768852, 0.5560339640189089, 0.48497790731510154, 0.9484189361163341], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p003-b006", "page": 3, "order": 6, "source": "expect this systematic bias not to have affected the general trends in driver behavior (for instance, the signs of model coefficients).", "translation": "expect this systematic bias not to have affected the general trends in driver behavior (for instance, the signs of model coefficients).", "bbox": [0.5150458802325684, 0.08495417793467655, 0.9367628551701312, 0.10827332550138238], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p003-b007", "page": 3, "order": 7, "source": "2.3. Statistical modeling", "translation": "2.3. 統計モデリング", "bbox": [0.5151407740919155, 0.12809683630348423, 0.6603768767811182, 0.13827325552289807], "kind": "heading", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p003-b008", "page": 3, "order": 8, "source": "To quantify the effect of sight distance and other variables of interest on cyclist safety, we modeled drivers’ choice of lateral clearance and overtaking speed at the moment of passing, as a function of certain input variables to the driver.", "translation": "To quantify the effect of sight distance and other variables of interest on cyclist safety, we modeled drivers’ choice of lateral clearance and overtaking speed at the moment of passing, as a function of certain input variables to the driver.", "bbox": [0.5150459314988349, 0.15445357877274196, 0.9367658286135899, 0.20420075458337925], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p003-b009", "page": 3, "order": 9, "source": "2.3.1. Model variables The dependent variables for the model were the lateral clearance between the ego vehicle and the cyclist at the moment of passing (LC), and the speed of the ego vehicle (Vego) at that same time. While Vego was directly obtained from the data, LC was calculated from the positions of ego vehicle and cyclist, considering their widths (Fig. 3, a). The independent variables consisted of a set of metrics that were, based on previous work, assumed to influence driver behavior and cyclist safety. The sight distance (dvis) was estimated from a set of interpolated, manual distance measurements made in Google Maps3: Thirteen points were distributed equally spaced over the road stretch. Then, for each point, and each direction (westbound and eastbound), we measured the sight distance as the distance from the point to the maximum-visible point on the road, given a straight line-of-sight, approximately tangent to the visual obstruction (road-side vegetation, Fig. 3, b). We then fitted a quadratic and linear function to the measurements for the westbound and eastbound direction, respectively, to be able to interpolate the sight distance at arbitrary locations on the road. The same procedure was done for the on-road distance, that is, the distance that a vehicle would need to travel to the intersection of the (possibly curved) road and the (straight) line-of-sight (Fig. 3, b). The presence of an oncoming vehicle was assessed in the following way: If an oncoming vehicle was visible to the driver at the passing moment, it was marked as present (OP ¼ 1), otherwise it was marked as absent (OP ¼ 0). An oncoming vehicle was estimated to be visible to the driver if its on-road distance at the passing moment was lower than the on-road sight distance at that moment (Fig. 3 b). To know how much distance the oncoming vehicle had covered, we extrapolated its position, assuming a constant speed at the speed limit (70 km/h). This estimation was done because of the limited detection range of the sensor system, as illustrated in Fig. 3 b. The estimated presence of oncoming vehicles outside of the detection range was verified in the manual review of the anonymized videos that allowed a manual identification of vehicles at farther distances. The distance to the oncoming vehicle at the passing moment is denoted by donc. The speed of the cyclist Vcyc and the width of the ego vehicle Wego were obtained from the sensor data. To be able to compare the coefficients for different variables, we standardized all continuous independent variables by subtracting their mean and dividing by one standard deviation. Table 1 summarizes, and Fig. 3 visualizes the independent variables and their definitions.", "translation": "2.3.1. Model variables The dependent variables for the model were the lateral clearance between the ego vehicle and the cyclist at the moment of passing (LC), and the speed of the ego vehicle (Vego) at that same time. While Vego was directly obtained from the data, LC was calculated from the positions of ego vehicle and cyclist, considering their widths (Fig. 3, a). The independent variables consisted of a set of metrics that were, based on previous work, assumed to influence driver behavior and cyclist safety. The sight distance (dvis) was estimated from a set of interpolated, manual distance measurements made in Google Maps3: Thirteen points were distributed equally spaced over the road stretch. Then, for each point, and each direction (westbound and eastbound), we measured the sight distance as the distance from the point to the maximum-visible point on the road, given a straight line-of-sight, approximately tangent to the visual obstruction (road-side vegetation, Fig. 3, b). We then fitted a quadratic and linear function to the measurements for the westbound and eastbound direction, respectively, to be able to interpolate the sight distance at arbitrary locations on the road. The same procedure was done for the on-road distance, that is, the distance that a vehicle would need to travel to the intersection of the (possibly curved) road and the (straight) line-of-sight (Fig. 3, b). The presence of an oncoming vehicle was assessed in the following way: If an oncoming vehicle was visible to the driver at the passing moment, it was marked as present (OP ¼ 1), otherwise it was marked as absent (OP ¼ 0). An oncoming vehicle was estimated to be visible to the driver if its on-road distance at the passing moment was lower than the on-road sight distance at that moment (Fig. 3 b). To know how much distance the oncoming vehicle had covered, we extrapolated its position, assuming a constant speed at the speed limit (70 km/h). This estimation was done because of the limited detection range of the sensor system, as illustrated in Fig. 3 b. The estimated presence of oncoming vehicles outside of the detection range was verified in the manual review of the anonymized videos that allowed a manual identification of vehicles at farther distances. The distance to the oncoming vehicle at the passing moment is denoted by donc. The speed of the cyclist Vcyc and the width of the ego vehicle Wego were obtained from the sensor data. To be able to compare the coefficients for different variables, we standardized all continuous independent variables by subtracting their mean and dividing by one standard deviation. Table 1 summarizes, and Fig. 3 visualizes the independent variables and their definitions.", "bbox": [0.5150453163036366, 0.2239529699983782, 0.9368556471125505, 0.8024675797756644], "kind": "body", "chapter_id": "chapter-006", "figure_ids": ["fig-005-01"]}, {"id": "p003-b010", "page": 3, "order": 10, "source": "2.3.2. Model specification We modeled LC and Vego with a Bayesian regression model. In contrast to their frequentist counterparts, Bayesian methods aim at estimating model parameters’ full uncertainty as a probability distribution that practitioners can use to draw inferences with different methods of effect existence (Makowski et al., 2019). To account for the possible correlation between LC and Vego, we modeled both metrics jointly, as sampled from a Multivariate Normal", "translation": "2.3.2. Model specification We modeled LC and Vego with a Bayesian regression model. In contrast to their frequentist counterparts, Bayesian methods aim at estimating model parameters’ full uncertainty as a probability distribution that practitioners can use to draw inferences with different methods of effect existence (Makowski et al., 2019). To account for the possible correlation between LC and Vego, we modeled both metrics jointly, as sampled from a Multivariate Normal", "bbox": [0.5150473156880312, 0.8223200912765514, 0.936842728013385, 0.9254252365638042], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p003-b011", "page": 3, "order": 11, "source": "3 Google Maps (https://www.google.com/maps/, retrieved June 12, 2023).", "translation": "3 Google Maps (https://www.google.com/maps/, retrieved June 12, 2023).", "bbox": [0.524285189319145, 0.9397267624715693, 0.8945607721602026, 0.9513315021527612], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b001", "page": 4, "order": 1, "source": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "translation": "A. Rasch, Y. Tarakanov, G. Tellwe et al. Journal of Safety Research 87 (2023) 76–85", "bbox": [0.06314273800005372, 0.06013894708680723, 0.9367945377228468, 0.06835134516718205], "kind": "metadata", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b002", "page": 4, "order": 2, "source": "(a) Sensor 3 anonymized video snapshot", "translation": "(MVNormal) 分布、分布平均 l = lLC をパラメータ化します。", "bbox": [0.20298079760467597, 0.08868090710879124, 0.4726336567961331, 0.0996139494649222], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b003", "page": 4, "order": 3, "source": "(b)", "translation": "lV /C2/C3 T は次のようになります: LCs i Vs ego;i!", "bbox": [0.20298079760467597, 0.35707675109429815, 0.22111817469123865, 0.3677307830815402], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b004", "page": 4, "order": 4, "source": "Sensors 1 & 2 Sensors 3 & 4", "translation": "/C24 MVNormal lLC;i lV;i!", "bbox": [0.34902835557708284, 0.4327341816519952, 0.6399190731223063, 0.44334184328095433], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p004-b005", "page": 4, "order": 5, "source": "Fig. 2. Data snapshot for an example overtaking maneuver. Panel a shows the anonymized video feed of sensor 3. Panel b shows the top view of the road with the stitched and rectified images from the four sensors, showing sensor locations and orientations, as well as the tracking outputs for the detected and classified road users (ego vehicle in blue, cyclist in yellow) with their positions, and speeds, and bounding boxes (shown for every second; black dots mark the geometrical center). A video version of the overtaking event is available at https://youtu.be/uLjw1yHNjwQ.", "translation": "図 2. 追い越し操作の例のデータスナップショット。", "bbox": [0.063142763633187, 0.4568563034888427, 0.9368197607259795, 0.49742502247578185], "kind": "figure-caption", "chapter_id": "chapter-007", "figure_ids": ["fig-004-01"]}, {"id": "p004-b006", "page": 4, "order": 6, "source": "(MVNormal) distribution, parametrizing the distribution mean l ¼ lLC; lV \u0001 \u0003T as follows:", "translation": "; r2 LC q rLC rV q rLC rV r2 V!", "bbox": [0.063142
