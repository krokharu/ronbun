<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新ビューア: Micro-level hotspot identification at intersections using traffic conflict analysis</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #192230;
      --muted: #657285;
      --line: #d7dde6;
      --blue: #2458a6;
      --green: #14796f;
      --mark: #fff1a8;
      --soft: #eef4f7;
      --danger: #b44a30;
      --shadow: 0 10px 28px rgba(25, 34, 48, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      margin: 0;
      overflow-x: hidden;
      padding-bottom: 250px;
    }

    button {
      font: inherit;
    }

    img {
      max-width: 100%;
    }

    .reader {
      display: grid;
      gap: 14px;
      grid-template-columns:
        minmax(260px, var(--graph-width, 34vw))
        8px
        minmax(420px, 1fr)
        8px
        minmax(240px, var(--nav-width, 320px));
      margin: 0 auto;
      max-width: 1760px;
      padding: 14px;
    }

    .paper-header {
      align-items: center;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 18px rgba(25, 34, 48, 0.06);
      display: flex;
      gap: 14px;
      justify-content: space-between;
      padding: 14px 18px;
      position: sticky;
      top: 0;
      z-index: 8;
    }

    .paper-title {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .paper-header h1 {
      font-size: 1.08rem;
      line-height: 1.35;
      margin: 0;
    }

    .paper-header p {
      color: var(--muted);
      font-size: 0.84rem;
      margin: 4px 0 0;
    }

    .reader-status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .status-chip {
      align-items: center;
      background: #edf4f8;
      border: 1px solid #d2e1eb;
      border-radius: 999px;
      color: #31475f;
      display: inline-flex;
      font-size: 0.78rem;
      min-height: 26px;
      padding: 0 9px;
      white-space: nowrap;
    }

    .header-actions {
      align-items: center;
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
      justify-content: flex-end;
      position: relative;
    }

    .header-button,
    .menu-button,
    .menu-item,
    .close-button {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 12px;
      white-space: nowrap;
    }

    .menu-button {
      min-width: 88px;
    }

    .header-menu {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: none;
      gap: 6px;
      min-width: 190px;
      padding: 8px;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      z-index: 30;
    }

    .header-actions.menu-open .header-menu {
      display: grid;
    }

    .menu-section {
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 6px;
      padding: 0 0 8px;
    }

    .menu-section-title {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      padding: 0 2px;
    }

    .segmented-control {
      display: grid;
      gap: 4px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .menu-choice {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      cursor: pointer;
      font-size: 0.78rem;
      min-height: 34px;
      padding: 0 8px;
      white-space: nowrap;
    }

    .menu-choice:hover {
      border-color: #8aa8cf;
      color: var(--blue);
    }

    .menu-choice.active {
      background: #eaf3ff;
      border-color: #6b98d4;
      color: var(--blue);
      font-weight: 700;
    }

    .menu-item {
      align-items: center;
      display: flex;
      justify-content: space-between;
      min-height: 38px;
      text-align: left;
      width: 100%;
    }

    .menu-item.danger,
    .close-button {
      border-color: #d8aaa1;
      color: var(--danger);
    }

    .header-button:hover,
    .menu-button:hover,
    .menu-item:hover {
      border-color: #8aa8cf;
      color: var(--blue);
    }

    .menu-item.danger:hover,
    .close-button:hover {
      background: #fff2ef;
      border-color: var(--danger);
      color: var(--danger);
    }

    .resize-handle {
      align-self: stretch;
      background: transparent;
      border: 0;
      cursor: col-resize;
      min-height: calc(100vh - 92px - 250px);
      padding: 0;
      position: sticky;
      top: 78px;
    }

    .resize-handle::before {
      background: #c4cfdd;
      border-radius: 999px;
      content: "";
      display: block;
      height: 100%;
      margin: 0 auto;
      width: 3px;
    }

    .resize-handle:hover::before,
    .resize-handle.active::before {
      background: var(--blue);
      width: 4px;
    }

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }

    .graph-pane,
    .right-nav {
      align-self: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(25, 34, 48, 0.06);
      max-height: calc(100vh - 92px - 250px);
      overflow: auto;
      position: sticky;
      top: 78px;
    }

    .graph-pane {
      padding: 12px;
    }

    .graph-pane h2,
    .right-nav h2 {
      font-size: 0.96rem;
      margin: 0 0 10px;
    }

    .active-figure {
      background: #fafbfc;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 0 0 12px;
      padding: 10px;
    }

    .mobile-page-figure {
      display: none;
    }

    .graph-toolbar {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin: 0 0 10px;
    }

    .graph-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .graph-status {
      background: #eef4f7;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #32465f;
      font-size: 0.78rem;
      line-height: 1.2;
      padding: 6px 9px;
    }

    .mini-button {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      cursor: pointer;
      font-size: 0.78rem;
      min-height: 30px;
      padding: 0 9px;
    }

    .mini-button:hover {
      border-color: #6b98d4;
      color: var(--blue);
    }

    .mini-button.active {
      background: #eaf3ff;
      border-color: #6b98d4;
      color: var(--blue);
      font-weight: 700;
    }

    .mini-button:disabled {
      color: #aeb8c6;
      cursor: not-allowed;
    }

    .graph-context {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
      margin: 0 0 10px;
    }

    .active-figure img {
      background: #fff;
      border: 1px solid var(--line);
      cursor: pointer;
      display: block;
      height: auto;
      max-height: 42vh;
      object-fit: contain;
      width: 100%;
    }

    figcaption {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.5;
      margin-top: 8px;
    }

    .summary-list {
      margin: 0;
      padding-left: 1.2rem;
    }

    .summary-list li {
      margin: 0 0 0.35rem;
    }

    .content {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .page-section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(25, 34, 48, 0.045);
      padding: 18px 20px;
      scroll-margin-top: 88px;
    }

    .overview-section {
      border-color: #b8d5d0;
      box-shadow: 0 8px 22px rgba(20, 121, 111, 0.08);
    }

    .quiz-section {
      border-color: #c9d8ec;
      box-shadow: 0 8px 22px rgba(36, 88, 166, 0.08);
    }

    .page-heading {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin: 0 0 14px;
      padding-bottom: 8px;
    }

    .page-heading h2 {
      font-size: 1.02rem;
      margin: 0;
    }

    .page-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .paragraph {
      border-left: 3px solid transparent;
      line-height: 1.82;
      margin: 0 0 1rem;
      padding: 3px 0 3px 10px;
      text-align: justify;
    }

    body.paragraph-guide-lines .paragraph:not(.title):not(.overview-summary):not(.overview-info):not(.overview-note) {
      border-bottom: 1px solid #dfe6ef;
      margin-bottom: 0.82rem;
      padding-bottom: 0.82rem;
    }

    body.paragraph-guide-zebra .page-section:not(.overview-section) .paragraph:not(.title):not(.heading):not(.metadata) {
      background: #f8fbff;
      border-radius: 6px;
      padding: 7px 10px;
      text-align: left;
    }

    body.paragraph-guide-zebra .page-section:not(.overview-section) .paragraph:not(.title):not(.heading):not(.metadata):nth-of-type(even) {
      background: #f7faf7;
    }

    body.paragraph-guide-zebra .paragraph.linked-to-figure {
      background: #eef6ff;
    }

    .paragraph.title {
      background: #f7fbff;
      border-left-color: #7aa5d8;
      font-size: 1.02rem;
      font-weight: 700;
      padding: 8px 10px;
      text-align: left;
    }

    .paragraph.heading {
      color: #26384d;
      font-weight: 700;
    }

    .paragraph.overview-summary,
    .paragraph.overview-info,
    .paragraph.overview-note {
      background: #f7fbfa;
      border-left-color: #62a79d;
      line-height: 1.78;
      padding: 10px 12px;
      text-align: left;
    }

    .paragraph.overview-info {
      background: #f8fafc;
      border-left-color: #6f94c3;
      overflow-wrap: anywhere;
    }

    .paragraph.overview-note {
      background: #fffdf4;
      border-left-color: #d0a742;
      color: #4c5563;
      font-size: 0.92rem;
    }

    .paragraph.metadata {
      background: #f7f8fa;
      border-left-color: #c5ceda;
      color: #6a7482;
      font-size: 0.8rem;
      line-height: 1.55;
      padding: 5px 8px;
      text-align: left;
    }

    body.hide-metadata .paragraph.metadata {
      display: none;
    }

    .paragraph.figure-caption,
    .paragraph.table-caption {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .paragraph.selected {
      background: #fff8ce;
      border-left-color: #d99a16;
    }

    .paragraph.linked-to-figure {
      border-left-color: #5d8fc9;
      background: #f7fbff;
    }

    .paragraph.focused-link {
      box-shadow: inset 0 0 0 2px rgba(36, 88, 166, 0.22);
    }

    .paragraph mark {
      background: var(--mark);
      padding: 0.08rem 0.12rem;
    }

    .paragraph-links {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-left: 8px;
      vertical-align: baseline;
    }

    .paragraph-figure-link,
    .related-paragraph-button {
      background: #fff;
      border: 1px solid #b7cde8;
      border-radius: 999px;
      color: var(--blue);
      cursor: pointer;
      font-size: 0.76rem;
      min-height: 26px;
      padding: 0 8px;
    }

    .paragraph-figure-link:hover,
    .related-paragraph-button:hover {
      background: #eaf3ff;
      border-color: #6b98d4;
    }

    .related-paragraphs {
      display: grid;
      gap: 7px;
      margin: 0 0 12px;
    }

    .related-paragraph-button {
      border-radius: 8px;
      color: var(--ink);
      line-height: 1.45;
      min-height: 34px;
      padding: 7px 9px;
      text-align: left;
      width: 100%;
    }

    .related-paragraph-button strong {
      color: var(--blue);
      display: block;
      font-size: 0.8rem;
      margin-bottom: 3px;
    }

    .related-paragraph-button span {
      color: var(--muted);
      display: block;
      font-size: 0.78rem;
    }

    .right-nav {
      padding: 12px;
    }

    .nav-block {
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
      padding-bottom: 12px;
    }

    .nav-block:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .nav-block h3 {
      font-size: 0.9rem;
      margin: 0 0 8px;
    }

    .toc-head {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toc-head h3 {
      margin: 0;
    }

    .toc-toggle {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      cursor: pointer;
      font-size: 0.78rem;
      min-height: 30px;
      padding: 0 9px;
      white-space: nowrap;
    }

    .toc-toggle:hover {
      border-color: #6b98d4;
      color: var(--blue);
    }

    .toc-list {
      display: grid;
      gap: 7px;
    }

    .toc-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      display: block;
      padding: 8px 9px;
      text-decoration: none;
    }

    .toc-item:hover,
    .toc-item.active {
      border-color: #6b98d4;
      box-shadow: 0 0 0 2px rgba(36, 88, 166, 0.12);
    }

    .toc-item strong {
      display: block;
      font-size: 0.84rem;
      line-height: 1.35;
      margin-bottom: 3px;
    }

    .toc-summary {
      color: var(--muted);
      display: block;
      font-size: 0.76rem;
      line-height: 1.42;
    }

    .toc-collapsed-note {
      color: var(--muted);
      font-size: 0.8rem;
      margin: 0;
    }

    .figure-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      margin: 0 0 8px;
      padding: 9px;
      text-align: left;
      width: 100%;
    }

    .figure-card.nav-figure-card {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }

    .figure-card:hover,
    .figure-card.active {
      border-color: #6b98d4;
      box-shadow: 0 0 0 2px rgba(36, 88, 166, 0.12);
    }

    .figure-card.carryover {
      background: #f8fbff;
      border-color: #9bbbe4;
    }

    .figure-card strong {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .figure-card.nav-figure-card strong {
      margin-bottom: 0;
    }

    .nav-action {
      color: var(--muted);
      flex: 0 0 auto;
      font-size: 0.76rem;
    }

    .figure-card p {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
      margin: 0;
    }

    .page-links {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(4, 1fr);
    }

    .page-link {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      display: inline-flex;
      justify-content: center;
      padding: 5px 0;
      text-decoration: none;
    }

    .page-link.active {
      background: #eaf3ff;
      border-color: #6b98d4;
      color: var(--blue);
      font-weight: 700;
    }

    .empty-state {
      background: var(--soft);
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 1rem;
    }

    .quiz-list {
      display: grid;
      gap: 12px;
    }

    .quiz-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .quiz-question {
      font-weight: 700;
      line-height: 1.55;
      margin: 0;
    }

    .quiz-choices {
      display: grid;
      gap: 7px;
    }

    .quiz-choice {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      line-height: 1.5;
      min-height: 42px;
      padding: 8px 10px;
      text-align: left;
      width: 100%;
    }

    .quiz-choice:hover {
      border-color: #6b98d4;
      box-shadow: 0 0 0 2px rgba(36, 88, 166, 0.1);
    }

    .quiz-choice.correct {
      background: #edf8f4;
      border-color: #3d9a82;
      color: #0f6659;
      font-weight: 700;
    }

    .quiz-choice.incorrect {
      background: #fff2ef;
      border-color: #cc7c69;
      color: #943621;
      font-weight: 700;
    }

    .quiz-result {
      border-radius: 8px;
      line-height: 1.55;
      padding: 9px 10px;
    }

    .quiz-result.correct {
      background: #edf8f4;
      border: 1px solid #b8ded4;
      color: #0f6659;
    }

    .quiz-result.incorrect {
      background: #fff8f4;
      border: 1px solid #e3b7a8;
      color: #6f2c1d;
    }

    .source-panel {
      background: var(--panel);
      border-top: 1px solid var(--line);
      bottom: 0;
      box-shadow: 0 -8px 24px rgba(25, 34, 48, 0.12);
      display: grid;
      gap: 12px;
      grid-template-columns: 300px minmax(320px, 1fr) 360px;
      height: 250px;
      left: 0;
      padding: 12px;
      position: fixed;
      right: 0;
      z-index: 20;
    }

    .selection-meta,
    .source-text,
    .page-preview {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .page-preview {
      text-align: center;
    }

    .selection-meta h2,
    .source-text h2,
    .page-preview h2 {
      font-size: 0.9rem;
      margin: 0 0 8px;
    }

    .selection-meta p,
    .source-text p {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.55;
      margin: 0 0 8px;
    }

    .source-text p.source-line {
      color: var(--ink);
      margin-bottom: 0.7rem;
    }

    .button {
      background: var(--blue);
      border: 1px solid var(--blue);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      min-height: 38px;
      padding: 0 12px;
      width: 100%;
    }

    .button-row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 92px;
    }

    .secondary-button {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      min-height: 38px;
      padding: 0 10px;
    }

    .secondary-button:disabled {
      color: #aeb8c6;
      cursor: not-allowed;
    }

    .button:disabled {
      background: #aeb8c6;
      border-color: #aeb8c6;
      cursor: not-allowed;
    }

    .closed {
      align-items: center;
      background: var(--bg);
      display: flex;
      min-height: 100vh;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .closed-box {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      max-width: 520px;
      padding: 24px;
    }

    .closed-box h1 {
      font-size: 1.15rem;
      margin: 0 0 8px;
    }

    .closed-box p {
      color: var(--muted);
      margin: 0;
    }

    .preview-stage {
      background: transparent;
      border: 0;
      cursor: zoom-in;
      display: inline-block;
      margin: 0 auto;
      max-height: 172px;
      padding: 0;
      position: relative;
      text-align: left;
    }

    .preview-stage img {
      border: 1px solid var(--line);
      display: block;
      margin: 0 auto;
      max-height: 172px;
      max-width: 100%;
    }

    .preview-hint {
      color: var(--muted);
      display: block;
      font-size: 0.78rem;
      margin-top: 5px;
    }

    .preview-title {
      color: #31475f;
      display: block;
      font-size: 0.8rem;
      margin-bottom: 6px;
      text-align: left;
    }

    .preview-hint {
      text-align: left;
    }

    .overlay-box {
      border: 3px solid var(--danger);
      box-shadow: 0 0 0 9999px rgba(180, 74, 48, 0.12);
      pointer-events: none;
      position: absolute;
    }

    .pdf-modal {
      align-items: center;
      background: rgba(18, 27, 39, 0.72);
      display: none;
      inset: 0;
      justify-content: center;
      padding: 24px;
      position: fixed;
      z-index: 40;
    }

    .pdf-modal.open {
      display: flex;
    }

    .pdf-modal-content {
      background: #ffffff;
      border-radius: 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      max-height: 94vh;

<meta name="citation_abstract" content="Traditional approaches to identifying traffic crash hotspots have mainly focused on determining dangerous in tersections within road networks, overlooking variations in crash risk within intersections. The micro-level crash hotspot analysis addresses this issue by identifying specific high-risk areas with precision. This study aims to identify micro-level hotspots within three signalized intersections using traffic conflict measures derived from drone video. An algorithm calculates conflicts based on various vehicle sizes and conflict angles. The traffic conflict measures in this study include time-to-collision (TTC), the time to a potential collision assuming constant speed; modified time-to-collision (MTTC), which detects conflicts by assuming constant acceleration; and postencroachment time (PET), the time gap between two vehicles passing the same point. To select the most appropriate conflict measures and determine optimal thresholds at each intersection, we develop crash frequency models using generalized linear modeling (GLM). These selected conflict measures and thresholds are subse quently used to detect micro-level hotspot sections through kernel density. The results demonstrate that the TTC and PET are strongly related to micro-level crash frequencies, with different patterns emerging depending on crash angle and intersection location. Specifically, TTC-based conflicts are highly correlated with rear-end crashes occurring before the stop line, while PET-based conflicts are closely associated with crashes within the intersection, particularly with left-turning movements. This study contributes to intersection safety by identifying traffic conflict measures for micro-level hotspots and offering detailed safety interventions. These interventions include pavement marking enhancements, stop-line location adjustment, extended left-turn bays, or separated bike lanes, which are based on the specific conflict patterns observed in the study." data-zotero-connector="server">

ることを目的としています。アルゴリズムは、さまざまな車両のサイズと衝突角度に基づいて衝突を計算します。この研究における交通衝突の尺度には、衝突までの時間（TTC）、つまり一定の速度を仮定した場合に潜在的な衝突までの時間が含まれます。修正TTC (MTTC) は、一定の加速を想定して衝突を検出します。交錯後時間 (PET)、同じ地点を通過する 2 台の車両間の時間差。最も適切な衝突対策を選択し、各交差点での最適なしきい値を決定するために、一般化線形モデリング (GLM) を使用して衝突頻度モデルを開発します。これらの選択されたコンフリクト指標としきい値は、その後、カーネル密度を通じてミクロレベルのホットスポット区間を検出するために使用されます。この結果は、TTC と PET がミクロレベルの衝突頻度に強く関係しており、衝突角度と交差点の位置に応じて異なるパターンが現れることを示しています。具体的には、TTC ベースの衝突は停止線手前で発生する追突事故と高い相関があるのに対し、PET ベースの衝突は交差点内、特に左折時の衝突と密接に関連しています。この研究は、ミクロレベルのホットスポットに対する交通衝突対策を特定し、詳細な安全介入を提供することにより、交差点の安全性に貢献します。これらの介入には、調査で観察された特定の衝突パターンに基づいた、舗装標示の強化、停止線の位置調整、左折区画の拡張、自転車レーンの分離などが含まれます。", "translation": "概要: 交通事故ホットスポットを特定する従来のアプローチは、主に道路網内の危険な交差点を特定することに焦点を当てており、交差点内の衝突リスクの変動は見落とされてきました。ミクロレベルの事故ホットスポット分析は、特定の高リスク領域を正確に特定することで、この問題に対処します。この研究は、ドローンのビデオから導き出された交通衝突対策を使用して、3 つの信号交差点内のミクロレベルのホットスポットを特定することを目的としています。アルゴリズムは、さまざまな車両のサイズと衝突角度に基づいて衝突を計算します。この研究における交通衝突の尺度には、衝突までの時間（TTC）、つまり一定の速度を仮定した場合に潜在的な衝突までの時間が含まれます。修正TTC (MTTC) は、一定の加速を想定して衝突を検出します。交錯後時間 (PET)、同じ地点を通過する 2 台の車両間の時間差。最も適切な衝突対策を選択し、各交差点での最適なしきい値を決定するために、一般化線形モデリング (GLM) を使用して衝突頻度モデルを開発します。これらの選択されたコンフリクト指標としきい値は、その後、カーネル密度を通じてミクロレベルのホットスポット区間を検出するために使用されます。この結果は、TTC と PET がミクロレベルの衝突頻度に強く関係しており、衝突角度と交差点の位置に応じて異なるパターンが現れることを示しています。具体的には、TTC ベースの衝突は停止線手前で発生する追突事故と高い相関があるのに対し、PET ベースの衝突は交差点内、特に左折時の衝突と密接に関連しています。この研究は、ミクロレベルのホットスポットに対する交通衝突対策を特定し、詳細な安全介入を提供することにより、交差点の安全性に貢献します。これらの介入には、調査で観察された特定の衝突パターンに基づいた、舗装標示の強化、停止線の位置調整、左折区画の拡張、自転車レーンの分離などが含まれます。", "bbox": [0.08, 0.2, 0.92, 0.3], "kind": "overview-summary", "chapter_id": "chapter-overview", "figure_ids": []}, {"id": "overview-03", "page": 0, "order": 3, "source": "自分の論文に入れるための情報: タイトル: Micro-level hotspot identification at intersections using traffic conflict analysis / 著者: Nuri Park, Juneyoung Park, Yang-Jun Joo, Mohamed Abdel-Aty / 出版日: 10 July 2025 / 掲載誌: Accident Analysis and Prevention / 巻・ページ/論文番号: 220 (2025) 108167 / DOI: 10.1016/j.aap.2025.108167 / 査読: 査読付き学術誌掲載論文と推定。ただし、本文PDFだけでは査読プロセスの明記確認はできないため、投稿先誌ページで最終確認してください 56286464, 0.1589377000779068], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b005", "page": 1, "order": 5, "source": "Micro-level hotspot identification at intersections using traffic conflict analysis", "translation": "交通コンフリクト分析を用いた交差点におけるミクロレベルのホットスポット特定", "bbox": [0.06314280849117021, 0.20280483762031012, 0.6955004725724448, 0.2522241046349057], "kind": "title", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b006", "page": 1, "order": 6, "source": "Nuri Park a , Juneyoung Park b , Yang-Jun Joo c,* , Mohamed Abdel-Aty c", "translation": "Nuri Park a, Juneyoung Park b, Yang-Jun Joo c,*, Mohamed Abdel-Aty c", "bbox": [0.06314280849117021, 0.2597499253498751, 0.6651516630469265, 0.28212637237612403], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b007", "page": 1, "order": 7, "source": "a Department of Smart City Engineering, Hanyang University, Ansan 15588, South Korea b Department of Transportation and Logistics Engineering, Smart City Engineering, Hanyang University, Ansan 15588, South Korea c Smart & Safe Transportation Lab, Department of Civil, Environmental & Construction Engineering, University of Central Florida, Orlando, FL 32816, USA", "translation": "a Department of Smart City Engineering, Hanyang University, Ansan 15588, South Korea b Department of Transportation and Logistics Engineering, Smart City Engineering, Hanyang University, Ansan 15588, South Korea c Smart & Safe Transportation Lab, Department of Civil, Environmental & Construction Engineering, University of Central Florida, Orlando, FL 32816, USA", "bbox": [0.06314280849117021, 0.2838214665844663, 0.7709240703529027, 0.3220986785832079], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b008", "page": 1, "order": 8, "source": "A R T I C L E I N F O", "translation": "記事情報", "bbox": [0.06314280849117021, 0.3496347315367729, 0.1943457511851223, 0.36400035312219775], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b009", "page": 1, "order": 9, "source": "A B S T R A C T", "translation": "要旨", "bbox": [0.3393333406473207, 0.3496347315367729, 0.43461203022413, 0.36400035312219775], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b010", "page": 1, "order": 10, "source": "Keywords: Crash risk hotspot Traffic safety Traffic conflict measures Signalized intersection", "translation": "キーワード: Crash risk hotspot Traffic safety Traffic conflict measures Signalized intersection", "bbox": [0.06314280849117021, 0.3738919656779373, 0.18090728628990335, 0.43016800911289044], "kind": "metadata", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b011", "page": 1, "order": 11, "source": "Traditional approaches to identifying traffic crash hotspots have mainly focused on determining dangerous in tersections within road networks, overlooking variations in crash risk within intersections. The micro-level crash hotspot analysis addresses this issue by identifying specific high-risk areas with precision. This study aims to identify micro-level hotspots within three signalized intersections using traffic conflict measures derived from drone video. An algorithm calculates conflicts based on various vehicle sizes and conflict angles. The traffic conflict measures in this study include time-to-collision (TTC), the time to a potential collision assuming constant speed; modified time-to-collision (MTTC), which detects conflicts by assuming constant acceleration; and postencroachment time (PET), the time gap between two vehicles passing the same point. To select the most appropriate conflict measures and determine optimal thresholds at each intersection, we develop crash frequency models using generalized linear modeling (GLM). These selected conflict measures and thresholds are subse quently used to detect micro-level hotspot sections through kernel density. The results demonstrate that the TTC and PET are strongly related to micro-level crash frequencies, with different patterns emerging depending on crash angle and intersection location. Specifically, TTC-based conflicts are highly correlated with rear-end crashes occurring before the stop line, while PET-based conflicts are closely associated with crashes within the intersection, particularly with left-turning movements. This study contributes to intersection safety by identifying traffic conflict measures for micro-level hotspots and offering detailed safety interventions. These interventions include pavement marking enhancements, stop-line location adjustment, extended left-turn bays, or separated bike lanes, which are based on the specific conflict patterns observed in the study.", "translation": "交通事故ホットスポットを特定する従来のアプローチは、主に道路網内の危険な交差点を特定することに焦点を当てており、交差点内の衝突リスクの変動は見落とされてきました。ミクロレベルの事故ホットスポット分析は、特定の高リスク領域を正確に特定することで、この問題に対処します。この研究は、ドローンのビデオから導き出された交通衝突対策を使用して、3 つの信号交差点内のミクロレベルのホットスポットを特定することを目的としています。アルゴリズムは、さまざまな車両のサイズと衝突角度に基づいて衝突を計算します。この研究における交通衝突の尺度には、衝突までの時間（TTC）、つまり一定の速度を仮定した場合に潜在的な衝突までの時間が含まれます。修正TTC (MTTC) は、一定の加速を想定して衝突を検出します。交錯後時間 (PET)、同じ地点を通過する 2 台の車両間の時間差。最も適切な衝突対策を選択し、各交差点での最適なしきい値を決定するために、一般化線形モデリング (GLM) を使用して衝突頻度モデルを開発します。これらの選択されたコンフリクト指標としきい値は、その後、カーネル密度を通じてミクロレベルのホットスポット区間を検出するために使用されます。この結果は、TTC と PET がミクロレベルの衝突頻度に強く関係しており、衝突角度と交差点の位置に応じて異なるパターンが現れることを示しています。具体的には、TTC ベースの衝突は停止線手前で発生する追突事故と高い相関があるのに対し、PET ベースの衝突は交差点内、特に左折時の衝突と密接に関連しています。この研究は、ミクロレベルのホットスポットに対する交通衝突対策を特定し、詳細な安全介入を提供することにより、交差点の安全性に貢献します。これらの介入には、調査で観察された特定の衝突パターンに基づいた、舗装標示の強化、停止線の位置調整、左折区画の拡張、自転車レーンの分離などが含まれます。", "bbox": [0.3393333406473207, 0.37390538462904904, 0.9403869700836727, 0.5935361258542278], "kind": "body", "chapter_id": "chapter-000", "figure_ids": []}, {"id": "p001-b012", "page": 1, "order": 12, "source": "1. Introduction", "translation": "1. はじめに", "bbox": [0.06314280849117021, 0.627562241055577, 0.16435497244848304, 0.6439803854153457], "kind": "heading", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b013", "page": 1, "order": 13, "source": "Signalized intersections have been a major focus of traffic safety research due to the high volume of traffic and the resulting high number of crashes. Various studies have been conducted on traffic safety man agement strategies for signalized intersections, such as the location of crosswalks and the installation of pedestrian islands and traffic control facilities at signalized intersections (Wang et al., 2022; Hurwitz et al., 2023; Wu et al., 2024). The identification of crash hotspots in advance is key in implementing these strategies. Identifying crash hotspots has focused on narrowing down the dangerous intersections in the road network so that the most urgent intersections can be addressed, considering the limited budget for safety management (Stipancic et al., 2019; Kus¸kapan et al., 2021; Li and Wang, 2022; Schultz et al., 2023).", "translation": "信号交差点は、交通量が多く、それに伴う事故件数も多いため、交通安全研究の主な焦点となってきました。横断歩道の位置、歩行者用島や信号交差点での交通規制施設の設置など、信号交差点の交通安全管理戦略についてさまざまな研究が行われてきた（Wang et al., 2022; Hurwitz et al., 2023; Wu et al., 2024）。これらの戦略を実装するには、事故のホットスポットを事前に特定することが重要です。衝突ホットスポットの特定では、安全管理のための限られた予算を考慮して、最も緊急性の高い交差点に対処できるように、道路網内の危険な交差点を絞り込むことに重点が置かれています（Stipancic et al., 2019; Kus ¸ kapan et al., 2021; Li and Wang, 2022; Schultz et al., 2023）。これまでの研究では、交差点内の危険エリアを正確に特定するミクロレベルのホットスポットではなく、マクロレベルの衝突リスクのホットスポットが特定されていました。", "bbox": [0.06314280849117021, 0.6539186374773849, 0.4888982899829201, 0.8153358540454908], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b014", "page": 1, "order": 14, "source": "* Corresponding author. E-mail addresses: nuripark@hanyang.ac.kr (N. Park), juneyoung@hanyang.ac.kr (J. Park), yangjun.joo@ucf.edu (Y.-J. Joo), m.aty@ucf.edu (M. Abdel-Aty).", "translation": "* Corresponding author. E-mail addresses: nuripark@hanyang.ac.kr (N. Park), juneyoung@hanyang.ac.kr (J. Park), yangjun.joo@ucf.edu (Y.-J. Joo), m.aty@ucf.edu (M. Abdel-Aty).", "bbox": [0.07161887821821425, 0.8429775091458418, 0.9215469247314827, 0.8698249468990188], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b015", "page": 1, "order": 15, "source": "https://doi.org/10.1016/j.aap.2025.108167 Received 11 March 2025; Received in revised form 6 June 2025; Accepted 6 July 2025", "translation": "https://doi.org/10.1016/j.aap.2025.108167 Received 11 March 2025; Received in revised form 6 June 2025; Accepted 6 July 2025", "bbox": [0.06314280849117021, 0.8764769785782017, 0.5425734558446722, 0.9032529767578383], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b016", "page": 1, "order": 16, "source": "Available online 10 July 2025 0001-4575/© 2025 Elsevier Ltd. All rights are reserved, including those for text and data mining, AI training, and similar technologies.", "translation": "Available online 10 July 2025 0001-4575/© 2025 Elsevier Ltd. All rights are reserved, including those for text and data mining, AI training, and similar technologies.", "bbox": [0.06302958694153861, 0.9004650647027986, 0.79169752041474, 0.9273684083439884], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b017", "page": 1, "order": 17, "source": "Previous studies have identified macro-level crash risk hotspots rather than micro-level hotspots that pinpoint the dangerous area within the intersection. These approaches, however, are limited in their capacity to recommend specific countermeasures because intersections are not uniformly risky. Different sections within the same intersection may have distinct risk profiles, complicating efforts to recommend precise safety interventions.", "translation": "ただし、交差点は一様に危険なわけではないため、これらのアプローチでは、特定の対策を推奨する能力には限界があります。同じ交差点内の異なるセクションには異なるリスクプロファイルがある可能性があり、正確な安全介入を推奨する取り組みが複雑になります。", "bbox": [0.5150428042565766, 0.627562241055577, 0.9407700316271852, 0.7230506897225523], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p001-b018", "page": 1, "order": 18, "source": "Alternatively, identifying micro-level crash hotspots within an intersection can determine risk factors and suggest specific preventive measures (Li and Wang, 2017; Wang et al., 2023; Xie et al., 2014; Munira et al., 2020; Son and Park, 2022). In this study, the term “microlevel” refers to a more detailed unit of analysis than the intersection or segment level. It denotes sub-intersection and sub-segment areas, rep resenting a finer scale of analysis compared to mesoor macro-level", "translation": "あるいは、交差点内のミクロレベルの衝突ホットスポットを特定することで、危険因子を特定し、具体的な予防策を提案することもできます（Li and Wang, 2017; Wang et al., 2023; Xie et al., 2014; Munira et al., 2020; Son and Park, 2022）。この研究では、 「ミクロレベル」という用語は、交差レベルやセグメントレベルよりも詳細な分析単位を指します。これは、サブ交差点およびサブセグメント領域を示し、メソレベルまたはマクロレベルと比較してより細かいスケールの分析を表します", "bbox": [0.5150428042565766, 0.7197750814614922, 0.9407674683138586, 0.8153358540454908], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b001", "page": 2, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b002", "page": 2, "order": 2, "source": "approaches. Micro-level hotspot studies provide new insights into the detailed risk factors that cannot be found in macro-hotspot studies. The crash risk depends on the environmental and geometrical characteristics of the intersection, such as the traffic signal types, the number of lanes, and the presence of a pedestrian island. Previous studies have shown that micro-level hotspot identification within an intersection can pinpoint the location and changes in crash risk. This information serves as fundamental data for reviewing the installation of safety facilities (Son, 2022). Micro-level hotspots were analyzed using both historical crash data and traffic conflict data, and statistical modeling was employed to find conflict measures that can best explain crash risks occurring within intersections (Son and Park, 2022; Son, 2022). How ever, research approaches that exclusively use either historical crash records or traffic conflicts have inherent limitations. Crash-based hot spot identification requires long periods of data collection and fails to account for potentially dangerous situations that do not result in re ported crashes. Conversely, methods focusing solely on conflicts do not establish a clear connection to crash occurrences, thus providing a weaker foundation for developing effective countermeasures.", "translation": "近づいてきます。ミクロレベルのホットスポット研究は、マクロホットスポット研究では見つけることができない詳細なリスク要因についての新たな洞察を提供します。衝突の危険性は、信号機の種類、車線数、歩行者専用島の有無など、交差点の環境的および幾何学的特性によって異なります。これまでの研究では、交差点内のミクロレベルのホットスポットを特定すると、位置と衝突リスクの変化を正確に特定できることが示されています。この情報は、安全設備の設置を検討するための基礎データとなります (Son, 2022)。過去の衝突データと交通衝突データの両方を使用してミクロレベルのホットスポットが分析され、交差点内で発生する衝突リスクを最もよく説明できる衝突対策を見つけるために統計モデリングが採用されました (Son and Park, 2022; Son, 2022)。しかし、過去の衝突記録または交通コンフリクトのいずれかをもっぱら使用する研究アプローチには、固有の限界があります。事故ベースのホットスポットの特定には長期間のデータ収集が必要であり、報告された事故に至らない潜在的に危険な状況を考慮することができません。逆に、競合のみに焦点を当てた方法では、事故の発生との明確な関係が確立されないため、効果的な対策を開発するための基盤が弱くなります。この研究は、さまざまな交通コンフリクト対策を使用したミクロレベルのホットスポット識別分析を開発することでギャップを埋めることを目的としています。このため、本研究では信号交差点を小さな車線幅のグリッドに分割し、交通衝突対策ごとにミクロレベルのホットスポットを導出し、交差点内の詳細な危険道路区間を特定する。ドローンのビデオデータから抽出された車両軌跡データは、交通衝突の特定に利用されます。次に、独立変数として交通衝突の測定値、従属変数として衝突回数を使用して、衝突頻度モデルが構築されます。このプロセス中に、衝突データの低精度の問題に対処するために、衝突の影響の空間的範囲を定義するためにバッファが適用されました。次のステップでは、各信号交差点での衝突リスクを最もよく説明できる最適な交通衝突対策とそのしきい値を導き出します。最後に、選択された交通コンフリクト対策に基づいて、カーネル密度推定 (KDE) を使用してミクロレベルのホットスポットが特定されました。提案された枠組みにより、衝突が発生する可能性が高い特定の交差点エリアを特定し、これらのリスクを軽減するための対象を絞った安全戦略を開発することが可能になります。 1.1.文献レビュー交差点におけるホットスポットの特定に関する従来の研究は、主にマクロレベルの分析に焦点を当ててきました。スティパンチッチら。 (Stipancic et al.、2019) は、衝突傷害データ、交通量データ、信号データを使用して信号交差点の衝突頻度モデルを開発し、マクロレベルのホットスポットを特定しました。 Kus ¸ kapan et al. (Kus ¸ kapan et al., 2021) は、過去の衝突データを使用して、信号交差点での車両と歩行者の衝突に関する信号交差点のマクロレベルのホットスポット特定に関する研究を実施しました。 Li と Wang (Li と Wang、2022) は、信号間隔の短い都市動脈をターゲットとしたメソレベルのホットスポットの特定を分析しました。シュルツら。 (Schultz et al., 2023) は、交差点とセグメントセクションの一意性を考慮して衝突ホットスポットの特定を実施し、さまざまな道路幾何学的データと過去の衝突データを使用しました。分析手法として、彼らはベイジアン手法を採用し、Negative Binomial-Lindely、Zeo-Inflated Negative Binomial、Zero-inflated Poisson-based モデル、および Artificial Neural Network (ANN) を開発しました (Stipancic et al., 2019; Kus ¸ kapan et al., 2021; Li and Wang, 2022;シュルツら、2023 年）。最近の研究では、マクロレベルの事故ホットスポットの特定が続けられている（Kamh et al., 2024; Ghezelbash et al., 2023）。カムら。 (Kamh et al., 2024) は、衝突データを利用した包括的な空間分析を通じて衝突ホットスポットを特定しました。ゲゼルバシュら。 (Ghezelbash et al., 2023) は、交通事故データを使用して都市レベルの時空間衝突ホットスポットマップを導き出しました。この目的のために、AHP-TOPSIS ハイブリッドモデルが使用されます。が開発され、衝突の時空間相互作用が捕捉されました。既存の研究では、ネットワークレベルでリスクの高い交差点や道路セグメントが特定されています。しかし、どの特定のエリアが危険なのか、また道路の形状と衝突事故がどのように関係しているのかを特定することは困難であり、これはサイト固有の対象を絞った対策にとって不可欠です。", "bbox": [0.06314278285803694, 0.0646335747770474, 0.4888969057937238, 0.3182635884951373], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b003", "page": 2, "order": 3, "source": "This study aims to bridge the gap by developing a micro-level hotspot identification analysis using various traffic conflict measures. To this end, this study divides a signalized intersection into a small lane-width grid, the micro-level hotspot is derived for each traffic conflict measure, and detailed risky road sections in the intersection are identified. Vehicle trajectory data extracted from drone video data is utilized to identify traffic conflicts. A crash frequency model is then constructed with traffic conflict measures as independent variables and the number of crashes as dependent variables. During this process, a buffer was applied to define the spatial extent of crash influence to address the issue of low precision in crash data. The subsequent step involves the deri vation of optimal traffic conflict measures and their thresholds that can best explain crash risk in each signalized intersection. Finally, based on the selected traffic conflict measures, the micro-level hotspots were identified using kernel density estimation (KDE). The proposed frame work allows for identifying specific intersection areas where conflicts are likely to occur and developing targeted safety strategies to reduce these risks.", "translation": "従来のホットスポット特定研究とは異なり、ミクロレベルのホットスポット特定アプローチは、潜在的な衝突リスクの正確な位置を最大数メートルの解像度で特定し、これらのリスクに寄与する根本的な要因を解明するように設計されています。いくつかの研究はメソレベルおよびミクロレベルのホットスポットの特定に焦点を当てており、マクロホットスポット研究では見つけることができない交差点の詳細なリスクゾーンについての洞察を提供しています（Li and Wang、2017; Wang et al.、2023; Xie et al.、2014; Munira et al.、2020）。 Li and Wang (Li and Wang, 2017) は、交差点分析の範囲を 3 つのレベルに分けて分類しました。マクロレベルは交通分析ゾーン (TAZ) またはコミュニティ単位の広い範囲として定義され、ミクロレベルは交差点内の道路セグメントとして定義されました。これまでの研究では、メゾレベルまたはミクロレベルの安全性評価のための統計モデルを使用して、衝突の頻度と重症度を推定していました。これらの研究では、さまざまな道路、交通、環境特性を説明変数として組み込むことで、衝突事故に影響を与える要因も特定されました（Wang et al., 2023; Xie et al., 2014; Munira et al., 2020）。王ら。 (Wang et al., 2023) は、メソレベルの安全性分析を実行し、セクション間の間隔と交通安全の間の相関関係を特定しました。謝ら。 (Xie et al., 2014) は、統計的手法を使用して信号交差点のミクロレベルの衝突頻度モデルを開発し、衝突頻度に影響を与える要因を分析しました。ムニラら。 (Munira et al., 2020) は、交差点での歩行者衝突モデルを使用して、衝突に影響を与える要因を特定しました。それにも関わらず、これらの研究では正確な衝突ホットスポットの位置を特定することができず、施設のない交差点内側や接近セクション内の詳細なリスクを把握することが困難でした。衝突ホットスポットの正確な位置を見つけようとした研究は限られています。 Son と Park (Son と Park、2022) は、衝突重大度データと地理情報システム (GIS) データに基づいて、KDE ​​を使用して交差点のミクロレベルのホットスポットを特定しました。彼らは、都市交差点での衝突リスクに関連する道路インフラの特性と衝突特性を特定しました。これらの研究の主な目的は、適切な対策を適用できるように、交差点の最も危険なセクションを特定することでした。しかし、これらの研究では、衝突データに依存したり、適切な交通衝突対策を選択したりするミクロレベルの衝突リスクのホットスポットが特定されており、これにより分析の信頼性が低下します。これらを補完するには、衝突データの統合と適切な交通衝突対策の選択が必要です。長期間にわたる十分な衝突データが入手できない場合、危険性の高いセクションを特定することが困難になります。さらに、このようなアプローチでは、事故の明らかな前兆である競合状況を考慮できません。これらの制限に対処するために、この研究では、正確な車両の走行軌跡から得られる交通衝突を利用します。このアプローチにより、ミクロレベルのホットスポット内で交通コンフリクトが発生する背後にあるメカニズムを理解することができます。交通衝突対策は、交差点の衝突頻度を推定するために頻繁に使用され、データ収集期間が短縮されるという利点があります (Zheng et al., 2020)。交差点衝突推定モデルに関する研究では、修正衝突時間 (MTTC) が追突事故の予測に最適な結果をもたらすことが一貫して示されています (Zheng and Sayed, 2019; Arun et al., 2021)。交通コンフリクト対策が潜在的な事故のスナップショットを提供することを考えると、ミクロレベルのホットスポットを特定するための効率的な方法となります。以前の研究では、交通衝突分析において適切な尺度としきい値を選択することの重要性が強調されており、これらの尺度やしきい値は次のような可能性があることに注意しています。特定の交通状況に応じて変化します (Zheng and Sayed, 2019; Arun et al., 2021)。しかし、ミクロレベルで高リスクの場所を特定するにはどの対策が最も効果的であるか、最適な対策としきい値がさまざまな状況で一貫しているかどうかについて、現在の知識にはギャップがあります。既存の研究のほとんどは、信号交差点での交通衝突を利用して、危険な事象や衝突頻度を予測している（Zhang et al., 2020; Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023）。これらの研究では、N. Park らの推定値を推定するために、Closed Circuit Television から車両の軌跡を収集しました。事故分析と予防 220 (2025) 108167 2", "bbox": [0.06314275722490367, 0.315059266008751, 0.4889049033313025, 0.5555467292094884], "kind": "body", "chapter_id": "chapter-001", "figure_ids": []}, {"id": "p002-b004", "page": 2, "order": 4, "source": "1.1. Literature review", "translation": "1.1. 文献レビュー", "bbox": [0.06314280849117021, 0.5662712779770712, 0.18834522693628075, 0.58268942233684], "kind": "heading", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b005", "page": 2, "order": 5, "source": "Conventional studies on hotspot identification at intersections have mainly focused on macro-level analysis. Stipancic et al. (Stipancic et al., 2019) developed a signalized intersection crash frequency model using crash injury data, traffic volume data, and signal data and identified macro-level hotspots. Kus¸kapan et al. (Kus¸kapan et al., 2021) performed a study on macro-level hotspot identification of signalized intersections regarding vehicle–pedestrian crashes at signalized intersections using historical crash data. Li and Wang (Li and Wang, 2022) analyzed mesolevel hotspot identification targeting urban arteries with short signal spacing. Schultz et al. (Schultz et al., 2023) conducted crash hotspot identification considering the uniqueness of intersection and segment sections and used various road geometric data and historical crash data. As an analysis methodology, they adopted the Bayesian methodology and developed a Negative Binomial-Lindely, a Zeo-Inflated Negative Binomial, a Zero-inflated Poisson-based model, and Artificial Neural Network (ANN) (Stipancic et al., 2019; Kus¸kapan et al., 2021; Li and Wang, 2022; Schultz et al., 2023). Recent studies have continued to identify macro-level crash hotspots (Kamh et al., 2024; Ghezelbash et al., 2023). Kamh et al. (Kamh et al., 2024) identified crash hotspots through comprehensive spatial analysis utilizing crash data. Ghezelbash et al. (Ghezelbash et al., 2023) derived city-level spatiotemporal crash hotspot maps using traffic crash data. For this purpose, an AHP-TOPSIS hybrid model was developed, and crash spatiotemporal interactions were captured. Existing studies have identified intersections and road segments with a high risk at the network level. However, it is difficult to identify which specific areas are dangerous and how road geometry and", "translation": "Conventional studies on hotspot identification at intersections have mainly focused on macro-level analysis. Stipancic et al. (Stipancic et al., 2019) developed a signalized intersection crash frequency model using crash injury data, traffic volume data, and signal data and identified macro-level hotspots. Kus¸kapan et al. (Kus¸kapan et al., 2021) performed a study on macro-level hotspot identification of signalized intersections regarding vehicle–pedestrian crashes at signalized intersections using historical crash data. Li and Wang (Li and Wang, 2022) analyzed mesolevel hotspot identification targeting urban arteries with short signal spacing. Schultz et al. (Schultz et al., 2023) conducted crash hotspot identification considering the uniqueness of intersection and segment sections and used various road geometric data and historical crash data. As an analysis methodology, they adopted the Bayesian methodology and developed a Negative Binomial-Lindely, a Zeo-Inflated Negative Binomial, a Zero-inflated Poisson-based model, and Artificial Neural Network (ANN) (Stipancic et al., 2019; Kus¸kapan et al., 2021; Li and Wang, 2022; Schultz et al., 2023). Recent studies have continued to identify macro-level crash hotspots (Kamh et al., 2024; Ghezelbash et al., 2023). Kamh et al. (Kamh et al., 2024) identified crash hotspots through comprehensive spatial analysis utilizing crash data. Ghezelbash et al. (Ghezelbash et al., 2023) derived city-level spatiotemporal crash hotspot maps using traffic crash data. For this purpose, an AHP-TOPSIS hybrid model was developed, and crash spatiotemporal interactions were captured. Existing studies have identified intersections and road segments with a high risk at the network level. However, it is difficult to identify which specific areas are dangerous and how road geometry and", "bbox": [0.06314278285803694, 0.5926277128485957, 0.4888982899829201, 0.9385428956958387], "kind": "body", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b007", "page": 2, "order": 7, "source": "crashes are related, which is imperative for site-specific targeted countermeasures.", "translation": "crashes are related, which is imperative for site-specific targeted countermeasures.", "bbox": [0.5150428042565766, 0.0646336516764807, 0.9407701341597182, 0.09426567077799233], "kind": "body", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b008", "page": 2, "order": 8, "source": "Unlike traditional hotspot identification studies, the micro-level hotspot identification approach is designed to identify exact locations of potential crash risk, with a resolution of up to a few meters, and to unravel the underlying factors that contribute to these risks. Several studies focus on the identification of mesoand micro-level hotspots, providing insights into intersection detailed-risk zones that cannot be found in macro-hotspot studies (Li and Wang, 2017; Wang et al., 2023; Xie et al., 2014; Munira et al., 2020). Li and Wang (Li and Wang, 2017) classified the scope of intersection analysis by dividing it into three levels. The macro level was defined as a large scope of traffic analysis zone (TAZ) or community unit, and the micro level was defined as a road segment within the intersection. Previous studies have estimated crash frequency and severity using statistical models for mesoor micro-level safety evaluations. These studies also identified factors influencing crashes by incorporating a variety of road, traffic, and environmental characteristics as explanatory variables (Wang et al., 2023; Xie et al., 2014; Munira et al., 2020). Wang et al. (Wang et al., 2023) performed a meso-level safety analysis and identified a correlation between inter section spacing and road safety. Xie et al. (Xie et al., 2014) developed a micro-level crash frequency model for signalized intersections using statistical methods and analyzed the factors influencing crash frequency. Munira et al. (Munira et al., 2020) identified factors affecting crashes with a pedestrian crash model at intersections. Nevertheless, these studies were unable to identify exact crash hotspot locations, which made it challenging to capture detailed risks within inner intersections or approaching sections without any facilities.", "translation": "Unlike traditional hotspot identification studies, the micro-level hotspot identification approach is designed to identify exact locations of potential crash risk, with a resolution of up to a few meters, and to unravel the underlying factors that contribute to these risks. Several studies focus on the identification of mesoand micro-level hotspots, providing insights into intersection detailed-risk zones that cannot be found in macro-hotspot studies (Li and Wang, 2017; Wang et al., 2023; Xie et al., 2014; Munira et al., 2020). Li and Wang (Li and Wang, 2017) classified the scope of intersection analysis by dividing it into three levels. The macro level was defined as a large scope of traffic analysis zone (TAZ) or community unit, and the micro level was defined as a road segment within the intersection. Previous studies have estimated crash frequency and severity using statistical models for mesoor micro-level safety evaluations. These studies also identified factors influencing crashes by incorporating a variety of road, traffic, and environmental characteristics as explanatory variables (Wang et al., 2023; Xie et al., 2014; Munira et al., 2020). Wang et al. (Wang et al., 2023) performed a meso-level safety analysis and identified a correlation between inter section spacing and road safety. Xie et al. (Xie et al., 2014) developed a micro-level crash frequency model for signalized intersections using statistical methods and analyzed the factors influencing crash frequency. Munira et al. (Munira et al., 2020) identified factors affecting crashes with a pedestrian crash model at intersections. Nevertheless, these studies were unable to identify exact crash hotspot locations, which made it challenging to capture detailed risks within inner intersections or approaching sections without any facilities.", "bbox": [0.5150427017240435, 0.09098999522992815, 0.9407810026082226, 0.4369051300150254], "kind": "body", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b009", "page": 2, "order": 9, "source": "Only a limited number of studies have sought to find precise crash hotspot locations. Son and Park (Son and Park, 2022) identified microlevel hotspots at intersections using KDE based on crash severity data and Geographical Information System (GIS) data. They identified road infrastructural characteristics and crash characteristics related to crash risk at urban intersections. The main objective of these studies was to identify the most dangerous sections of the intersection so that appro priate countermeasures could be applied. However, these studies iden tified micro-level crash risk hotspots relying on crash data or selecting appropriate traffic conflict measures, which reduces the reliability of the analysis. Integration of crash data and the selection of appropriate traffic conflict measures are required to complement these. When sufficient crash data over an extended period is unavailable, identifying high-risk sections becomes challenging. Additionally, such an approach fails to account for conflict situations, which are clear precursors to crashes. To address these limitations, this study utilizes traffic conflicts derived from precise vehicle driving trajectories. This approach enables an under standing of the mechanisms behind traffic conflict occurrence within micro-level hotspots.", "translation": "Only a limited number of studies have sought to find precise crash hotspot locations. Son and Park (Son and Park, 2022) identified microlevel hotspots at intersections using KDE based on crash severity data and Geographical Information System (GIS) data. They identified road infrastructural characteristics and crash characteristics related to crash risk at urban intersections. The main objective of these studies was to identify the most dangerous sections of the intersection so that appro priate countermeasures could be applied. However, these studies iden tified micro-level crash risk hotspots relying on crash data or selecting appropriate traffic conflict measures, which reduces the reliability of the analysis. Integration of crash data and the selection of appropriate traffic conflict measures are required to complement these. When sufficient crash data over an extended period is unavailable, identifying high-risk sections becomes challenging. Additionally, such an approach fails to account for conflict situations, which are clear precursors to crashes. To address these limitations, this study utilizes traffic conflicts derived from precise vehicle driving trajectories. This approach enables an under standing of the mechanisms behind traffic conflict occurrence within micro-level hotspots.", "bbox": [0.5150425991915105, 0.43370088442807236, 0.9407796696852928, 0.6873308260529436], "kind": "body", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b010", "page": 2, "order": 10, "source": "Traffic conflict measures are frequently used to estimate intersection crash frequencies, offering the advantage of shorter data collection pe riods (Zheng et al., 2020). Studies on intersection crash estimation models have consistently shown that modified time-to-collision (MTTC) yields optimal results in predicting rear-end crashes (Zheng and Sayed, 2019; Arun et al., 2021). Given that traffic conflict measures offer a snapshot of potential crashes, they present an efficient method for identifying micro-level hotspots. Previous studies emphasize the importance of selecting suitable measures and thresholds in traffic conflict analysis, noting that these may vary based on specific traffic situations (Zheng and Sayed, 2019; Arun et al., 2021). However, there is a gap in current knowledge regarding which measures are most effective for identifying high-risk locations at the micro-level and whether the optimal measures and thresholds remain consistent across different contexts.", "translation": "Traffic conflict measures are frequently used to estimate intersection crash frequencies, offering the advantage of shorter data collection pe riods (Zheng et al., 2020). Studies on intersection crash estimation models have consistently shown that modified time-to-collision (MTTC) yields optimal results in predicting rear-end crashes (Zheng and Sayed, 2019; Arun et al., 2021). Given that traffic conflict measures offer a snapshot of potential crashes, they present an efficient method for identifying micro-level hotspots. Previous studies emphasize the importance of selecting suitable measures and thresholds in traffic conflict analysis, noting that these may vary based on specific traffic situations (Zheng and Sayed, 2019; Arun et al., 2021). However, there is a gap in current knowledge regarding which measures are most effective for identifying high-risk locations at the micro-level and whether the optimal measures and thresholds remain consistent across different contexts.", "bbox": [0.5150427529903101, 0.6840562943839498, 0.9407609062317428, 0.8850438061466793], "kind": "body", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p002-b011", "page": 2, "order": 11, "source": "Most existing studies have used traffic conflicts at signalized in tersections to predict risky events or crash frequency (Zhang et al., 2020; Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023). These studies collected vehicle trajectories from Closed Circuit Television to estimate", "translation": "Most existing studies have used traffic conflicts at signalized in tersections to predict risky events or crash frequency (Zhang et al., 2020; Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023). These studies collected vehicle trajectories from Closed Circuit Television to estimate", "bbox": [0.5150428042565766, 0.8817681209861861, 0.9407686987042554, 0.9377576755823613], "kind": "body", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p003-b001", "page": 3, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p003-b002", "page": 3, "order": 2, "source": "the traffic conflict measure, predicting risky events immediately before a pedestrian crash at a signalized intersection using data (Zhang et al., 2020). Time-to-collision (TTC), MTTC, and post-encroachment time (PET) were adopted to quantify the level of traffic conflict, and various threshold criteria were set to predict crash risk using Extreme Value Theory (EVT) (Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023). Another study used a generalized linear model (GLM) to predict the number of crashes or traffic conflicts, using traffic conflict as exposure instead of the commonly used traffic volume (Sacchi and Sayed, 2016; Essa and Sayed, 2018). While traffic volumes lead to inaccurate models because they include routine interactions that do not affect the occur rence of crashes, the methodology using traffic conflict only records dangerous interactions, allowing the model to account for unobservable driver behavior.", "translation": "データを使用して信号交差点での歩行者衝突直前の危険な出来事を予測する交通コンフリクト指標 (Zhang et al., 2020)。交通衝突のレベルを定量化するために、衝突までの時間（TTC）、MTTC、および交錯後時間（PET）が採用され、極値理論（EVT）を使用して衝突リスクを予測するためにさまざまなしきい値基準が設定されました（Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023）。別の研究では、一般化線形モデル (GLM) を使用して、一般的に使用される交通量の代わりに交通衝突をエクスポージャとして使用して、衝突または交通衝突の数を予測しました (Sacchi and Sayed, 2016; Essa and Sayed, 2018)。交通量には衝突の発生に影響を及ぼさない日常的なやり取りが含まれるため、モデルが不正確になりますが、交通量の衝突を使用する手法では、危険なやり取りのみが記録されるため、観察できないドライバーの行動をモデルで考慮することができます。この文献レビューは、大規模な道路網から危険な交差点を特定する従来のアプローチとは対照的に、交差点内のミクロレベルの衝突ホットスポットを特定する方法における研究上の大きなギャップを浮き彫りにしている。私たちは、ミクロレベルのホットスポットを特定するために事故データと競合分析の両方を統合するフレームワークに関する研究が限られていることがわかりました。これにより、これらの手法の個々の限界を克服できる可能性があります。さらに、適切なしきい値の設定を含め、交差点事故を表すための最も効果的な交通衝突の尺度を決定するための包括的な研究が必要です。私たちのレビューでは、ドローンで収集したデータを分析する場合、特にドローン研究では観測期間が短いため、EVT よりも GLM の方が適切であることも示唆しています。これらの調査結果に基づいて、私たちの研究は、GLM を使用して衝突リスクと強く相関する最も適切な交通衝突対策を特定することに焦点を当て、このアプローチをミクロレベルで高リスクエリアを特定するために適用します。 1.2.データの説明この研究では、CitySim データセットを利用します。このデータセットは、毎秒 30 フレームで記録されたドローンビデオから抽出された車両軌道データを提供し、車両間の詳細な相互作用をキャプチャします (Zheng et al., 2023)。鄭ら。 (Zheng et al., 2023) は、ビデオ安定化、オブジェクトフィルタリング、マルチビデオスティッチング、検出と追跡、強化されたエラーフィルタリングの 5 つのステップを通じてドローンビデオデータを処理し、CitySim データセット内の軌道の精度を向上させ、車両の境界ボックス情報を抽出しました。これにより、車両の境界ボックス情報を使用して、より厳密な衝突イベントの計算が可能になります。", "bbox": [0.06314280849117021, 0.0646335747770474, 0.4888755277605808, 0.2524071637358883], "kind": "body", "chapter_id": "chapter-002", "figure_ids": []}, {"id": "p003-b003", "page": 3, "order": 3, "source": "The literature review highlights a significant research gap in methods for pinpointing micro-level crash hotspots within intersections, in contrast to conventional approaches that identify dangerous in tersections from larger road networks. We found limited research on frameworks that integrate both crash data and conflict analysis for micro-level hotspot identification, which could potentially overcome the individual limitations of these methods. Moreover, there is a need for comprehensive studies to determine the most effective traffic conflict measure for representing intersection crashes, including establishing appropriate threshold values. Our review also suggests that when analyzing drone-collected data, GLM is more appropriate than EVT, particularly due to the shorter observation periods typical in drone studies. Based on these findings, our study focuses on identifying the most relevant traffic conflict measures that correlate strongly with crash risk using GLM and applies this approach to identify high-risk areas at a micro-level.", "translation": "この研究では、信号交差点におけるホットスポットの特定のために、2022 年にフロリダ州オーランドのセントラルフロリダ大学 (UCF) キャンパス付近で取得された 3 つのデータセットが使用されています。すなわち、四車線信号交差点のある交差点 A、連続する信号交差点のある交差点 D、三叉路信号交差点のある交差点 E です (図 1)。この調査のために選択された調査地では、幅広い交通レベルと左折車線戦略 (保護のみ、保護/許可) が採用されています。交差点 A は交通量が多いため、他の交差点に比べて衝突や交通事故が多く発生します。保護された左折信号は、この交差点の左折車両を処理します。交差点 D は近くの車庫に向かう右折交通が多く、保護された左折で運行されます。交差点 E では、近くの車庫に入る車両が大量に発生します。この交差点は、保護と許可の左折段階で運行されています。この研究では、交差点 A、D、E のデータ分析期間はそれぞれ 55 分、15 分、95 分です。本研究は、交差点内のさまざまな交通手段間の車車間の相互作用に焦点を当てています。さらに、衝突データは、特定の場所の各信号交差点での衝突リスクと高度に相関する交通衝突対策を特定するために収集されます。衝突データについては、この研究では 2018 年から 2024 年までの過去のデータを収集し、Signal Four から提供されたフロリダの衝突データを使用しています。 Analytics (Analytics、2024) およびフロリダ州運輸省 (FDOT) 州安全局 (SSO) 地理情報システム (SSOGis) (州安全局およびクエリツール、2024)。ドローンのビデオデータは日中にキャプチャされたため、図 1. ケーススタディサイトのジオメトリのみです。 N.パークら。事故分析と予防 220 (2025) 108167 3", "bbox": [0.06314280849117021, 0.24913155547482824, 0.48889957163958336, 0.46326160333626654], "kind": "body", "chapter_id": "chapter-002", "figure_ids": ["fig-003-01"]}, {"id": "p003-b004", "page": 3, "order": 4, "source": "1.2. Data description", "translation": "1.2. データ概要", "bbox": [0.06314280849117021, 0.47955724689878043, 0.18559516341737653, 0.4959753912585492], "kind": "heading", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p003-b005", "page": 3, "order": 5, "source": "This study utilizes the CitySim dataset, which provides vehicle", "translation": "This study utilizes the CitySim dataset, which provides vehicle", "bbox": [0.08323689080551813, 0.5059146814629379, 0.48884199962227015, 0.5223328258227067], "kind": "body", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p003-b006", "page": 3, "order": 6, "source": "Fig. 1. Geometries in case study sites.", "translation": "図 1. ケーススタディサイトのジオメトリのみです。", "bbox": [0.39657066613951275, 0.9232627475998341, 0.6034718335954407, 0.9380388968099578], "kind": "figure-caption", "chapter_id": "chapter-003", "figure_ids": ["fig-003-01"]}, {"id": "p003-b008", "page": 3, "order": 8, "source": "trajectory data extracted from drone video recorded at 30 frames per second, capturing detailed interactions between vehicles (Zheng et al., 2023). Zheng et al. (Zheng et al., 2023) processed drone video data through five steps of video stabilization, object filtering, multi-video stitching, detection and tracking, and enhanced error filtering to improve the accuracy of trajectories in the CitySim dataset and extracted the vehicle’s bounding box information. This enables the calculation of more rigorous conflict events by using the vehicle’s bounding box in formation. This study employs three datasets obtained near the Uni versity of Central Florida (UCF) campus, Orlando, Florida, in 2022 for hotspot identification at signalized intersections: Intersection A with a 4way signalized intersection, Intersection D with consecutive signalized intersection, and Intersection E with 3-way signalized intersection (Fig. 1). The study sites selected for this research have a wide range of traffic levels and left-turn lane strategies (protected-only, protected/ permissive). Intersection A has high traffic volume, resulting in more conflicts and traffic crashes compared to other intersections. The pro tected left-turn signals process the left-turn vehicles in this intersection. Intersection D experiences heavy turning traffic toward a nearby garage and operates with a protected left turn. Intersection E also has high volumes of vehicles turning into a nearby garage. This intersection operates with protected-permissive left-turn phasing. In this study, the data analysis periods for Intersections A, D, and E are 55, 15, and 95 min, respectively. The present study focuses on vehicle-to-vehicle in teractions among the various modes of transportation within intersections.", "translation": "trajectory data extracted from drone video recorded at 30 frames per second, capturing detailed interactions between vehicles (Zheng et al., 2023). Zheng et al. (Zheng et al., 2023) processed drone video data through five steps of video stabilization, object filtering, multi-video stitching, detection and tracking, and enhanced error filtering to improve the accuracy of trajectories in the CitySim dataset and extracted the vehicle’s bounding box information. This enables the calculation of more rigorous conflict events by using the vehicle’s bounding box in formation. This study employs three datasets obtained near the Uni versity of Central Florida (UCF) campus, Orlando, Florida, in 2022 for hotspot identification at signalized intersections: Intersection A with a 4way signalized intersection, Intersection D with consecutive signalized intersection, and Intersection E with 3-way signalized intersection (Fig. 1). The study sites selected for this research have a wide range of traffic levels and left-turn lane strategies (protected-only, protected/ permissive). Intersection A has high traffic volume, resulting in more conflicts and traffic crashes compared to other intersections. The pro tected left-turn signals process the left-turn vehicles in this intersection. Intersection D experiences heavy turning traffic toward a nearby garage and operates with a protected left turn. Intersection E also has high volumes of vehicles turning into a nearby garage. This intersection operates with protected-permissive left-turn phasing. In this study, the data analysis periods for Intersections A, D, and E are 55, 15, and 95 min, respectively. The present study focuses on vehicle-to-vehicle in teractions among the various modes of transportation within intersections.", "bbox": [0.5150428042565766, 0.0646335747770474, 0.9407741329285075, 0.4105477339005846], "kind": "body", "chapter_id": "chapter-003", "figure_ids": ["fig-003-01"]}, {"id": "p003-b009", "page": 3, "order": 9, "source": "In addition, crash data is collected to identify traffic conflict mea sures that are highly correlated with crash risk at each signalized intersection at a specific location. For the crash data, this study gathers historical data from 2018 to 2024 and uses Florida crash data provided by Signal Four Analytics (Analytics, 2024) and Florida Department of Transportation (FDOT) State Safety Office (SSO) geographic information system (SSOGis) (State Safety Office and Query Tool, 2024). The drone video data was captured during daylight hours, and accordingly, only", "translation": "In addition, crash data is collected to identify traffic conflict mea sures that are highly correlated with crash risk at each signalized intersection at a specific location. For the crash data, this study gathers historical data from 2018 to 2024 and uses Florida crash data provided by Signal Four Analytics (Analytics, 2024) and Florida Department of Transportation (FDOT) State Safety Office (SSO) geographic information system (SSOGis) (State Safety Office and Query Tool, 2024). The drone video data was captured during daylight hours, and accordingly, only", "bbox": [0.5150428042565766, 0.40734444955654786, 0.9407393743998002, 0.5159754343222318], "kind": "body", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p004-b001", "page": 4, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314300714795301, 0.04240068457413517, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p004-b002", "page": 4, "order": 2, "source": "daytime crash data was used in the analysis to reduce the effect of temporal instability (Mannering, 2017). Data from adverse weather with low visibility conditions were also excluded to ensure a uniform light environment across the dataset. As a result, a total of 129 crashes occurred at that intersection. Moreover, road environment data was constructed based on open street maps, Google Street View, and Florida road GIS data. The list of data to be built includes stop lines, inner in tersections, segregation facilities, bicycle lanes, and road signs. Table 1 summarizes the characteristics of the study site.", "translation": "時間的不安定性の影響を軽減するために、日中の衝突データが分析に使用されました (Mannering、2017)。データセット全体で均一な光環境を確保するために、視界不良の悪天候によるデータも除外されました。その結果、その交差点では合計129件の衝突事故が発生した。また、道路環境データは、オープンストリートマップ、Googleストリートビュー、フロリダ道路GISデータに基づいて構築されました。構築するデータのリストには、停止線、内側交差点、分離施設、自転車レーン、道路標識が含まれます。表 1 は調査地の特徴をまとめたものです。", "bbox": [0.06314280849117021, 0.0646335747770474, 0.48888619114401904, 0.18647843428447422], "kind": "body", "chapter_id": "chapter-003", "figure_ids": []}, {"id": "p004-b003", "page": 4, "order": 3, "source": "2. Methods", "translation": "2. 方法", "bbox": [0.06314280849117021, 0.1964177052640046, 0.13821980145190169, 0.2128358688486317], "kind": "heading", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b004", "page": 4, "order": 4, "source": "This study proposes a framework that consists of four main steps to identify hotspots at intersections on a more micro-level, as depicted in Fig. 2. First, we gather information about the study site from drone video, crash data, and open street maps. Then, the traffic conflict mea sures are calculated at each signal intersection, and a GLM-based crash frequency model is developed. The traffic conflict measures and thresholds that best represent crash risk are selected to identify microlevel hotspots by intersection type. Lastly, each micro-level hotspot’s features are examined by investigating the traffic and road environment characteristics in the sections.", "translation": "This study proposes a framework that consists of four main steps to identify hotspots at intersections on a more micro-level, as depicted in Fig. 2.まず、ドローンのビデオ、衝突データ、公開市街地図などから調査現場に関する情報を収集します。次に、各信号交差点での交通衝突対策が計算され、GLM ベースの衝突頻度モデルが開発されます。交差点の種類ごとにミクロレベルのホットスポットを特定するために、衝突リスクを最もよく表す交通衝突の測定値としきい値が選択されます。最後に、各セクションの交通および道路環境の特性を調査することで、各ミクロレベルのホットスポットの特徴を検討します。", "bbox": [0.06314280849117021, 0.2227741401355291, 0.4888969057937238, 0.3578338644649026], "kind": "body", "chapter_id": "chapter-004", "figure_ids": ["fig-005-01"]}, {"id": "p004-b005", "page": 4, "order": 5, "source": "In this study, TTC, MTTC, and PET are used as traffic conflict mea sures that can indicate the risk of crashes at signalized intersections. The present study focuses on crash risk or near-crash events as an alternative to actual crash data for the identification of high-risk areas. These measures have been used in various traffic safety evaluation studies, as well as in the signalized intersection safety evaluation (Essa and Sayed, 2018; Marisamynathan and Vedagiri, 2020; Ke-jun et al., 2021). TTC is the time until a collision occurs if the current vehicle speed and path are maintained, and the lower the value, the higher the probability of collision (Hayward, 1972). When the position difference between the leading vehicle and the following vehicle is Δx, and the speed difference between the leading vehicle and the following vehicle is Δv = vfollow −vlead, TTC can be expressed as Equation (1).", "translation": "この研究では、信号交差点での衝突の危険性を示す交通衝突対策として、TTC、MTTC、および PET が使用されています。本研究は、高リスク領域を特定するための実際の衝突データの代替として、衝突リスクまたは衝突に近い事象に焦点を当てています。 These measures have been used in various traffic safety evaluation studies, as well as in the signalized intersection safety evaluation (Essa and Sayed, 2018; Marisamynathan and Vedagiri, 2020; Ke-jun et al., 2021). TTC is the time until a collision occurs if the current vehicle speed and path are maintained, and the lower the value, the higher the probability of collision (Hayward, 1972). When the position difference between the leading vehicle and the following vehicle is Δ x, and the speed difference between the leading vehicle and the following vehicle is Δ v = v follow v lead, TTC can be expressed as Equation (1). TTC = Δ x Δ v ∀ Δ v > 0 (1) MTTC は一定の加速度を仮定した競合指数です。 It can detect conflicts in situations where the speeds are similar or where the speed of the following vehicle is lower than that of the leading vehicle, but there is a risk of conflict by considering the relative distance, relative speed, and relative acceleration of the two vehicles (Ozbay et al., 2008). When the acceleration difference between the leading vehicle and the following vehicle is Δ a = a follow a lead, MTTC is expressed in Equation (2). MTTC = Δ v ± ̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅ ̅̅̅̅ ̅ Δ v 2 + 2 Δ a (Δ x) √ Δ a (2) While these metrics can be expressed in those equations when the車両は一次元的に運動しているため、交差点での衝突はさまざまな角度で発生する可能性があり、車両のサイズも異なります。上記の for - mulas は、そのシナリオで大きなエラーを生成します。したがって、別の方法論が必要になります。", "bbox": [0.06314280849117021, 0.35455929434619216, 0.48885943015289035, 0.5295862110703348], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b006", "page": 4, "order": 6, "source": "TTC = Δx Δv∀Δv > 0 (1)", "translation": "Joo et al. (Joo et al., 2024) utilized bounding boxes recorded in a vehicle trajectory dataset based on drone image data to calculate various types of conflict situations, such as rear-end, sideswipe, lane change, crossing, and head-on conflict.彼らは、競合ポイントを見つけるための予測増分競合検索 (PICS) 手法を考案しました。", "bbox": [0.06314402606500029, 0.5327040985936863, 0.48885860989262586, 0.5628361802913365], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b007", "page": 4, "order": 7, "source": "MTTC is a conflict index that assumes constant acceleration. It can detect conflicts in situations where the speeds are similar or where the speed of the following vehicle is lower than that of the leading vehicle, but there is a risk of conflict by considering the relative distance, relative speed, and relative acceleration of the two vehicles (Ozbay et al., 2008). When the acceleration difference between the leading vehicle and the following vehicle is Δa = afollow −alead, MTTC is expressed in Equation (2).", "translation": "PICS アルゴリズムは、さまざまなタイプの競合における競合ポイントを見つけるように設計されたヒューリスティックアルゴリズムです。 The algorithm considers the future movement of the bounding box and calculates the conflict when moving at a constant speed or constant acceleration. It confirms the occurrence of conflict in the coarse search phase and finds the exact point in time when conflict occurs through incremental search in the fine search phase. 2 段階のアプローチは、競合検出の精度を維持しながら計算効率を最適化する効果的な方法です。 TTC と MTTC は PICS アルゴリズムに基づいて計算されました。", "bbox": [0.06314334678696877, 0.5639889796960119, 0.48887737334617587, 0.6731226560572107], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b008", "page": 4, "order": 8, "source": "MTTC = −Δv ± ̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅̅ Δv2 + 2Δa(Δx) √", "translation": "PET は、最初の車両が車両を占有するまでの時間の差です。", "bbox": [0.06314517314771391, 0.6739679346280993, 0.26636757584997933, 0.7018358278612338], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b009", "page": 4, "order": 9, "source": "Δa (2)", "translation": "ある地点と後続車両が連続して到着した時刻を表し、値が低いほど衝突の可能性が高いことを示します。", "bbox": [0.18561904068101287, 0.685418567844948, 0.4888591738215577, 0.7087654664946478], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b010", "page": 4, "order": 10, "source": "While these metrics can be expressed in those equations when the vehicle is in one-dimensional motion, conflict in the intersections can occur at different angles, and the vehicles vary in size. The above for mulas produce large errors in that scenario. Thus, a different method ology is required. Joo et al. (Joo et al., 2024) utilized bounding boxes recorded in a vehicle trajectory dataset based on drone image data to calculate various types of conflict situations, such as rear-end,", "translation": "Equation (3) represents the PET. PET = t 2 t 1 (3) ここで、t 1 は最初の車両が道路上の点を占有する時間、t 2 は同じ点で 2 番目の車両が重なり合った時間です。この研究では、車両の過去の軌跡を一度に 1 フレームずつたどり、軌跡が最初に別の車両と一致した点を探すことによって PET を計算しました。現在時刻 (t 2) と、過去に車両のバウンディングボックスが他の車両と最初に重なった点 (t 1) との差が計算されます。", "bbox": [0.06314394275731719, 0.7098469801246494, 0.48889803365158746, 0.805407752708648], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b011", "page": 4, "order": 11, "source": "Table 1 CitySim Dataset Description Used in This Study.", "translation": "表 1 CitySim Dataset Description Used in This Study.", "bbox": [0.06314280849117021, 0.8291196160688133, 0.32016539625440454, 0.8559670538219902], "kind": "table-caption", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b012", "page": 4, "order": 12, "source": "Intersection Type Feature Collection time", "translation": "これらの指標は競合発生の時間しきい値を設定し、競合の数をカウントするため、競合のしきい値を設定することが重要です (Mahmud et al., 2017; Wang et al., 2021)。", "bbox": [0.07323796303948261, 0.8589638247378864, 0.675860263332254, 0.8828832396685419], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b013", "page": 4, "order": 13, "source": "Intersection A 4-way signalized intersection Large intersection with 9 by 9 lanes 55 min 4,035 99 Intersection D 3-way consecutive signalized intersecti
