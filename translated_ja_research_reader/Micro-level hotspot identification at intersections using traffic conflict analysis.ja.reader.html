igure_ids": []}, {"id": "p011-b037", "page": 11, "order": 37, "source": "0.146 0.103 0.155", "translation": "405 × 停止線 + 0 。", "bbox": [0.7870449529283394, 0.4766069616903172, 0.9147352784301696, 0.4897411157507957], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b038", "page": 11, "order": 38, "source": "road sign 0.826 0.413 0.045* bike lane −1.042 0.209 <0.001***", "translation": "146 × 中央値 + 0 。", "bbox": [0.7011419663402099, 0.498177521880388, 0.9268096120558572, 0.5220977442550933], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b039", "page": 11, "order": 39, "source": "left lane 0.213 0.081 0.009**", "translation": "826 × 道路標識 1 。", "bbox": [0.7011419663402099, 0.5190650613038438, 0.922793310203361, 0.5328833127230036], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b040", "page": 11, "order": 40, "source": "crashes have significantly different precursors, while traffic conflict generally increases the crash risk whatsoever. Moreover, for a given crash type, the best traffic conflict indicator and its threshold levels differ with location, which implies that micro-level hotspot identifica tion should be conducted using models that are specific to both crash type and location.", "translation": "042 × バイクレーン + 0 。", "bbox": [0.5150428042565766, 0.5634902484213123, 0.94074070732273, 0.6457648367651885], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b041", "page": 11, "order": 41, "source": "In this study, the expected number of crashes was calculated based on the final model. Visualization was used to assess how effectively the model, based on the optimal traffic conflict measure, identified microhotspots. Fig. 9 shows the expected crash frequency derived from each model alongside actual crashes. The results indicate that Model 11 (with PET) effectively captures turning-related crash risks, whereas Model 12 (with TTC) is well-suited for identifying rear-end crash risks.", "translation": "213 × 左車線 ] 0.262 インターセプト 0.584 0.061 < 0.001 *** ln(TTC ≤ 3.0 s) 0.711 0.040 < 0.001 *** 停止線 0.405 0.138 0.003 ** 中央分離帯 0.146 0.103 0.155符号 0.826 0.413 0.045* 自転車レーン 1.042 0.209 < 0.001 *** 左車線 0.213 0.081 0.009 ** 注: *p < 0.05、** p < 0.01、*** p < 0.001。", "bbox": [0.5150428042565766, 0.6425605142788021, 0.9407754658514373, 0.738049001395494], "kind": "body", "chapter_id": "chapter-010", "figure_ids": ["fig-012-01"]}, {"id": "p011-b042", "page": 11, "order": 42, "source": "The spatial correlation between the crash and traffic conflict revealed that using traffic conflict-based hotspots enables the detection of precise high-risk areas across all three intersections. While correlation analysis reveals that the TTC and PET were optimal traffic conflict measures, each measure captured different types of crashes. As shown in (d), (e), and (f) in Fig. 9, conflicts defined by TTC were primarily concentrated near stop lines, and the spatial pattern of these conflicts closely matched the distribution of crash occurrences. The result reveals that rear-end conflicts defined by TTC demonstrate strong predictive power for crash frequency. On the other hand, PET-based traffic con flicts were predominantly observed in the inner areas of intersections and were closely associated with non-rear-end crashes. As a result, the two traffic conflict measures showed distinct crash risk patterns across different road sections.", "translation": "N.パークら。", "bbox": [0.5150428042565766, 0.734773393134434, 0.9407674683138586, 0.9225480442666973], "kind": "body", "chapter_id": "chapter-010", "figure_ids": ["fig-012-01"]}, {"id": "p011-b043", "page": 11, "order": 43, "source": "Among all intersection segments, the approaching section exhibited", "translation": "事故分析と予防 220 (2025) 108167 11", "bbox": [0.5351369250206244, 0.9193436448808778, 0.9407207134787833, 0.9357618276903632], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p012-b001", "page": 12, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p012-b002", "page": 12, "order": 2, "source": "Fig. 9. Expected crashes at virtual grids and actual crashes (white dots).", "translation": "図 9. 仮想グリッドで予想される事故と実際の事故 (白い点)。", "bbox": [0.3034289852498749, 0.4888340484852465, 0.6965260029681117, 0.5036102361450868], "kind": "figure-caption", "chapter_id": "chapter-010", "figure_ids": ["fig-012-01"]}, {"id": "p012-b003", "page": 12, "order": 3, "source": "the highest predictive accuracy for rear-end crashes, with an R-square value of 0.262. Given the limited dataset, consisting of only several hours of trajectory data, this level of accuracy is promising, and it sug gests that additional data may further enhance predictive performance. The superior predictive power of TTC relative to other traffic conflict measures aligns with findings from previous studies that applied extreme value theory to estimate crash frequencies at intersections (Chen et al., 2024). However, our analysis further suggests that TTC may not be universally effective in predicting entire crash types and loca tions. For inner intersection crashes, such as those involving left-turn maneuvers, the prediction performance with TTC is generally poor across all evaluated thresholds. PET is found to be the most effective measure for estimating crashes within the inner intersection, but even the best model yielded an R-square value of 0.216. These results imply that further development of a predictive traffic conflict measure for inner intersection crashes may be beneficial.", "translation": "R 2 乗値は 0.262 で、追突事故の予測精度が最も高くなります。わずか数時間の軌跡データで構成される限られたデータセットを考慮すると、このレベルの精度は有望であり、データを追加することで予測パフォーマンスがさらに向上する可能性があることを示唆しています。他の交通衝突対策と比較した TTC の優れた予測力は、交差点での衝突頻度を推定するために極値理論を適用した以前の研究の結果と一致しています (Chen et al., 2024)。しかし、私たちの分析はさらに、TTC が衝突の種類と場所全体を予測するのに普遍的に有効ではない可能性があることを示唆しています。左折操作を伴う衝突など、交差点内側の衝突の場合、TTC による予測パフォーマンスは、評価されたすべてのしきい値にわたって一般に劣ります。 PET は内側の交差点内の衝突事故を推定するのに最も効果的な尺度であることがわかっていますが、最良のモデルでも R 二乗値は 0.216 でした。これらの結果は、交差点内側の衝突に対する予測交通衝突対策をさらに開発することが有益である可能性があることを示唆しています。", "bbox": [0.06314280849117021, 0.5159194130850692, 0.48889695705999037, 0.7300494609465075], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p012-b004", "page": 12, "order": 4, "source": "4. Implications", "translation": "4. 示唆", "bbox": [0.06314280849117021, 0.7399887127011795, 0.16340435488478317, 0.7564068955106649], "kind": "heading", "chapter_id": "chapter-011", "figure_ids": []}, {"id": "p012-b005", "page": 12, "order": 5, "source": "The primary conclusion of this study is that micro-level hotspot identification requires the use of different traffic conflict measures and thresholds based on the characteristics of each intersection. In addition, the crash frequency regression results suggest that various geometric locations, such as the inner intersection, approaching section, and other intersection environments, exhibit distinct risk patterns that lead to crashes. The identified micro-level hotspots can inform targeted traffic safety countermeasures for mitigating specific crash types.", "translation": "この研究の主な結論は、ミクロレベルのホットスポットを特定するには、各交差点の特性に基づいて、さまざまな交通衝突対策としきい値を使用する必要があるということです。さらに、衝突頻度回帰の結果は、交差点内側、進入セクション、その他の交差点環境などのさまざまな幾何学的位置が、衝突につながる明確なリスクパターンを示していることを示唆しています。特定されたミクロレベルのホットスポットは、特定のタイプの衝突を軽減するための対象となる交通安全対策を知らせることができます。", "bbox": [0.06314280849117021, 0.766345147572704, 0.4888969057937238, 0.8749771320310209], "kind": "body", "chapter_id": "chapter-011", "figure_ids": []}, {"id": "p012-b006", "page": 12, "order": 6, "source": "One example is the application of pavement marking extensions as outlined in the Manual on Uniform Traffic Control Devices (MUTCD). These markings help guide vehicles through intersections with complex road designs or visibility constraints, such as misaligned left-turn lanes", "translation": "一例は、統一交通制御装置マニュアル (MUTCD) に概要が記載されている舗装標示拡張の適用です。これらのマーキングは、左折車線の位置がずれていたり、複数の方向転換オプションがあるなど、複雑な道路設計や見通しの制約がある交差点を車両が通過できるようにするのに役立ちます (Administration, 2009)。", "bbox": [0.06314280849117021, 0.8717728095446347, 0.4888567643070308, 0.9276900017740699], "kind": "body", "chapter_id": "chapter-011", "figure_ids": []}, {"id": "p012-b008", "page": 12, "order": 8, "source": "or multiple turning options (Administration, 2009). The micro-level hotspot identification results for intersection E (Fig. 8) indicate that when PET-based conflict risk for left-turning traffic is high, extending left-turn lane markings into the intersection can help guide vehicles and enhance safety.", "translation": "交差点Eのミクロレベルのホットスポット特定結果（図8）は、左折交通に対するPETベースの衝突リスクが高い場合、左折車線区分線を交差点まで延長することで車両の誘導に役立ち、安全性を向上できることを示しています。もう一つの対策としては、分離自転車レーンの導入が挙げられます。", "bbox": [0.5150428042565766, 0.5159194130850692, 0.9407568049304204, 0.5850504271878869], "kind": "body", "chapter_id": "chapter-011", "figure_ids": ["fig-009-02"]}, {"id": "p012-b009", "page": 12, "order": 9, "source": "Another countermeasure involves the implementation of separated bike lanes. As illustrated in Fig. 7, intersection D exhibits a high TTCbased conflict risk in the lane adjacent to the bicycle lane. In such cases, physical separation, such as curbs and greenery, can reduce traffic conflicts and improve cyclist safety (Federal Highway Administration, 2009b). In summary, micro-level hotspot identification provides essen tial data for safety management, enabling the implementation of location-specific countermeasures to address high-risk areas.", "translation": "図７に示すように、交差点Ｄは、自転車レーンに隣接する車線において、ＴＴＣに基づく衝突リスクが高い。このような場合、縁石や緑地などの物理的な分離によって交通衝突が減り、自転車利用者の安全性が向上する可能性があります (連邦道路管理局、2009b)。要約すると、ミクロレベルのホットスポットの特定は安全管理に不可欠なデータを提供し、高リスクエリアに対処するための場所固有の対策を実行できるようにします。", "bbox": [0.5150428042565766, 0.5818471428438502, 0.9407795671527598, 0.6904781660592508], "kind": "body", "chapter_id": "chapter-011", "figure_ids": ["fig-009-01"]}, {"id": "p012-b010", "page": 12, "order": 10, "source": "5. Conclusions", "translation": "5. 結論", "bbox": [0.5150428042565766, 0.7004174178139229, 0.6122637419740097, 0.7168356006234083], "kind": "heading", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p012-b011", "page": 12, "order": 11, "source": "Numerous studies and governmental efforts have led to the devel opment of effective safety measures at signalized intersections. Despite their proven success in reducing crashes, further improvements require identifying micro-level hotspots where crash risks remain high to pro vide targeted and cost-effective countermeasures. This study attempts to find micro-level hotspots at signalized intersections using crash records and various conflict measures based on vehicle trajectory data. The study has developed a GLM to estimate crash frequency on the lanewidth-sized grid on the intersection and identify optimal traffic con flict measures and their threshold. It also has identified potential highrisk areas without crash records. Police reports offer valuable general insights; however, they are inherently limited due to the infrequency of crash events and the potential for underreporting. There is a lack of documentation of near-crash events, which limits the ability to comprehensively understand crash risk at intersections. To address this", "translation": "数多くの研究と政府の取り組みにより、信号交差点における効果的な安全対策の開発が行われてきました。事故の削減には成功していることが証明されていますが、さらなる改善には、ターゲットを絞った費用対効果の高い対策を提供するために、事故のリスクが依然として高いミクロレベルのホットスポットを特定する必要があります。この研究では、車両の軌跡データに基づく衝突記録とさまざまな衝突対策を使用して、信号交差点でのミクロレベルのホットスポットを発見することを試みています。この研究では、交差点の車線幅サイズのグリッドでの衝突頻度を推定し、最適な交通衝突対策とそのしきい値を特定するための GLM を開発しました。また、衝突記録がない潜在的な高リスク地域も特定しました。警察の報告書は貴重な一般的な洞察を提供します。ただし、事故イベントの頻度が低く、過小報告される可能性があるため、本質的に制限されています。衝突寸前の出来事に関する文書が不足しているため、交差点での衝突リスクを包括的に理解する能力が制限されています。これに対処するために、図 9. 仮想グリッドで予想される事故と実際の事故 (白い点)。 N.パークら。事故分析と予防 220 (2025) 108167 12", "bbox": [0.5150428042565766, 0.7267738526854474, 0.9407608036992098, 0.9276900017740699], "kind": "body", "chapter_id": "chapter-012", "figure_ids": ["fig-012-01"]}, {"id": "p013-b001", "page": 13, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314727506464164, 0.04239727696799684, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p013-b002", "page": 13, "order": 2, "source": "gap, this study utilizes traffic conflict measures to objectively identify high-conflict zones, offering a clearer picture of vehicular interactions and potential safety concerns. Our comprehensive approach enabled a detailed analysis of micro-level hotspots at each intersection, leading to the proposal of more targeted safety countermeasures, such as pavement marking enhancements, extended left-turn bays, or separated bike lanes, based on the specific conflict patterns observed at each site.", "translation": "このギャップを考慮して、この研究では交通コンフリクト指標を利用して高紛争地域を客観的に特定し、車両の相互作用と潜在的な安全上の懸念についてより明確な全体像を提供します。当社の包括的なアプローチにより、各交差点のミクロレベルのホットスポットの詳細な分析が可能になり、各現場で観察された特定の衝突パターンに基づいて、舗装標識の強化、左折区画の拡張、自転車レーンの分離など、より的を絞った安全対策の提案につながりました。この研究の主な貢献は、衝突事故と交通衝突の関係をよりミクロレベルの観点から分析したことです。", "bbox": [0.06314275722490367, 0.0646335747770474, 0.48889818745038705, 0.16012201863780806], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p013-b003", "page": 13, "order": 3, "source": "The main contribution of this study is to analyze the relationship between crashes and traffic conflicts from a more micro-level perspec tive. Our analysis suggests that the majority of crashes at signalized intersections occurred mostly before the stop line and inside the inter section during the left turns, which aligns with the patterns identified by traffic conflict-based hotspots. The visualization of traffic conflict mea sure demonstrates that TTC is effective in describing rear-end crashes that occur prior to reaching the stop line, whereas PET is effective in describing crashes that occur within the intersection. The results of the GLM model support this observation, indicating that incorporating TTC and PET in both the inner intersection model and approaching section model offers a more accurate estimation of micro-level crash hotspots. These findings were more pronounced at intersections with high traffic volumes, where conflicts and crashes are more likely to occur.", "translation": "私たちの分析によると、信号交差点での衝突事故の大部分は、主に停止線の手前と左折時の交差点内側で発生しており、これは交通衝突ベースのホットスポットによって特定されたパターンと一致しています。交通衝突対策の視覚化は、TTC が停止線に到達する前に発生する追突事故を説明するのに効果的であるのに対し、PET は交差点内で発生する衝突を説明するのに効果的であることを示しています。 GLM モデルの結果はこの観察を裏付けており、内側交差点モデルと進入セクションモデルの両方に TTC と PET を組み込むことで、ミクロレベルの衝突ホットスポットのより正確な推定が提供されることを示しています。これらの結果は、衝突や衝突が発生しやすい交通量の多い交差点でより顕著でした。この研究には、将来の研究で解決する必要があるいくつかの制限があります。まず、この研究では、観察期間が限られていたため、交差点のリアルタイム信号機が紛争に与える影響を判断できませんでした。", "bbox": [0.06314275722490367, 0.15691769615142176, 0.4888808594522999, 0.3446200041418035], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p013-b004", "page": 13, "order": 4, "source": "This study has several limitations that future studies should address. First, the study was unable to determine the impact of real-time traffic signals at intersections on conflicts due to the limited observation period. Also, crash records are manually documented by police officers at the scene, leading to imprecise location information. This lack of spatial accuracy may reduce the accuracy of the micro-level crash fre quency model and decrease generalizability when crash location data is not sufficiently accurate. In addition, this study only uses data from small periods collected at three intersections at a university campus, which may not be representative of broader driving behaviors. The analysis also focused exclusively on signalized intersections, which limit the applicability of our findings to other roadway environments.", "translation": "また、衝突記録は現場の警察官によって手作業で記録されるため、位置情報が不正確になる可能性があります。この空間精度の欠如により、衝突位置データが十分に正確でない場合、ミクロレベルの衝突頻度モデルの精度が低下し、一般化可能性が低下する可能性があります。さらに、この研究では大学キャンパス内の 3 つの交差点で収集された短期間のデータのみを使用しているため、より広範な運転行動を表していない可能性があります。また、分析は信号交差点のみに焦点を当てていたため、調査結果の他の道路環境への適用は制限されていました。これらの限界に対処するために、将来の研究では、地上設置カメラやLiDARシステムなどの長期観測を提供するソースからデータを取得することにより、より広い時間範囲にわたるデータの収集と分析を検討する必要があります。", "bbox": [0.06314275722490367, 0.3414157201051338, 0.48889557287079405, 0.5028328213240898], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p013-b005", "page": 13, "order": 5, "source": "To address these limitations, future studies should consider collect ing and analyzing data over a broader temporal range by obtaining data from sources that offer long-term observation, such as ground-mounted cameras or LiDAR systems. By leveraging these sensors, conflicts be tween diverse transportation modes, including pedestrians, cyclists, and other types of mobility, can be thoroughly evaluated. Additionally, it is necessary to adopt more precise crash location data and develop a more scientific method to evaluate crash location accuracy, thereby enhancing the accuracy of micro-level safety analyses. To support the generalizability of the conflict-crash associations and validate the results obtained, additional case studies are necessary across diverse infra structure types, including roundabouts, stop-controlled intersections, and freeway segments. Despite these limitations, proposed micro-level hotspots enable road administrators and safety practitioners to eval uate and refine traffic safety policies. Moreover, examining the distri bution patterns of these micro-level hotspots across different intersection configurations can provide valuable insights for road design processes.", "translation": "これらのセンサーを活用することで、歩行者、自転車、その他のモビリティを含む多様な交通手段間の競合を徹底的に評価できます。さらに、より正確な衝突位置データを採用し、衝突位置の精度を評価するためのより科学的な方法を開発し、それによってミクロレベルの安全分析の精度を高める必要があります。紛争と衝突の関連性の一般化可能性を裏付け、得られた結果を検証するには、ラウンドアバウト交差点、一時停止規制のある交差点、高速道路区間など、さまざまな種類のインフラストラクチャにわたって追加のケーススタディが必要です。これらの制限にもかかわらず、提案されているミクロレベルのホットスポットにより、道路管理者や安全担当者は交通安全政策を評価し、改善することができます。さらに、さまざまな交差点構成にわたるこれらのミクロレベルのホットスポットの分布パターンを調査することにより、道路設計プロセスに貴重な洞察が得られます。 CRediT 著者寄稿文ヌリ・パーク: 執筆 - 原案、検証、方法論、形式分析、概念化、執筆 - レビューと編集、視覚化、ソフトウェア、調査、データキュレーション。 Juneyoung Park: 執筆 - 原案、リソース、調査、正式な分析、執筆 - レビューと編集、監督、プロジェクト管理、資金調達。 Yang-Jun Joo: 執筆 - レビューと編集、ソフトウェア、調査、概念化、執筆 - 原案、方法論、データキュレーション。", "bbox": [0.06314278285803694, 0.49955728996246307, 0.48889962290584993, 0.7400447723880589], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p013-b006", "page": 13, "order": 6, "source": "CRediT authorship contribution statement", "translation": "Mohamed Abdel-Aty: 執筆 – レビューと編集、監修、形式的分析、執筆 – オリジナルドラフト、リソース、データのキュレーション。", "bbox": [0.06314280849117021, 0.7499840241427309, 0.33518143951985246, 0.7664022069522163], "kind": "body", "chapter_id": "chapter-012", "figure_ids": []}, {"id": "p013-b007", "page": 13, "order": 7, "source": "Nuri Park: Writing – original draft, Validation, Methodology, Formal analysis, Conceptualization, Writing – review & editing, Visu alization, Software, Investigation, Data curation. Juneyoung Park: Writing – original draft, Resources, Investigation, Formal analysis, Writing – review & editing, Supervision, Project administration, Fund ing acquisition. Yang-Jun Joo: Writing – review & editing, Software, Investigation, Conceptualization, Writing – original draft, Methodology, Data curation. Mohamed Abdel-Aty: Writing – review & editing, Su pervision, Formal analysis, Writing – original draft, Resources, Data curation.", "translation": "競合利益の宣言著者らは、潜在的な競合利益とみなされる可能性のある以下の経済的利益/人的関係を宣言します: Juneyoung Park は、国土交通省が資金提供する韓国インフラ技術推進庁の補助金によって資金援助が提供されたと報告しています。", "bbox": [0.06314278285803694, 0.776340382114822, 0.4888902411790749, 0.9114002410182038], "kind": "body", "chapter_id":
