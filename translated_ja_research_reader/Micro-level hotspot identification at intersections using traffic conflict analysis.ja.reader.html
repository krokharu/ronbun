on", "translation": "これまでの研究では、交通衝突に対するさまざまなしきい値を設定することで、衝突リスク予測のモデリングが行われてきました（Xie et al., 2018; Borsos et al., 2020）。", "bbox": [0.07323796303948261, 0.8863206443372756, 0.8377652337198331, 0.9210252816883917], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b014", "page": 4, "order": 14, "source": "Left-turning vehicles heading for the large student garage", "translation": "この研究では、信号交差点グリッドユニットの GLM ベースの衝突頻度モデルを開発します。", "bbox": [0.35618702323653784, 0.8971059436571694, 0.5981350665159302, 0.9210252816883917], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b015", "page": 4, "order": 15, "source": "Intersection E 3-way signalized intersection Permissive left-turning phasing 95 min 690 22", "translation": "各しきい値での交通衝突の数は、0.1 秒間隔で 0.1 ～ 3.0 秒のさまざまな値に設定されます。", "bbox": [0.07323796303948261, 0.9187487508648302, 0.8377652337198331, 0.931882866475592], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b017", "page": 4, "order": 17, "source": "sideswipe, lane change, crossing, and head-on conflict. They devised the Predictive Incremental Conflict Search (PICS) methodology to find conflict points. The PICS algorithm is a heuristic algorithm designed to find conflict points in various conflict types. The algorithm considers the future movement of the bounding box and calculates the conflict when moving at a constant speed or constant acceleration. It confirms the occurrence of conflict in the coarse search phase and finds the exact point in time when conflict occurs through incremental search in the fine search phase. The two-step approach is an effective method for opti mizing computational efficiency while maintaining the accuracy of conflict detection. TTC and MTTC were calculated based on the PICS algorithm.", "translation": "2.1.衝突頻度モデル以前の研究では、GLM は衝突頻度モデルの開発に適用されてきました (Essa and Sayed、2018)。この論文では、グリッド単位の交差点内で発生する衝突の頻度を従属変数として、しきい値ごとの交通衝突対策の発生数を独立変数として、GLM ベースのモデルを開発します。 GLMは衝突予測モデルだけでなく衝突予測モデルにも利用されており、交通事故発生頻度予測では主にポアソン分布や負の二項分布を確率分布として仮定して解析が行われていました。本研究では負の二項分布を考慮してGLMモデルを構築する。", "bbox": [0.5150425991915105, 0.06464018812831163, 0.9407740303959745, 0.22605634252299506], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b018", "page": 4, "order": 18, "source": "PET is the difference between the time the first vehicle occupies a certain point and the time the second vehicle arrives in succession, with a lower value indicating a higher probability of collision. Equation (3) represents the PET.", "translation": "負の二項モデルは、データセット内で過分散が発生した場合のポアソンモデルの制限に対処します。", "bbox": [0.5150425991915105, 0.2227817531794263, 0.9407298388742256, 0.278770211958677], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b019", "page": 4, "order": 19, "source": "PET = t2 −t1 (3)", "translation": "等分散を仮定するポアソンモデルとは異なり、負の二項モデルを使用すると、不均一な衝突パターンをより正確にモデリングできます。", "bbox": [0.5150425991915105, 0.28227603789819394, 0.9407668531186603, 0.2986989307979693], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b020", "page": 4, "order": 20, "source": "where t1 is the time that the first vehicle occupies a point on the road, and t2 is the time that the second vehicle overlapped at the same point. This study calculated PET by retracing the past trajectory of the vehicle one frame at a time, looking for the point where the trajectory first matched another vehicle. The difference between the current time (t2) and the point where the vehicle’s bounding box first overlapped with the other vehicle in the past (t1) is calculated.", "translation": "ポアソンガンマモデルとしても知られる負の二項分布は、ランダム誤差がガンマ分布に従うと仮定しています。本研究では、すべての交差点 A、D、E の衝突頻度モデルを開発します。", "bbox": [0.5150480846820292, 0.3068469448278095, 0.9407653151306644, 0.4025143961506604], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b021", "page": 4, "order": 21, "source": "Since these indicators set the time threshold for conflict occurrence and count the number of conflicts, it is important to set the threshold for conflict (Mahmud et al., 2017; Wang et al., 2021). In previous studies, modeling for crash risk prediction has been performed by setting various thresholds for traffic conflicts (Xie et al., 2018; Borsos et al., 2020). This study develops a GLM-based crash frequency model for a signalized intersection grid unit, with the number of traffic conflicts at each threshold set to various values from 0.1 to 3.0 s at 0.1-second intervals.", "translation": "一方、衝突の数が 0 の場合に、予測される衝突リスクに対する交通衝突の影響を排除するモデルを構築するために、この研究で使用されるこの表 1 CitySim データセットの説明を使用します。交差点の種類特徴収集時間事故発生台数（2018年～2024年） A交差点信号交差点 9×9車線の大型交差点 55分 4,035 99 交差点D 三方連続信号交差点大学生車庫方面左折車 15分 300 8 交差点E 三方信号交差点左折容認 95台 min 690 22 N. Park et al.事故分析と予防 220 (2025) 108167 4", "bbox": [0.5150492125398929, 0.39906091950036593, 0.9407685961717223, 0.5077631900407237], "kind": "body", "chapter_id": "chapter-004", "figure_ids": []}, {"id": "p004-b022", "page": 4, "order": 22, "source": "2.1. Crash frequency model", "translation": "2.1. 事故頻度モデル", "bbox": [0.5150492125398929, 0.5225596407012397, 0.6752810570529977, 0.5389777850610086], "kind": "heading", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p004-b023", "page": 4, "order": 23, "source": "In previous studies, the GLM has been applied to develop a crash frequency model (Essa and Sayed, 2018). A GLM-based model is developed with the frequency of crashes occurring within grid-unit in tersections as the dependent variable and the number of occurrences of traffic conflict measures for each threshold as the independent variable in this paper. GLM has been used not only for crash prediction models but also for conflict prediction models, and for traffic crash frequency prediction, analysis was mainly performed by assuming Poisson or negative binomial distribution as a probability distribution. In this study, we construct a GLM model by considering negative binomial distribution. The negative binomial model addresses the limitations of Poisson models when overdispersion occurs in a dataset. Unlike the Poisson model, which assumes equidispersion, the negative binomial model allows for more accurate modeling of heterogeneous crash pat terns. The negative binomial distribution, also known as the Poissongamma model, assumes that the random error follows a gamma distri bution. The present study develops a crash frequency model for all in tersections A, D, and E.", "translation": "In previous studies, the GLM has been applied to develop a crash frequency model (Essa and Sayed, 2018). A GLM-based model is developed with the frequency of crashes occurring within grid-unit in tersections as the dependent variable and the number of occurrences of traffic conflict measures for each threshold as the independent variable in this paper. GLM has been used not only for crash prediction models but also for conflict prediction models, and for traffic crash frequency prediction, analysis was mainly performed by assuming Poisson or negative binomial distribution as a probability distribution. In this study, we construct a GLM model by considering negative binomial distribution. The negative binomial model addresses the limitations of Poisson models when overdispersion occurs in a dataset. Unlike the Poisson model, which assumes equidispersion, the negative binomial model allows for more accurate modeling of heterogeneous crash pat terns. The negative binomial distribution, also known as the Poissongamma model, assumes that the random error follows a gamma distri bution. The present study develops a crash frequency model for all in tersections A, D, and E.", "bbox": [0.5150492125398929, 0.548987361347438, 0.9407631619474701, 0.7894035964480767], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p004-b024", "page": 4, "order": 24, "source": "Meanwhile, to build a model that eliminates the impact of traffic conflict on predicted crash risks when the number of conflicts is 0, this", "translation": "Meanwhile, to build a model that eliminates the impact of traffic conflict on predicted crash risks when the number of conflicts is 0, this", "bbox": [0.5150492125398929, 0.7862002736543233, 0.9407805924780903, 0.8157609541128008], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p004-b025", "page": 4, "order": 25, "source": "Number of vehicles", "translation": "Number of vehicles", "bbox": [0.7150394309362389, 0.8589638247378864, 0.7723391731079313, 0.8828832396685419], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p004-b026", "page": 4, "order": 26, "source": "Crashes (2018–2024)", "translation": "Crashes (2018–2024)", "bbox": [0.825704793252375, 0.8589638247378864, 0.8897553799332759, 0.8828832396685419], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p004-b027", "page": 4, "order": 27, "source": "15 min 300 8", "translation": "15 min 300 8", "bbox": [0.6209458380096713, 0.8971059436571694, 0.8317349878529708, 0.9102400592679313], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b001", "page": 5, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b002", "page": 5, "order": 2, "source": "Fig. 2. Research framework for the signalized intersection micro-level hotspot identification Calculating Traffic Conflict Measures.", "translation": "図 2. Research framework for the signalized intersection micro-level hotspot identification Calculating Traffic Conflict Measures.", "bbox": [0.14714266950832164, 0.3246198072792542, 0.8529290263654206, 0.3393959949390945], "kind": "figure-caption", "chapter_id": "chapter-005", "figure_ids": ["fig-005-01"]}, {"id": "p005-b003", "page": 5, "order": 3, "source": "study reflected conflict indicators at each threshold value in the form of exposure variables in the model by referring to existing literature (Essa and Sayed, 2018). When E(Y|x) denotes the estimated number of crashes, x is another independent variable, and C is a conflict indicator (TTC, MTTC, and PET); it can be expressed as Equation (4). Here, α and βi represent the coefficients of each variable. This study adds 1 to traffic conflict indicators during model estimation to avoid the problem of the log-transformed value converging to minus infinity when traffic conflict is zero.", "translation": "この研究は、既存の文献を参照することにより、モデル内のエクスポージャー変数の形式で各閾値における競合指標を反映しました (Essa and Sayed、2018)。 E (Y | x) が衝突の推定数を表す場合、x は別の独立変数、C は競合指標 (TTC、MTTC、および PET) です。それは式(4)のように表すことができます。ここで、α、β i は各変数の係数を表す。この調査では、交通コンフリクトがゼロの場合に対数変換された値がマイナス無限大に収束する問題を回避するために、モデル推定中に交通コンフリクト指標に 1 を追加します。 E (Y | x) = C β 0 × exp [ α + ∑ j i = 1 β i x i ] (4) GLM を開発した後、この研究では、衝突頻度に最もよく関連する交通衝突測定値を見つけるために、さまざまな交通衝突測定値としきい値を使用して各モデルの R 二乗を測定します。", "bbox": [0.06314280849117021, 0.35170521032879354, 0.48889962290584993, 0.47354967092041006], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b006", "page": 5, "order": 6, "source": "α + ∑ j", "translation": "R2乗(R2)はモデルの説明力を示す尺度であり、値が大きいほどモデルの説明力が高くなります(式(5)。", "bbox": [0.1816182725072752, 0.47926499060250477, 0.2253723776535676, 0.5019005694941332], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b007", "page": 5, "order": 7, "source": "E(Y|x) = Cβ0 × exp", "translation": "R2乗が0.5の場合、独立変数がモデル内の従属変数の50%を説明すると解釈できます。", "bbox": [0.06314384022478413, 0.4872033575522972, 0.1738251207166778, 0.5036227323029988], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b008", "page": 5, "order": 8, "source": "(4)", "translation": "R2 = 1 SSR SST = SSE SST (5) ここで、SSTは平方和の総和、SSRは次の残差和を指します。", "bbox": [0.46733005899106755, 0.48720428034549684, 0.48885937888662384, 0.5036224247052656], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b009", "page": 5, "order": 9, "source": "βixi", "translation": "この研究では、R 二乗値が最も高いモデル内の特定のしきい値による衝突測定に焦点を当てています。", "bbox": [0.22752302316763598, 0.48720458794323007, 0.24698123716164522, 0.5044370973016988], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b010", "page": 5, "order": 10, "source": "i=1", "translation": "これは、衝突頻度モデルを構築する際に、従属変数である衝突の有無が重要です。", "bbox": [0.20866625219599053, 0.5021213093174353, 0.22258185223380453, 0.5127929897246208], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b011", "page": 5, "order": 11, "source": "After developing the GLM, this study measures the R-squared of each model with different traffic conflict measures and thresholds to find the traffic conflict measures that are best related to the crash frequency. Rsquared (R2) is a measure that indicates the explanatory power of a model, and the higher the value, the more explanatory power the model has (Equation (5). If R-squared is 0.5, it can be interpreted that the independent variable explains 50 % of the dependent variable in the model.", "translation": "この研究では、Signal Four Analytics と SSOGis の 2 つのデータソースから位置座標を含む衝突データを収集します。 Analytics, 2024; State Safety Office and Query Tool, 2024) ただし、手動衝突報告システムの特性により、位置情報の精度が損なわれ、検証が困難であることが、そのような方法論の 1 つとして提案されています (Lee et al., 2018; Iqbal et al., 2020)。 Iqbal et al. (2018) は、交差点の停止線から 50 フィートの円形バッファーを確立することで衝突データを収集しました。 Iqbal et al. (2020) は、右から右への車道バッファーの精度を評価するために使用されました。", "bbox": [0.06314457076908217, 0.5169899685458248, 0.48889423994786424, 0.6262637172247887], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b012", "page": 5, "order": 12, "source": "R2 = 1 −SSR SST = SSE SST (5)", "translation": "R2 = 1 −SSR SST = SSE SST (5)", "bbox": [0.06314457076908217, 0.629133334927715, 0.4888589687564916, 0.6592654550750819], "kind": "metadata", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b013", "page": 5, "order": 13, "source": "where SST is a total sum of squares, SSR refers to the residual sum of squares, and SSE is the regression sum of squares. This study focuses on the conflict measure with certain thresholds in the model with the highest R-squared value. This is considered to be an indicator that can best represent the crash risk for the micro-level hotspot identification.", "translation": "このプロセスでは、私道バッファを設定する際に車両のサイズを考慮して、30 フィートのバッファも考慮されました。ただし、本研究は、主にマクロレベルまたはメソレベルでの衝突データの分析と評価に焦点を当てている以前の研究とは異なります。この研究では、一般的な車両の寸法と衝突位置の精度を考慮して、各衝突位置の周囲に 30 フィートのバッファを適用しました。", "bbox": [0.0631437505088177, 0.6651328049368206, 0.4888898310489427, 0.734264857181988], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b014", "page": 5, "order": 14, "source": "When building a crash frequency model, the presence or absence of a crash, which is a dependent variable, is important. This study collects crash data containing the location coordinates from two data sources, Signal Four Analytics and SSOGis (Analytics, 2024; State Safety Office and Query Tool, 2024). However, due to the characteristics of the manual crash reporting system, the accuracy of the location information is compromised and challenging to validate. Previous studies have suggested methodologies to correct crash location data and enhance the reliability of crash data. One such methodology involves the use of a buffer (Lee et al., 2018; Iqbal et al., 2020). Lee et al. (Lee et al., 2018) collected crash data by establishing a 50-ft circular buffer from the intersection stop line. This approach was employed to complement the inaccuracy of crash data during the intersection crash modeling process. Iqbal et al. (Iqbal et al., 2020) conducted a study to evaluate the accu racy of crash location data. They considered right-in-right-out driveway", "translation": "衝突位置の精度は、記録された衝突位置および衝突方法と比較することによって手動で評価され、その後、衝突頻度モデルが作成され、すべての衝突の頻度が推定されます。 2.2. 仮想グリッドを使用したミクロレベルのホットスポットの特定当社の分析フレームワークは、交通衝突イベント、過去の衝突記録、道路環境データを均一なグリッド単位で体系的に集約することで、交差点内の衝突頻度を推定するように設計されています。空間的に明示的な分析が容易になります。この方法論は、一時的な安定性仮説に基づいており、短期的な交通衝突パターンは、安定した潜在的な衝突リスクを示していると仮定します。したがって、これらの観察された短期衝突は、各特定のグリッドセル内で長期衝突が発生する原因となる危険な相互作用を十分に表していると考えられます。研究領域をグリッドセルに離散化することは各セル内の均一性を前提としていますが、この空間解析技術は的を絞った効果的な安全介入を開発するために不可欠です。これにより、従来の交差点レベルのリスク評価から脱却でき、特定の高リスクゾーンを正確に特定できるようになります。効果的なミクロレベルの衝突解析には、適切なグリッドサイズの選択が重要です。", "bbox": [0.0631437505088177, 0.730989248920928, 0.4888951627406618, 0.9319053980095504], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b016", "page": 5, "order": 16, "source": "buffers, full-access driveway buffers, and other buffers before evaluating the accuracy of crash data. In this process, a 30-ft buffer was additionally considered, accounting for the size of the vehicle when setting the driveway buffer. However, there is still no scientific way to determine the buffer size and accuracy of crash location data.", "translation": "グリッドが小さすぎると、限られた数のセルに事故が集中してインフレがゼロになる可能性があります。対照的に、グリッドが大きすぎると、ミクロレベルの分析が無効になる可能性があります。このトレードオフに対処するために、この研究では 3.6 m × 3.6 m の仮想グリッドを実装します。", "bbox": [0.5150437783156406, 0.3517075557615093, 0.9407752607863712, 0.4208395311072434], "kind": "body", "chapter_id": "chapter-005", "figure_ids": []}, {"id": "p005-b017", "page": 5, "order": 17, "source": "The present study is distinct from previous research, which primarily focuses on the analysis and evaluation of crash data at the macroor meso-level. In contrast, this study aims to evaluate crash hotspots at the micro-level, specifically within smaller, grid-based areas, which require smaller buffer sizes. In this study, a 30-ft buffer was applied around each crash location, considering typical vehicle dimensions and the accuracy of the crash location. The accuracy of the crash location was manually assessed by comparing the police report diagrams with the recorded crash location and manner of collision. Aggregated crashes are subse quently calculated by grid unit, and a crash frequency model is devel oped. As a result, the crash frequency model estimates the frequency of all crashes that are recorded within 30 feet of the grid.", "translation": "これは一般的な車線幅と一致しています。この粒度は意図的なものであり、そうでなければ不明瞭になる可能性のあるレーン間のリスクのミクロレベルの変動を特定できるようになります。その後、このグリッド単位に基づいて衝突頻度モデルが構築されます。図 3 にこれらを示します。 N.パークら。事故分析と予防 220 (2025) 108167 5", "bbox": [0.5150437783156406, 0.4175639612959, 0.9407830532588838, 0.5789811009645727], "kind": "body", "chapter_id": "chapter-005", "figure_ids": ["fig-006-01"]}, {"id": "p005-b018", "page": 5, "order": 18, "source": "2.2. Micro-level hotspot identification using virtual grid", "translation": "2.2. 仮想グリッドを用いたミクロレベルのホットスポット特定", "bbox": [0.5150437783156406, 0.5926337879038268, 0.8297809228379118, 0.6090519322635956], "kind": "heading", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p005-b019", "page": 5, "order": 19, "source": "Our analytical framework is designed to estimate crash frequency at a micro-level within intersections, focusing on highly specific zones. This is achieved by systematically aggregating traffic conflict events, historical crash records, and road environment data within uniform grid units. The adoption of these ‘virtual grids’ facilitates a spatially explicit analysis. This methodology is based on the temporal stability hypothe sis, which posits that the short-term traffic conflict patterns are indica tive of stable, underlying crash risks. These observed short-term conflicts are, therefore, considered sufficiently representative of the hazardous interactions that contribute to long-term crash occurrences within each specific grid cell. While discretizing the study area into grid cells assumes homogeneity within each cell, this spatial analysis tech nique is crucial for developing targeted and effective safety in terventions. It allows for a departure from conventional intersectionlevel risk assessments, enabling us to pinpoint specific high-risk zones.", "translation": "Our analytical framework is designed to estimate crash frequency at a micro-level within intersections, focusing on highly specific zones. This is achieved by systematically aggregating traffic conflict events, historical crash records, and road environment data within uniform grid units. The adoption of these ‘virtual grids’ facilitates a spatially explicit analysis. This methodology is based on the temporal stability hypothe sis, which posits that the short-term traffic conflict patterns are indica tive of stable, underlying crash risks. These observed short-term conflicts are, therefore, considered sufficiently representative of the hazardous interactions that contribute to long-term crash occurrences within each specific grid cell. While discretizing the study area into grid cells assumes homogeneity within each cell, this spatial analysis tech nique is crucial for developing targeted and effective safety in terventions. It allows for a departure from conventional intersectionlevel risk assessments, enabling us to pinpoint specific high-risk zones.", "bbox": [0.5150437783156406, 0.6189912224679842, 0.9407684936391892, 0.8199063718639739], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p005-b020", "page": 5, "order": 20, "source": "The selection of an appropriate grid size is crucial for effective microlevel crash analysis. A grid that is too small may lead to zero inflation, with crashes concentrated in a limited number of cells. In contrast, a grid that is too large may render micro-level analysis ineffective. To address this trade-off, this study implements a virtual grid measuring 3.6 m by 3.6 m. which aligns with typical lane widths. This granularity is inten tional, enabling the identification of micro-level variations in risk across lanes that might otherwise be obscured. The crash frequency model is subsequently constructed based on this grid unit. Fig. 3 shows these", "translation": "The selection of an appropriate grid size is crucial for effective microlevel crash analysis. A grid that is too small may lead to zero inflation, with crashes concentrated in a limited number of cells. In contrast, a grid that is too large may render micro-level analysis ineffective. To address this trade-off, this study implements a virtual grid measuring 3.6 m by 3.6 m. which aligns with typical lane widths. This granularity is inten tional, enabling the identification of micro-level variations in risk across lanes that might otherwise be obscured. The crash frequency model is subsequently constructed based on this grid unit. Fig. 3 shows these", "bbox": [0.5150437783156406, 0.8167021262770209, 0.940775055721305, 0.9385479710584369], "kind": "body", "chapter_id": "chapter-006", "figure_ids": ["fig-006-01"]}, {"id": "p006-b001", "page": 6, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p006-b002", "page": 6, "order": 2, "source": "Fig. 3. Virtual grids in each intersection.", "translation": "図 3. 各交差点の仮想グリッドを強調表示しています。", "bbox": [0.3886667663966438, 0.22197792340308906, 0.6113520226900394, 0.23675407261321268], "kind": "figure-caption", "chapter_id": "chapter-006", "figure_ids": ["fig-006-01"]}, {"id": "p006-b003", "page": 6, "order": 3, "source": "virtual grids in the case study sites.", "translation": "ケーススタディサイトの仮想グリッド。", "bbox": [0.06314280849117021, 0.2490620191622622, 0.27290694700975143, 0.2654801827468893], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p006-b004", "page": 6, "order": 4, "source": "In the final step, the derived optimal traffic conflict measure and threshold are used to identify micro-level hotspots of each signalized intersection. Detailed intersection areas with a high frequency of con flict occurrence are identified through KDE, following previous studies that identified crash hotspots (Anderson, 2009; Thakali et al., 2015; Lakshmi et al., 2019; Le et al., 2020). KDE is a methodology that can improve the problems of histogram-based density estimation methods that show discontinuity by using the kernel function. It is also one of the non-parametric density estimation methodologies. Using the KDE methodology, an estimate of the probability density function can be provided in a smoothed form. This estimation methodology allows for micro-level hotspot identification that partially considers the impact of conflict hotspots on adjacent areas.", "translation": "最後のステップでは、導出された最適な交通競合指標としきい値を使用して、各信号交差点のミクロレベルのホットスポットを特定します。衝突ホットスポットを特定した以前の研究 (Anderson, 2009; Thakali et al., 2015; Lakshmi et al., 2019; Le et al., 2020) に続いて、衝突が発生する頻度が高い詳細な交差点エリアが KDE によって特定されます。 KDE は、カーネル関数を使用して不連続性を示すヒストグラムベースの密度推定方法の問題を改善できる方法論です。ノンパラメトリック密度推定手法のひとつでもあります。 KDE 手法を使用すると、確率密度関数の推定値を平滑化された形式で提供できます。この推定方法により、隣接エリアへの競合ホットスポットの影響を部分的に考慮したミクロレベルのホットスポットの特定が可能になります。 KDE を使用したホットスポットの識別は帯域幅の影響を受け、帯域幅が小さいほどホットスポットも小さくなります。したがって、最適な帯域幅を選択することが重要です (Le et al., 2020)。", "bbox": [0.06314280849117021, 0.26220459371068755, 0.48889962290584993, 0.43683561292731765], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p006-b005", "page": 6, "order": 5, "source": "Hotspot identification using KDE is affected by bandwidth, and the", "translation": "タカリら。", "bbox": [0.08323689080551813, 0.4335600046662576, 0.48881123986235214, 0.4499781490260264], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p006-b006", "page": 6, "order": 6, "source": "Fig. 4. Top 5% high-risk areas defined by TTC, MTTC, and PET on each intersection.", "translation": "図 4 は、各測定値によって特定された高リスク地域の上位 5 % の分布を示し、図 3. 各交差点の仮想グリッドを強調表示しています。", "bbox": [0.26895254917409017, 0.9232627475998341, 0.7310639841968657, 0.9380388968099578], "kind": "figure-caption", "chapter_id": "chapter-006", "figure_ids": ["fig-006-01", "fig-006-02"]}, {"id": "p006-b008", "page": 6, "order": 8, "source": "smaller the bandwidth, the smaller the hotspot. Therefore, it is impor tant to select the optimal bandwidth (Le et al., 2020). Thakali et al. (Thakali et al., 2015) adopted the KDE methodology and kriging methodology in crash hotspot identification. They found that choosing a bandwidth smaller than the grid cell size was not worthwhile. Therefore, the present study considers a bandwidth size of 3.6 m, which is the same as the virtual grid size.", "translation": "(Thakali et al.、2015) は、事故ホットスポットの特定に KDE 手法とクリギング手法を採用しました。彼らは、グリッドセルサイズより小さい帯域幅を選択することは価値がないことを発見しました。したがって、本研究では、仮想グリッドサイズと同じ 3.6 m の帯域幅サイズを考慮します。", "bbox": [0.5150428042565766, 0.2490620191622622, 0.9407608036992098, 0.3445504486043791], "kind": "body", "chapter_id": "chapter-006", "figure_ids": []}, {"id": "p006-b009", "page": 6, "order": 9, "source": "3. Results and discussion", "translation": "3. 結果と考察", "bbox": [0.5150428042565766, 0.3544887391161348, 0.680719946535436, 0.3709068834759036], "kind": "heading", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p006-b010", "page": 6, "order": 10, "source": "This study investigates several types of conflicts, including rear-end, sideswipe, lane change, and head-on conflicts. This approach allowed us to analyze both vehicles entering the intersection and the different conflict types occurring within it. Fig. 4 illustrates the distribution of the top 5 % of high-risk areas as identified by each measure, highlighting", "translation": "この研究では、追突、横滑り、車線変更、正面衝突など、いくつかのタイプの衝突を調査しました。このアプローチにより、交差点に進入する車両と交差点内で発生するさまざまな種類の衝突の両方を分析することができました。図 4 は、各測定値によって特定された高リスク地域の上位 5 % の分布を示し、図 3. 各交差点の仮想グリッドを強調表示しています。図 4. 各交差点の TTC、MTTC、PET によって定義された上位 5% の高リスクエリア。 N.パークら。事故分析と予防 220 (2025) 108167 6", "bbox": [0.5150428042565766, 0.3808461736802923, 0.9407661353909289, 0.4499781490260264], "kind": "body", "chapter_id": "chapter-007", "figure_ids": ["fig-006-01", "fig-006-02"]}, {"id": "p007-b001", "page": 7, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p007-b002", "page": 7, "order": 2, "source": "intersections flagged as dangerous. The visualization of traffic conflicts at each intersection revealed that the high-risk areas indicated by the three traffic conflict indicators are notably different. TTC and MTTC display similar risk patterns near the stop line, whereas PET reveals higher risk within the intersection, especially for left-turning vehicles. These observations indicate that each measure may represent a pre cursor to a different form of crash.", "translation": "危険信号交差点。各交差点での交通衝突を視覚化したところ、3 つの交通衝突指標が示す高リスクエリアが著しく異なることが明らかになりました。 TTC と MTTC は停止線付近で同様のリスクパターンを示しますが、PET では交差点内、特に左折車両のリスクが高いことがわかります。これらの観察は、各測定値が異なる形態の事故の前兆である可能性があることを示しています。各測定値のリスク集中の明確な空間パターンは、ミクロレベルのホットスポットの特定において適切な交通コンフリクト測定値を選択するという重要な役割を強調します。", "bbox": [0.06314280849117021, 0.0646335747770474, 0.48888485822108924, 0.16012201863780806], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p007-b003", "page": 7, "order": 3, "source": "The distinct spatial patterns of risk concentration for each measure emphasize the crucial role of selecting an appropriate traffic conflict measure in micro-level hotspot identification. To examine the relation ship between crashes and traffic conflicts, this study first derives the optimal traffic conflict measure and its threshold value that best rep resents the crash risk of each intersection through GLM. The modeling process was conducted in three categories: (1) entire crashes across the entire intersection, (2) turning-related and non-rear-end crashes within the inner intersection, and (3) approaching sections where rear-end crashes are more frequent. The necessity for this division is due to the observed heterogeneity of driving patterns within intersection sections (i.e., “approaching section,” which is the entrance section to the inter section, and the “inner intersection,” which refers to the central area of the intersection enclosed by crosswalks) (Polders et al., 2015; Singh et al., 2022; Yuan and Abdel-Aty, 2018). Through this modeling process, the optimal traffic conflict measures for identifying micro-hotspots in", "translation": "衝突と交通衝突の関係を調べるために、この研究ではまず、GLM を通じて各交差点の衝突リスクを最もよく表す最適な交通衝突尺度とそのしきい値を導き出します。モデリングプロセスは、(1) 交差点全体にわたる衝突全体、(2) 交差点内側の方向転換関連および非追突事故、(3) 追突事故がより頻繁に発生する接近セクションの 3 つのカテゴリに分けて実行されました。この分割の必要性は、交差点セクション（つまり、交差点への入口セクションである「進入セクション」と、横断歩道で囲まれた交差点の中央エリアを指す「内側交差点」）内で観察された運転パターンの不均一性によるものです（Polders et al., 2015; Singh et al., 2022; Yuan and Abdel-Aty, 2018）。このモデリングプロセスを通じて、信号交差点のマイクロホットスポットを特定するための最適な交通競合対策がセグメントごとに決定されます。さらに、交通コンフリクト指標と衝突リスクとの関係も特定されます。 3.1.交通コンフリクト対策と閾値の選択交通コンフリクト対策ごとに閾値を0.1から3.0まで0.1秒間隔で変化させてモデルを構築した結果を図5に示します。 TTC と PET は、特定の衝突タイプの 3 種類のセクションにわたって、一貫して TTC よりも優れた推定パフォーマンスを示しており、これは以前の研究の観察結果と一致しています (Analytics, 2024; State Safety Office and Query Tool, 2024)。すべての衝突タイプの交差領域全体について、しきい値が 1.2 秒の場合、PET 指数は衝突リスクの状況を最もよく表します。また、追突事故以外の交差点内側については、しきい値が 0.9 秒の PET が最良の指標であることがわかります。追突事故が発生する接近セクションの場合、TTC はしきい値が 3.0 秒の場合に衝突リスク状況を最もよく表します。これは、PET が交差点内側の方向転換に関連した衝突リスクを効果的に把握できる一方、TTC が交差点進入区間での追突リスクの特定に適していることを示しています。特に、3 つの測定値の最適なしきい値でのモデルのパフォーマンスはほぼ 10% 以内で類似しています。これは、しきい値が次のセクションと衝突タイプになる可能性が非常に高いことを意味します。", "bbox": [0.06314280849117021, 0.15691769615142176, 0.48889962290584993, 0.37097743870596095], "kind": "body", "chapter_id": "chapter-007", "figure_ids": ["fig-007-01"]}, {"id": "p007-b004", "page": 7, "order": 4, "source": "Fig. 5. R-squared graph in each section and crash type.", "translation": "図 5. R-squared graph in each section and crash type.", "bbox": [0.34923800897405743, 0.9232627475998341, 0.6507800880180277, 0.9380388968099578], "kind": "figure-caption", "chapter_id": "chapter-007", "figure_ids": ["fig-007-01"]}, {"id": "p007-b006", "page": 7, "order": 6, "source": "signalized intersections are determined for each segment. Additionally, the relationships between the traffic conflict measures and crash risk are identified.", "translation": "N.パークら。事故分析と予防 220 (2025) 108167 7", "bbox": [0.5150428042565766, 0.0646335747770474, 0.9407191754907873, 0.10740815881455525], "kind": "body", "chapter_id": "chapter-007", "figure_ids": []}, {"id": "p007-b007", "page": 7, "order": 7, "source": "3.1. Selection of traffic conflict measure and threshold", "translation": "3.1. 交通コンフリクト指標としきい値の選択", "bbox": [0.5150428042565766, 0.12698945562660466, 0.8263202960483347, 0.14340761921123174], "kind": "heading", "chapter_id": "chapter-008", "figure_ids": []}, {"id": "p007-b008", "page": 7, "order": 8, "source": "The results of building a model by changing the threshold value from 0.1 to 3.0 in 0.1-second intervals for each traffic conflict measure are shown in Fig. 5. TTC and PET show consistently superior estimation performance than TTC across three types of sections with specific crash types, consistent with the observations from previous studies (Analytics, 2024; State Safety Office and Query Tool, 2024). For the entire inter section area with all crash types, the PET index best represents the crash risk situation when the threshold was 1.2 s. Also, for the inside of the intersection with non-rear-end crashes, the PET is found to be the best indicator with a threshold of 0.9 s. For approaching sections with rearend crashes, the TTC represents the crash risk situation best when the threshold is 3.0 s. This means that the PET can effectively capture the turning-related crash risks within the inner intersection, while the TTC demonstrates its suitability for identifying rear-end crash risks in the approaching section of the intersection. Notably, the performance of the model at the optimal threshold for the three measures is similar, within 10 % or so. This means that it is very likely that the threshold can be", "translation": "The results of building a model by changing the threshold value from 0.1 to 3.0 in 0.1-second intervals for each traffic conflict measure are shown in Fig. 5. TTC and PET show consistently superior estimation performance than TTC across three types of sections with specific crash types, consistent with the observations from previous studies (Analytics, 2024; State Safety Office and Query Tool, 2024). For the entire inter section area with all crash types, the PET index best represents the crash risk situation when the threshold was 1.2 s. Also, for the inside of the intersection with non-rear-end crashes, the PET is found to be the best indicator with a threshold of 0.9 s. For approaching sections with rearend crashes, the TTC represents the crash risk situation best when the threshold is 3.0 s. This means that the PET can effectively capture the turning-related crash risks within the inner intersection, while the TTC demonstrates its suitability for identifying rear-end crash risks in the approaching section of the intersection. Notably, the performance of the model at the optimal threshold for the three measures is similar, within 10 % or so. This means that it is very likely that the threshold can be", "bbox": [0.5150428042565766, 0.15334689019076211, 0.9407621366221395, 0.38061947415090913], "kind": "body", "chapter_id": "chapter-008", "figure_ids": ["fig-007-01"]}, {"id": "p008-b001", "page": 8, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-008", "figure_ids": []}, {"id": "p008-b002", "page": 8, "order": 2, "source": "changed for the other case study and in future studies.", "translation": "他のケーススタディおよび今後の研究では変更されます。 3.2.微視的な交通衝突ホットスポット本研究では、最適な交通衝突対策を導出した後、それを利用してKDEを導出し、各交差点における交通衝突が多発しているエリアを可視化する。図6は、交差点Aにおけるミクロレベルのホットスポットを特定した結果を示しており、進入セクションのTTC数（≤3.0秒）と内側交差点のPET数（≤0.9秒）によって定義され、最も正確な衝突頻度推定が得られます。私たちの分析により、衝突事故は主に停止線付近で発生し、残りは交差点内で発生していることが明らかになりました。交通衝突もこの傾向を再現しており、横断歩道付近よりも停止線で頻繁に発生しています。交通衝突の原因と実際の衝突場所とのこの一致は、たとえ顕微鏡レベルであっても、交通衝突が衝突頻度の重要な予測因子であるという以前の発見を補強するものである(Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023)。交差点 A の進入区間である Eastbound through (EBT) では、停止線が横断歩道から比較的離れており、交通衝突 (TTC) の発生は比較的少なかった。しかし、西行き通過（WBT）の場合は、停止線が横断歩道に比較的近い位置にあったため、衝突率が比較的高かった。このような場合、歩行者と車両の間、および車両同士の間で重大な交通衝突が発生し、歩行者の安全が損なわれる可能性があります。したがって、これらのリスクに対処するために、交差点の横断歩道や停止線の配置や間隔を再評価し、必要に応じて調整することが重要です。内側の交差点の場合、車両が左折する区間が危険であることがわかります。これは、PET が交差点内側での方向転換に関連した衝突のリスクを効果的に記述し、このセグメントのマイクロホットスポットを特定する上での重要性を強調していることを示唆しています。南行き通過（SBT）でも、交差点内での高レベルの衝突が見られました。したがって、このセクションに入るのを待っている車両との衝突の危険に特別な注意を払う必要があります。また、交差点での SBT 車両と右折車両の間の衝突のリスクを軽減する戦略を考案することも不可欠です。これは、交通信号制御の最適化などの手段によって実現できます。図 7 は、交差点 D で特定されたミクロレベルのホットスポットを示しています。この三叉路交差点は交差点 E と接続しており、近くの車庫に向かう交通量が多いです。この交差点は保護された左折として機能します。この場所では、ドローンによる観測時間が比較的短く、交通量と衝突頻度が低いため、交通衝突と衝突との明確な関係を確立する能力が制限されていました。それにもかかわらず、交通衝突によりミクロレベルのホットスポットが特定され、ノースバウンドスルー（NBT）の停止線付近で交通衝突が頻繁に発生していることが明らかになりました。さらに、交差点内で危険な衝突が観察され、南方向に移動する際の潜在的な危険性を示しています。一番右の北行きの通過車線も比較的高い衝突率を示しており、自転車専用車線に近いために顕著です。このため、D交差点区間では、車両のスムーズな左折を可能にするカラーレーンを活用し、全体で車両の車線変更を誘導するとともに、自転車専用レーンを走行する自転車と北行き右端の車線を走行する車両との衝突を防止するため、自転車専用レーンと車両道路区間を物理的に分離することで衝突リスクを低減することが推奨される。図 8 は、交差点 E におけるミクロレベルのホットスポット特定の結果と、その詳細な道路特徴を示しています。交差点 E は三叉路で、近くの車庫に入る車両が大量にあります。この交差点は、保護と許可の左折段階で運行されています。交差点Eでは、交差点内側の自転車道路付近で衝突が多発。このパターンはおそらく自転車専用道路の存在と、交差点での左折許可は許容されます。物理的に区別できない自転車道路は、これらの衝突を引き起こす可能性があります。この観察は、保護された左折スキームを実装すると交通衝突を大幅に減らし、衝突頻度を潜在的に減らすことができるという考えを強化します。保護専用の左折信号に移行すると、この問題が軽減される可能性があります。さらに、色付きの車線を設置すると、ドライバーが正しい左折操作を実行できるようガイドするのに役立つ可能性があります。内側の交差点内でのドライバーの混乱を軽減するには、自転車道路の輪郭をより明確にし、この区間での交通の衝突を最小限に抑えることも必要です。また、交差点 E では、停止線区間への進入時に衝突事故が多発しています。特に、NBT 道路区間の左端の車線では交通渋滞が頻繁に発生しています。この現象は、この交差点の特徴である駐車場に進入しようとする車両の衝突によるものと考えられます。したがって、左折を誘導するための措置を講じる必要がある。事故分析と予防 220 (2025) 108167 8", "bbox": [0.06314280849117021, 0.0646335747770474, 0.38721885323103594, 0.08105173355545991], "kind": "body", "chapter_id": "chapter-008", "figure_ids": ["fig-008-01", "fig-009-01", "fig-009-02"]}, {"id": "p008-b003", "page": 8, "order": 3, "source": "3.2. Microscopic traffic conflict hotspots", "translation": "3.2. ミクロ交通コンフリクト・ホットスポット", "bbox": [0.06314280849117021, 0.098275245680232, 0.293689214869432, 0.1146934092648591], "kind": "heading", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p008-b004", "page": 8, "order": 4, "source": "After deriving the optimal traffic conflict measures, this study uti lizes them to derive KDE to visualize areas with frequent traffic conflict in each intersection. Fig. 6 shows the results of identifying micro-level hotspots at Intersection A defined by the number of TTC (≤3.0 s) in the approaching section and the number of PET (≤0.9 s) in the inner intersection, which provides the most accurate crash frequency estimation.", "translation": "After deriving the optimal traffic conflict measures, this study uti lizes them to derive KDE to visualize areas with frequent traffic conflict in each intersection. Fig. 6 shows the results of identifying micro-level hotspots at Intersection A defined by the number of TTC (≤3.0 s) in the approaching section and the number of PET (≤0.9 s) in the inner intersection, which provides the most accurate crash frequency estimation.", "bbox": [0.06314280849117021, 0.12463267063196032, 0.48889957163958336, 0.2201211289113647], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-008-01"]}, {"id": "p008-b005", "page": 8, "order": 5, "source": "Our analysis reveals that crashes primarily occurred near the stop line, with the remainder occurring within the intersection. The traffic conflicts replicate this trend, which is more frequent at the stop line than at the crosswalk area. This alignment between the origin of traffic conflicts and actual crash locations reinforces earlier findings that traffic conflicts are a significant predictor of crash frequency (Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023), even at a microscopic level. In the approaching section, Eastbound through (EBT) in intersection A, the stop line is relatively far from the crosswalk, and the traffic conflict (TTC) occurred relatively less. However, in the case of the westbound through (WBT) movement, the conflict rate was relatively high, with the stop line positioned relatively close to the crosswalk. In such cases, significant traffic conflicts between pedestrians and vehicles, as well as between vehicles themselves, can compromise pedestrian safety. Therefore, it is important to reassess and, if necessary, adjust the placement and spacing of crosswalks and stop lines at intersections to address these risks.", "translation": "Our analysis reveals that crashes primarily occurred near the stop line, with the remainder occurring within the intersection. The traffic conflicts replicate this trend, which is more frequent at the stop line than at the crosswalk area. This alignment between the origin of traffic conflicts and actual crash locations reinforces earlier findings that traffic conflicts are a significant predictor of crash frequency (Ali et al., 2023; Hussain et al., 2023; Singh et al., 2023), even at a microscopic level. In the approaching section, Eastbound through (EBT) in intersection A, the stop line is relatively far from the crosswalk, and the traffic conflict (TTC) occurred relatively less. However, in the case of the westbound through (WBT) movement, the conflict rate was relatively high, with the stop line positioned relatively close to the crosswalk. In such cases, significant traffic conflicts between pedestrians and vehicles, as well as between vehicles themselves, can compromise pedestrian safety. Therefore, it is important to reassess and, if necessary, adjust the placement and spacing of crosswalks and stop lines at intersections to address these risks.", "bbox": [0.06314280849117021, 0.21684552065030469, 0.4888969057937238, 0.44411910430308466], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p008-b006", "page": 8, "order": 6, "source": "In the case of the inner intersection, the section where vehicles are turning left is found to be risky. It suggests that the PET effectively de scribes the risk of turning-related crashes within the inner intersection and highlights its importance for identifying micro-hotspots in this segment. Southbound through (SBT) also showed a high level of conflict within the intersection. Therefore, special attention should be paid to the risk of conflict with vehicles waiting to turn into this section. It is also imperative to devise a strategy to mitigate the risk of conflict be tween the SBT vehicle and the turning vehicle at the intersection. This can be achieved through traffic signal control optimization and other measures.", "translation": "In the case of the inner intersection, the section where vehicles are turning left is found to be risky. It suggests that the PET effectively de scribes the risk of turning-related crashes within the inner intersection and highlights its importance for identifying micro-hotspots in this segment. Southbound through (SBT) also showed a high level of conflict within the intersection. Therefore, special attention should be paid to the risk of conflict with vehicles waiting to turn into this section. It is also imperative to devise a strategy to mitigate the risk of conflict be tween the SBT vehicle and the turning vehicle at the intersection. This can be achieved through traffic signal control optimization and other measures.", "bbox": [0.06314280849117021, 0.440914820266415, 0.4888969057937238, 0.5891180996119886], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p008-b007", "page": 8, "order": 7, "source": "Fig. 7 illustrates the identified micro-level hotspots at Intersection D.", "translation": "Fig. 7 illustrates the identified micro-level hotspots at Intersection D.", "bbox": [0.08323689080551813, 0.5859138155753189, 0.48889018991280836, 0.6023319599350877], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-009-01"]}, {"id": "p008-b008", "page": 8, "order": 8, "source": "Fig. 6. Micro-level hotspot identification results of intersection A.", "translation": "図6は、交差点Aにおけるミクロレベルのホットスポットを特定した結果を示しており、進入セクションのTTC数（≤3.0秒）と内側交差点のPET数（≤0.9秒）によって定義され、最も正確な衝突頻度推定が得られます。", "bbox": [0.3214290584581035, 0.9232627475998341, 0.6785390795572481, 0.9380388968099578], "kind": "figure-caption", "chapter_id": "chapter-009", "figure_ids": ["fig-008-01"]}, {"id": "p008-b010", "page": 8, "order": 10, "source": "This three-way intersection connects with Intersection E and experi ences heavy traffic turning toward a nearby garage. This intersection operates as a protected left turn. At this location, the relatively short duration of drone observations, combined with low traffic volume and crash frequencies, limited the ability to establish a clear relationship between traffic conflicts and crashes.", "translation": "This three-way intersection connects with Intersection E and experi ences heavy traffic turning toward a nearby garage. This intersection operates as a protected left turn. At this location, the relatively short duration of drone observations, combined with low traffic volume and crash frequencies, limited the ability to establish a clear relationship between traffic conflicts and crashes.", "bbox": [0.5150428042565766, 0.0646335747770474, 0.9407609062317428, 0.14697945370181184], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p008-b011", "page": 8, "order": 11, "source": "Nevertheless, traffic conflicts identified micro-level hotspots, revealing frequent traffic conflicts near the stop line in the Northbound through (NBT). Additionally, dangerous conflicts are observed inside the intersection, indicating potential risks while moving in the south di rection. The rightmost northbound through lane also shows relatively high conflict rates, notable due to its proximity to a bike-only lane.", "translation": "Nevertheless, traffic conflicts identified micro-level hotspots, revealing frequent traffic conflicts near the stop line in the Northbound through (NBT). Additionally, dangerous conflicts are observed inside the intersection, indicating potential risks while moving in the south di rection. The rightmost northbound through lane also shows relatively high conflict rates, notable due to its proximity to a bike-only lane.", "bbox": [0.5150428042565766, 0.14370385505318095, 0.9407514732387012, 0.2260497291717308], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p008-b012", "page": 8, "order": 12, "source": "Therefore, in the Intersection D section, it is recommended to induce lane changes of vehicles throughout by using color lanes for smooth left turning of vehicles and to reduce the risk of crashes by physically separating the bike-only lane and vehicle road sections to prevent col lisions between bikes driving in the bike-only lane and vehicles driving in the rightmost lane of the North Bound Through.", "translation": "Therefore, in the Intersection D section, it is recommended to induce lane changes of vehicles throughout by using color lanes for smooth left turning of vehicles and to reduce the risk of crashes by physically separating the bike-only lane and vehicle road sections to prevent col lisions between bikes driving in the bike-only lane and vehicles driving in the rightmost lane of the North Bound Through.", "bbox": [0.5150428042565766, 0.2227741401355291, 0.9407701341597182, 0.3051210139467119], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p008-b013", "page": 8, "order": 13, "source": "Fig. 8 displays the results of micro-level hotspot identification at Intersection E, along with its detailed road features. Intersection E is a three-way junction with high volumes of vehicles turning into a nearby garage. This intersection operates with protected-permissive left-turn phasing. At Intersection E, conflicts occurred frequently near the bike road in the inner intersection. This pattern likely stems from the pres ence of a bike road and the permissive left-turn allowance at the inter section. The physically indistinct bike road may cause these conflicts.", "translation": "Fig. 8 displays the results of micro-level hotspot identification at Intersection E, along with its detailed road features. Intersection E is a three-way junction with high volumes of vehicles turning into a nearby garage. This intersection operates with protected-permissive left-turn phasing. At Intersection E, conflicts occurred frequently near the bike road in the inner intersection. This pattern likely stems from the pres ence of a bike road and the permissive left-turn allowance at the inter section. The physically indistinct bike road may cause these conflicts.", "bbox": [0.5150428042565766, 0.3018454249105102, 0.9407447060915193, 0.4105477339005846], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-009-02"]}, {"id": "p008-b014", "page": 8, "order": 14, "source": "This observation reinforces the notion that implementing protected left-turn schemes can significantly reduce traffic conflicts, potentially decreasing crash frequency. Transitioning to a protected-only left-turn signal could mitigate this issue. Moreover, installing colored lanes may help guide drivers in executing correct left-turn maneuvers. To mitigate driver confusion within the inner intersection, it is also necessary to delineate the bike road more clearly and minimize traffic conflicts in this segment.", "translation": "This observation reinforces the notion that implementing protected left-turn schemes can significantly reduce traffic conflicts, potentially decreasing crash frequency. Transitioning to a protected-only left-turn signal could mitigate this issue. Moreover, installing colored lanes may help guide drivers in executing correct left-turn maneuvers. To mitigate driver confusion within the inner intersection, it is also necessary to delineate the bike road more clearly and minimize traffic conflicts in this segment.", "bbox": [0.5150428042565766, 0.40734444955654786, 0.9407755683839704, 0.5159754343222318], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p008-b015", "page": 8, "order": 15, "source": "Furthermore, at Intersection E, a high frequency of traffic conflicts is observed in the approach to the stop line section. In particular, the leftmost lane of the NBT road segment exhibits frequent traffic conflicts. This phenomenon is likely attributed to interactions involving vehicles attempting to enter the parking lot, a characteristic of this intersection. Therefore, measures should be implemented to guide left-turning", "translation": "Furthermore, at Intersection E, a high frequency of traffic conflicts is observed in the approach to the stop line section. In particular, the leftmost lane of the NBT road segment exhibits frequent traffic conflicts. This phenomenon is likely attributed to interactions involving vehicles attempting to enter the parking lot, a characteristic of this intersection. Therefore, measures should be implemented to guide left-turning", "bbox": [0.5150428042565766, 0.5127721499781952, 0.9407555745400237, 0.5950467383220713], "kind": "body", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p009-b001", "page": 9, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06314280849117021, 0.04239308594888172, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-009", "figure_ids": []}, {"id": "p009-b002", "page": 9, "order": 2, "source": "Fig. 7. Micro-level hotspot identification results of intersection D.", "translation": "図 7. 交差点 D のミクロレベルのホットスポット識別結果。", "bbox": [0.32133329307222536, 0.41647683400726715, 0.6787084120355968, 0.43125302166710744], "kind": "figure-caption", "chapter_id": "chapter-009", "figure_ids": ["fig-009-01"]}, {"id": "p009-b003", "page": 9, "order": 3, "source": "Fig. 8. Micro-level hotspot identification results of intersection E.", "translation": "図 8. 交差点のミクロレベルのホットスポット識別結果 E. N. Park et al.事故分析と予防 220 (2025) 108167 9", "bbox": [0.32200021593351463, 0.7595480835623079, 0.6780137028578482, 0.7743242327724315], "kind": "figure-caption", "chapter_id": "chapter-009", "figure_ids": ["fig-009-02"]}, {"id": "p009-b004", "page": 9, "order": 4, "source": "vehicles entering the parking lot to perform lane changes smoothly, minimizing potential conflicts.", "translation": "駐車場に進入する車両がスムーズに車線変更を行い、潜在的な衝突を最小限に抑えます。 3.3.微視的衝突頻度回帰負の二項回帰モデルが、交差点 A、D、E および統合交差点 ADE に対してそれぞれ開発されました。この研究では、衝突頻度モデルにおける停止線、道路標識、左折車線の存在など、追加の道路環境変数を考慮しています。表 2 は、各交差点のミクロレベルの衝突頻度モデルの結果を示しています。表 3 に交差 ADE 統合モデルの結果を示します。交通コンフリクトの測定値は、統計的に有意であり、理論的な期待と一致する場合、正の係数値を持ちます。解析対象交差点に存在しない変数（例：交差点Aには自転車レーンがない）や、標準誤差が異常に大きい変数は削除されます。モデルを選択する際には、変数の合理性や重要性、モデル全体の説明力を比較します。その結果、3 つの交差点 A、D、E のデータを統合して開発した ADE モデルは、R 二乗とモデルの合理性の点で、各交差点の個別モデルよりも優れたパフォーマンスを示しました。特に、図 7. 交差点 D のミクロレベルのホットスポット識別結果。図 8. 交差点のミクロレベルのホットスポット識別結果 E. N. Park et al.事故分析と予防 220 (2025) 108167 9", "bbox": [0.06314280849117021, 0.7865617009908569, 0.4888260045471128, 0.8161937441234415], "kind": "body", "chapter_id": "chapter-009", "figure_ids": ["fig-009-01", "fig-009-02"]}, {"id": "p009-b005", "page": 9, "order": 5, "source": "3.3. Microscopic crash frequency regression", "translation": "3.3. ミクロ事故頻度回帰", "bbox": [0.06314280849117021, 0.8298463926129789, 0.3127697759110477, 0.8462645 apter_id": "chapter-010", "figure_ids": []}, {"id": "p009-b009", "page": 9, "order": 9, "source": "The rationality and significance of the variables and the explanatory power of the entire model are compared when selecting a model. As a result, the ADE model developed by integrating data of three in tersections A, D, and E performed better than the individual models of each intersection in terms of R-square and rationality of the model. In particular, the crash frequency and traffic volume were very low in", "translation": "The rationality and significance of the variables and the explanatory power of the entire model are compared when selecting a model. As a result, the ADE model developed by integrating data of three in tersections A, D, and E performed better than the individual models of each intersection in terms of R-square and rationality of the model. In particular, the crash frequency and traffic volume were very low in", "bbox": [0.5150428042565766, 0.852489430749638, 0.9407287110163619, 0.9347639806437974], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p010-b001", "page": 10, "order": 1, "source": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "translation": "N. Park et al. Accident Analysis and Prevention 220 (2025) 108167", "bbox": [0.06315153016476363, 0.04240068457413517, 0.940998576643376, 0.05554101462035096], "kind": "metadata", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p010-b002", "page": 10, "order": 2, "source": "Table 2 Micro-level Crash Frequency Estimation Results (Single intersection).", "translation": "表 2 Micro-level Crash Frequency Estimation Results (Single intersection).", "bbox": [0.06314280849117021, 0.0661912785353611, 0.43321487066238684, 0.09303871148232347], "kind": "table-caption", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p010-b003", "page": 10, "order": 3, "source": "(a) Entire section with all types of crashes", "translation": "表 2 ミクロレベルの衝突頻度の推定結果 (単一 値の合理性、重要性、モデルの説明力に基づいて行われます。", "bbox": [0.07323796303948261, 0.24849338630268833, 0.7863337872790347, 0.26231290656249767], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b008", "page": 11, "order": 8, "source": "(Model 10) Entire section with all types of crashes", "translation": "あらゆるタイプの衝突が発生するセクション全体を対象としたモデルの場合、1 つの交通衝突対策といくつかの道路環境変数に基づいて構築されたモデル 10 が最終モデルとして選択されます。", "bbox": [0.07324529411559641, 0.28232100484181905, 0.2487711988575415, 0.3062404389973329], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b009", "page": 11, "order": 9, "source": "[PET( ≤1.2) + 1 ]0.525 × exp[0.484 + 0.010 × stopline −0.481 × medianstrip + 0.357 × roadsign −1.225 × bikelane + 0.030 × leftlane]", "translation": "交差点内側については，道路標識などの道路環境変数が含まれていないため，非追突事故（その他の衝突）が発生した交差点内側を対象として，重要でない変数を除去し交通衝突対策を1つ使用したモデル11を最終モデルとして選択した。", "bbox": [0.264859168489866, 0.28298956851497276, 0.6296722280996149, 0.3078833377153194], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b010", "page": 11, "order": 10, "source": "left lane 0.030 0.094 0.748 (Model 11) Inner intersection with other crash", "translation": "最後に、追突接近区間を対象としたモデルとして、道路環境変数全体と交通衝突対策を1つ採用したモデル12を最終モデルとして選択した。", "bbox": [0.07324529411559641, 0.3686784147981578, 0.9147352784301696, 0.4033831290487071], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b011", "page": 11, "order": 11, "source": "[PET( ≤0.9) + 1 ]0.571 × exp[0.760 −1.549 × stopline −3.986 × bikelane] 0.216 Intercept 0.760 0.091 <0.001***", "translation": "結果は、PET は内側の交差点で発生する旋回関連の衝突を捕捉するのに最も効果的であるのに対し、TTC は接近する交差点で発生する追突事故を捕捉するのにより正確であることを示しています。", "bbox": [0.26486203940079167, 0.37877923226220367, 0.9268096120558572, 0.3942406323225082], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b012", "page": 11, "order": 12, "source": "(Model 12) Approaching section with rear-end crashes", "translation": "交差点全体を考慮すると、PET はさまざまな衝突タイプを効果的に捕捉します。", "bbox": [0.07323796303948261, 0.43339294064740247, 0.24033546286568996, 0.4573838720510317], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b013", "page": 11, "order": 13, "source": "[TTC( ≤3.0) + 1]0.711 × exp[−0.584 + 0.405 × stopline + 0.146 × medianstrip + 0.826 × roadsign −1.042 × bikelane + 0.213 × leftlane]", "translation": "道路環境変数は、衝突の種類と場所に応じて衝突の結果に影響を与えます。", "bbox": [0.2648547083246779, 0.4341321748997635, 0.6332915239841025, 0.45902586720067684], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b014", "page": 11, "order": 14, "source": "Note: *p < 0.05, **p < 0.01, ***p < 0.001.", "translation": "たとえば、停止線、中央分離帯、左車線は通常、追突事故のリスクが高いことと関連していますが、この関連性はすべての衝突タイプで一貫しているわけではありません。", "bbox": [0.06314280849117021, 0.5356530380620667, 0.2891211598234062, 0.5511823018722628], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b015", "page": 11, "order": 15, "source": "intersection D; all the coefficients of the traffic conflict measures were negative values, which is not reasonable to use in deriving microhotspots. Therefore, this study employs the integrated intersection ADE model instead of individual intersection models to identify microhotspots and investigate the characteristics of micro-hotspots at the signalized intersections.", "translation": "これらの観察は、交通衝突は一般的に衝突の危険性を増大させる一方、衝突の種類によっては大きく異なる前兆を持っていることを示唆しています。さらに、特定の衝突タイプに対して、最適な交通コンフリクト指標とそのしきい値レベルは場所によって異なります。", "bbox": [0.06314280849117021, 0.5634902484213123, 0.4888741435713845, 0.6457648367651885], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b016", "page": 11, "order": 16, "source": "Among the models in Table 2 and Table 3, the selection of the final model is made based on the rationality of the variable coefficient esti mates, significance, and explanatory power of the model, as mentioned above. For the model targeting the entire section with all types of crashes, Model 10, which is built based on one traffic conflict measure and several road environment variables, is selected as the final model. For the inner intersection, since road environment variables such as road signs are not included, Model 11, which eliminated insignificant vari ables and used one traffic conflict measure, is selected as the final model targeting the inner intersection with non-rear-end crashes (Other crashes). Lastly, for the model targeting the approaching section with rear-end crashes, Model 12, which adopts the entire road environment variables and one traffic conflict measure, is selected as the final model.", "translation": "これは、ミクロレベルのホットスポットの特定は、衝突タイプと場所の両方に固有のモデルを使用して実行する必要があることを意味します。この研究では、最終モデルに基づいて予想される衝突回数が計算されました。", "bbox": [0.06314280849117021, 0.6425605142788021, 0.4888982899829201, 0.8171203053953334], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b017", "page": 11, "order": 17, "source": "The results show that PET is the most effective in capturing turningrelated crashes that occur in the inner intersection, while TTC is more accurate in capturing rear-end crashes that occur in the approaching intersection. When considering the entire intersection, PET effectively captures various crash types. The road environment variables affect crash outcomes in ways that depend on crash type and location. For instance, stop lines, median strips, and left lanes are typically linked to a higher risk of rear-end crashes, but this association is not consistent for every crash type. These observations suggest that different types of", "translation": "視覚化を使用して、最適な交通コンフリクト測定に基づいたモデルがマイクロホットスポットをどの程度効果的に特定したかを評価しました。", "bbox": [0.06314280849117021, 0.8138446971342734, 0.48889962290584993, 0.9357618276903632], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b019", "page": 11, "order": 19, "source": "Variable Coef. S.E. P-value", "translation": "図 9 は、各モデルから導出された予想衝突頻度と実際の衝突頻度を示しています。", "bbox": [0.6810471278484307, 0.11703505468357152, 0.9172573736783812, 0.13016921835647915], "kind": "body", "chapter_id": "chapter-010", "figure_ids": ["fig-012-01"]}, {"id": "p011-b020", "page": 11, "order": 20, "source": "road sign 0.290 1.058 0.784 bike lane −0.029 0.222 0.895 left lane −0.653 0.229 0.004**", "translation": "結果は、モデル 11 (PET 搭載) は旋回関連の衝突リスクを効果的に捉えているのに対し、モデル 12 (TTC 搭載) は追突リスクの特定に適していることを示しています。", "bbox": [0.6810471278484307, 0.13360659418792545, 0.9168617006333024, 0.16838361313063976], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b021", "page": 11, "order": 21, "source": "Variable Coef. S.E. P-value", "translation": "衝突事故と交通衝突との空間的相関関係から、交通衝突ベースのホットスポットを使用すると、3 つの交差点すべてにわたって高リスクエリアを正確に検出できることが明らかになりました。", "bbox": [0.7011419663402099, 0.2657494653374651, 0.9172565534181168, 0.2788836386228019], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b022", "page": 11, "order": 22, "source": "0.183 Intercept 0.484 0.058 <0.001***", "translation": "相関分析により、TTC と PET が最適な交通衝突対策であることが明らかになりましたが、それぞれの対策は異なるタイプの衝突を捉えていました。", "bbox": [0.6549486506821182, 0.28163688825827937, 0.9268096120558572, 0.29545527425144746], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b023", "page": 11, "order": 23, "source": "0.525 0.039 <0.001***", "translation": "図９の（ｄ）、（ｅ）、（ｆ）に示すように、ＴＴＣによって定義された衝突は主に停止線付近に集中しており、これらの衝突の空間パターンは衝突発生の分布とよく一致していた。", "bbox": [0.7870449529283394, 0.29242180308100657, 0.9268096120558572, 0.3062413233408159], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b024", "page": 11, "order": 24, "source": "ln(PET ≤ 1.2 s)", "translation": "その結果、TTC が定義する追突衝突は、衝突頻度に対して強力な予測力を発揮することが明らかになりました。", "bbox": [0.7011419663402099, 0.2931071500554791, 0.7447221891269991, 0.3170266034358513], "kind": "body", "chapter_id": "chapter-010", "figure_ids": []}, {"id": "p011-b025", "page": 11, "order": 25, "source": "stop line 0.010 0.161 0.953 median strip", "translation": "一方、PET ベースの交
