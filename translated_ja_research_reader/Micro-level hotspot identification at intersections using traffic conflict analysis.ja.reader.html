kind": "body", "chapter_id": "chapter-012", "figure_ids": []}], "figures": [{"id": "fig-003-01", "page": 3, "index": 1, "label": "図1", "caption_en": "Fig. 1. Geometries in case study sites.", "caption_ja": "図 1. ケーススタディサイトのジオメトリのみです。", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-003-fig-01.jpg", "bbox": [0.12101042068893249, 0.526754274089728, 0.8789579864743183, 0.9506380999626499], "summary": ["図 1. ケーススタディサイトのジオメトリのみです。", "この研究では、信号交差点におけるホットスポットの特定のために、2022 年にフロリダ州オーランドのセントラルフロリダ大学 (UCF) キャンパス付近で取得された 3 つのデータセットが使用されています。", "すなわち、四車線信号交差点のある交差点 A、連続する信号交差点のある交差点 D、三叉路信号交差点のある交差点 E です (図 1)。", "この調査のために選択された調査地では、幅広い交通レベルと左折車線戦略 (保護のみ、保護/許可) が採用されています。", "交差点 A は交通量が多いため、他の交差点に比べて衝突や交通事故が多く発生します。"], "related_paragraph_ids": ["p003-b006", "p003-b003", "p003-b008"]}, {"id": "fig-005-01", "page": 5, "index": 1, "label": "図2", "caption_en": "Fig. 2. Research framework for the signalized intersection micro-level hotspot identification Calculating Traffic Conflict Measures.", "caption_ja": "図 2. Research framework for the signalized intersection micro-level hotspot identification Calculating Traffic Conflict Measures.", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-005-fig-01.jpg", "bbox": [0.09567713100028073, 0.057245764513787566, 0.9044205056043257, 0.3519951980917867], "summary": ["ページ画像のキャプションで対象、条件、単位を先に確認します。", "図表は、本文の直前・直後にある説明を読んでから、凡例、軸、色、注記の順に確認すると解釈しやすくなります。", "図2はページ5の本文説明と合わせて確認します。"], "related_paragraph_ids": ["p005-b002", "p004-b004"]}, {"id": "fig-006-01", "page": 6, "index": 1, "label": "図3", "caption_en": "Fig. 3. Virtual grids in each intersection.", "caption_ja": "図 3. 各交差点の仮想グリッドを強調表示しています。", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-006-fig-01.jpg", "bbox": [0.0974867148596914, 0.05725708795534173, 0.9025132979568752, 0.2493532757659049], "summary": ["図 3. 各交差点の仮想グリッドを強調表示しています。", "図 4 は、各測定値によって特定された高リスク地域の上位 5 % の分布を示し、図 3. 各交差点の仮想グリッドを強調表示しています。", "この研究では、追突、横滑り、車線変更、正面衝突など、いくつかのタイプの衝突を調査しました。", "このアプローチにより、交差点に進入する車両と交差点内で発生するさまざまな種類の衝突の両方を分析することができました。", "図 4. 各交差点の TTC、MTTC、PET によって定義された上位 5% の高リスクエリア。"], "related_paragraph_ids": ["p006-b002", "p006-b006", "p005-b017", "p005-b020", "p006-b010"]}, {"id": "fig-006-02", "page": 6, "index": 2, "label": "図4", "caption_en": "Fig. 4. Top 5% high-risk areas defined by TTC, MTTC, and PET on each intersection.", "caption_ja": "図 4 は、各測定値によって特定された高リスク地域の上位 5 % の分布を示し、図 3. 各交差点の仮想グリッドを強調表示しています。", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-006-fig-02.jpg", "bbox": [0.10224853076006751, 0.46264952229687534, 0.8977501491335693, 0.9506380999626499], "summary": ["図 4 は、各測定値によって特定された高リスク地域の上位 5 % の分布を示し、図 3. 各交差点の仮想グリッドを強調表示しています。", "この研究では、追突、横滑り、車線変更、正面衝突など、いくつかのタイプの衝突を調査しました。", "このアプローチにより、交差点に進入する車両と交差点内で発生するさまざまな種類の衝突の両方を分析することができました。", "図 4. 各交差点の TTC、MTTC、PET によって定義された上位 5% の高リスクエリア。", "事故分析と予防 220 (2025) 108167 6"], "related_paragraph_ids": ["p006-b006", "p006-b010"]}, {"id": "fig-007-01", "page": 7, "index": 1, "label": "図5", "caption_en": "Fig. 5. R-squared graph in each section and crash type.", "caption_ja": "図 5. R-squared graph in each section and crash type.", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-007-fig-01.jpg", "bbox": [0.053296288927245174, 0.385043844596396, 0.9467036918479049, 0.9506380999626499], "summary": ["衝突と交通衝突の関係を調べるために、この研究ではまず、GLM を通じて各交差点の衝突リスクを最もよく表す最適な交通衝突尺度とそのしきい値を導き出します。", "モデリングプロセスは、(1) 交差点全体にわたる衝突全体、(2) 交差点内側の方向転換関連および非追突事故、(3) 追突事故がより頻繁に発生する接近セクションの 3 つのカテゴリに分けて実行されました。", "この分割の必要性は、交差点セクション（つまり、交差点への入口セクションである「進入セクション」と、横断歩道で囲まれた交差点の中央エリアを指す「内側交差点」）内で観察された運転パターンの不均一性によるものです（Polders et al., 2015; Singh et al., 2022; Yuan and Abdel-Aty, 2018）。", "このモデリングプロセスを通じて、信号交差点のマイクロホットスポットを特定するための最適な交通競合対策がセグメントごとに決定されます。", "さらに、交通コンフリクト指標と衝突リスクとの関係も特定されます。"], "related_paragraph_ids": ["p007-b004", "p007-b003", "p007-b008"]}, {"id": "fig-008-01", "page": 8, "index": 1, "label": "図6", "caption_en": "Fig. 6. Micro-level hotspot identification results of intersection A.", "caption_ja": "図6は、交差点Aにおけるミクロレベルのホットスポットを特定した結果を示しており、進入セクションのTTC数（≤3.0秒）と内側交差点のPET数（≤0.9秒）によって定義され、最も正確な衝突頻度推定が得られます。", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-008-fig-01.jpg", "bbox": [0.1498676253731928, 0.6067088449805087, 0.8501310673370107, 0.9506380999626499], "summary": ["図6は、交差点Aにおけるミクロレベルのホットスポットを特定した結果を示しており、進入セクションのTTC数（≤3.0秒）と内側交差点のPET数（≤0.9秒）によって定義され、最も正確な衝突頻度推定が得られます。", "他のケーススタディおよび今後の研究では変更されます。", "3.2.微視的な交通衝突ホットスポット本研究では、最適な交通衝突対策を導出した後、それを利用してKDEを導出し、各交差点における交通衝突が多発しているエリアを可視化する。", "私たちの分析により、衝突事故は主に停止線付近で発生し、残りは交差点内で発生していることが明らかになりました。", "交通衝突もこの傾向を再現しており、横断歩道付近よりも停止線で頻繁に発生しています。"], "related_paragraph_ids": ["p008-b008", "p008-b002", "p008-b004"]}, {"id": "fig-009-01", "page": 9, "index": 1, "label": "図7", "caption_en": "Fig. 7. Micro-level hotspot identification results of intersection D.", "caption_ja": "図 7. 交差点 D のミクロレベルのホットスポット識別結果。", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-009-fig-01.jpg", "bbox": [0.10224853076006751, 0.05720037462327929, 0.8977501491335693, 0.44385222481979963], "summary": ["図 7. 交差点 D のミクロレベルのホットスポット識別結果。", "駐車場に進入する車両がスムーズに車線変更を行い、潜在的な衝突を最小限に抑えます。", "3.3.微視的衝突頻度回帰負の二項回帰モデルが、交差点 A、D、E および統合交差点 ADE に対してそれぞれ開発されました。", "この研究では、衝突頻度モデルにおける停止線、道路標識、左折車線の存在など、追加の道路環境変数を考慮しています。", "表 2 は、各交差点のミクロレベルの衝突頻度モデルの結果を示しています。"], "related_paragraph_ids": ["p009-b002", "p008-b002", "p008-b007", "p009-b004", "p012-b009"]}, {"id": "fig-009-02", "page": 9, "index": 2, "label": "図8", "caption_en": "Fig. 8. Micro-level hotspot identification results of intersection E.", "caption_ja": "図 8. 交差点のミクロレベルのホットスポット識別結果 E. N. Park et al.事故分析と予防 220 (2025) 108167 9", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-009-fig-02.jpg", "bbox": [0.10224853076006751, 0.05720037462327929, 0.8977501491335693, 0.7869234359251236], "summary": ["図 8. 交差点のミクロレベルのホットスポット識別結果 E.", "Park et al.事故分析と予防 220 (2025) 108167 9", "駐車場に進入する車両がスムーズに車線変更を行い、潜在的な衝突を最小限に抑えます。", "3.3.微視的衝突頻度回帰負の二項回帰モデルが、交差点 A、D、E および統合交差点 ADE に対してそれぞれ開発されました。", "この研究では、衝突頻度モデルにおける停止線、道路標識、左折車線の存在など、追加の道路環境変数を考慮しています。"], "related_paragraph_ids": ["p009-b003", "p008-b002", "p008-b013", "p009-b004", "p012-b008"]}, {"id": "fig-012-01", "page": 12, "index": 1, "label": "図9", "caption_en": "Fig. 9. Expected crashes at virtual grids and actual crashes (white dots).", "caption_ja": "図 9. 仮想グリッドで予想される事故と実際の事故 (白い点)。", "image": "figures/micro-level-hotspot-identification-at-intersections-using-traffic-conflict-analysis/page-012-fig-01.jpg", "bbox": [0.09596287635335253, 0.0572381706947487, 0.9039914069534694, 0.516209439297779], "summary": ["図 9. 仮想グリッドで予想される事故と実際の事故 (白い点)。", "数多くの研究と政府の取り組みにより、信号交差点における効果的な安全対策の開発が行われてきました。", "事故の削減には成功していることが証明されていますが、さらなる改善には、ターゲットを絞った費用対効果の高い対策を提供するために、事故のリスクが依然として高いミクロレベルのホットスポットを特定する必要があります。", "この研究では、車両の軌跡データに基づく衝突記録とさまざまな衝突対策を使用して、信号交差点でのミクロレベルのホットスポットを発見することを試みています。", "この研究では、交差点の車線幅サイズのグリッドでの衝突頻度を推定し、最適な交通衝突対策とそのしきい値を特定するための GLM を開発しました。"], "related_paragraph_ids": ["p012-b002", "p011-b019", "p011-b041", "p011-b042", "p012-b011"]}], "chapters": [{"id": "chapter-overview", "title_en": "Overview and citation information", "title_ja": "論文概要・引用情報", "start_page": 0, "paragraph_ids": ["overview-01", "overview-02", "overview-03", "overview-04"], "summary": ["2000字以内の論文概要と、引用に必要な著者、出版日、掲載誌、DOI、査読推定をまとめています。"], "overview": true}, {"id": "chapter-quiz", "title_en": "Comprehension check", "title_ja": "確認問題", "start_page": -1, "paragraph_ids": [], "summary": ["各論文につき10問の確認問題です。誤答時には解説と正答を表示します。"], "quiz": true}, {"id": "chapter-000", "title_en": "Document", "title_ja": "文書全体", "start_page": 1, "paragraph_ids": ["p001-b001", "p001-b002", "p001-b003", "p001-b004", "p001-b005", "p001-b006", "p001-b007", "p001-b008", "p001-b009", "p001-b010", "p001-b011"], "summary": ["交通事故ホットスポットを特定する従来のアプローチは、主に道路網内の危険な交差点を特定することに焦点を当てており、交差点内の衝突リスクの変動は見落とされてきました。", "ミクロレベルの事故ホットスポット分析は、特定の高リスク領域を正確に特定することで、この問題に対処します。", "この研究は、ドローンのビデオから導き出された交通衝突対策を使用して、3 つの信号交差点内のミクロレベルのホットスポットを特定することを目的としています。", "最も適切な衝突対策を選択し、各交差点での最適なしきい値を決定するために、一般化線形モデリング (GLM) を使用して衝突頻度モデルを開発します。", "この研究は、ミクロレベルのホットスポットに対する交通衝突対策を特定し、詳細な安全介入を提供することにより、交差点の安全性に貢献します。"]}, {"id": "chapter-001", "title_en": "1. introduction", "title_ja": "1. はじめに", "start_page": 1, "paragraph_ids": ["p001-b012", "p001-b013", "p001-b014", "p001-b015", "p001-b016", "p001-b017", "p001-b018", "p002-b001", "p002-b002", "p002-b003"], "summary": ["この研究は、さまざまな交通コンフリクト対策を使用したミクロレベルのホットスポット識別分析を開発することでギャップを埋めることを目的としています。", "最後に、選択された交通コンフリクト対策に基づいて、カーネル密度推定 (KDE) を使用してミクロレベルのホットスポットが特定されました。", "(Stipancic et al.、2019) は、衝突傷害データ、交通量データ、信号データを使用して信号交差点の衝突頻度モデルを開発し、マクロレベルのホットスポットを特定しました。", "しかし、これらの研究では、衝突データに依存したり、適切な交通衝突対策を選択したりするミクロレベルの衝突リスクのホットスポットが特定されており、これにより分析の信頼性が低下します。", "交通コンフリクト対策が潜在的な事故のスナップショットを提供することを考えると、ミクロレベルのホットスポットを特定するための効率的な方法となります。"]}, {"id": "chapter-002", "title_en": "1.1. literature review", "title_ja": "1.1. 文献レビュー", "start_page": 2, "paragraph_ids": ["p002-b004", "p002-b005", "p002-b007", "p002-b008", "p002-b009", "p002-b010", "p002-b011", "p003-b001", "p003-b002", "p003-b003"], "summary": ["この文献レビューは、大規模な道路網から危険な交差点を特定する従来のアプローチとは対照的に、交差点内のミクロレベルの衝突ホットスポットを特定する方法における研究上の大きなギャップを浮き彫りにしている。", "私たちは、ミクロレベルのホットスポットを特定するために事故データと競合分析の両方を統合するフレームワークに関する研究が限られていることがわかりました。", "これらの調査結果に基づいて、私たちの研究は、GLM を使用して衝突リスクと強く相関する最も適切な交通衝突対策を特定することに焦点を当て、このアプローチをミクロレベルで高リスクエリアを特定するために適用します。", "この研究では、信号交差点におけるホットスポットの特定のために、2022 年にフロリダ州オーランドのセントラルフロリダ大学 (UCF) キャンパス付近で取得された 3 つのデータセットが使用されています。", "さらに、衝突データは、特定の場所の各信号交差点での衝突リスクと高度に相関する交通衝突対策を特定するために収集されます。"]}, {"id": "chapter-003", "title_en": "1.2. data description", "title_ja": "1.2. データ概要", "start_page": 3, "paragraph_ids": ["p003-b004", "p003-b005", "p003-b006", "p003-b008", "p003-b009", "p004-b001", "p004-b002"], "summary": ["時間的不安定性の影響を軽減するために、日中の衝突データが分析に使用されました (Mannering、2017)。", "データセット全体で均一な光環境を確保するために、視界不良の悪天候によるデータも除外されました。", "その結果、その交差点では合計129件の衝突事故が発生した。", "また、道路環境データは、オープンストリートマップ、Googleストリートビュー、フロリダ道路GISデータに基づいて構築されました。", "構築するデータのリストには、停止線、内側交差点、分離施設、自転車レーン、道路標識が含まれます。"]}, {"id": "chapter-004", "title_en": "2. methods", "title_ja": "2. 方法", "start_page": 4, "paragraph_ids": ["p004-b003", "p004-b004", "p004-b005", "p004-b006", "p004-b007", "p004-b008", "p004-b009", "p004-b010", "p004-b011", "p004-b012", "p004-b013", "p004-b014", "p004-b015", "p004-b017", "p004-b018", "p004-b019", "p004-b020", "p004-b021"], "summary": ["次に、各信号交差点での交通衝突対策が計算され、GLM ベースの衝突頻度モデルが開発されます。", "交差点の種類ごとにミクロレベルのホットスポットを特定するために、衝突リスクを最もよく表す交通衝突の測定値としきい値が選択されます。", "この研究では、信号交差点での衝突の危険性を示す交通衝突対策として、TTC、MTTC、および PET が使用されています。", "この論文では、グリッド単位の交差点内で発生する衝突の頻度を従属変数として、しきい値ごとの交通衝突対策の発生数を独立変数として、GLM ベースのモデルを開発します。", "一方、衝突の数が 0 の場合に、予測される衝突リスクに対する交通衝突の影響を排除するモデルを構築するために、この研究で使用されるこの表 1 CitySim データセットの説明を使用します。"]}, {"id": "chapter-005", "title_en": "2.1. crash frequency model", "title_ja": "2.1. 事故頻度モデル", "start_page": 4, "paragraph_ids": ["p004-b022", "p004-b023", "p004-b024", "p004-b025", "p004-b026", "p004-b027", "p005-b001", "p005-b002", "p005-b003", "p005-b006", "p005-b007", "p005-b008", "p005-b009", "p005-b010", "p005-b011", "p005-b012", "p005-b013", "p005-b014", "p005-b016", "p005-b017"], "summary": ["E (Y | x) = C β 0 × exp [ α + ∑ j i = 1 β i x i ] (4) GLM を開発した後、この研究では、衝突頻度に最もよく関連する交通衝突測定値を見つけるために、さまざまな交通衝突測定値としきい値を使用して各モデルの R 二乗を測定します。", "この研究では、R 二乗値が最も高いモデル内の特定のしきい値による衝突測定に焦点を当てています。", "衝突位置の精度は、記録された衝突位置および衝突方法と比較することによって手動で評価され、その後、衝突頻度モデルが作成され、すべての衝突の頻度が推定されます。", "2.2. 仮想グリッドを使用したミクロレベルのホットスポットの特定当社の分析フレームワークは、交通衝突イベント、過去の衝突記録、道路環境データを均一なグリッド単位で体系的に集約することで、交差点内の衝突頻度を推定するように設計されています。", "これにより、従来の交差点レベルのリスク評価から脱却でき、特定の高リスクゾーンを正確に特定できるようになります。"]}, {"id": "chapter-006", "title_en": "2.2. micro-level hotspot identification using virtual grid", "title_ja": "2.2. 仮想グリッドを用いたミクロレベルのホットスポット特定", "start_page": 5, "paragraph_ids": ["p005-b018", "p005-b019", "p005-b020", "p006-b001", "p006-b002", "p006-b003", "p006-b004", "p006-b005", "p006-b006", "p006-b008"], "summary": ["最後のステップでは、導出された最適な交通競合指標としきい値を使用して、各信号交差点のミクロレベルのホットスポットを特定します。", "衝突ホットスポットを特定した以前の研究 (Anderson, 2009; Thakali et al., 2015; Lakshmi et al., 2019; Le et al., 2020) に続いて、衝突が発生する頻度が高い詳細な交差点エリアが KDE によって特定されます。", "KDE は、カーネル関数を使用して不連続性を示すヒストグラムベースの密度推定方法の問題を改善できる方法論です。", "この推定方法により、隣接エリアへの競合ホットスポットの影響を部分的に考慮したミクロレベルのホットスポットの特定が可能になります。", "(Thakali et al.、2015) は、事故ホットスポットの特定に KDE 手法とクリギング手法を採用しました。"]}, {"id": "chapter-007", "title_en": "3. results and discussion", "title_ja": "3. 結果と考察", "start_page": 6, "paragraph_ids": ["p006-b009", "p006-b010", "p007-b001", "p007-b002", "p007-b003", "p007-b004", "p007-b006"], "summary": ["図 4 は、各測定値によって特定された高リスク地域の上位 5 % の分布を示し、図 3. 各交差点の仮想グリッドを強調表示しています。", "各交差点での交通衝突を視覚化したところ、3 つの交通衝突指標が示す高リスクエリアが著しく異なることが明らかになりました。", "各測定値のリスク集中の明確な空間パターンは、ミクロレベルのホットスポットの特定において適切な交通コンフリクト測定値を選択するという重要な役割を強調します。", "3.1.交通コンフリクト対策と閾値の選択交通コンフリクト対策ごとに閾値を0.1から3.0まで0.1秒間隔で変化させてモデルを構築した結果を図5に示します。", "これは、PET が交差点内側の方向転換に関連した衝突リスクを効果的に把握できる一方、TTC が交差点進入区間での追突リスクの特定に適していることを示しています。"]}, {"id": "chapter-008", "title_en": "3.1. selection of traffic conflict measure and threshold", "title_ja": "3.1. 交通コンフリクト指標としきい値の選択", "start_page": 7, "paragraph_ids": ["p007-b007", "p007-b008", "p008-b001", "p008-b002"], "summary": ["図6は、交差点Aにおけるミクロレベルのホットスポットを特定した結果を示しており、進入セクションのTTC数（≤3.0秒）と内側交差点のPET数（≤0.9秒）によって定義され、最も正確な衝突頻度推定が得られます。", "私たちの分析により、衝突事故は主に停止線付近で発生し、残りは交差点内で発生していることが明らかになりました。", "これは、PET が交差点内側での方向転換に関連した衝突のリスクを効果的に記述し、このセグメントのマイクロホットスポットを特定する上での重要性を強調していることを示唆しています。", "それにもかかわらず、交通衝突によりミクロレベルのホットスポットが特定され、ノースバウンドスルー（NBT）の停止線付近で交通衝突が頻繁に発生していることが明らかになりました。", "図 8 は、交差点 E におけるミクロレベルのホットスポット特定の結果と、その詳細な道路特徴を示しています。"]}, {"id": "chapter-009", "title_en": "3.2. microscopic traffic conflict hotspots", "title_ja": "3.2. ミクロ交通コンフリクト・ホットスポット", "start_page": 8, "paragraph_ids": ["p008-b003", "p008-b004", "p008-b005", "p008-b006", "p008-b007", "p008-b008", "p008-b010", "p008-b011", "p008-b012", "p008-b013", "p008-b014", "p008-b015", "p009-b001", "p009-b002", "p009-b003", "p009-b004"], "summary": ["3.3.微視的衝突頻度回帰負の二項回帰モデルが、交差点 A、D、E および統合交差点 ADE に対してそれぞれ開発されました。", "表 2 は、各交差点のミクロレベルの衝突頻度モデルの結果を示しています。", "表 3 に交差 ADE 統合モデルの結果を示します。", "その結果、3 つの交差点 A、D、E のデータを統合して開発した ADE モデルは、R 二乗とモデルの合理性の点で、各交差点の個別モデルよりも優れたパフォーマンスを示しました。", "図 8. 交差点のミクロレベルのホットスポット識別結果 E. N. Park et al.事故分析と予防 220 (2025) 108167 9"]}, {"id": "chapter-010", "title_en": "3.3. microscopic crash frequency regression", "title_ja": "3.3. ミクロ事故頻度回帰", "start_page": 9, "paragraph_ids": ["p009-b005", "p009-b006", "p009-b008", "p009-b009", "p010-b001", "p010-b002", "p010-b003", "p010-b004", "p010-b005", "p010-b006", "p010-b007", "p010-b008", "p010-b009", "p010-b010", "p010-b011", "p010-b012", "p010-b013", "p010-b014", "p010-b015", "p010-b016", "p010-b017", "p010-b018", "p010-b019", "p010-b020", "p010-b021", "p010-b022", "p010-b023", "p010-b024", "p010-b025", "p010-b026", "p010-b028", "p010-b029", "p010-b030", "p010-b031", "p010-b032", "p010-b033", "p010-b034", "p010-b035", "p010-b036", "p010-b037", "p010-b038", "p010-b039", "p010-b040", "p010-b041", "p010-b042", "p010-b043", "p010-b044", "p010-b045", "p010-b046", "p010-b047", "p010-b048", "p010-b049", "p010-b050", "p010-b051", "p010-b052", "p010-b053", "p010-b054", "p010-b055", "p010-b056", "p010-b057", "p010-b058", "p010-b059", "p010-b060", "p010-b061", "p010-b062", "p010-b063", "p011-b001", "p011-b002", "p011-b003", "p011-b004", "p011-b005", "p011-b006", "p011-b007", "p011-b008", "p011-b009", "p011-b010", "p011-b011", "p011-b012", "p011-b013", "p011-b014", "p011-b015", "p011-b016", "p011-b017", "p011-b019", "p011-b020", "p011-b021", "p011-b022", "p011-b023", "p011-b024", "p011-b025", "p011-b026", "p011-b027", "p011-b028", "p011-b029", "p011-b030", "p011-b031", "p011-b032", "p011-b033", "p011-b034", "p011-b035", "p011-b036", "p011-b037", "p011-b038", "p011-b039", "p011-b040", "p011-b041", "p011-b042", "p011-b043", "p012-b001", "p012-b002", "p012-b003"], "summary": ["交差点内側については，道路標識などの道路環境変数が含まれていないため，非追突事故（その他の衝突）が発生した交差点内側を対象として，重要でない変数を除去し交通衝突対策を1つ使用したモデル11を最終モデルとして選択した。", "視覚化を使用して、最適な交通コンフリクト測定に基づいたモデルがマイクロホットスポットをどの程度効果的に特定したかを評価しました。", "結果は、モデル 11 (PET 搭載) は旋回関連の衝突リスクを効果的に捉えているのに対し、モデル 12 (TTC 搭載) は追突リスクの特定に適していることを示しています。", "衝突事故と交通衝突との空間的相関関係から、交通衝突ベースのホットスポットを使用すると、3 つの交差点すべてにわたって高リスクエリアを正確に検出できることが明らかになりました。", "これらの結果は、交差点内側の衝突に対する予測交通衝突対策をさらに開発することが有益である可能性があることを示唆しています。"]}, {"id": "chapter-011", "title_en": "4. implications", "title_ja": "4. 示唆", "start_page": 12, "paragraph_ids": ["p012-b004", "p012-b005", "p012-b006", "p012-b008", "p012-b009"], "summary": ["この研究の主な結論は、ミクロレベルのホットスポットを特定するには、各交差点の特性に基づいて、さまざまな交通衝突対策としきい値を使用する必要があるということです。", "さらに、衝突頻度回帰の結果は、交差点内側、進入セクション、その他の交差点環境などのさまざまな幾何学的位置が、衝突につながる明確なリスクパターンを示していることを示唆しています。", "特定されたミクロレベルのホットスポットは、特定のタイプの衝突を軽減するための対象となる交通安全対策を知らせることができます。", "交差点Eのミクロレベルのホットスポット特定結果（図8）は、左折交通に対するPETベースの衝突リスクが高い場合、左折車線区分線を交差点まで延長することで車両の誘導に役立ち、安全性を向上できることを示しています。", "要約すると、ミクロレベルのホットスポットの特定は安全管理に不可欠なデータを提供し、高リスクエリアに対処するための場所固有の対策を実行できるようにします。"]}, {"id": "chapter-012", "title_en": "5. conclusions", "title_ja": "5. 結論", "start_page": 12, "paragraph_ids": ["p012-b010", "p012-b011", "p013-b001", "p013-b002", "p013-b003", "p013-b004", "p013-b005", "p013-b006", "p013-b007", "p013-b009", "p013-b010", "p013-b011", "p013-b012", "p013-b013", "p013-b014", "p013-b015", "p013-b016", "p014-b001", "p014-b002", "p014-b004"], "summary": ["この研究では、交差点の車線幅サイズのグリッドでの衝突頻度を推定し、最適な交通衝突対策とそのしきい値を特定するための GLM を開発しました。", "当社の包括的なアプローチにより、各交差点のミクロレベルのホットスポットの詳細な分析が可能になり、各現場で観察された特定の衝突パターンに基づいて、舗装標識の強化、左折区画の拡張、自転車レーンの分離など、より的を絞った安全対策の提案につながりました。", "私たちの分析によると、信号交差点での衝突事故の大部分は、主に停止線の手前と左折時の交差点内側で発生しており、これは交通衝突ベースのホットスポットによって特定されたパターンと一致しています。", "GLM モデルの結果はこの観察を裏付けており、内側交差点モデルと進入セクションモデルの両方に TTC と PET を組み込むことで、ミクロレベルの衝突ホットスポットのより正確な推定が提供されることを示しています。", "これらの制限にもかかわらず、提案されているミクロレベルのホットスポットにより、道路管理者や安全担当者は交通安全政策を評価し、改善することができます。"]}], "quiz": [{"id": "quiz-01", "question": "この論文の掲載誌として正しいものはどれですか。", "choices": ["Journal of Transportation Safety & Security", "Traffic Safety Research", "Journal of Safety Research", "Accident Analysis and Prevention"], "answer_index": 3, "explanation": "概要ページの引用情報では、掲載誌は「Accident Analysis and Prevention」と整理されています。"}, {"id": "quiz-02", "question": "この論文の出版日または出版年として正しいものはどれですか。", "choices": ["10 July 2025", "10 July 2026", "10 July 2024", "2027"], "answer_index": 0, "explanation": "概要ページの引用情報では、出版日・出版年は「10 July 2025」です。"}, {"id": "quiz-03", "question": "この論文のDOIとして正しいものはどれですか。", "choices": ["10.1016/j.trfake.2021.100001", "10.1016/j.aap.2025.108167", "10.1080/00000000.2020.0000000", "10.1016/j.aap.2025.000000"], "answer_index": 1, "explanation": "概要ページの引用情報では、DOIは「10.1016/j.aap.2025.108167」です。"}, {"id": "quiz-04", "question": "著者情報として正しいものはどれですか。", "choices": ["Nuri Park, Juneyoung Park, Yang-Jun Joo, Mohamed Abdel-Aty", "Accident Analysis and Prevention", "著者はPDF本文から確認できない", "Micro-level hotspot identification at intersections using traffic conflict analysis"], "answer_index": 0, "explanation": "概要ページの引用情報では、著者は「Nuri Park, Juneyoung Park, Yang-Jun Joo, Mohamed Abdel-Aty」と抽出されています。"}, {"id": "quiz-05", "question": "この論文の主なテーマとして最も適切なものはどれですか。", "choices": ["鉄道駅の商業施設配置と乗降客数の関係だけを分析している。", "ミクロレベルの事故ホットスポット分析は、特定の高リスク領域を正確に特定することで、この問題に対処します。", "航空機エンジンの燃料消費だけを比較する研究である。", "港湾物流におけるコンテナ取扱量の季節変動を予測している。"], "answer_index": 1, "explanation": "概要では「ミクロレベルの事故ホットスポット分析は、特定の高リスク領域を正確に特定することで、この問題に対処します。」という内容が中心的に説明されています。"}, {"id": "quiz-06", "question": "研究方法・使用データとして本文に近いものはどれですか。", "choices": ["この研究は、ドローンのビデオから導き出された交通衝突対策を使用して、3 つの信号交差点内のミクロレベルのホットスポットを特定することを目的としています。", "実験や観測データを使わず、広告文の印象評価だけで結論を出している。", "交通安全指標を用いず、気温と降水量だけを説明変数にしている。", "道路利用者の挙動ではなく、住宅価格データだけを分析している。"], "answer_index": 0, "explanation": "方法やデータに関して、本文では「この研究は、ドローンのビデオから導き出された交通衝突対策を使用して、3 つの信号交差点内のミクロレベルのホットスポットを特定することを目的としています。」と説明されています。"}, {"id": "quiz-07", "question": "結果として述べられている内容に近いものはどれですか。", "choices": ["道路利用者の速度や距離は安全性と無関係だと説明している。", "交通事故ホットスポットを特定する従来のアプローチは、主に道路網内の危険な交差点を特定することに焦点を当てており、交差点内の衝突リスクの変動は見落とされてきました。", "交通安全上の差やリスク要因は確認されなかったと結論づけている。", "観測されたデータはモデル化に使えないため、分析を行っていない。"], "answer_index": 1, "explanation": "結果に関して、本文では「交通事故ホットスポットを特定する従来のアプローチは、主に道路網内の危険な交差点を特定することに焦点を当てており、交差点内の衝突リスクの変動は見落とされてきました。」と説明されています。"}, {"id": "quiz-08", "question": "示唆・応用として適切なものはどれですか。", "choices": ["交通管理や道路設計には応用できないと述べている。", "研究成果は交通安全評価とは関係しないと説明している。", "安全対策ではなく、観光案内板の色だけを改善すべきだと述べている。", "この研究は、ドローンのビデオから導き出された交通衝突対策を使用して、3 つの信号交差点内のミクロレベルのホットスポットを特定することを目的としています。"], "answer_index": 3, "explanation": "示唆・応用に関して、本文では「この研究は、ドローンのビデオから導き出された交通衝突対策を使用して、3 つの信号交差点内のミクロレベルのホットスポットを特定することを目的としています。」と説明されています。"}, {"id": "quiz-09", "question": "研究背景として適切なものはどれですか。", "choices": ["研究背景は通信販売の購入履歴分析に限定されている。", "交通事故ホットスポットを特定する従来のアプローチは、主に道路網内の危険な交差点を特定することに焦点を当てており、交差点内の衝突リスクの変動は見落とされてきました。", "対象は道路交通ではなく、海上輸送の航路選択である。", "主な関心は交通事故やコンフリクトではなく、映画レビューの分類である。"], "answer_index": 1, "explanation": "研究背景として、本文では「交通事故ホットスポットを特定する従来のアプローチは、主に道路網内の危険な交差点を特定することに焦点を当てており、交差点内の衝突リスクの変動は見落とされてきました。」と説明されています。"}, {"id": "quiz-10", "question": "査読に関する扱いとして正しいものはどれですか。", "choices": ["査読なしのブログ記事として扱う。", "新聞記事として扱い、DOIは記載しない。", "査読の有無は気にせず、著者名だけを引用すればよい。", "査読付き学術誌掲載論文と推定。ただし、本文PDFだけでは査読プロセスの明記確認はできないため、投稿先誌ページで最終確認してください。"], "answer_index": 3, "explanation": "掲載誌情報があるため「査読付き学術誌掲載論文と推定。ただし、本文PDFだけでは査読プロセスの明記確認はできないため、投稿先誌ページで最終確認してください。」として扱い、必要に応じて掲載誌ページで最終確認します。"}]}</script>
  <script>
    const data = JSON.parse(document.getElementById("reader-data").textContent);
    const paragraphById = new Map(data.paragraphs.map((paragraph) => [paragraph.id, paragraph]));
    const figureById = new Map(data.figures.map((figure) => [figure.id, figure]));
    const figuresInOrder = [...data.figures].sort((a, b) => a.page - b.page || a.index - b.index);
    const pageByNumber = new Map(data.pages.map((page) => [page.number, page]));
    const chapterById = new Map(data.chapters.map((chapter) => [chapter.id, chapter]));
    const quizItems = Array.isArray(data.quiz) ? data.quiz : [];
    const quizById = new Map(quizItems.map((item) => [item.id, item]));
    const regularPageCount = data.pages.filter((page) => !page.overview && !page.quiz).length;
    const readerLayout = document.getElementById("readerLayout");
    const content = document.getElementById("content");
    const graphPane = document.getElementById("graphPane");
    const rightNav = document.getElementById("rightNav");
    const readerStatus = document.getElementById("readerStatus");
    const selectionLabel = document.getElementById("selectionLabel");
    const showOriginal = document.getElementById("showOriginal");
    const clearSelection = document.getElementById("clearSelection");
    const sourceText = document.getElementById("sourceText");
    const pagePreview = document.getElementById("pagePreview");
    const pdfModal = document.getElementById("pdfModal");
    const pdfModalTitle = document.getElementById("pdfModalTitle");
    const pdfModalBody = document.getElementById("pdfModalBody");
    const pdfModalClose = document.getElementById("pdfModalClose");
    const closeReader = document.getElementById("closeReader");
    const resetLayout = document.getElementById("resetLayout");
    const metadataToggle = document.getElementById("metadataToggle");
    const headerActions = document.querySelector(".header-actions");
    const headerMenuToggle = document.getElementById("headerMenuToggle");
    const paragraphGuideButtons = Array.from(document.querySelectorAll("[data-paragraph-guide]"));
    const graphResize = document.getElementById("graphResize");
    const navResize = document.getElementById("navResize");

    let currentPage = data.pages[0]?.number ?? 1;
    let activeFigureId = data.figures[0]?.id || null;
    let activeSelection = null;
    let currentPreviewPage = currentPage;
    let currentPreviewBoxes = [];
    const layoutKeyPrefix = `researchReader.${data.title}.`;
    const graphPinKey = layoutKeyPrefix + "pinnedFigureId";
    const metadataKey = layoutKeyPrefix + "metadataVisible";
    const tocKey = layoutKeyPrefix + "tocCollapsed";
    const paragraphGuideKey = layoutKeyPrefix + "paragraphGuide";
    let pinnedFigureId = localStorage.getItem(graphPinKey);
    let metadataVisible = localStorage.getItem(metadataKey) === "true";
    let tocCollapsed = localStorage.getItem(tocKey) === "true";
    let paragraphGuideMode = localStorage.getItem(paragraphGuideKey) || "none";
    if (!["lines", "none", "zebra"].includes(paragraphGuideMode)) paragraphGuideMode = "none";
    if (pinnedFigureId && !figureById.has(pinnedFigureId)) pinnedFigureId = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function shortText(value, max = 170) {
      const text = String(value || "").trim();
      return text.length > max ? text.slice(0, max - 1) + "…" : text;
    }

    function pageObject(pageOrNumber) {
      return typeof pageOrNumber === "object" ? pageOrNumber : pageByNumber.get(pageOrNumber);
    }

    function pageLabel(pageOrNumber) {
      const page = pageObject(pageOrNumber);
      if (page?.overview) return "概要";
      if (page?.quiz) return "問題";
      return String(page?.number ?? pageOrNumber);
    }

    function pageTitle(pageOrNumber) {
      const page = pageObject(pageOrNumber);
      if (page?.quiz) return "確認問題";
      return page?.overview ? "論文概要・引用情報" : `ページ ${page?.number ?? pageOrNumber}`;
    }

    function pageStatusText(pageNumber) {
      const page = pageByNumber.get(pageNumber);
      if (page?.quiz) return `確認問題 / ${quizItems.length}問`;
      return page?.overview ? `概要 / 本文${regularPageCount}ページ` : `ページ ${pageNumber} / ${regularPageCount}`;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function currentPaneWidth(selector) {
      const element = document.querySelector(selector);
      return element ? element.getBoundingClientRect().width : 0;
    }

    function setPaneWidths(graphWidth, navWidth, save = true) {
      if (graphWidth) {
        readerLayout.style.setProperty("--graph-width", `${Math.round(graphWidth)}px`);
        if (save) localStorage.setItem(layoutKeyPrefix + "graphWidth", String(Math.round(graphWidth)));
      }
      if (navWidth) {
        readerLayout.style.setProperty("--nav-width", `${Math.round(navWidth)}px`);
        if (save) localStorage.setItem(layoutKeyPrefix + "navWidth", String(Math.round(navWidth)));
      }
    }

    function applySavedPaneWidths() {
      const graphWidth = Number(localStorage.getItem(layoutKeyPrefix + "graphWidth"));
      const navWidth = Number(localStorage.getItem(layoutKeyPrefix + "navWidth"));
      if (graphWidth > 0) readerLayout.style.setProperty("--graph-width", `${graphWidth}px`);
      if (navWidth > 0) readerLayout.style.setProperty("--nav-width", `${navWidth}px`);
    }

    function resetPaneWidths() {
      localStorage.removeItem(layoutKeyPrefix + "graphWidth");
      localStorage.removeItem(layoutKeyPrefix + "navWidth");
      readerLayout.style.removeProperty("--graph-width");
      readerLayout.style.removeProperty("--nav-width");
    }

    function startPaneResize(kind, event) {
      if (window.matchMedia("(max-width: 1120px)").matches) return;
      event.preventDefault();
      const handle = kind === "graph" ? graphResize : navResize;
      handle.classList.add("active");
      document.body.classList.add("resizing");

      const move = (moveEvent) => {
        const bounds = readerLayout.getBoundingClientRect();
        const graphWidth = currentPaneWidth(".graph-pane");
        const navWidth = currentPaneWidth(".right-nav");
        const minContentWidth = 460;

        if (kind === "graph") {
          const maxGraph = Math.max(260, bounds.width - navWidth - minContentWidth);
          const nextGraph = clamp(moveEvent.clientX - bounds.left, 240, maxGraph);
          setPaneWidths(nextGraph, navWidth);
        } else {
          const maxNav = Math.max(240, bounds.width - graphWidth - minContentWidth);
          const nextNav = clamp(bounds.right - moveEvent.clientX, 220, maxNav);
          setPaneWidths(graphWidth, nextNav);
        }
      };

      const done = () => {
        handle.classList.remove("active");
        document.body.classList.remove("resizing");
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", done);
      };

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", done);
    }

    function applyMetadataVisibility() {
      document.body.classList.toggle("hide-metadata", !metadataVisible);
      metadataToggle.textContent = metadataVisible ? "メタ情報非表示" : "メタ情報表示";
      localStorage.setItem(metadataKey, metadataVisible ? "true" : "false");
    }

    function applyParagraphGuide() {
      document.body.classList.remove("paragraph-guide-lines", "paragraph-guide-none", "paragraph-guide-zebra");
      document.body.classList.add(`paragraph-guide-${paragraphGuideMode}`);
      localStorage.setItem(paragraphGuideKey, paragraphGuideMode);
      for (const button of paragraphGuideButtons) {
        const active = button.dataset.paragraphGuide === paragraphGuideMode;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      }
    }

    function setHeaderMenu(open) {
      headerActions.classList.toggle("menu-open", open);
      headerMenuToggle.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function closeHeaderMenu() {
      setHeaderMenu(false);
    }

    function renderStatus() {
      const page = pageByNumber.get(currentPage);
      const chapter = page ? chapterById.get(page.chapter_id) : null;
      const displayedFigure = displayedGraphFigure();
      const figureText = displayedFigure ? `${displayedFigure.label} / p.${displayedFigure.page}` : "図なし";
      readerStatus.innerHTML = `
        <span class="status-chip">${escapeHtml(pageStatusText(currentPage))}</span>
        <span class="status-chip">表示図: ${escapeHtml(figureText)}</span>
        <span class="status-chip">${escapeHtml(chapter?.title_ja || "文書")}</span>
      `;
    }

    function graphDistanceTextForPage(figure, pageNumber) {
      if (!figure) return "";
      const diff = pageNumber - figure.page;
      if (diff === 0) return "このページのグラフ";
      if (diff > 0) return `${diff}ページ前のグラフ`;
      return `${Math.abs(diff)}ページ後のグラフ`;
    }

    function mobileFigureForPage(pageNumber) {
      return figureListForPage(pageNumber)[0] || previousFigureForPage(pageNumber);
    }

    function renderMobileFigureButton(pageNumber) {
      const figure = mobileFigureForPage(pageNumber);
      if (!figure) return "";
      return `
        <button class="mobile-page-figure" type="button" data-figure-id="${escapeHtml(figure.id)}">
          <img src="${escapeHtml(figure.image)}" alt="${escapeHtml(figure.label)}">
          <span>
            <strong>${escapeHtml(figure.label)} / ページ ${figure.page}</strong>
            <span>${escapeHtml(graphDistanceTextForPage(figure, pageNumber))} / PDF位置</span>
          </span>
        </button>
      `;
    }

    function paragraphFigureLinks(paragraph) {
      const figures = (paragraph.figure_ids || []).map((id) => figureById.get(id)).filter(Boolean);
      if (!figures.length) return "";
      return `
        <span class="paragraph-links" aria-label="関連図">
          ${figures.map((figure) => `
            <button class="paragraph-figure-link" type="button" data-figure-id="${escapeHtml(figure.id)}">
              ${escapeHtml(figure.label)}
            </button>
          `).join("")}
        </span>
      `;
    }

    function paragraphInnerHtml(paragraph, marked = false) {
      const text = marked
        ? `<mark>${escapeHtml(paragraph.translation)}</mark>`
        : escapeHtml(paragraph.translation);
      return `<span class="paragraph-text">${text}</span>${paragraphFigureLinks(paragraph)}`;
    }

    function renderQuizPage(page) {
      const items = quizItems.length ? quizItems : [];
      const questions = items.map((item, index) => `
        <section class="quiz-item" data-quiz-id="${escapeHtml(item.id)}">
          <p class="quiz-question">Q${index + 1}. ${escapeHtml(item.question)}</p>
          <div class="quiz-choices">
            ${(item.choices || []).map((choice, choiceIndex) => `
              <button class="quiz-choice" type="button" data-quiz-id="${escapeHtml(item.id)}" data-choice-index="${choiceIndex}">
                ${escapeHtml(choice)}
              </button>
            `).join("")}
          </div>
          <div class="quiz-result" id="quiz-result-${escapeHtml(item.id)}" hidden></div>
        </section>
      `).join("");
      return `
        <section class="page-section quiz-section" id="page-${page.number}" data-page="${page.number}">
          <div class="page-heading">
            <h2>${escapeHtml(pageTitle(page))}</h2>
            <div class="page-badges">
              <span class="status-chip">${items.length}問</span>
              <span class="status-chip">誤答時に解説表示</span>
            </div>
          </div>
          <div class="quiz-list">
            ${questions || '<p class="empty-state">確認問題を作成できませんでした。</p>'}
          </div>
        </section>
      `;
    }

    function applyQuizAnswer(button) {
      const item = quizById.get(button.dataset.quizId);
      if (!item) return;
      const selectedIndex = Number(button.dataset.choiceIndex);
      if (Number.isNaN(selectedIndex)) return;
      const quizItem = button.closest(".quiz-item");
      const result = quizItem?.querySelector(".quiz-result");
      for (const choice of quizItem?.querySelectorAll(".quiz-choice") || []) {
        choice.classList.remove("correct", "incorrect");
        choice.removeAttribute("aria-current");
      }
      const correctIndex = Number(item.answer_index);
      const correctChoice = item.choices?.[correctIndex] || "";
      const correctButton = quizItem?.querySelector(`[data-choice-index="${correctIndex}"]`);
      correctButton?.classList.add("correct");
      button.setAttribute("aria-current", "true");
      if (!result) return;
      result.hidden = false;
      if (selectedIndex === correctIndex) {
        result.className = "quiz-result correct";
        result.textContent = "正解です。";
      } else {
        button.classList.add("incorrect");
        result.className = "quiz-result incorrect";
        result.innerHTML = `
          <strong>不正解です。</strong>
          <span>正解: ${escapeHtml(correctChoice)}</span><br>
          <span>${escapeHtml(item.explanation || "本文と概要ページを確認してください。")}</span>
        `;
      }
    }

    function renderContent() {
      content.innerHTML = data.pages.map((page) => {
        if (page.quiz) return renderQuizPage(page);
        const chapter = chapterById.get(page.chapter_id);
        const figureCount = page.figures.length;
        const mobileFigure = renderMobileFigureButton(page.number);
        const sectionClass = page.overview ? "page-section overview-section" : "page-section";
        const badges = page.overview
          ? `
              <span class="status-chip">2000字以内</span>
              <span class="status-chip">引用情報</span>
            `
          : `
              <span class="status-chip">${figureCount ? `図 ${figureCount}` : "図なし"}</span>
              <span class="status-chip">${escapeHtml(chapter?.title_ja || "文書")}</span>
            `;
        const paragraphs = page.paragraphs
          .map((id) => paragraphById.get(id))
          .filter(Boolean)
          .map((paragraph) => `
            <p class="paragraph ${escapeHtml(paragraph.kind)}"
               id="${escapeHtml(paragraph.id)}"
               data-paragraph-id="${escapeHtml(paragraph.id)}"
               data-page="${paragraph.page}">
              ${paragraphInnerHtml(paragraph)}
            </p>
          `).join("");
        return `
          <section class="${sectionClass}" id="page-${page.number}" data-page="${page.number}">
            <div class="page-heading">
              <h2>${escapeHtml(pageTitle(page))}</h2>
              <div class="page-badges">
                ${badges}
              </div>
            </div>
            ${mobileFigure}
            ${paragraphs || '<p class="empty-state">このページから抽出できる本文はありません。</p>'}
          </section>
        `;
      }).join("");

      for (const button of content.querySelectorAll(".mobile-page-figure")) {
        button.addEventListener("click", () => {
          const figureId = button.dataset.figureId;
          const section = button.closest(".page-section");
          const pageNumber = Number(section?.dataset.page);
          if (!Number.isNaN(pageNumber)) currentPage = pageNumber;
          selectFigure(figureId, { scroll: false, preservePage: true, keepPin: Boolean(pinnedFigureId) });
        });
      }

      for (const button of content.querySelectorAll(".quiz-choice")) {
        button.addEventListener("click", () => applyQuizAnswer(button));
      }

    }

    function figureListForPage(pageNumber) {
      const page = pageByNumber.get(pageNumber);
      if (!page) return [];
      return page.figures.map((id) => figureById.get(id)).filter(Boolean);
    }

    function previousFigureForPage(pageNumber) {
      let previous = null;
      for (const figure of figuresInOrder) {
        if (figure.page > pageNumber) break;
        previous = figure;
      }
      return previous;
    }

    function naturalFigureForPage(pageNumber) {
      const activeFigure = activeFigureId ? figureById.get(activeFigureId) : null;
      if (activeFigure && activeFigure.page === pageNumber) return activeFigure;
      const pageFigures = figureListForPage(pageNumber);
      return pageFigures[0] || previousFigureForPage(pageNumber);
    }

    function displayedGraphFigure() {
      const pinned = pinnedFigureId ? figureById.get(pinnedFigureId) : null;
      if (pinned) return pinned;
      const selectedFigure = activeSelection?.figureId ? figureById.get(activeSelection.figureId) : null;
      if (selectedFigure) return selectedFigure;
      return naturalFigureForPage(currentPage);
    }

    function syncActiveFigureForPage() {
      const figure = displayedGraphFigure();
      activeFigureId = figure?.id || null;
    }

    function graphDistanceText(figure) {
      if (!figure) return "";
      const diff = currentPage - figure.page;
      const pinPrefix = pinnedFigureId === figure.id ? "ピン止め中 / " : "";
      if (diff === 0) return `${pinPrefix}現在ページのグラフ`;
      if (diff > 0) return `${pinPrefix}${diff}ページ前のグラフ`;
      return `${pinPrefix}${Math.abs(diff)}ページ後のグラフ`;
    }

    function graphContextText(figure) {
      if (!figure) return "";
      const pageFigures = figureListForPage(currentPage);
      if (pinnedFigureId === figure.id) {
        return `ページ${figure.page}の${figure.label}を固定表示しています。現在ページは${currentPage}です。`;
      }
      if (figure.page === currentPage) {
        return `ページ${currentPage}にある${figure.label}を表示しています。`;
      }
      if (!pageFigures.length) {
        return `ページ${currentPage}には新しい図がないため、ページ${figure.page}の${figure.label}を継続表示しています。`;
      }
      return `ページ${figure.page}の${figure.label}を表示しています。`;
    }

    function figureOrderIndex(figureId) {
      return figuresInOrder.findIndex((figure) => figure.id === figureId);
    }

    function adjacentFigure(offset) {
      const currentFigure = displayedGraphFigure();
      const currentIndex = currentFigure ? figureOrderIndex(currentFigure.id) : -1;
      const nextIndex = currentIndex + offset;
      if (nextIndex < 0 || nextIndex >= figuresInOrder.length) return null;
      return figuresInOrder[nextIndex];
    }

    function setPinnedFigure(figureId) {
      pinnedFigureId = figureId && figureById.has(figureId) ? figureId : null;
      if (pinnedFigureId) {
        localStorage.setItem(graphPinKey, pinnedFigureId);
      } else {
        localStorage.removeItem(graphPinKey);
      }
    }

    function toggleGraphPin() {
      const figure = displayedGraphFigure();
      if (!figure) return;
      if (pinnedFigureId === figure.id) {
        setPinnedFigure(null);
        syncActiveFigureForPage();
      } else {
        setPinnedFigure(figure.id);
        activeFigureId = figure.id;
      }
      renderSidebars();
    }

    function jumpGraph(offset) {
      const figure = adjacentFigure(offset);
      if (!figure) return;
      selectFigure(figure.id, { keepPin: Boolean(pinnedFigureId) });
    }

    function relatedParagraphsForFigure(figure) {
      return (figure.related_paragraph_ids || [])
        .map((id) => paragraphById.get(id))
        .filter(Boolean);
    }

    function relatedParagraphsHtml(figure) {
      const related = relatedParagraphsForFigure(figure).slice(0, 6);
      if (!related.length) return "";
      return `
        <h2>関連する翻訳</h2>
        <div class="related-paragraphs">
          ${related.map((paragraph) => `
            <button class="related-paragraph-button" type="button" data-paragraph-id="${escapeHtml(paragraph.id)}" data-figure-id="${escapeHtml(figure.id)}">
              <strong>ページ ${paragraph.page} / ${paragraph.kind === "figure-caption" ? "図キャプション" : "本文"}</strong>
              <span>${escapeHtml(shortText(paragraph.translation, 150))}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function tocChapters() {
      const chapters = data.chapters.filter((chapter) => chapter.title_en !== "Document");
      return chapters.length ? chapters : data.chapters;
    }

    function chapterSummaryText(chapter) {
      const summary = (chapter.summary || []).filter(Boolean).join(" ");
      return shortText(summary || chapter.title_ja || chapter.title_en, 96);
    }

    function renderToc(chapter) {
      const chapters = tocChapters();
      const currentChapterId = chapter?.id || "";
      const body = tocCollapsed
        ? '<p class="toc-collapsed-note">目次を閉じています。</p>'
        : `
          <div class="toc-list">
            ${chapters.map((candidate) => `
              <a class="toc-item ${candidate.id === currentChapterId ? "active" : ""}"
                 href="#page-${candidate.start_page}"
                 data-page="${candidate.start_page}">
                <strong>${escapeHtml(candidate.title_ja || candidate.title_en)}</strong>
                <span class="toc-summary">${escapeHtml(chapterSummaryText(candidate))}</span>
              </a>
            `).join("")}
          </div>
        `;
      return `
        <div class="nav-block toc-block">
          <div class="toc-head">
            <h3>目次</h3>
            <button class="toc-toggle" id="tocToggle" type="button">${tocCollapsed ? "開く" : "閉じる"}</button>
          </div>
          ${body}
        </div>
      `;
    }

    function renderGraphPane() {
      syncActiveFigureForPage();
      const figure = displayedGraphFigure();

      if (!figure) {
        graphPane.innerHTML = '<p class="empty-state">ここまでに抽出された図はありません。</p>';
        return;
      }

      const previous = adjacentFigure(-1);
      const next = adjacentFigure(1);
      const pinned = pinnedFigureId === figure.id;
      graphPane.innerHTML = `
        <div class="graph-toolbar">
          <span class="graph-status">${escapeHtml(graphDistanceText(figure))}</span>
          <div class="graph-actions">
            <button class="mini-button" id="prevGraph" type="button" ${previous ? "" : "disabled"}>前の図</button>
            <button class="mini-button" id="nextGraph" type="button" ${next ? "" : "disabled"}>次の図</button>
            <button class="mini-button" id="viewGraphPdf" type="button">PDF</button>
            <button class="mini-button ${pinned ? "active" : ""}" id="toggleGraphPin" type="button">${pinned ? "ピン解除" : "ピン止め"}</button>
          </div>
        </div>
        <p class="graph-context">${escapeHtml(graphContextText(figure))}</p>
        <figure class="active-figure" data-figure-id="${escapeHtml(figure.id)}">
          <img src="${escapeHtml(figure.image)}" alt="${escapeHtml(figure.label)}">
          <figcaption><strong>${escapeHtml(figure.label)}</strong> ${escapeHtml(figure.caption_ja)}</figcaption>
        </figure>
        <h2>グラフの説明</h2>
        <ul class="summary-list">
          ${figure.summary.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
        </ul>
        ${relatedParagraphsHtml(figure)}
      `;

      graphPane.querySelector("#toggleGraphPin")?.addEventListener("click", toggleGraphPin);
      graphPane.querySelector("#prevGraph")?.addEventListener("click", () => jumpGraph(-1));
      graphPane.querySelector("#nextGraph")?.addEventListener("click", () => jumpGraph(1));
      graphPane.querySelector("#viewGraphPdf")?.addEventListener("click", () => selectFigure(figure.id, { scroll: false, preservePage: true, keepPin: Boolean(pinnedFigureId) }));
      graphPane.querySelector(".active-figure img")?.addEventListener("click", () => selectFigure(figure.id, { scroll: false, preservePage: true, keepPin: Boolean(pinnedFigureId) }));
      for (const button of graphPane.querySelectorAll(".related-paragraph-button")) {
        button.addEventListener("click", () => focusLinkedParagraph(button.dataset.paragraphId, button.dataset.figureId));
      }
    }

    function renderRightNav() {
      syncActiveFigureForPage();
      const page = pageByNumber.get(currentPage);
      const chapter = page ? chapterById.get(page.chapter_id) : null;
      const pageFigures = figureListForPage(currentPage);
      const displayedFigure = displayedGraphFigure();
      const displayedFigureId = displayedFigure?.id || null;
      const figureCards = page?.overview
        ? '<p class="empty-state">概要ページではPDF図を表示しません。本文ページへ移動すると固定グラフが表示されます。</p>'
        : page?.quiz
          ? '<p class="empty-state">確認問題ページではPDF図を表示しません。本文ページへ移動すると固定グラフが表示されます。</p>'
        : pageFigures.length
        ? pageFigures.map((figure) => `
            <button class="figure-card nav-figure-card ${figure.id === displayedFigureId ? "active" : ""}" type="button" data-figure-id="${escapeHtml(figure.id)}">
              <strong>${escapeHtml(figure.label)} / ページ ${figure.page}</strong>
              <span class="nav-action">固定グラフへ</span>
            </button>
          `).join("")
        : displayedFigure
          ? `<p class="empty-state">このページに新しい図はありません。固定グラフには${escapeHtml(graphDistanceText(displayedFigure))}を表示しています。</p>`
          : '<p class="empty-state">このページに抽出された図はありません。</p>';

      rightNav.innerHTML = `
        ${renderToc(chapter)}
        <div class="nav-block">
          <h3>ページ内の図</h3>
          ${figureCards}
        </div>
        <div class="nav-block">
          <h3>章の要約</h3>
          <p><strong>${escapeHtml(chapter?.title_ja || "文書")}</strong></p>
          <ul class="summary-list">
            ${(chapter?.summary || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </div>
        <div class="nav-block">
          <h3>ページ移動</h3>
          <div class="page-links">
            ${data.pages.map((candidate) => `
              <a class="page-link ${candidate.number === currentPage ? "active" : ""}" href="#page-${candidate.number}">${escapeHtml(pageLabel(candidate))}</a>
            `).join("")}
          </div>
        </div>
      `;

      rightNav.querySelector("#tocToggle")?.addEventListener("click", () => {
        tocCollapsed = !tocCollapsed;
        localStorage.setItem(tocKey, tocCollapsed ? "true" : "false");
        renderRightNav();
      });

      for (const link of rightNav.querySelectorAll(".toc-item")) {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const pageNumber = Number(link.dataset.page);
          if (Number.isNaN(pageNumber)) return;
          currentPage = pageNumber;
          document.querySelector(`#page-${pageNumber}`)?.scrollIntoView({ block: "start", behavior: "smooth" });
          renderSidebars();
          if (!activeSelection) renderPagePreview(currentPage, []);
        });
      }

      for (const button of rightNav.querySelectorAll(".figure-card")) {
        button.addEventListener("click", () => selectFigure(button.dataset.figureId, { scroll: false, preservePage: true, keepPin: Boolean(pinnedFigureId) }));
      }
    }

    function renderSidebars() {
      renderGraphPane();
      renderRightNav();
      renderStatus();
      updateFigureLinkHighlights();
    }

    function removeSelectionMarks() {
      for (const paragraph of document.querySelectorAll(".paragraph.selected")) {
        const id = paragraph.dataset.paragraphId;
        const dataParagraph = paragraphById.get(id);
        paragraph.classList.remove("selected");
        paragraph.classList.remove("focused-link");
        if (dataParagraph) paragraph.innerHTML = paragraphInnerHtml(dataParagraph);
      }
    }

    function updateFigureLinkHighlights() {
      for (const paragraph of document.querySelectorAll(".paragraph.linked-to-figure")) {
        paragraph.classList.remove("linked-to-figure");
      }
      const figure = displayedGraphFigure();
      if (!figure) return;
      for (const paragraphId of figure.related_paragraph_ids || []) {
        document.getElementById(paragraphId)?.classList.add("linked-to-figure");
      }
    }

    function clearActiveSelection() {
      activeSelection = null;
      removeSelectionMarks();
      selectionLabel.textContent = "本文または図を選択してください。";
      showOriginal.disabled = true;
      clearSelection.disabled = true;
      sourceText.innerHTML = "<p>選択後に表示します。</p>";
      renderPagePreview(currentPage, []);
    }

    function focusLinkedParagraph(paragraphId, figureId = null) {
      const paragraph = paragraphById.get(paragraphId);
      if (!paragraph) return;
      removeSelectionMarks();
      currentPage = paragraph.page;
      const linkedFigure = figureId && figureById.has(figureId) ? figureId : (paragraph.figure_ids || [])[0] || null;
      activeFigureId = linkedFigure || activeFigureId;
      activeSelection = {
        type: "paragraph",
        ids: [paragraph.id],
        selectedText: paragraph.translation,
        figureId: linkedFigure,
      };
      selectionLabel.textContent = `関連段落: ${shortText(paragraph.translation, 140)}`;
      showOriginal.disabled = false;
      clearSelection.disabled = false;
      const element = document.getElementById(paragraph.id);
      if (element) {
        element.classList.add("selected", "focused-link");
        element.innerHTML = paragraphInnerHtml(paragraph, true);
        element.scrollIntoView({ block: "center", behavior: "smooth" });
      }
      renderSidebars();
      updatePreviewForSelection();
    }

    function selectParagraphsFromSelection() {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0 || !selection.toString().trim()) return;
      const range = selection.getRangeAt(0);
      const paragraphs = Array.from(document.querySelectorAll(".paragraph"))
        .filter((paragraph) => range.intersectsNode(paragraph));
      if (!paragraphs.length) return;

      removeSelectionMarks();
      for (const paragraph of paragraphs) {
        paragraph.classList.add("selected");
        const id = paragraph.dataset.paragraphId;
        const dataParagraph = paragraphById.get(id);
        if (dataParagraph) {
          paragraph.innerHTML = paragraphInnerHtml(dataParagraph, true);
        }
      }

      const ids = paragraphs.map((paragraph) => paragraph.dataset.paragraphId);
      const selectedText = selection.toString().trim();
      const linkedFigureId = ids
        .map((id) => paragraphById.get(id))
        .flatMap((paragraph) => paragraph?.figure_ids || [])
        .find((figureId) => figureById.has(figureId));
      activeSelection = { type: "paragraph", ids, selectedText, figureId: linkedFigureId || null };
      selectionLabel.textContent = `${ids.length}段落を選択: ${shortText(selectedText, 140)}`;
      showOriginal.disabled = false;
      clearSelection.disabled = false;
      renderSidebars();
      updatePreviewForSelection();
    }

    function selectFigure(figureId, options = {}) {
      const figure = figureById.get(figureId);
      if (!figure) return;
      activeFigureId = figure.id;
      if (options.keepPin || pinnedFigureId) setPinnedFigure(figure.id);
      if (!options.preservePage) currentPage = figure.page;
      activeSelection = { type: "figure", figureId: figure.id };
      selectionLabel.textContent = `${figure.label}を選択: ${shortText(figure.caption_ja, 140)}`;
      showOriginal.disabled = false;
      clearSelection.disabled = false;
      if (options.scroll !== false) {
        document.querySelector(`#page-${figure.page}`)?.scrollIntoView({ block: "start", behavior: "smooth" });
      }
      renderSidebars();
      updatePreviewForSelection();
    }

    function overlayHtml(boxes) {
      return boxes.map((box) => {
        const [x0, y0, x1, y1] = box;
        return `<span class="overlay-box" style="left:${x0 * 100}%; top:${y0 * 100}%; width:${(x1 - x0) * 100}%; height:${(y1 - y0) * 100}%;"></span>`;
      }).join("");
    }

    function renderPagePreview(pageNumber, boxes = []) {
      const page = pageByNumber.get(pageNumber);
      currentPreviewPage = pageNumber;
      currentPreviewBoxes = boxes;
      if (page?.quiz) {
        pagePreview.innerHTML = '<p class="empty-state">確認問題ページにはPDFページ画像はありません。本文ページを開くとPDF画像を確認できます。</p>';
        return;
      }
      if (page?.overview || !page?.image) {
        pagePreview.innerHTML = '<p class="empty-state">概要ページにはPDFページ画像はありません。本文ページを開くとPDF画像を確認できます。</p>';
        return;
      }
      const previewLabel = boxes.length ? `${pageTitle(page)} / 選択箇所 ${boxes.length}` : pageTitle(page);
      pagePreview.innerHTML = page
        ? `
          <span class="preview-title">${escapeHtml(previewLabel)}</span>
          <button class="preview-stage" type="button" aria-label="PDFページ${pageNumber}を拡大表示">
            <img src="${escapeHtml(page.image)}" alt="PDF page ${pageNumber}">
            ${overlayHtml(boxes)}
          </button>
          <span class="preview-hint">クリックでPDFページを拡大表示します。</span>
        `
        : '<p>PDFページ画像が見つかりません。</p>';
    }

    function selectionPreviewTarget() {
      if (!activeSelection) {
        return { pageNumber: currentPage, boxes: [] };
      }

      if (activeSelection.type === "paragraph") {
        const paragraphs = activeSelection.ids.map((id) => paragraphById.get(id)).filter(Boolean);
        if (!paragraphs.length) return { pageNumber: currentPage, boxes: [] };
        const pageNumber = paragraphs[0].page;
        return {
          pageNumber,
          boxes: paragraphs.filter((paragraph) => paragraph.page === pageNumber).map((paragraph) => paragraph.bbox),
        };
      }

      const figure = figureById.get(activeSelection.figureId);
      if (!figure) return { pageNumber: currentPage, boxes: [] };
      return { pageNumber: figure.page, boxes: [figure.bbox] };
    }

    function updatePreviewForSelection() {
      const target = selectionPreviewTarget();
      renderPagePreview(target.pageNumber, target.boxes);
    }

    function openPdfModal(pageNumber = currentPreviewPage, boxes = currentPreviewBoxes) {
      const page = pageByNumber.get(pageNumber);
      if (!page || page.overview || !page.image) return;
      pdfModalTitle.textContent = `PDFページ画像: ${pageTitle(page)}`;
      pdfModalBody.innerHTML = `
        <div class="modal-stage">
          <img src="${escapeHtml(page.image)}" alt="PDF page ${pageNumber}">
          ${overlayHtml(boxes)}
        </div>
      `;
      pdfModal.classList.add("open");
      pdfModal.setAttribute("aria-hidden", "false");
    }

    function closePdfModal() {
      pdfModal.classList.remove("open");
      pdfModal.setAttribute("aria-hidden", "true");
      pdfModalBody.innerHTML = "";
    }

    function showOriginalForSelection() {
      if (!activeSelection) return;
      let pageNumber = currentPage;
      let boxes = [];
      let sourceLines = [];
      let label = "";

      if (activeSelection.type === "paragraph") {
        const paragraphs = activeSelection.ids.map((id) => paragraphById.get(id)).filter(Boolean);
        if (!paragraphs.length) return;
        pageNumber = paragraphs[0].page;
        boxes = paragraphs.filter((paragraph) => paragraph.page === pageNumber).map((paragraph) => paragraph.bbox);
        sourceLines = paragraphs.map((paragraph) => paragraph.source);
        label = `${pageByNumber.get(pageNumber)?.overview ? "概要ページ" : `ページ${pageNumber}`} / 段落原文`;
      } else {
        const figure = figureById.get(activeSelection.figureId);
        if (!figure) return;
        pageNumber = figure.page;
        boxes = [figure.bbox];
        sourceLines = [figure.caption_en, ...figure.summary];
        label = `ページ${pageNumber} / ${figure.label}`;
      }

      const page = pageByNumber.get(pageNumber);
      sourceText.innerHTML = `
        <p><strong>${escapeHtml(label)}</strong></p>
        ${sourceLines.map((line) => `<p class="source-line">${escapeHtml(line)}</p>`).join("")}
      `;
      renderPagePreview(pageNumber, boxes);
    }

    function setupPageObserver() {
      const observer = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        const nextPage = Number(visible.target.dataset.page);
        if (Number.isNaN(nextPage) || nextPage === currentPage) return;
        currentPage = nextPage;
        renderSidebars();
        if (!activeSelection) renderPagePreview(currentPage, []);
      }, { root: null, threshold: [0.25, 0.45, 0.65] });

      for (const section of document.querySelectorAll(".page-section")) {
        observer.observe(section);
      }
    }

    applySavedPaneWidths();
    applyMetadataVisibility();
    applyParagraphGuide();
    renderContent();
    renderSidebars();
    renderPagePreview(currentPage, []);
    setupPageObserver();
    if (location.hash) {
      window.setTimeout(() => document.querySelector(location.hash)?.scrollIntoView({ block: "start" }), 0);
    }
    document.addEventListener("mouseup", () => window.setTimeout(selectParagraphsFromSelection, 0));
    document.addEventListener("keyup", () => window.setTimeout(selectParagraphsFromSelection, 0));
    headerMenuToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      setHeaderMenu(!headerActions.classList.contains("menu-open"));
    });
    document.addEventListener("click", (event) => {
      if (!headerActions.contains(event.target)) closeHeaderMenu();
    });
    content.addEventListener("click", (event) => {
      const link = event.target.closest(".paragraph-figure-link");
      if (!link) return;
      event.preventDefault();
      event.stopPropagation();
      const paragraph = link.closest(".paragraph");
      const pageNumber = Number(paragraph?.dataset.page);
      if (!Number.isNaN(pageNumber)) currentPage = pageNumber;
      selectFigure(link.dataset.figureId, { scroll: false, preservePage: true, keepPin: Boolean(pinnedFigureId) });
    });
    metadataToggle.addEventListener("click", () => {
      metadataVisible = !metadataVisible;
      applyMetadataVisibility();
      closeHeaderMenu();
    });
    for (const button of paragraphGuideButtons) {
      button.addEventListener("click", () => {
        paragraphGuideMode = button.dataset.paragraphGuide || "none";
        applyParagraphGuide();
        closeHeaderMenu();
      });
    }
    showOriginal.addEventListener("click", showOriginalForSelection);
    clearSelection.addEventListener("click", clearActiveSelection);
    pagePreview.addEventListener("click", (event) => {
      if (event.target.closest(".preview-stage")) openPdfModal();
    });
    pdfModalClose.addEventListener("click", closePdfModal);
    pdfModal.addEventListener("click", (event) => {
      if (event.target === pdfModal) closePdfModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (pdfModal.classList.contains("open")) closePdfModal();
        closeHeaderMenu();
      }
    });
    graphResize.addEventListener("pointerdown", (event) => startPaneResize("graph", event));
    navResize.addEventListener("pointerdown", (event) => startPaneResize("nav", event));
    resetLayout.addEventListener("click", () => {
      resetPaneWidths();
      closeHeaderMenu();
    });
    closeReader.addEventListener("click", () => {
      closeHeaderMenu();
      window.close();
      if (document.visibilityState !== "hidden") {
        alert("ブラウザのタブを閉じてください。");
      }
    });
  </script>

<style id="viewer-page-close-style">
  .viewer-page-close-button {
    align-items: center;
    background: #ffffff;
    border: 1px solid #d8aaa1;
    border-radius: 8px;
    bottom: 18px;
    box-shadow: 0 8px 22px rgba(24, 33, 47, 0.16);
    color: #a73d2a;
    cursor: pointer;
    display: inline-flex;
    font: 700 14px/1 "Yu Gothic", "Meiryo", system-ui, sans-serif;
    height: 38px;
    justify-content: center;
    padding: 0 14px;
    position: fixed;
    right: 18px;
    z-index: 2147483647;
  }

  .viewer-page-close-button:hover {
    background: #fff2ef;
    border-color: #a73d2a;
  }

  .viewer-page-close-notice {
    align-items: center;
    background: rgba(24, 33, 47, 0.62);
    display: flex;
    inset: 0;
    justify-content: center;
    padding: 24px;
    position: fixed;
    z-index: 2147483646;
  }

  .viewer-page-close-notice-box {
    background: #ffffff;
    border: 1px solid #d8dee8;
    border-radius: 8px;
    box-shadow: 0 12px 30px rgba(24, 33, 47, 0.2);
    color: #18212f;
    max-width: 420px;
    padding: 20px;
    text-align: center;
  }

  .viewer-page-close-notice-box h1 {
    font-size: 1rem;
    margin: 0 0 8px;
  }

  .viewer-page-close-notice-box p {
    color: #617086;
    font-size: 0.9rem;
    margin: 0;
  }
</style>
<script id="viewer-page-close-script">
(() => {
  function showManualCloseNotice() {
    if (document.getElementById("viewerPageCloseNotice")) return;
    const notice = document.createElement("div");
    notice.className = "viewer-page-close-notice";
    notice.id = "viewerPageCloseNotice";
    notice.innerHTML = `
      <div class="viewer-page-close-notice-box">
        <h1>このタブを閉じてください</h1>
        <p>ブラウザの制限により自動で閉じられませんでした。</p>
      </div>
    `;
    document.body.appendChild(notice);
    notice.addEventListener("click", () => notice.remove());
  }

  function closeCurrentPage(button) {
    button.disabled = true;
    button.textContent = "閉じています";
    window.close();
    window.setTimeout(() => {
      if (document.visibilityState !== "hidden") {
        button.disabled = false;
        button.textContent = "閉じる";
        showManualCloseNotice();
      }
    }, 350);
  }

  function addCloseButton() {
    if (window.top !== window.self) return;
    if (document.getElementById("viewerPageClose")) return;
    const button = document.createElement("button");
    button.className = "viewer-page-close-button";
    button.id = "viewerPageClose";
    button.type = "button";
    button.textContent = "閉じる";
    button.title = "このページを閉じる";
    button.addEventListener("click", () => closeCurrentPage(button));
    document.body.appendChild(button);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", addCloseButton);
  } else {
    addCloseButton();
  }
})();
</script>
